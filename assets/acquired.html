  "Pinduoduo": "We kick off Season 7 with a bang: Pinduoduo, the incredible five year-old Chinese mashup of \"Costco and Disneyland\" (as self-described in their IPO prospectus) which recently became the fastest company ever to pass $100B market capitalization. What makes PDD so special, and how were they able to enter a market that everyone considered \"already won\" and disrupt massive entrenched competitors Alibaba and JD.com? This story is chock-full of lessons that apply not only to China tech, but to high-growth company building and investing everywhere.",
  "Oprah (Harpo Studios)": "We close out Season 6 with the story of perhaps the single most successful media entrepreneur of all-time: Oprah Winfrey, and her juggernaut conglomerate Harpo Studios. Born to a poor single mother in the segregated 1950's deep south, Oprah's rise from terrible adversity to wealthiest Black woman in the world ranks among the very greatest American success stories. And oh yeah — along the way she single-handedly created the entire influencer economy, rewrote the blueprint of a modern power broker, and set the world record for most cars given away at one time (276). Sit back, listen and get ready to live your best life.",
  "SpaceX": "On the eve of SpaceX's historic scheduled launch of its first human spaceflight mission — both the first ever by a private company, and the first to take place on American soil in nearly a decade — we tell the incredible story of its rise from ragtag rocket jocks to the most disruptive and advanced force in aerospace today. While much of the Musk spotlight has shone on Tesla in recent years, is SpaceX actually the company that will have the greatest impact on our world's future, and perhaps even other worlds beyond? All of a sudden that idea seems a little less crazy...",
  "Adapting Episode 3: Intel": "When you think of Intel today, you probably think of the microprocessor company. Maybe you also think about about 'Intel Inside' and their famous jingle. You might even think \"big, stable, boring public company\". But for the first two decades of Intel's life, absolutely none of those things were true. Today we tell the incredible story of how the company that started it all in Silicon Valley clawed back from a crisis that brought them to the brink of death, and of one man who rose as the ultimate survivor to become their leader and a legend even in his own time: the late, great Andy Grove.",
  "Special Episode: Jason Calacanis": "We're joined by the one and only Jason Calacanis for this very special episode, wherein we chronicle Jason's journey from a kid porter in the barrooms of Brooklyn to building the largest independent media business in tech, becoming the \"3rd or 4th greatest seed investor of all-time\" (and the original Sequoia Scout), launching one of the top accelerators in the world, and constructing a one-man empire that may just disrupt the entire capital stack in our industry. We dive into how it all ties together, and where the money and power is shifting in the ever changing sands of Silicon Valley...",
  "Adapting Episode 2: Sequoia’s Black Swan Memo (with Roelof Botha)": "On March 5th 2020, Sequoia Capital published a Medium post entitled ‘Coronavirus: The Black Swan of 2020’. The memo minces no words, admonishing founders &amp; CEOs to “question every assumption about your business”, and portends that “as Darwin surmised, those who [will] survive ‘are not the strongest or the most intelligent, but the most adaptable to change.’” We’re joined by longtime Sequoia partner and head of the firm’s US business Roelof Botha to discuss on what Sequoia saw leading up to the memo and why they decided to publish it, how they and their portfolio companies are adapting to the new world it warned of, and what lasting changes might come to Sequoia itself from this moment. For anyone facing hard decisions and/or looking for ways to think about opportunity, this is not one to miss.",
  "Adapting Episode 1: Canlis": "The world has changed. Acquired is changing too: we’re taking a pause from our normal episodes. The world doesn’t need stories of M&amp;A and IPOs right now. But it does still need stories of great companies and great leaders. So we’re taking everything that we’ve put into Acquired - our format, our infrastructure, and the way we can reach all of you - and launching Adapting. Adapting is a series all about doing just that -- changing to fit what the world needs right now, not what it needed last week.",
  "The Top 10 Acquisitions of All-Time": "5 years and 100+ episodes into Acquired, there’s been one question we get asked more than any other: what are the best acquisitions of all-time, and what can we learn from them? We thought it was time to formalize our answers. So here it is, the Acquired Greatest Hits album. :)",
  "Sequoia Capital Part II (with Doug Leone)": "The wait is over. Acquired returns with a very special Part II of the Sequoia Capital story, joined by the very best person in the world to help us tell it - Doug Leone. Since 1996, Doug has served as Sequoia’s Global Managing Partner, in charge of overseeing the firm’s incredible expansion from a single, $150m early-stage fund focused on Northern California to the multi-billion dollar global powerhouse it is today. Doug is incredibly candid and insightful about all that has gone into building the modern Sequoia: from winning Google and missing Facebook, to the enormous (and enormously successful) bet on decentralized expansion in China and India, to the firm’s “proudest moment” at the depth of the dot com bust. This episode is an absolute must-listen for anyone in the tech, startup and venture ecosystems today. Thank you to Doug and all of the Sequoia team for joining us to make it happen!",
  "WhatsApp": "We kick off Season 6 with a long-awaited Acquired Classic: Facebook’s $22B purchase of WhatsApp in 2014, which still ranks as the largest acquisition of a private VC-backed startup in history. Yet despite that enormous pricetag and all its associated fanfare, as we sit here 5+ years later WhatsApp actually generates LESS revenue than the meager ~$20m it was bringing in at the time of acquisition. Was this this worst acquisition of all-time, or a brilliant strategic chess move by Mark Zuckerberg &amp; co? Tune in as we render Acquired’s judgement!",
  "The Lean Startup and the Long-Term Stock Exchange (with Eric Ries)": "Season 5, Episode 10: The Lean Startup and the Long-Term Stock Exchange (with Eric Ries)",
  "Convoy (with CEO Dan Lewis)": "Coming to you live from the University of Washington, Ben and David are joined by hundreds of awesome Seattle listeners (and a few non-Seattle listeners!) to cover the meteoric rise of trucking industry disruptor and hometown hero Convoy. How did Dan and Convoy go from nervously conducting market research at truck stops on I-5 to one of the largest logistics companies and fastest-growing startups in the world in just four short years, raising over $650m (not a typo) along the way? Tune in to find out!",
  "TikTok": "We take Acquired to the Old Town Road to cover the amazing story behind the biggest global sensation of 2019 — and the highest valued private startup in the world — TikTok. How did a mid-30 year old UX architect at enterprise software giant SAP wind up creating Gen Z’s favorite social app that’s now rivaling Instagram in global MAU? Why is a 2017 merger of two Chinese companies being branded a US national security threat and retroactively placed under review by CFIUS? And perhaps most importantly, why is TikTok such an important product &amp; technology innovation that all of us should be learning from? Tune in for all the answers!",
  "Disney, Plus": "The Flywheel is strong with this one. We dive deep into the origins of one of the boldest business strategy decisions of our time: Disney CEO Bob Iger’s attempt to buck the Innovator’s Dilemma - and forego billions of dollars in cashflow from Netflix and pay TV providers - in order to establish a direct distribution relationship with its customers for the first time in the company’s history. Is this the force awakening within the house that Walt built, or a phantom menace that will drag Disney to the dark side of unprofitability? Tune in to find out!",
  "The WeWork “Acquisition” (with Dan Primack)": "It’s an IPO, it’s a bailout, it’s an... acquisition? We’re joined by the one and only Dan Primack from Axios to recount the epic saga of the We Company in all its tragic glory. How did this business somehow go from chopping up commercial real estate to elevating global consciousness to rewarding its ousted CEO with a $1.7B “platinum parachute”, all while the company can’t afford severance for thousands of soon-to-be laid-off employees? Where did it all go wrong? And most importantly, who gets the Gulfstream G650??",
  "Season 5, Episode 5: Atari (with Nolan Bushnell)": "We’re joined by the legendary Nolan Bushnell, founder not only of Atari, but also the only person ever to hire Steve Jobs, the recipient of Sequoia Capital’s first-ever investment, and the creator of Chuck E. Cheese, the canonical GPS navigation arrow, and a little project that would go on to become Pixar. We cover it all in this special episode!",
  "Sequoia Capital (Part 1)": "Acquired dives into the history behind storied venture firm Sequoia Capital and its legendary founder, Don Valentine. Part 1 tells Don’s story, starting from humble beginnings born to uneducated parents in Yonkers, NY, through shaping the fabric of Silicon Valley first as head of Sales &amp; Marketing at both Fairchild and National Semiconductor, and then for generations to come via his pioneering concept of “company building” at Sequoia Capital. No matter where you sit in the ecosystem today, Don and the companies he helped build laid the foundation for nearly everything technology has become over the past 60 years.",
  "Google Maps": "Ben and David cover the series of three 2004 Google acquisitions that formed the core of Google Maps as we know and love it today: Where 2 Technologies, Keyhole and ZipDash. From nearly zero adoption between the three companies at the time of acquisition to well over 1 billion users today, does Google Maps merit admission to the hallowed Acquired A+ pantheon? Tune in to find out!",
  "The Shopify IPO": "Ben and David head north of the border to Ottawa, Canada to cover perhaps one of the greatest IPO success stories of the past 5 years, Shopify. From humble beginnings as a “lifestyle business” hawking hipster snowboard gear online to now routinely mentioned in the same breath as Amazon, the tale of Shopify and its incredible CEO Tobi Lütke’s ascent is not one to miss!",
  "Huawei": "For our first episode of Season 5, Acquired returns to Shenzhen to cover another Chinese technology giant, this one slightly... different from our past subjects: Huawei. From a backwater importer of PBX switches to the world’s second largest handset manufacturer and near-undisputed leader in 5G infrastructure technology, Huawei’s ascent over the past 30 years has been nothing short of spectacular, equaled only by the spectacular fireworks of recent events surrounding the company. What’s the story behind this global telecom giant, and what does its future portend for global tech and US - China relations? We dive in.",
  "Superhuman (with CEO Rahul Vohra)": "We wrap up Season 4 with a very special (and accidental!) episode, a conversation with the CEO of Superhuman, the red hot email productivity app which just announced their $33m Series B led by Andreessen Horowitz. While originally intended as a limited release episode, we felt Superhuman would provide the perfect bookend to our “modern enterprise productivity trilogy” following our Zoom and Slack episodes. We hope you enjoy the conversation with Rahul as much as we did, and we’ll see you later this summer for Season 5!",
  "The Slack DPO": "It’s a bird! It’s a plane! It’s an... enterprise software company? We give the full Acquired treatment to newly-public Slack, one of the most extreme and successful pivots of all-time. From a log cabin in Canada to a never-ending game and back again, Slack’s journey has more twists and turns than a Hobbit’s tale. Tune in for one APLUSS story you don’t want to miss!",
  "The Zoom IPO (with Santi Subotovsky)": "Zoom board member (and general partner at Emergence Capital) Santi Subotovsky joins us to tell the true underdog story behind the hottest IPO of 2019. Together we trace founder Eric Yuan’s incredible journey from immigrant software developer, who didn’t speak any English upon arriving in Silicon Valley in 1997, to Glassdoor’s #1 rated CEO in America in 2018. In an age where border walls have replaced open doors in Washington, and burn rates and privacy scandals have sidelined Silicon Valley’s pretense of making the world a better place, there is no better reminder than Zoom of everything that can be great about our country and our industry.",
  "The Electronic Arts IPO (with Trip Hawkins)": "Acquired looks back at a monumental IPO from a *much* different era: Electronic Arts. We’re joined by EA’s founder Trip Hawkins to tell the incredible story of how he built the company that made video games mainstream. Starting from his high school years as both a geek and a jock, to then working for Steve Jobs as one of Apple Computer’s first employees and later completely changing the world of sports with John Madden Football, Trip always had a clear vision for what EA could become and what magic could happen at the intersection of technology and the liberal arts.",
  "The Uber IPO": "Welcome to the big one. On the day of its IPO, we tell the story of Uber. It’s a story whose roots stretch back 130 years, but whose impact reverberates perhaps more powerfully on our current world than any other. A story that, in all of its greatness and in all of its ugliness, may just be the story of our time.",
  "The Pinterest IPO": "In the second episode of our APLUSS(Z!) IPO saga, we dive into the history behind the planet’s largest non-social social network, Pinterest. From The Pirates of Silicon Valley to the bloggers of Salt Lake City, the creation story behind this “productivity tool for planning your dreams” is far from your typical unicorn journey. Once labelled as the “next Facebook” by investors and press, ten years later both Pinterest-the-product and Pinterest-the-company are in fact anything but. Whether that’s a good thing or a bad thing… tune in to find out!",
  "The Lyft IPO": "Call it the playoffs. Call it the Olympics. Call it March Madness. No matter which sports analogy you borrow, it falls short of capturing what Lyft's IPO yesterday kicked off in the tech world. A generational changing of the guard from the FAANG to the APLUSS (Airbnb, Pinterest, Lyft, Uber, Slack, Stripe). A breaking of the liquidity dam that's kept capital, technology and talent locked up in a small number of Silicon Valley winners for longer than ever in history. And most importantly, a public market avenue for investing in the largest single market created since the advent of the internet. Acquired is live on the scene recounting and analyzing the history of Lyft (and ridesharing broadly) in every exquisite detail!",
  "Season 4, Episode 3: Instagram Revisited (with Emily White)": "We enter the wayback machine and revisit the subject of Acquired’s second ever episode, Facebook’s bombshell 2012 acquisition of Instagram — this time with the help of then-Facebook executive Emily White, who moved over post-acquisition to become Instagram’s first business head. Together with Kevin and Mike, Emily helped build Instagram's business model, which today accounts for nearly 1/4 of all of Facebook’s revenue. Is this still Acquired’s canonical A+ with an extra 3.5 years of hindsight? Spoiler alert: yes.",
  "Spotify + Gimlet/Anchor Quick Take + Worldwide Meetup Details!": "Spotify + Gimlet/Anchor Quick Take!",
  "Season 4, Episode 2: ARM &amp; SoftBank": "We dive into the crazy, little-known story of how this small, former PC-maker in Cambridge, England dethroned Intel, saved Apple from bankruptcy, became the blueprint for the largest investment fund in history, and of course now powers just about every device you use today. From Issac Newton to the Apple Newton, the Vision Fund and beyond, ARM has had an impact on the technology industry that cannot be overstated!",
  "Season 4, Episode 1: ESPN": "Booyah! Acquired, the worldwide leader in acquisitions and IPOs, kicks off Season 4 with a classic: ESPN. How did a failed former TV weatherman end up building the world’s most valuable media company on top of a dump (quite literally) in Bristol, Connecticut? We follow the incredible entrepreneurial journey from Getty Oil diversification strategy to Berkshire Hathaway home run to Disney crown jewel. This Is Awesome, Baby!!",
  "Season 3, Episode 10: Tencent": "We close out Season 3 and our China mini-series with a monster episode on Tencent, the Shenzhen-based social networking and entertainment powerhouse. We dive deep into the story of Pony Ma and his cofounders’ incredible journey from making software for pagers(!) to QQ, WeChat, League of Legends, Fortnite, Snapchat and even Tesla. This is one finale you don’t want to miss!",
  "Season 3, Episode 9: Netflix (Part 2)": "We complete our two-part Netflix special with the company’s bold transition to streaming, including of course the most (in)famous spin-out in business history. Rising from the ashes of Qwikster, we chronicle Netflix’s rebirth as a media company and long journey back to the top of the FAANG mountaintop!",
  "Season 3, Episode 8: Netflix (Part 1)": "In a world ravaged by late fees and lack of rewinding, one man two men from a sleepy California beach town make a stand against tyranny, daringly dethrone an evil empire and… oh who are we kidding, they just copied Amazon’s business plan for books and applied it to movie rentals. But as always there is much more to the story than that! We dive into the fascinating, true, and oft-untold history of Netflix in our first two-part special on Acquired. Part 1 covers Netflix’s original DVD rental business from founding to 2009, and next time on Part 2 we’ll cover the (rocky) transition to streaming from 2010 to present. Buckle up for a wild ride!",
  "Acquired Season 3 Episode 7: Venmo (live with Andrew Kortina)": "Ben &amp; David are joined by special guest and Venmo cofounder Andrew Kortina for our first-ever SF live show! In front of a packed house we chronicle the journey of how two freshman-year roommates from Penn turned a healthy obsession with Craigslist and a fake podcast into an app that facilitated $17B of payments last quarter alone, producing not one but two landmark acquisitions along the way!",
  "Season 3, Episode 6: Behance (with Scott Belsky)": "Ben and David are joined by Adobe’s Chief Product Officer, Behance founder, Benchmark partner, author, and product luminary, Scott Belsky, to tell the story of Adobe Systems’ 2012 acquisition of Behance. We dive into the role it played in of one of the greatest (and least well-known) pivots of all time: Adobe’s transition from packaged software to services, which over the past 6 years has generated an astounding $100B+ in market cap and nearly 10x growth in Adobe’s share price!",
  "Season 3, Episode 5: Alibaba": "We continue our China Tech series with perhaps the most incredible entrepreneurial journey in history: Alibaba and its indefatigable founder, Jack Ma. How did an unknown 30 year-old English teacher from a second tier Chinese city build the world’s 7th largest company by market cap (and the largest in China) in just 20 short years? This is one story you don’t want to miss.",
  "Season 3, Episode 4: Recode (with Kara Swisher)": "In this special episode Ben &amp; David head to Recode’s SF office and sit down in the red chair with the one &amp; only Kara Swisher! Kara tells the story of Recode, from the beginnings of her partnership with Walt Mossberg in the late 90’s at WSJ to the launch of the D Conference and the All Things D blog, to starting Recode and ultimately being acquired by Vox Media in 2015. Kara is someone we’ve long looked up to at Acquired, and it was really special to have her join us on the show. We hope you enjoy the conversation as much as we did!",
  "Season 3, Episode 3: The Sonos IPO": "Ben and David are (almost) live on the scene covering the plucky Southern California “camera company”… uh wait, wrong episode… we mean *speaker* company’s IPO! Continuing the long Acquired tradition of analyzing companies at the intersection of music, tech and business, we discuss the past, present and future of Sonos in world where speakers actually now… speak!",
  "Season 3, Episode 2: The Xiaomi IPO": "Acquired kicks off our China tech mini-series by teaming up with the best in the business: Hans and Zara from GGV’s 996 Podcast! Together we cover the largest technology IPO in the world since fellow China tech giant Alibaba in 2014: Xiaomi, where Hans has been an investor and board member from the very beginning. This episode is chock full of history and insight on both Xiaomi and what’s happening in China tech more broadly, and why we all should be paying attention. No matter where you live, this is definitely not one to miss!",
  "Season 3, Episode 1: Tesla": "Acquired kicks off Season 3 with a gangbuster two-hour extravaganza on America’s most successful automotive startup since The Ford Motor Company: Tesla. We cover everything, from founding to its 2010 IPO to all that’s happened since, including the question on the minds of superhero fans everywhere: who came first, Elon Musk or Tony Stark? (Spoiler: Elon)",
  "Season 2, Episode 10: The Rover-DogVacay Merger (with Rover CEO Aaron Easterly)": "Acquired wraps up Season 2 with our first “elusive” private-private merger: Rover.com and its 2017 combination with rival pet care marketplace DogVacay. We’re joined by Rover CEO Aaron Easterly to dive into the full history of how the crazy idea of “Airbnb for dogs” not only became a billion-dollar company, but also brought our heroes together for the first time and led to the founding of Acquired!",
  "Season 2, Episode 9: GitHub": "We’re live on the scene the day following the biggest announcement in the open source software world since well, open source software: Microsoft acquiring GitHub for $7.5B in stock. How did we get here? What does it mean for software developers going forward? And most importantly, why is there a creepy half-cat / half-octopus plastered all over everything? As always, Acquired has the answers.",
  "Season 2, Episode 8: T-Mobile / Sprint": "If you thought the telecom business was boring, think again! Acquired brings you an episode packed with more drama than an entire season of Game of Thrones. Starting with a death in the family, we follow a tale of fortunes lost and rebuilt, bitter battles between rivals who once worked for each other, and at the center of it all, a lesson in the power of stable cashflow businesses. This is one call you don’t want to drop!",
  "Season 2, Episode 7: PowerPoint": "Acquired returns with a classic, delving into Microsoft’s first acquisition ever: Forethought Inc, the makers of PowerPoint. Hate it or love it, you can’t deny the combined companies’ impact: by the early 90’s PowerPoint had transformed the way businesses, educators and governments communicate, ensuring job security for pointy-haired Dilbert bosses everywhere.",
  "Season 2, Episode 6: Spotify’s Direct Listing": "Acquired wraps up a big few weeks of coverage with not an IPO or an M&amp;A or a fundraising round, but what’s still the largest tech exit in recent memory: Spotify’s $30B direct public listing. We dive into what it all means and how we got here: from Napster to iTunes to Facebook (and even some Justin Timberlake thrown in for good measure). Acquired FM is on the scene and spinning all the hits from this new wave music industry titan!",
  "Season 2, Episode 5: The Dropbox IPO": "Acquired is live on the scene following Dropbox’s public market debut. From playing a central role in the early days of Y Combinator, to having Steve Jobs famously label the company a “feature not a product”, to pivoting from consumers to enterprise to developers and back again, the silicon valley history runs deep with this one. What twists and turns lie ahead for Dropbox as a public company? We speculate!",
  "Season 2, Episode 4: SoftBank, Fortress and the Vision Fund": "Acquired dives into the topic on the minds and lips of just about every VC and founder these days: SoftBank’s $93B+ Vision Fund, and its seemingly-overnight rewriting of the rules of venture capital and startup fundraising. Where did this new 800lbs gorilla come from, what are its goals, and what does it mean for the future of silicon valley and the global tech ecosystem? The answer, it turns out, starts with an acquisition, and unfolds into a story no one has yet told and few yet understand. Luckily our heroes are on the case!",
  "Season 2, Episode 3: Nest": "Acquired brings it all back home—to the smart home that is—with Google’s 2014 acquisition of Nest for $3.2B. From Nest cofounder Tony Fadell’s first job at General Magic (alongside future Android founder Andy Rubin) to his days as “father of the iPod” under Steve Jobs at Apple, the Silicon Valley history runs deep with this one. But did that make the acquisition a good move for Google in the coming battle with Amazon’s “Lady A” for control over consumers’ homes? We dive in!",
  "Season 2, Episode 2: Raising a Seed Round with Against Gravity CEO Nick Fajt": "We launch mini-series on Acquired with a subject near &amp; dear to our heroes’ hearts: startup fundraising! This has been one of our most-requested new topics, and we’re excited to kick things off with makers of the popular Rec Room social VR app, Against Gravity, which raised one of Seattle’s hottest venture rounds in recent history: a $4m seed led by Sequoia Capital in 2016. CEO Nick Fajt joins to tell the story from company inception to building and shipping the initial product, fundraising as a first-time CEO, what they’ve been able to accomplish with the capital and their vision for the future. We had a blast touching on many classic Acquired themes for the first time “in-action” with a young, growing company, and hope you all enjoy the discussion as much as we did. Let us know what you think in the Slack!",
  "Season 2, Episode 1: Zappos (with Alfred Lin)": "Former Zappos Chairman &amp; COO (and current Partner at Sequoia Capital) Alfred Lin joins our heroes to kick off Season 2 with a classic: Amazon’s 2009 acquisition of the internet’s quirkiest online retailer for $1.2B in stock. How did three Harvard undergrads go from delivering pizza to their dorm to delivering happiness to the world — and become in the process one of the few companies ever to compete successfully head-to-head against Amazon in commerce? Tune in to find out!",
  "Episode 51: 2017 Holiday Special": "Acquired cozies up to the fire and looks back on the year in tech. How wildly off were we on last year’s predictions? What does the next year have in store? Most importantly, what price will Bitcoin be trading at in December 2018??? Pour yourself a glass of your favorite holiday beverage and kick back with us.",
  "Episode 50: Apple - Beats": "Acquired crosses the half-century mark with an instant classic: Apple’s 2014 purchase of Beats, its largest acquisition ever. If you knew Beats as just another headphone company, think again—the history on this one will keep your heads ringin’.",
  "Episode 49: The Stitch Fix IPO": "Ben and David dive into the most talked-about tech IPO of 4Q 2017: Stitch Fix. After downsizing the offering and pricing below the range, does this signal a warning that public markets won’t value high-flying silicon valley “disruptors” as high as VCs hope? Or is this a textbook example of a great return for a disciplined management team and well-run company? Most importantly, what happens next? Tune in for our heroes’ take.",
  "Episode 48: Qualcomm - Broadcom": "Ben &amp; David cover the proposed largest tech M&amp;A deal of all time, and in the process dive into the evolving dynamics of the industry that started everything in Silicon Valley—silicon. Just when VCs thought innovation was dead in semiconductors, a new wave of startups and large companies are redrawing the lines of competition in an industry dominated for a half-century by the “Wintel” duopoly of Intel and Microsoft.",
  "Episode 47: The Atlassian IPO": "Ben &amp; David venture to the land down under (and reunite in-person!) to tell the story of the granddaddy of all bootstrapped tech success stories, collaboration software company Atlassian. How did two plucky college grads from Sydney, Australia go from just trying to escape working for the man to becoming two of the top 10 wealthiest people in the entire country, all without raising a dollar of venture capital? We dive in.",
  "Episode 46: Blue Bottle Coffee": "Today our heroes cover a deal that might have more impact on life in Silicon Valley than AI, wearables and AR/VR combined… Nestle’s acquisition of Blue Bottle Coffee. Will hipster entrepreneurs and the VCs who love/need them continue to line up around the block for their minimalist coffee experience of choice, now that it’s owned by the Nesquik Bunny? Is this the beginning of Blue Bottle pod machines filling the empty counter space left by Juicero’s demise in VC offices throughout South Park? We investigate.",
  "Episode 45: HTC, Google and the Future of Mobile": "Acquired is back and live on the scene! After months of speculation, Google announces today their acquisition (err, \"Cooperation Agreement”) of a large portion of HTC’s hardware division. What does this mean for the future of mobile? Can Google transform itself into a vertically integrated device company and compete directly with Apple? Most importantly, when will we see more  Beats Android handsets??? (We hope never)",
  "Episode 44: AOL - Time Warner (with the Internet History Podcast)": "On this extra-long episode of Acquired, Brian McCullough from the Internet History Podcast returns to discuss perhaps the most (in)famous merger of all time: AOL - Time Warner. Who doesn’t remember the soothing sounds of 56k modems and the timeless phrase, “You’ve Got Mail”? Join us all as we unpack how one of the biggest ISP’s of the 90’s tried to take over the world… and fell far short.",
  "Episode 43: The Square IPO": "Unicorns and ratchets and lawsuits, oh my! Our heroes dive into the history of Jack Dorsey’s famous “other” company, Square. Was the Square IPO a canary in the coal mine signaling doom &amp; gloom for the so-called unicorn companies of the early 2010’s, or a mispriced and misunderstood diamond in the rough? Acquired weighs in.",
  "Episode 42: Opsware (with special guest Michel Feaster)": "Acquired dives into the legendary acquisition of Ben Horowitz &amp; Marc Andreessen’s “second act” software company Opsware, from a perspective never before heard—HP’s side of the story! Our heroes are joined by Michel Feaster, who led both the acquisition for HP and then the Opsware product as part of the integrated company afterward under Ben Horowitz. Today the tables have turned: Michel is the Co-Founder and CEO of Seattle-based startup Usermind, and Ben Horowitz sits on her board on behalf of A16Z. This episode is not one to miss!",
  "Episode 41: Booking.com with Jetsetter &amp; Room 77 CEO Drew Patterson": "Acquired trains its lens on the “second or third best acquisition of all-time”, Priceline’s 2005 purchase of Booking.com. Our heroes are joined by friend-of-the-show and former Jetsetter &amp; Room 77 CEO Drew Patterson to help understand how this little-known startup from The Netherlands grew into the largest travel company in the world, with nearly $8B in annual revenue. Was this deal even better than Instagram??? We debate, hotly.",
  "Episode 40: Activision Blizzard": "Ben &amp; David cover the creation of the gaming world’s equivalent of the 70’s rock supergroup: the 2008 merger of Blizzard and Activision. We tell the story from the Blizzard perspective, tracing the history of one of the most innovative companies in the business from humble beginnings at the hands of UCLA undergrads, to surviving multiple acquisition rollups (including at one point being owned by the French national water company), to joining ultimately with Activision to form the largest gaming company in the world, all while inventing multiple game genres that define the industry as we know it today.",
  "Acquired Episode 39: Whole Foods Market": "Ben and David are once again live on the scene, this time covering the biggest disruption in grocery since… well, sliced bread: Amazon’s $13.7B purchase of Whole Foods Market. We place this deal in context by diving deep into the long, intertwining history of grocery, tech and Amazon, from the infamous dotcom flameout Webvan (domain name now owned by Amazon) to its much more successful progeny Kiva Systems (acquired by Amazon in 2012) to current Silicon Valley unicorn Instacart (founded by former Amazon logistics engineer Apoorva Mehta). One thing is clear: for Amazon and Jeff Bezos, realizing the longterm vision of the Everything Store truly means building the everything store.",
  "Acquired Episode 38: SoundJam (iTunes)": "Ben &amp; David revisit the birth of the digital music revolution and Steve Jobs' \"digital hub\" strategy, with Apple's 2000 acquisition of the Mac music player SoundJam MP, which would go on to become iTunes. We relive the 90's with brushed metal interfaces, music visualizers and of course, software sold in (physical) boxes.",
  "Episode 37: BAMTech, Disney and \"the Biggest Media Company You've Never Heard Of”": "Ben and David continue Acquired’s “tech and sports” mini-series with Disney’s 2016 acquisition of a minority stake (with the right to purchase a majority stake at a later date) in BAMTech, the internet streaming company originally founded as part of Major League Baseball in the early 2000’s. However the importance of this story goes deeper than just sports, with major ramifications for nearly every major technology company from Amazon to YouTube. Even if you’re not not sure if baseball’s played on a diamond or a gridiron, tune in as we swing for the fences in predicting the future of TV!",
  "Episode 36: The LA Clippers": "In honor of start of NBA playoffs, Ben &amp; David venture off the beaten path to explore one of Steve Ballmer’s most famous acquisitions, his 2014 purchase of the Los Angeles Clippers NBA franchise. Was this landmark purchase a steal or a turnover for the former Microsoft CEO? We speculate wildly!",
  "Episode 35: Oculus": "Ben &amp; David transcend the barriers of “real” reality, and dive into Facebook and Mark Zuckerberg’s geek-eutpoia vision of the future of gaming, social, and maybe even the entire internet: strapping goofy-looking goggles to your face. Is VR for real this time or are we living through another Virtual Boy moment? Tune in to find out!",
  "Episode 34: The Starbucks IPO with Dan Levitan": "Ben &amp; David \"pour over\" the 1992 IPO of the legendary Seattle coffee company with the help of Dan Levitan, who served as lead investment banker on the IPO and who would later co-found the venture capital firm Maveron with Starbucks’ CEO Howard Schultz.",
  "Episode 33: Overture (with the Internet History Podcast!)": "Episode 33: Overture (with the Internet History Podcast!)    Ben &amp; David dive deep into the early days of internet search, with the help of the best in the internet history business: Brian McCullough from the Internet History Podcast! We are huge fans of IHP at Acquired, so this was a real treat to collaborate with Brian and the great work he does over there. In this episode we cover the story of how a small incubator in Southern California spawned perhaps the greatest tech business model of all-time, Yahoo!’s fumbling of that golden opportunity, and Google’s recovery of that fumble to cross into the end zone of tech history behind the biggest moat ever constructed on the internet.",
  "Episode 32: The Snap Inc. IPO": "Snap! Acquired is live on the scene reporting from the \"Super Bowl\" of 2017 tech events: Snap Inc's hugely anticipated (and just plain huge) IPO. What does the future hold for this plucky “camera company”? Will Snap's IPO endure as tech's most important picture-frame since the  2012 debut of Facebook, or is it destined to fade as just another snapshot? We debate!",
  "Episode 31: The Uber - Didi Chuxing Merger with Brad Stone, author of The Upstarts &amp; The Everything Store": "Topics covered include:",
  "Episode 30: P.A. Semi + AuthenTec": "Topics covered include:",
  "Episode 29: Special—2016 Review and 2017 Predictions": "Ben &amp; David wrap up 2016 with a review of the top tech themes we discussed on the show this year, and look forward to which themes we think will be relevant in the coming year. Can our hosts predict the future? Tune-in in 2018 to find out!   Note: we apologize for the less-than-amazing audio quality on this one. We’re still working on tuning our remote recording setup! ",
  "Episode 28: The Amazon IPO with original Amazon Board Member Tom Alberg": "Ben &amp; David welcome very special guest Tom Alberg, board member and first lead investor in Amazon.com, to cover the IPO of \"earth’s most customer-centric company\". From longterm thinking to flywheels to riding big waves, this episode is chock full of lessons and stories from the journey of building one of tech’s most iconic franchises. We hope you enjoy listening as much as we did recording it!",
  "Episode 27: Special—A Conversation with Microsoft's Head of Strategic Investments Brian Schultz": "Topics covered include:",
  "Episode 26: Marvel": "Topics covered include:",
  "Episode 25: The Facebook IPO": "Hey Acquired listeners. A note about this show: we recorded this episode the night before the 2016 Election Day in the US. At the time, the biggest change we saw coming was adding a new type of content to Acquired in analyzing IPO’s, which we introduce in this episode. Two days later, we woke up to a very different world than the one we were expecting. Reflecting on what’s happened, and the past few months of our show, we wanted to say two things:",
  "Episode 24: Skype": "An acquisition so wild and crazy, they had to do it again. And again. Ben &amp; David cover tech’s perhaps most-traded asset, Skype (which also happens to be a fantastic business). How do we even know which deal to grade? Tune in to find out…",
  "Episode 23: NeXT (Live show at the GeekWire Summit)": "Ben &amp; David broadcast live from the 2016 GeekWire Summit covering one of the all-time greats, Apple’s 1996 acquisition of NeXT. This episode has it all: the Steve Jobs hero story, Apple, I.M. Pei, Ross Perot, Aaron Sorkin, Nobel Laureates and… Gil Amelio? Does NeXT rank atop the best acquisitions ever? Our own heroes cast their votes.",
  "Episode 22: Zillow + Trulia (with Zillow Group CFO Kathleen Philips)": "CFO of Zillow Group Kathleen Philips joins Ben and David to cover the show’s first true “merger” versus “acquisition\" (only took 22 episodes!), Zillow’s 2015 combination with Trulia to form Zillow Group.   Note: our audio glitches unfortunately continued on this episode, and quality is rough. We recommend listening on speakers vs headphones if you’re able. We apologize and will be back to normal quality next time! ",
  "Episode 21: Inside the M&amp;A Press with Bloomberg's Alex Sherman": "Ben and David go inside the M&amp;A press with Bloomberg’s technology M&amp;A reporter and host of the Deal of the Week Podcast, Alex Sherman. If you’ve ever wondered how stories about big deals get broken or what “according to people familiar with the matter” really means, tune in for the behind-the-scenes scoop!   Note: A technical glitch with our recording setup created occasional short silences between Alex’s comments and Ben &amp; David’s. It shouldn’t impact listenability, but we apologize for the awkward pauses! ",
  "Episode 20: Android": "Ben &amp; David examine Google’s 2005 purchase of Android for a rumored $50M, undeniably one of the best technology acquisitions of all time. But will it top the list of these tough graders? Tune in to find out.",
  "Episode 19: Jet": "Ben &amp; David break down Jet.com’s meteoric rise, culminating in Walmart’s blockbuster $3B+ acquisition of the company just two years after its founding. Will we look back on this deal as an ‘Instagram-like’ bargain or a ‘Pets.com'-sized blunder? And most importantly, can *anyone* compete with Amazon going forward? We speculate wildly.",
  "Episode 18: Special—An Acquirer’s View into M&amp;A with Taylor Barada, head of Corp Dev at Adobe": "Ben &amp; David are joined by special guest Taylor Barada, VP and Head of Corporate Development &amp; Strategic Partnerships at Adobe, to discuss how large tech acquirers approach buying companies. This episode is full of great insights for startups &amp; entrepreneurs who might find themselves navigating the M&amp;A process, as well as anyone curious about the craft of dealmaking and the strategic approach of large acquirers.",
  "Acquired Episode 17: Waze": "Topics covered include:",
  "Acquired Episode 16: Midroll + Stitcher (acquired by Scripps)": "The meta show: Ben and David turn their gaze inward and examine the podcasting industry through E. W. Scripps’ recent acquisitions of the Midroll podcast advertising network and Stitcher podcast client. Featuring discussion of our own product process and metrics at Acquired.",
  "Acquired Episode 15: ExactTarget (acquired by Salesforce) with Scott Dorsey": "Ben and David return to make their first foray into enterprise software, covering Salesforce’s $2.5B acquisition of ExactTarget in 2013 with the help of special guest and ExactTarget cofounder &amp; CEO, Scott Dorsey.   Technical note: due to an issue we didn’t catch during recording, audio quality is significantly lower than usual for this episode (especially David’s voice). We apologize but hope you’ll give it a chance anyway— Scott offers great wisdom &amp; insights, and the ExactTarget success story is a inspiring one underdog entrepreneurs, especially (but not limited to!) anyone located in the Midwest or elsewhere outside of traditional \"Silicon Valley-style” tech hubs. Sponsors:",
  "Episode 14: LinkedIn": "Ben and David cover the 3-day-old acquisition of LinkedIn by Microsoft for $26.2 billion. They cover LinkedIn’s founding story by Reid Hoffman, break down their core businesses, analyze recent stock behavior, and speculate on the future of the company inside Microsoft. The big question - were they worth the price tag?",
  "Episode 13: Push Pop Press (Facebook Instant Articles) with Todd Bishop": "Ben and David are joined by Todd Bishop, technology reporter and co-founder of GeekWire, to discuss Facebook's 2011 acquisition of Push Pop Press.",
  "Episode 12: Snapchat": "Ben and David tackle their first failed acquisition: Facebook's 2013 offer to buy Snapchat. They cover the fascinating story of Snapchat's creation and growth, their blossoming business model, how it would be different inside of Facebook, and what the future holds.",

  "Acquired Episode 10: Virgin America": "Ben and David deviate entirely from the stated purpose of the show, tackling this non-technology acquisition that is so recent, we have no idea if it went well yet. But, the April 2016 acquisition of Virgin America by Alaska Airlines was so fascinating, we had to do it!",
  "Episode 9: Writely (Google Docs)": "Ben and David continue the cloud productivity saga with Google Docs. They examine the suite of acquisitions made by Google with a focus on Writely in 2006. They tackle:",
  "Episode 8: Acompli, Sunrise, and Wunderlist (w/ Kurt DelBene)": "Ben and David have special guest Kurt DelBene on to discuss Microsoft's acquisition of Acompli, Sunrise, and Wunderlist. Kurt is the EVP of Corporate Strategy and Planning at Microsoft, and joins to discuss Microsoft’s cloud-first, mobile-first strategy, and the importance of being cross-platform in the modern era. They cover:",

  "Episode 3: Twitch": "Ben and David discuss Amazon's acquisition of Twitch in 2014. Unlike previous episodes, this recent acquisition still has a lot of open questions, and Amazon hasn't publicly reported growth of Twitch since the purchase. Ben and David talk about Justin Kan's original product with Justin.tv, and the transformation into the Twitch that Emmett Shear is running today.",

        let books = [];
        let groupedData = {}; // { "Episode Name": [book1, book2] }
        let episodes = [];
        let episodeDescriptions = {}; // Add descriptions state
        
        // Search State
        let searchQuery = '';
        let searchScope = null; // 'ep', 'tag', or null
        let autocompleteSelectedIndex = -1;

        // --- DOM ELEMENTS ---
        const scrollContainer = document.getElementById('scroll-container');
        const episodeList = document.getElementById('episode-list');
        const resultsCount = document.getElementById('results-count');
        
        const searchInput = document.getElementById('search-input');
        const searchWrapper = document.getElementById('search-wrapper');
        const clearSearchBtn = document.getElementById('clear-search-btn');
        const autocompleteDropdown = document.getElementById('autocomplete-dropdown');
        
        const sidebar = document.getElementById('sidebar');
        const drawerOverlay = document.getElementById('drawer-overlay');
        const detailDrawer = document.getElementById('detail-drawer');
        const drawerContent = document.getElementById('drawer-content');

        // --- DATA FETCHING ---
        async function fetchBooks() {
            try {
                // Fetch books and descriptions in parallel
                // Data is now inlined
/*
                    fetch('books.json'),
                    fetch('episodes.json').catch(() => ({ json: () => ({}) })) // Fallback if missing
                */
                
                const data = inlineBooksData;
                episodeDescriptions = inlineEpisodesData;
                
                // Add internal IDs and group
                books = data.map((b, index) => ({...b, internalId: index}));
                
                // Group by episode
                books.forEach(b => {
                    const epName = b.episodeRef ? b.episodeRef.name : 'Unknown';
                    if (!groupedData[epName]) groupedData[epName] = [];
                    groupedData[epName].push(b);
                });

                // Sort episodes in reverse chronological order based on season/episode numbers
                episodes = Object.keys(groupedData).sort((a, b) => {
                    const epA = groupedData[a][0].episodeRef;
                    const epB = groupedData[b][0].episodeRef;
                    
                    const sA = epA ? epA.seasonNumber || 0 : 0;
                    const eA = epA ? epA.episodeNumber || 0 : 0;
                    const sB = epB ? epB.seasonNumber || 0 : 0;
                    const eB = epB ? epB.episodeNumber || 0 : 0;
                    
                    if (sB !== sA) return sB - sA;
                    return eB - eA;
                });
                
                initUI();
            } catch (e) {
                console.error("Failed to fetch books", e);
                scrollContainer.innerHTML = `<div style="opacity: 0.5;">Error loading library data.</div>`;
            }
        }

        // --- INITIALIZATION ---
        function initUI() {
            renderSidebarEpisodes();
            renderContent();

            // Search Handlers
            searchInput.addEventListener('input', handleSearchInput);
            searchInput.addEventListener('keydown', handleSearchKeydown);
            document.addEventListener('click', (e) => {
                if (!searchWrapper.contains(e.target)) {
                    autocompleteDropdown.classList.remove('active');
                }
            });

            // Close drawer on escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeDrawer();
            });

            // Scroll Spy
            scrollContainer.addEventListener('scroll', handleScrollSpy);
        }

        // --- RENDER FUNCTIONS ---
        function renderSidebarEpisodes() {
            episodeList.innerHTML = episodes.map(ep => `
                <button class="filter-btn" id="sidebar-btn-${encodeURIComponent(ep)}" onclick="scrollToEpisode('${encodeURIComponent(ep)}')">
                    ${ep}
                </button>
            `).join('');
        }

        function renderContent() {
            let totalBooks = 0;
            let html = '';

            // Filter logic
            const term = searchQuery.toLowerCase();

            for (const ep of episodes) {
                // If scoped to episode via pill, only show matching episode
                if (searchScope === 'ep' && !ep.toLowerCase().includes(term)) continue;

                let episodeBooks = groupedData[ep];

                // If scoped to tag via pill, only show matching category
                if (searchScope === 'tag') {
                    episodeBooks = episodeBooks.filter(b => 
                        (b.category || 'Uncategorized').toLowerCase().includes(term)
                    );
                }

                // If no scope, filter books globally by title/author/category (or episode name match)
                if (!searchScope && term) {
                    const epMatch = ep.toLowerCase().includes(term);
                    if (!epMatch) {
                        episodeBooks = episodeBooks.filter(b => 
                            (b.title || '').toLowerCase().includes(term) || 
                            (b.author || '').toLowerCase().includes(term) ||
                            (b.category || '').toLowerCase().includes(term)
                        );
                    }
                }

                if (episodeBooks.length === 0) continue;

                totalBooks += episodeBooks.length;
                const safeId = 'ep-' + encodeURIComponent(ep);
                
                const epRef = episodeBooks[0].episodeRef;
                const seasonInfo = epRef ? `S${epRef.seasonNumber} E${epRef.episodeNumber}` : '';
                
                // Get Description if it exists
                const epDesc = episodeDescriptions[ep] || '<span style="font-style: italic; opacity: 0.5;">No description available.</span>';
                
                // Construct the link to the Acquired episode if slug exists
                
                let slug = epRef && epRef.slug ? epRef.slug : '';
                if (!slug) {
                    // Custom fixes for known weird URLs
                    if (ep.includes("Google Part III")) slug = "google-the-ai-company";
                    else if (ep.includes("Google Part II")) slug = "alphabet-inc";
                    else if (ep.includes("Google Part I")) slug = "google";
                    else if (ep.includes("Trader Joe")) slug = "trader-joes";
                    else if (ep.includes("The NFL")) slug = "the-nfl";
                    else slug = ep.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
                }

                const slugUrl = `https://www.acquired.fm/episodes/${slug}`;

                const titleHtml = `<a href="${slugUrl}" target="_blank" style="text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 4px;">${ep} ↗</a>`;

                html += `
                    <div class="episode-group" id="${safeId}">
                        <div class="episode-header">
                            ${titleHtml}
                            <span class="episode-season">${seasonInfo}</span>
                        </div>
                        <div class="episode-layout">
                            <div class="episode-desc-container">
                                <div class="episode-description">${epDesc}</div>
                            </div>
                            <div class="episode-books-container">
                                <div class="book-grid">
                                    ${episodeBooks.map(b => renderBookCard(b)).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            resultsCount.textContent = `${totalBooks} book${totalBooks !== 1 ? 's' : ''}`;

            if (totalBooks === 0) {
                scrollContainer.innerHTML = `<div style="opacity: 0.5;">No books found.</div>`;
            } else {
                scrollContainer.innerHTML = html;
            }
        }

        function renderBookCard(b) {
            // Horizontal layout with flush image
            const coverHtml = b.coverUrl 
                ? `<div class="book-cover"><img src="${b.coverUrl}" alt="Cover" loading="lazy"></div>`
                : `<div class="book-cover" style="display:flex; align-items:center; justify-content:center; opacity:0.1;">N/A</div>`;

            // Make category click trigger search
            const categoryHtml = b.category 
                ? `<span style="pointer-events: auto;" onclick="event.stopPropagation(); triggerSearch('${b.category}')">${b.category}</span>`
                : 'Uncategorized';

            return `
                <div class="book-card" onclick="openDrawer(${b.internalId})">
                    ${coverHtml}
                    <div class="book-info">
                        <div class="book-title">${b.title}</div>
                        <div class="book-author">${b.author}</div>
                        <div class="book-meta" style="position: relative; z-index: 2;">${categoryHtml}</div>
                    </div>
                </div>
            `;
        }

        function triggerSearch(term) {
            // Check if we need to enter 'tag:' mode
            if (!searchScope) {
                searchInput.value = 'tag: ' + term;
                handleSearchInput({target: {value: searchInput.value}});
            } else if (searchScope !== 'tag') {
                // Clear existing scope and apply tag scope
                clearSearchScope();
                searchInput.value = 'tag: ' + term;
                handleSearchInput({target: {value: searchInput.value}});
            } else {
                searchInput.value = term;
                handleSearchInput({target: {value: term}});
            }
            searchInput.focus();
        }

        async function renderDrawerContent(book) {
            const epRef = book.episodeRef;
            let slugUrl = '#';
            let slugLabel = 'Unknown Episode';
            
            if (epRef) {
                slugLabel = epRef.name;
                
                let slug = epRef.slug || '';
                if (!slug) {
                    const epName = epRef.name;
                    if (epName.includes("Google Part III")) slug = "google-the-ai-company";
                    else if (epName.includes("Google Part II")) slug = "alphabet-inc";
                    else if (epName.includes("Google Part I")) slug = "google";
                    else if (epName.includes("Trader Joe")) slug = "trader-joes";
                    else if (epName.includes("The NFL")) slug = "the-nfl";
                    else slug = epName.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
                }

                slugUrl = `https://www.acquired.fm/episodes/${slug}`;
            }

            const coverHtml = book.coverUrl 
                ? `<div class="drawer-cover-wrapper"><img src="${book.coverUrl}" alt="Cover"></div>` 
                : '';

            // Render basic UI first so it's snappy
            drawerContent.innerHTML = `
                <div class="drawer-content-layout">
                    ${coverHtml}
                    <div class="drawer-text-wrapper">
                        <div class="drawer-book-title">${book.title}</div>
                        <div class="drawer-book-author">by ${book.author}</div>
                        
                        <div style="margin-top: 16px;">
                            <a href="${book.amazonUrl || '#'}" class="buy-btn" target="_blank" style="padding: 6px 12px; font-size: 10px;">View on Amazon ↗</a>
                        </div>
                    </div>
                </div>
                
                <div class="drawer-section">
                    <div class="drawer-label">Episode Context</div>
                    <div>
                        <a href="${slugUrl}" target="_blank" style="text-decoration: underline; text-underline-offset: 2px;">
                            ${slugLabel} ↗
                        </a>
                    </div>
                </div>

                <div class="drawer-section">
                    <div class="drawer-label">Category</div>
                    <div style="font-size: 13px;">
                        ${book.category ? `<a href="#" onclick="event.preventDefault(); closeDrawer(); triggerSearch('${book.category}')" style="text-decoration: underline; text-underline-offset: 2px;">${book.category}</a>` : 'N/A'}
                    </div>
                </div>

                <div id="open-library-data" class="drawer-section" style="display: none;">
                    <div class="drawer-label">Additional Metadata (Open Library)</div>
                    <div id="ol-content" style="font-size: 13px; opacity: 0.8; line-height: 1.6;">Loading...</div>
                </div>
            `;

            // Async fetch from Open Library API
            fetchOpenLibraryData(book.title, book.author);
        }

        async function fetchOpenLibraryData(title, author) {
            const olContainer = document.getElementById('open-library-data');
            const olContent = document.getElementById('ol-content');
            if (!olContainer || !olContent) return;

            olContainer.style.display = 'block';

            try {
                const cleanTitle = encodeURIComponent(title.split(':')[0].trim());
                // Use the search API to find the work key
                const searchRes = await fetch(`https://openlibrary.org/search.json?title=${cleanTitle}&limit=1`);
                const searchData = await searchRes.json();

                if (searchData.docs && searchData.docs.length > 0) {
                    const doc = searchData.docs[0];
                    let detailsHtml = '';
                    
                    // From Search Endpoint
                    if (doc.first_publish_year) {
                        detailsHtml += `<div style="margin-bottom: 4px;"><strong>First Published:</strong> ${doc.first_publish_year}</div>`;
                    }
                    if (doc.number_of_pages_median) {
                        detailsHtml += `<div style="margin-bottom: 4px;"><strong>Pages:</strong> ~${doc.number_of_pages_median}</div>`;
                    }
                    if (doc.publisher && doc.publisher.length > 0) {
                        detailsHtml += `<div style="margin-bottom: 4px;"><strong>Publisher:</strong> ${doc.publisher[0]}</div>`;
                    }

                    // Secondary Fetch: Work Endpoint (for Subjects & Descriptions)
                    if (doc.key) {
                        try {
                            const workRes = await fetch(`https://openlibrary.org${doc.key}.json`);
                            const workData = await workRes.json();
                            
                            if (workData.subjects && workData.subjects.length > 0) {
                                const subjects = workData.subjects.filter(s => s.length < 35).slice(0, 4).join(', ');
                                if (subjects) {
                                    detailsHtml += `<div style="margin-bottom: 4px;"><strong>Subjects:</strong> ${subjects}</div>`;
                                }
                            }
                            
                            // Sometimes works have string descriptions or objects with .value
                            if (workData.description) {
                                const descText = typeof workData.description === 'string' ? workData.description : workData.description.value;
                                if (descText) {
                                    // Truncate description to keep it neat
                                    const truncated = descText.length > 250 ? descText.substring(0, 250) + '...' : descText;
                                    detailsHtml += `<div style="margin-top: 12px; font-style: italic;">"${truncated}"</div>`;
                                }
                            }
                        } catch(e) {}
                    }

                    // Fallback for subjects if work fetch failed
                    if (!detailsHtml.includes('Subjects:') && doc.subject && doc.subject.length > 0) {
                        const subjects = doc.subject.filter(s => s.length < 40).slice(0, 3).join(', ');
                        if (subjects) {
                            detailsHtml += `<div style="margin-bottom: 4px;"><strong>Subjects:</strong> ${subjects}</div>`;
                        }
                    }

                    olContent.innerHTML = detailsHtml || 'No extra metadata found.';
                } else {
                    olContent.innerHTML = 'Book not found in Open Library database.';
                }
            } catch (e) {
                olContent.innerHTML = 'Failed to load metadata.';
            }
        }

        // --- SEARCH & AUTOCOMPLETE ---
        function handleSearchInput(e) {
            const val = e.target.value;
            
            // Toggle clear button visibility
            if (val || searchScope) {
                clearSearchBtn.classList.add('active');
            } else {
                clearSearchBtn.classList.remove('active');
            }

            // Detect "ep:" to create pill
            if (!searchScope && val.toLowerCase().startsWith('ep:')) {
                setSearchScope('ep', 'Episode', 'Type episode name...');
                searchInput.value = val.substring(3).trim();
                searchQuery = searchInput.value;
                updateAutocomplete();
                renderContent();
                return;
            }

            // Detect "tag:" to create pill
            if (!searchScope && val.toLowerCase().startsWith('tag:')) {
                setSearchScope('tag', 'Category', 'Type category name...');
                searchInput.value = val.substring(4).trim();
                searchQuery = searchInput.value;
                updateAutocomplete();
                renderContent();
                return;
            }

            searchQuery = val;
            updateAutocomplete();
            renderContent();
        }

        function handleSearchKeydown(e) {
            const items = autocompleteDropdown.querySelectorAll('.autocomplete-item');
            
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (items.length > 0) {
                    autocompleteSelectedIndex = (autocompleteSelectedIndex + 1) % items.length;
                    updateAutocompleteFocus(items);
                }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (items.length > 0) {
                    autocompleteSelectedIndex = autocompleteSelectedIndex <= 0 ? items.length - 1 : autocompleteSelectedIndex - 1;
                    updateAutocompleteFocus(items);
                }
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (autocompleteSelectedIndex >= 0 && autocompleteSelectedIndex < items.length) {
                    window.autocompleteSuggestions[autocompleteSelectedIndex].action();
                } else if (items.length > 0) {
                    // Default to first item if none selected
                    window.autocompleteSuggestions[0].action();
                }
            } else if (e.key === 'Backspace' && searchInput.value === '' && searchScope) {
                clearSearchScope();
                renderContent();
            } else {
                autocompleteSelectedIndex = -1;
            }
        }

        function updateAutocompleteFocus(items) {
            items.forEach((item, index) => {
                if (index === autocompleteSelectedIndex) {
                    item.classList.add('focused');
                    item.scrollIntoView({ block: 'nearest' });
                } else {
                    item.classList.remove('focused');
                }
            });
        }

        function setSearchScope(type, label, placeholderStr) {
            searchScope = type;
            // Inject pill DOM
            const pill = document.createElement('div');
            pill.className = 'search-pill';
            pill.id = 'active-pill';
            pill.textContent = label;
            searchWrapper.insertBefore(pill, searchInput);
            
            searchInput.placeholder = placeholderStr;
            clearSearchBtn.classList.add('active');
        }

        function clearSearchScope() {
            searchScope = null;
            const pill = document.getElementById('active-pill');
            if (pill) pill.remove();
            searchInput.placeholder = "Search or type 'ep:' or 'tag:'...";
            autocompleteDropdown.classList.remove('active');
            
            if (!searchInput.value) {
                clearSearchBtn.classList.remove('active');
            }
        }

        function clearAllSearch() {
            searchInput.value = '';
            searchQuery = '';
            clearSearchScope();
            renderContent();
            clearSearchBtn.classList.remove('active');
            searchInput.focus();
        }

        function updateAutocomplete() {
            const term = searchQuery.toLowerCase();
            if (!term) {
                autocompleteDropdown.classList.remove('active');
                return;
            }

            let suggestions = [];

            if (searchScope === 'ep') {
                // Only suggest episodes
                episodes.forEach(ep => {
                    if (ep.toLowerCase().includes(term)) {
                        suggestions.push({ type: 'Episode', text: ep, action: () => {
                            searchInput.value = ep;
                            searchQuery = ep;
                            autocompleteDropdown.classList.remove('active');
                            renderContent();
                        }});
                    }
                });
                // Suggest categories if in tag scope
                const categories = [...new Set(books.map(b => b.category || 'Uncategorized'))];
                categories.forEach(cat => {
                    if (cat.toLowerCase().includes(term)) {
                        suggestions.push({ type: 'Category', text: cat, action: () => {
                            searchInput.value = cat;
                            searchQuery = cat;
                            autocompleteDropdown.classList.remove('active');
                            renderContent();
                        }});
                    }
                });
            } else {
                // Global search mode
                episodes.forEach(ep => {
                    if (ep.toLowerCase().includes(term)) {
                        suggestions.push({ type: 'Episode', text: ep, action: () => scrollToEpisode(encodeURIComponent(ep)) });
                    }
                });
                
                // Add category shortcut suggestions
                const categories = [...new Set(books.map(b => b.category || 'Uncategorized'))];
                categories.forEach(cat => {
                    if (cat.toLowerCase().includes(term)) {
                        suggestions.push({ type: 'Category', text: cat, action: () => {
                            triggerSearch(cat); // Swaps to tag mode
                            autocompleteDropdown.classList.remove('active');
                        }});
                    }
                });
                
                // Limit book suggestions to keep it snappy
                let bookMatches = 0;
                for (const b of books) {
                    if (bookMatches >= 5) break;
                    if ((b.title || '').toLowerCase().includes(term)) {
                        suggestions.push({ type: 'Book', text: b.title, action: () => openDrawer(b.internalId) });
                        bookMatches++;
                    }
                }
            }

            if (suggestions.length > 0) {
                autocompleteSelectedIndex = -1;
                autocompleteDropdown.innerHTML = suggestions.map((s, i) => `
                    <div class="autocomplete-item" onclick="autocompleteSuggestions[${i}].action()">
                        <span class="autocomplete-type">${s.type}</span>
                        ${s.text}
                    </div>
                `).join('');
                autocompleteDropdown.classList.add('active');
                // Expose globally for the onclick handler
                window.autocompleteSuggestions = suggestions;
            } else {
                autocompleteDropdown.classList.remove('active');
            }
        }

        // --- ACTIONS & SCROLL SPY ---
        let isProgrammaticScroll = false;

        function handleScrollSpy() {
            if (isProgrammaticScroll || searchQuery) return;
            
            const groups = document.querySelectorAll('.episode-group');
            let currentActiveId = null;

            for (const group of groups) {
                const rect = group.getBoundingClientRect();
                // If top of the group is past the top of the container, or it's taking up the top of the screen
                if (rect.top <= 100 && rect.bottom >= 100) {
                    currentActiveId = group.id;
                    break;
                }
            }

            if (currentActiveId) {
                const encodedEp = currentActiveId.replace('ep-', '');
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active-scroll'));
                const sidebarBtn = document.getElementById('sidebar-btn-' + encodedEp);
                if (sidebarBtn && !sidebarBtn.classList.contains('active-scroll')) {
                    sidebarBtn.classList.add('active-scroll');
                    
                    // Only scroll the sidebar if the active button is out of view
                    const sidebarRect = episodeList.getBoundingClientRect();
                    const btnRect = sidebarBtn.getBoundingClientRect();
                    if (btnRect.top < sidebarRect.top || btnRect.bottom > sidebarRect.bottom) {
                        sidebarBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                }
            }
        }

        function scrollToEpisode(encodedEp) {
            isProgrammaticScroll = true;
            
            // Ensure search isn't completely hiding it
            if (searchQuery || searchScope) {
                searchInput.value = '';
                searchQuery = '';
                clearSearchScope();
                renderContent();
            }
            
            autocompleteDropdown.classList.remove('active');
            
            // Remove old active states in sidebar
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active-scroll'));
            
            // Add active state to sidebar button and scroll sidebar to it
            const sidebarBtn = document.getElementById('sidebar-btn-' + encodedEp);
            if (sidebarBtn) {
                sidebarBtn.classList.add('active-scroll');
                sidebarBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            
            // Wait a tick for render if we just cleared search
            setTimeout(() => {
                const el = document.getElementById('ep-' + encodedEp);
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    el.classList.add('highlight-section');
                    setTimeout(() => {
                        el.classList.remove('highlight-section');
                        isProgrammaticScroll = false;
                    }, 2000);
                } else {
                    isProgrammaticScroll = false;
                }
            }, 50);
        }

        function toggleSidebar() {
            sidebar.classList.toggle('collapsed');
        }

        function openDrawer(internalId) {
            const book = books.find(b => b.internalId === internalId);
            if (!book) return;

            renderDrawerContent(book);
            drawerOverlay.classList.add('active');
            detailDrawer.classList.add('open');
            autocompleteDropdown.classList.remove('active');
        }

        function closeDrawer() {
            drawerOverlay.classList.remove('active');
            detailDrawer.classList.remove('open');
        }

        // Run
        fetchBooks();
    </script>
</body>
</html>
