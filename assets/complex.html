    "transcript": "<strong>Transcript:</strong></h2><p><strong><em>Welcome to Complex Systems where we discuss the technical, organizational, and human factors underpinning why the world works the way it does.</em></strong></p><p><strong><em>Hideho everybody. My name is Patrick McKenzie, better known as Patio11 on the Internet. So I read my ChatGPT recap for 2025, and it called me the person most likely to quote Reg E at a dinner party - Regulation E. And for reasons that will become obvious to you in a minute, that&apos;s actually probably reasonably accurate.</em></strong></p><p><strong><em>I have factually quoted Reg E at dinner parties and I just love it both for what it says about this nation, for its distributional effects, for its actual impact on the operation of the credit card industry among many other industries near and dear to my heart, and for the frequent and successful use of it in helping people who were in diminished financial circumstances. And I&apos;ll tell you a little bit about that anecdote in a few minutes.</em></strong></p><p><strong><em>Regulation E has recently come up in a couple of Bits About Money issues, including how gift cards have such an asymmetric issue with fraud and unwillingness of either the card issuers or the card program managers to deal with it and take responsibility for it in a way which surprises people who have dealt with similar things on, say, credit cards or debit cards.</em></strong></p><p><strong><em>The banks feel very responsive to them. I would argue, with some evidence behind it, that the reason for that responsiveness is fundamentally Regulation E, and I think everybody should know a little bit more about it than most people do. And so, without further ado, I want to talk through both the history of Regulation E and some live controversies, particularly around one payment method - Zelle - and potentially some future payment methods.</em></strong></p><p><strong><em>So reading a Bits About Money issue: Consumer Protection and Its Discontents. [</em>Patrick notes: Published as </strong><a href=\"https://www.bitsaboutmoney.com/archive/regulation-e/\"><strong><u>One Regulation E, Two Very Different Regimes</u></strong></a><strong> after I did an editing pass after the recording session. The content is not strictly identical, and as always I inserted some live commentary, set out via the magic of <em>bold italics.]</em></strong></p><p><strong><em>Periodically,</em></strong> the U.S. is often maligned as being customer-hostile compared to other comparable nations, particularly those in Europe. One striking counterexample is that the government, by regulation, outsources to the financial industry an effective, virtually comprehensive, and extremely costly consumer protection apparatus covering a huge swath of the economy. It does this by strictly regulating the usage of what were once called &quot;electronic&quot; payment methods, which you now just call &quot;payment&quot; methods, in Regulation E.</p><p>Reg E is not uniformly loved in the financial industry. In particular, there has been a concerted effort by banks to renegotiate the terms of it with respect to Zelle in particular. This is principally because Zelle has been anomalously expensive, as Reg E embeds a strong, intentionally bank-funded anti-fraud regime, but Zelle does not monetize sufficiently to pay for it.</p><p>And thus a history lesson, a primer, and an explanation of a live public policy controversy.</p><h2 id=\"these-newfangled-computers-might-steal-our-money\"><strong>These newfangled computers might steal our money</strong></h2><p>If you were to ask your friendly neighborhood reference librarian for Electronic Fund Transfers (Regulation E), 44 Fed. Reg. 18469 (Mar. 28, 1979), you might get back <a href=\"https://archives.federalregister.gov/issue_slice/1979/3/28/18467-18483.pdf\"><u>a document yellowed with age</u></a>. Congress, in its infinite wisdom, intended the <a href=\"https://www.congress.gov/bill/95th-congress/house-bill/13007\"><u>Electronic Funds Transfer Act</u></a> to rein in what it saw as the downsides of automation of the finance industry, which was in full swing by this time.</p><p>Many electronic transactions might not issue paper receipts, and this would complicate he-said bank-said dispute resolution. So those were mandated. Customers might not realize transactions were happening when they didn&apos;t have to physically pull out a checkbook for each one. Therefore, institutions were required to issue periodic statements, via a trustworthy scaled distribution system, paper delivered by the United States Postal Service. And electronic access devices&#x2014;the magnetic-stripe cards, and keyfobs, and whatever the geeks dreamed up next&#x2014;might be stolen from customers.</p><p>And therefore the banks were mandated to be able to take reports of mislaid access devices, and there was a strict liability transfer, where any unauthorized use of a device was explicitly and intentionally laid at the foot of the financial institution.</p><p><strong><em>A footnote here about key fobs.</em></strong></p><p><strong><em>The first credit cards were not the plastic with a magstripe form factor, which came to dominate, but rather charge plates. They were physical tokens, which pointed at a record in, for example, a department store&apos;s internal accounts, usually by means of an embossed account number to be read by the Mark 0 human eyeball, and later copied to a paper record via ink. Many were metal and designed to be kept around a key ring.</em></strong></p><p><strong><em>As Matt Levine and many others have mentioned, the crypto community has speedrun hundreds of years of financial history, and keeping your account identifier on etched metal enjoyed a short renaissance recently. Unlike the department stores&apos; bookkeepers a hundred years ago, crypto enthusiasts lost many millions of dollars of customer funds by misplacing their metal. See page 20 in the writeup about the Prime Trust bankruptcy in Nevada.</em></strong></p><p><strong><em>Back to the essay.</em></strong></p><p>Some of the concerns that were top of mind for lawmakers sound even more outlandish to us, today. Financial institutions can&apos;t issue credit cards without receiving an &quot;oral or written request&quot; for the credit card. That sounds like &quot;Why would you even need to clarify that, let alone legislate against it?!&quot; unless you have the recent memory of Bank of America having the Post Office blanket a city with unsolicited credit cards then just waiting to see what happened.</p><p><strong><em>Now for a fun side note about the Fresno Drop.</em></strong></p><p><strong><em>Market research in the 1950s was hard. The short story of the Fresno Drop: Bank of America lost money due to abuse by a small segment of users in the city of Fresno, where they delivered substantially everyone a credit card without them asking for it. But this successfully proved the middle class would happily use plastic to transact if it were offered, and if it were generally accepted by businesses as opposed to being tied to a single store - status quo for the last few decades.</em></strong></p><p><strong><em>They then scaled the 60,000 card pilot to millions within a year. Visa is the corporate descendant of that program, MasterCard of what the competitors did in response to it.</em></strong></p><p><strong><em>Back to the body of the essay.</em></strong></p><p>The staff who implemented Reg E and the industry advocates commenting on it devoted quite a bit of effort to timelines, informed by their impression of the cadence of life in a middle class American household and the capabilities of the Operations departments at financial institutions across the U.S.&apos;s wide spectrum of size and sophistication. Two business days felt like a reasonable timeline after the theft of a card to let the financial institution know. They picked sixty business days from the postmark for discovering an unauthorized transaction in your periodic statements. That felt like a fair compromise between wanting to eventually give financial institutions some level of finality while still giving customers a reasonable buffer to account for holidays, vacation schedules, the time it takes a piece of mail to travel from New York City to Hawaii, and the reality that consumers, unlike banks, do not have teams paid to open and act upon mail.</p><p>And, very importantly for the future, Congress decided that unsophisticated Americans might be conned into using these newfangled electronic devices in ways that might cost them money, and this was unacceptable. Fraudulent use of an electronic fund transfer mechanism was considered an error as grave as the financial institution simply making up transactions. It had the same remedy: the financial institution corrects their bug at their cost.</p><p>&quot;Unauthorized electronic fund transfer&quot; means an electronic fund transfer from a consumer&apos;s account initiated by a person other than the consumer without actual authority to initiate the transfer and from which the consumer receives no benefit.</p><p>Reg E provided for two caps on consumer liability for unauthorized electronic fund transfer: $50 in the case of timely notice to the financial institution, as sort of a deductible (Congress didn&apos;t want to encourage moral hazard), and $500 for those customers who didn&apos;t organize themselves sufficiently. Above those thresholds, it was the bank&apos;s problem.</p><p>Reg E also establishes some procedural rights: an obligation for institutions to investigate claims of unauthorized funds transfers (among other errors&#x2014;Congress was quite aware that banks frequently made math and recordkeeping mistakes), to provisionally credit customers during those investigations, strict timelines for the financial institutions, and the presumptive burden of proof.</p><p>In this privately-administered court system, the bank is the prosecutor, the defendant, and the judge simultaneously, and the default judgment is &quot;guilty.&quot; It can exonerate itself only by, at its own expense and peril, producing a written record of the evidence examined. This procedural hurdle is designed to simplify review by the United States&apos; actual legal system, regulators, and consumer advocates.</p><p><em>The institution&apos;s report of the results of its investigation shall include a written explanation of the institution&apos;s findings and shall note the consumer&apos;s right to request the documents that the institution relied on in making its determination. Upon request, the institution shall promptly provide copies of the documents.</em></p><p>Having done <a href=\"https://www.kalzumeus.com/2017/09/09/identity-theft-credit-reports/#ghostwriting\"><u>informal consumer advocacy for people with banking and debt issues for a few years</u></a>, I cannot overstate the degree to which this prong of Reg E is a gift to consumer advocates. Many consumers are not impressively detail-oriented, and Reg E allows an advocate to conscript a financial institution&apos;s Operations department to backfill the customer&apos;s files about a transaction they do not have contemporaneous records of. In the case that the Operations department itself isn&apos;t organized, great, at least from my perspective. Reg E says the bank just ate the loss. And indeed, several times over the years, the prototypical grandmother in Kansas received a letter from a bank vice president of consumer lending explaining that the bank was in receipt of her Reg E complaint, had credited her checking account, and considered the matter closed. It felt like a magic spell to me at the time.</p><p><strong><em>And as an aside, I&apos;ll give you a little bit of the backstory of what people do when they&apos;re underemployed in their twenties while not playing World of Warcraft.&#xA0;</em></strong></p><p><strong><em>So when I first got to Japan in my early twenties, I did something which all the guides for people establishing their adult lives said to do. Be a responsible person. Get a handle on your finances. Order a copy of your credit report from the official website you can </em></strong><a href=\"https://www.annualcreditreport.com/index.action\"><strong><em><u>get it for free from</u></em></strong></a><strong><em>. And so I did. And I was surprised to learn that despite my expectation that the only thing that I had ever borrowed money for was to attend college, my credit report listed more than $100,000 in debt dating (in some cases) to before when I was born.</em></strong></p><p><strong><em>This set me into an absolute panic mode. I thought I would be bankrupt before I even got my first paycheck from a real job. I thought there was potentially the possibility of litigation. I was deeply unsophisticated at the time, as many consumers are, and so I went out to the Internet and I found a few watering holes where people who had problems with banks and debt collectors and similar gathered, and I learned the rules about the Fair Debt Collection Practices Act and the Fair Credit Reporting Act.</em></strong></p><p><strong><em>After about six months, I had straightened out my own situation and my credit report correctly listed only my student loan debts and one ding from an encounter with the United States healthcare establishment that I hadn&apos;t understood at the time wasn&apos;t paid for by somebody else.</em></strong></p><p><strong><em>But I stayed on these forums and people would routinely ask questions that were similar in character to questions I had had. &#x201C;You know, the bank is telling me this thing, people are calling me at all hours of day and night. I have no idea. I&apos;m so overwhelmed. What do I do to get out of this? &#x201C;And being the helpful Internet denizen that I was, I would go to the forum and say, the thing you need to do is just write a quick professional letter to the bank, explain the circumstances and they will take care of it.</em></strong></p><p><strong><em>Sometimes when people hear me say it in that tone of voice, they think I am charmingly naive about how financial institutions operate, but I do genuinely have a strong regard for the probity of American financial institutions.</em></strong></p><p><strong><em>So often the people who I gave this advice to would say, &quot;Look, dude, that might as well be on the moon for me.&quot; And indeed many of the people who end up in financial precarity with large debt or conflicts with the financial institutions are not socially advantaged. They genuinely do find it difficult to just write a quick letter in a professional tone of voice. They find it difficult mustering the social capital for financial institutions to take them seriously.</em></strong></p><p><strong><em>So here I was a 20-something in Central Japan with no formal authority and no formal expertise on this matter, with only one asset to my name: I write really, really well. And yeah, I went to a good university in America and I can adopt the mien of the American professional managerial class when required to.</em></strong></p><p><strong>[Patrick notes: I think the second factor is more load-bearing than the first, to be honest, but one of the core things that separates the American PMC from the rest of the country is facility with wading through text. You don&#x2019;t need to produce Shakespearean levels of drama in your demand letters to convey to a responsible professional &#x201C;If I&#x2019;ve gotten this far, I am the sort of person who keeps detailed records, will successfully read everything you send me and follow every deadline, and be freakishly sympathetic to a regulator or judge later reviewing your actions. That can be a potentially expensive headache. Paying me off is cheap, and it isn&#x2019;t even your <em>budget</em>, to say nothing of your money.&#x201D;]<em>&#xA0;</em></strong></p><p><strong><em>And so I told the people on the forums, if you can&apos;t write the letter, no worries. Send me the circumstances. I&apos;ll ghostwrite a letter for you. You can sign it and put it in the mail. And when they write a response back, pass that over to me, I&apos;ll tell you what to do in response to it.</em></strong></p><p><strong><em>Was this the unlicensed practice of law? Eh, who cares?&#xA0;</em></strong></p><p><strong>[Patrick notes: Me, at the time. That kept me up at night, but not enough to not do it.]</strong></p><p><strong><em>Anyhow, so that was the thing I did for a few years in my twenties. I don&apos;t do it anymore, but that greatly informs why I love Regulation E more than any rational person does.</em></strong></p><p><strong><em>Back to the essay.</em></strong></p><h2 id=\"the-contractual-liability-waterfall-in-card-payments\"><strong>The contractual liability waterfall in card payments</strong></h2><p>Banks do not like losing money, citation hopefully unnecessary, and part of the business of banking is arranging for liability transfers. Insurance is many people&apos;s paradigmatic way to understand liability transfers, but banks make minimal use of insurance in core banking services. (A bank which is robbed almost always self-insures, and the loss&#x2014;averaging <a href=\"https://popcenter.asu.edu/sites/g/files/litvpz3631/files/problems/robbery_banks/PDFs/FBI_BankRobbery_2003.pdf\"><u>four figures</u></a> and trending down&#x2014;is so tiny that it isn&apos;t worth specifically budgeting for.)</p><p>The liability transfer which most matters to Reg E is a contractual one, from issuing banks to card processors and from card processors to card-accepting businesses. These parties&apos; obligations to banks and cardholders are substantially broader than the banks&apos; obligations under Reg E, but the banks use a fraction of those contracts to defray a large portion of their Reg E liability.</p><p>For example, under the various brands&apos; card rules, <strong><em>(brands is, by the way, the industry term of art for Visa, MasterCard, American Express, and so on)</em></strong> an issuer <strong><em>(that&apos;s the bank that is named on your plastic)</em></strong> must have the capability for a customer to say that a transaction which happened over plastic (or the electronic equivalent) simply didn&apos;t meet their expectations. The issuer&apos;s customer service representative will briefly collect facts from the customer, and then initiate an automatic process to request information from a representative of the card-accepting business. On receipt of that information, or non-receipt of it, a separate customer service representative makes a decision on the case. This mechanism is called a &quot;chargeback&quot; in the industry, and some banks are notorious for favoring the high-income quite-desirable customers who hold their plastic over the e.g. restaurant that the bank has no relationship with. &quot;My eggs were undercooked&quot; is a sufficient reason to ask for a chargeback and will result in the bank restoring your money a large percentage of the time.</p><p>In the case where the complaint is &quot;My card was stolen and used without my knowledge&quot;, essentially the same waterfall activates, perhaps with the internal note made that this dispute is Reg E sensitive. <strong><em>As an aside, why did you need that internal note? Well, your regulator is very likely to ask you once a year or so, &quot;How many Reg E disputes have you had this year?&quot; And you need to have an exact count ready for that question.</em></strong></p><p><strong><em>Mechanically, it will be quite similar.</em></strong> The bank tells processor &quot;Customer asserts fraud&quot;, processor tells business, business replies with a fax, bank staff reviews fax and adjudicates.</p><p>There are on the order of 5 million criminal cases in the formal U.S. legal system every year. There are more than 100 million complaints to banks, some of them alleging a simple disagreement (undercooked eggs) and very many alleging crime (fraud). It costs banks billions of dollars to adjudicate them.</p><p>The typical physical form of an adjudication is not a weeks-long trial with multiple highly-educated representatives debating in front of a more-senior finder of fact. It is a CSR clicking a button on their web app&apos;s interface after 3 minutes of consideration, and then entire evidentiary record often fits in a tweet.</p><p>&quot;Customer ordered from online store. Customer asserts they didn&apos;t receive the item in six weeks. No response from store. Customer wins. Next.&quot;, &quot;Customer ordered from online store. Customer asserts they didn&apos;t receive item. Store provided evidence of shipping via UPS. Customer does not have a history of fraudulent chargebacks. Customer wins. Next.&quot;, &quot;Customer&apos;s bookkeeper asserts ignorance of software as a service provider charge. Business provided written statement from customer&apos;s CEO stating chargeback filed in error by new bookkeeper. Customer wins. Next.&quot; (I&apos;m still annoyed by that last one, years later, but one has to understand why it is rational for the bank and, in a software company&apos;s clearer-minded moments, rational for them to accept the risk of this given how lucrative software is.)</p><p><strong><em>As an aside, since we don&apos;t have the tyranny of column inches constraining us here: Why is the bank more likely to rule against the business that is the vendor versus the business that is the consumer? One reason is, well, assuming that this is actually a legitimate business relationship and that these two parties actually do deal with each other on an ongoing basis, they&apos;ll work it out between themselves over the course of the next couple of weeks.</em></strong></p><p><strong><em>Clearly, the SaaS company just needs to send another invoice and that CEO who gave the affidavit will pay it. If the CEO, in fact, did give the affidavit. In the case where the CEO didn&apos;t give the affidavit, well, I want to rule on the side of caution, give him his money back and then let him decide where the ball needs to be.</em></strong></p><p><strong><em>And explaining that in as many words to people who run SaaS companies is something that gets them very, very hot under the collar. However, the actual realized experience for most companies in the economy is that they&apos;re abused relatively little by the chargeback guarantee.</em></strong></p><p><strong><em>This is one of the reasons why I wrote the essay that the </em></strong><a href=\"https://www.bitsaboutmoney.com/archive/optimal-amount-of-fraud/\"><strong><em><u>optimal amount of fraud is not zero</u></em></strong></a><strong><em> back in the day. We wouldn&apos;t want to erect barriers as high around the chargeback guarantee as we do around the legal system because they would cause customers to use it less.</em></strong></p><p><strong><em>Sounds great, says businesses, but no, you don&apos;t actually want that! You want use of the chargeback system! The fact of nature that transacting on plastic is virtually riskless to the customer without the customer having to do any sort of underwriting of their counterparty, without the customer having to be particularly careful - I give out my Visa and nothing bad ever happens to me - that fact of nature is worth billions of dollars.</em></strong></p><p><strong><em>It is why people can transact on the Internet at all, and we spent a stupendous amount of money as the tech industry broadly in the 1990s convincing customers: Yeah, you might&apos;ve heard in the media that the Internet is a hive of scum and villainy, but don&apos;t worry about any of that. Don&apos;t worry about the hackers. We&apos;ll try to teach you what a lock means and what SSL means, but we know you&apos;re never going to truly grok 256-bit encryption. Anyhow, so just internalize this message: If something goes wrong with your credit card, the bank has your back.</em></strong></p><p><strong><em>And that requires a different burden of proof and different evidentiary standards than the formal legal system has. It also implies very different cost burden on the businesses. Sure. If you want to have the formal written record of your dispute with the customer reviewed by someone who went to Yale Law, you can purchase from the United States legal system. Opening bid is a hundred thousand dollars, goes up from there. It&apos;s basically impossible to do a court case below that.</em></strong></p><p><strong>[Patrick notes: Slight exaggeration, and of course most controversies like this don&#x2019;t actually end up in court. Your lawyer swaps letters with their lawyer, and then you reach an amicable settlement, which will often include a release of claims, so that no one is tempted to roll the dice on the resolution pathway where the winner can lose $100,000 trivially.]</strong></p><p><strong><em>Well, that sounds great. If your average transaction size is $80, like say the economy at large, a hundred thousand dollar dispute resolution process doesn&apos;t exactly sound like what the doctor ordered. The typical dispute resolution process in the case of a chargeback is free to the customer (obviously), and costs perhaps $15 plus the cost of the chargeback to the accepting business. And as long as the business doesn&apos;t accumulate an anomalous number of them is basically consequence-free long-term. Pay back the money, you lose one sale at the margin, oh well, cost of doing business.</em></strong></p><p><strong>[Patrick notes: That &#x201C;unless&#x201D; is very, very important. You <em>profoundly</em> do not want to have a sustained elevated chargeback rate at your company. It will endanger not just your relationship with your current processor, but <em>potentially</em> your ability to ever again own/represent a company which wants to touch card rails. It does not require gross moral turpitude or fraudulent intent to end up with your name and social security number on the </strong><a href=\"https://developer.mastercard.com/product/match/\"><strong><u>MATCH database</u></strong></a><strong>, or a similar blacklist, for&#x2026; well it will default to &#x201C;forever.&#x201D;]</strong></p><p><strong><em>Granted, chargebacks are not distributed fairly or evenly across the economy. There are some sectors which are relatively fraud-plagued for various reasons. One being that the fraud can most easily get money out of them. Also, bluntly, customers who are predisposed to commit fraud do not consume all goods at equal rates. For example, video games on the Internet suffer a greatly disproportionate amount of fraud.</em></strong></p><p><strong>[Patrick notes: They deal with quite a bit of what is variously called &#x201C;family fraud&#x201D; or &#x201C;friendly fraud&#x201D;, where the person with their hands on the credit card absolutely intends on consuming the good or service obtained with the card, but retrospective review by e.g. their parents might not approve of $600 of Fortnite skins, and so&#x2026; Doesn&#x2019;t Matter, That&#x2019;s Reg E. Children are very not the only guilty party here; first-party fraud is common enough that the industry invented &#x201C;friendly&#x201D; fraud to try to distinguish it from cases where the fraudster does not know the cardholder.]</strong></p><p><strong><em>Counterintuitively, charities suffer a greatly disproportionate amount of fraud - not because fraudsters are just so civic-minded, but because victimizing the charity is the first step in the </em></strong><a href=\"https://www.bitsaboutmoney.com/archive/the-fraud-supply-chain/\"><strong><em><u>supply chain</u></em></strong></a><strong><em> for validating the credit card that the fraudster acquired through nefarious means. Validating that it can be used in any transaction increases the value of that credit card. And when they sell it on to someone else in the fraud supply chain or when they send it to their colleague who&apos;ll be doing the actual exploitation, safe in the knowledge that this card is active versus the other cards that were already deactivated.</em></strong></p><p><strong><em>Back to the main body of the essay.</em></strong></p><p>The funds flow in a chargeback mirrors the contractual liability waterfall: the issuing bank gets money back from a financial intermediary, who gets it back from a card processor (like Stripe, which I once worked for, and which doesn&apos;t specifically endorse things I write in my own spaces), who will attempt to get it back from the card accepting business.</p><p>That word &quot;attempt&quot; is important. What if the business doesn&apos;t have sufficient money to pay the aggrieved customer, or they can&apos;t be located anymore when the system comes to collect? Reg E has a list of exceptions and those aren&apos;t on it. The card processor then eats the loss.</p><p>The same frequently happens to cover the provisional credit mandated while the bank does its investigation, and the opposite happens in the case where the issuing bank decides that the card accepting business is in the right, and should be restored the money they charged a customer.</p><p>This high-frequency privately-funded alternative legal system has quietly ground out hundreds of millions of cases for the last half century. It is a foundation upon which commerce rests. It even exerts influence internationally, since the card brand rules essentially embed a variant of the Reg E rights for cardholders globally, and since nowhere in Reg E is there a carveout for transactions that a customer might make electronically with their U.S. financial institution while not physically located in the United States. If you are mugged and forced to withdraw money at an ATM in Caracas, Uncle Sam says your bank knows that some tiny percentage of cardholders will be mugged every year, and mandates they pay.</p><h2 id=\"enter-zelle\"><strong>Enter Zelle</strong></h2><p>Zelle, operated by Early Warning Systems (owned by a consortium of large banks), is a substantially real-time electronic transfer method between U.S. bank accounts. Bank web and mobile apps have for decades supported peer to peer and customer to business transfers, via push ACH (and, less frequently, by wire), but ACH will, in standard practice, take a few days to be credited to the recipient and a few hours until it will become known to them as pending.</p><p>Zelle is substantially a blocking play, against Venmo, Cash App, and similar. Those apps captivated a large number of mostly-young users with the P2P payments, for use cases like e.g. splitting dinner, spotting a buddy $20, or collecting donations for a Christmas gift for the teacher from all the parents in a class. After attracting the users with those features, they kept them with product offerings which, in the limit, resemble bank accounts and which actually had bank accounts under the hood for at least some users.</p><p>And so the banks, fearing that real-time payment rails would not arrive in time (FedNow has been FedLater for a decade and RTP has relatively poor coverage), stood up Zelle, on the theory that this feature could be swiftly built into all the bank apps. Zelle launched in 2017.</p><p>Zelle processes enormous volumes. It <a href=\"https://www.prnewswire.com/news-releases/zelle-hits-new-highs-two-billion-in-transactions-and-nearly-600-billion-in-payments-in-first-half-of-2025-302556767.html\"><u>crowed recently</u></a> that it did $600 billion in volume in the first half of 2025. Zelle is much larger than the upstarts like Venmo (about<a href=\"https://www.sec.gov/Archives/edgar/data/1633917/000163391725000019/pypl-20241231.htm\"><u> $250 billion in annual volume</u></a>) and Cash App (<a href=\"https://www.sec.gov/Archives/edgar/data/1512673/000162828025007376/sq-20241231.htm\"><u>about $300 billion</u></a> in customer inflows annually). This is not nearly in the same league as card payments (~$10 trillion annually) or ACH transfers (<a href=\"https://www.nacha.org/content/ach-network-volume-and-value-statistics\"><u>almost $100 trillion</u></a> annually), but it is quite considerable.</p><p>All of it is essentially free to the transacting customers, unlike credit cards, which are <a href=\"https://www.bitsaboutmoney.com/archive/how-credit-cards-make-money/\"><u>extremely well-monetized</u></a>. And there is the rub.</p><h2 id=\"zelle-is-an-enormous-fraud-target\"><strong>Zelle is an enormous fraud target</strong></h2><p>&quot;Hiya, this is Susan calling from your bank. Your account has been targeted by fraudsters. I need you to initiate a Zelle payment to yourself to move it to a safe account while we conduct our investigation. Just open your mobile banking app, type the password, select Zelle from the menu, and send it to your own phone number. Thank you for your cooperation.&quot;</p><p>Susan is lying. Her confederates have convinced at least one financial institution in the U.S. that the customer&apos;s phone number is tied to a bank account which fraudsters control. That financial institution registered it with Zelle, so that when the victim sends money, the controlled account receives it substantially instantaneously. They will then attempt to immediately exfiltrate that money, sending it to another financial institution or a gift card or a crypto exchange, to make it difficult for investigators to find it faster than they can spend it. This process often repeats; professionals call this &quot;<a href=\"https://www.bitsaboutmoney.com/archive/money-laundering-and-aml-compliance/\"><u>layering</u></a>.&quot;</p><p>So, some days later, when the victim calls the bank and asks what happened to the money the bank was trying to secure from fraud, what does the bank tell them?</p><p>Zelle is quick to point out that only 0.02% of transactions over it have fraud reported, and they assert this compares favorably to competing payments methods. Splendid, then do the banks want to absorb on the order of $240 million a year in losses from fraudulent use of a technology they built into their own apps which is indisputably by any intellectually serious person an electronic funds access device?</p><p>Frequently in the last few years, the bank has said &quot;Well, as Gen Z would say, that sounds like a bit of a skill issue.&quot; And Reg E? &quot;We never heard of it. Caveat emptor.&quot;</p><p>To be slightly more sympathetic to the banks, they&apos;re engaged in fine-grained decisioning on Zelle frauds, which have many mechanisms and flavor texts. They are more likely to reimburse as required in the case of account takeovers, where the criminal divines a customer&apos;s password, pops an email address, or steals access to a phone number, and then uses it to empty a bank account. They are far less likely to reimburse where the criminal convinces the customer to operate their access device (mobile phone) in a way against their interests. Skill issue.</p><p><strong><em>Banks like to pretend that the dominant fraud pattern is, for example, a social media scam</em></strong> where an ad on Facebook or a TikTok video leads someone to purchase sneakers with a Zelle payment from an unscrupulous individual, who doesn&apos;t actually send the sneakers. This pattern matches more towards &quot;well, that&apos;s a disagreement about how your eggs were done, not a disagreement about how we operate payment rails.&quot; Use a card and we&apos;ll refund the eggs (via getting the restaurant to pay for them); don&apos;t and we won&apos;t.</p><p>So, in sum and in scaled practice at call centers, the bank wants to quickly get customers to admit their fingers were on their phone when defrauded. If so, no reimbursement.</p><p>This rationale is new and is against our standard practice, for decades. If you are defrauded via a <a href=\"https://www.fbi.gov/how-we-can-help-you/scams-and-safety/common-frauds-and-scams/skimming\"><u>skimming device</u></a> attached to an ATM, the bank is absolutely liable, and will almost always come to the correct conclusion immediately. It would be absurdly cynical to say that you intended to transact with the skimming device and demonstrated your assent by physically dipping your card past it.</p><p>Bank recalcitrance caused the Consumer Financial Protection Bureau to <a href=\"https://www.consumerfinance.gov/about-us/newsroom/cfpb-sues-jpmorgan-chase-bank-of-america-and-wells-fargo-for-allowing-fraud-to-fester-on-zelle/\"><u>sue a few large banks in late 2024</u></a>. The CFPB alleged they had a pattern and practice of not paying out claims for fraud conducted over Zelle rails. The banks will tell you the same, using slightly different wording. Chase, for example, now buries in the fine print &quot;Neither Chase nor Zelle&#xAE; offers reimbursement for authorized payments you make using Zelle&#xAE;, except for a limited reimbursement program that applies for certain imposter scams where you sent money with Zelle&#xAE;. This reimbursement program is not required by law and may be modified or discontinued at any time.&quot;</p><p>The defensible gloss of banks&apos; position on &quot;purchase protection&quot; is that the purchase protection that customers pay for in credit cards which makes them whole for eggs not cooked to their liking is not available for Zelle payments. Fine.</p><p>The indefensible extension is that banks aren&apos;t liable for defrauded customers. That is a potential policy regime, chosen by the polity of many democratic nations. The United States is not one of those nations. Our citizens, through their elected representatives, made the considered choice that financial institutions would need to provide extraordinary levels of safety in electronic payments. In reliance upon that regime, the people of the United States transacted many trillions of dollars over payment rails, which was and is very lucrative for all considered.</p><p>The CFPB&apos;s lawsuit was dropped in early 2025, as CFPB&apos;s enforcement priorities were abruptly curtailed. (Readers interested in why might see <a href=\"https://www.bitsaboutmoney.com/archive/debanking-and-debunking/\"><u>Debanking and Debunking</u></a> and Ctrl-F &quot;wants some examples made.&quot;) To the extent it still exists <a href=\"https://www.cbsnews.com/news/trump-administration-cutting-nearly-90-percent-consumer-financial-protection-bureau/\"><u>after being gutted</u></a>, it is <a href=\"https://apnews.com/article/cfpb-russell-vought-nteu-federal-reserve-banks-965ff497e53aee8fedd37f0cd07c42e3\"><u>fighting for its life</u></a>.</p><p><strong><em>There&apos;s currently a court case ongoing as to whether the Trump administration is allowed to not pay the CFPB money that has been appropriated for them under law. One of the legal issues under discussion here is what&apos;s called an impoundment, which is referenced in the Impoundment Control Act of 1974.</em></strong></p><p><strong><em>Briefly, the Appropriations Clause in the Constitution - &quot;No money shall be drawn from the treasury, but in consequence of appropriations made by law&quot; - establishes that Congress has the power of the purse. And the Take Care Clause, Article Two, Section Three - &quot;The President shall take care that the laws be faithfully executed&quot; - collectively create a bind on the Executive Branch which was then encoded into law explicitly that the executive branch doesn&apos;t have the discretion to simply not spend money that Congress has appropriated for the execution of laws that Congress has passed.</em></strong></p><p><strong><em>You don&apos;t get to sort of veto anything you don&apos;t like just by saying, &quot;Well, I don&apos;t actually need to do that, so you can have your money back, taxpayer.&quot; And so this has been one of the arguments that&apos;s been raised in the CFPB matter after DOGE terminated the employment of over 90% of CFPB staff in early 2025 and the administration has variously tried to curtail their activities.</em></strong></p><p><strong><em>Back to the essay.</em></strong></p><p>But knifing the CFPB doesn&apos;t repeal Reg E. In theory, any bank regulator (and many other actors besides) can hold them to account for obligations under it. One of the benefits of Reg E is that the single national standard is easiest to reason about, but in the absence of it, one can easily imagine a patchwork of state-by-state consumer protection actions and/or coalitioning between state attorneys general. I will be unmoved if banks complain that this is all so complicated and they welcome regulation but it has to be a single national standard.</p><h2 id=\"banks-may-attempt-to-extend-the-zelle-precedent\"><strong>Banks may attempt to extend the Zelle precedent</strong></h2><p>Having for the moment renegotiated their Reg E obligations by asserting they don&apos;t exist, and mostly getting away with it, some banks might attempt to feel their oats a bit and assert that customers bear fraud risks more generally.</p><p>For example, in my hometown of Chicago, there has been a recent spate of <a href=\"https://www.chicagotribune.com/2025/03/07/credit-card-scam/\"><u>tap-to-pay donation</u></a> fraud. The fraudster gets a processing account, in their own name or that of a confederate/dupe, to collect donations for a local charitable cause. (This is not in itself improper; the financial industry understands that the parent in charge of a church bake sale will not necessarily be able to show paperwork to that effect before the cookies go stale.) Bad actors purporting to be informal charities accost Chicagoans on the street and ask for a donation via tap-to-pay, but the actual charged donation was absurdly larger than what the donor expected to donate; $4,000 versus $10, for example. The bad actor then exits the scene quickly.</p><p>(A donor who discovers the fraud in the moment is then confronted with the unfortunate reality that they are outnumbered by young men who want to rob them. This ends about as well as you&apos;d expect. Chicago has an arrest rate far under 1% for this. A cynic might say that if you don&apos;t kill the victim, it&apos;s legal. I&apos;m not quite that cynical.)</p><p>But Reg E doesn&apos;t care about the safety of city streets, in Chicago or anywhere else. It assumes that payment instruments will continue to be used in an imperfect world. This case has a very clear designed outcome: customer calls bank, bank credits customer $4,000 because the customer was defrauded and therefore the &quot;charity&quot; lacked actual authority for the charge, bank pulls $4,000 from credit card processor, credit card processor attempts to pull $4,000 from the &quot;charity&quot;, card processor fails in doing so, card processor chalks it up to tuition to <a href=\"https://www.complexsystemspodcast.com/episodes/the-past-present-and-future-of-ai-with-stripe/\" rel=\"noreferrer\">i<u>mprove its fraud models</u></a> in the future.</p><p>Except at least some banks, per the Chicago Tribune&apos;s reporting, have adopted specious rationales to deny these claims. Some victims surrender physical control of their device, and banks argue that that means they authorized the transaction. Some banks asserted the manufactured-out-of-their-hindquarters rationale that Reg E only triggers when there is a physical receipt. (This inverts the Act&apos;s responsibility graph, where banks were required to provide physical hardcopy receipts to avoid an <a href=\"https://www.amazon.com/Unaccountability-Machine-Dan-Davies/dp/1788169549\"><u>accountability sink</u></a> swallowing customer funds.)</p><p>Banks will often come to their senses after being contacted by the Chicago Tribune or someone with social power and gravitas who knows how to cite Reg E. But it is designed to work even for less sophisticated customers who don&apos;t know the legislative history of the state machine. They just have to know &quot;Call your bank if you have a problem.&quot;</p><p>That should work and we are diminished if it doesn&apos;t.</p><h2 id=\"reg-e-encompasses-almost-every-technology-which-exists-and-many-which-dont-yet\"><strong>Reg E encompasses almost every technology which exists and many which don&apos;t yet</strong></h2><p>With a limited number of carveouts (e.g. wire transfers), Reg E is intentionally drafted to be future-proof against changes in how Americans transact. This is why, when banks argue that some new payments rail is exempt because it is &quot;different,&quot; the correct legal response is usually some variation of: <a href=\"https://suno.com/song/173bbd67-92f7-4868-930f-efeca4b373c0\"><u>doesn&apos;t matter&#x2014;that&apos;s Reg E</u></a>.</p><p><strong><em>Did he punch you in your face and steal your card? Doesn&apos;t matter. That&apos;s Reg E.</em></strong></p><p><strong><em>Did she call from the bank&#x2014;except it was a lie. Doesn&apos;t matter. That&apos;s Reg E.</em></strong></p><p><strong><em>Did he copy your mag stripe onto blank plastic? Doesn&apos;t matter. That&apos;s Reg E.</em></strong></p><p><strong><em>Did your computer catch a virus? Doesn&apos;t matter. That&apos;s Reg E.</em></strong></p><p><strong><em>Did your computer with a privileged session join a botnet? Doesn&apos;t matter. That&apos;s Reg E.</em></strong></p><p><strong><em>Did cosmic rays corrupt a database? Doesn&apos;t matter. That&apos;s Reg E.</em></strong></p><p><strong><em>Did an inattentive banker make a typo? Doesn&apos;t matter. That&apos;s Reg E.</em></strong></p><p>Our friends in crypto generally believe that Reg E is one star in the constellation of regulations that they&apos;re not subject to. They created Schr&#xF6;dinger&apos;s financial infrastructure, which is the future of finance in the boardroom and just some geeks playing with an open source project once grandma gets defrauded. There is an unresolved tension in saying &quot;Traditional institutions like Visa are adopting stablecoins&quot; and in the see-no-evil reimburse-no-losses attitude issuers and others in the industry take towards fraud which goes over their rails.</p><p>Reg E doesn&apos;t have an exception in its text for electronic funds transfers which happen over slow databases.</p><p>A hypothetical future CFPB, given the long-standing premise that fraud is not an acceptable outcome of consumer payment systems, would swiftly come to the conclusion that if it walks like a checking account, quacks like a checking account, and is marketed as an alternative to checking accounts, then it is almost certainly within Reg E scope.</p><p>Casting one&apos;s eyes across the fintech landscape, many players seem to have checking account envy. In the era of the &quot;financial superapp&quot; where everyone wants to bolt on high-frequency use cases like payments to e.g. AUM gathering machines like brokerage accounts, that is worth a quick chat with Legal before you start getting the letters from Kansan grandmas.</p><p><strong><em>This isn&apos;t free. It never was.</em></strong></p><hr><p><strong><em>Thanks very much for listening to this episode of Complex Systems, and we&apos;ll be back next week. Thanks for tuning into this week&apos;s episode of Complex Systems. If you have comments, drop me an email or hit me up at patio11 on Twitter. Ratings and reviews are the lifeblood of new podcasts for SEO reasons, and also because they let me know what you like.</em></strong></p>"

        let activeEpisode = null;
        
        // AI Session State
        let aiSession = null;

        let pinnedSnippets = [];
        let currentSelectionRange = null;

        const episodeList = document.getElementById('episode-list');
        const contentScroll = document.getElementById('content-scroll');
        const chatContainer = document.getElementById('chat-container');
        const chatInput = document.getElementById('chat-input');
        const chatSubmit = document.getElementById('chat-submit');
        const aiStatus = document.getElementById('ai-status');

        const pinnedList = document.getElementById('pinned-list');
        const floatingPin = document.getElementById('floating-pin');

        let mouseX = 0;
        let mouseY = 0;

        async function init() {
            // Initialize Chrome Local AI API first
            await initAI();

            // Load data
            try {
                // Data is inlined or fetched
                // In the bundled version this will be replaced, but let's keep the logic sound
                // Data is inlined
                if (false) {
                    const fetched = await response.json();
                    if (fetched && fetched.length > 0) episodes = fetched;
                }
                
                renderEpisodeList();
                
                // Automatically select first episode AFTER AI is initialized
                if (episodes.length > 0) {
                    await selectEpisode(0);

            } catch (e) {
                console.error("Failed to load episodes", e);
                episodeList.innerHTML = '<div style="padding:16px;opacity:0.5;">Error loading data.</div>';
            }

            // Chat Listeners
            chatSubmit.addEventListener('click', handleChatSubmit);
            chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleChatSubmit();
                }
            });
            chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });

            // Track mouse position for pinning
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            document.addEventListener('mouseup', handleSelection);
            document.addEventListener('keyup', handleSelection);
            
            // Hide floating pin on click elsewhere
            document.addEventListener('mousedown', (e) => {
                if (e.target.closest('#floating-pin') === null) {
                    setTimeout(() => { floatingPin.style.display = 'none'; }, 10);
                }
            });
        }

        function renderEpisodeList() {
            episodeList.innerHTML = episodes.map((ep, i) => {
                const dateObj = new Date(ep.date);
                const dateStr = !isNaN(dateObj) ? dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : '';
                return `
                    <button class="episode-btn" id="ep-btn-${i}" onclick="selectEpisode(${i})">
                        <span class="ep-date">${dateStr}</span>
                        ${ep.title}

                `;
            }).join('');
        }

        async function selectEpisode(index) {
            activeEpisode = episodes[index];
            
            // Update active state in UI
            document.querySelectorAll('.episode-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`ep-btn-${index}`);
            if (activeBtn) activeBtn.classList.add('active');

            // Render Content
            contentScroll.innerHTML = `
                <h1 class="ep-title">${activeEpisode.title}</h1>
                <a href="${activeEpisode.link}" target="_blank" class="ep-link">Original Post ↗</a>
                <div class="ep-desc">${activeEpisode.description}</div>
                <div class="ep-transcript">${activeEpisode.transcript || 'No transcript available.'}</div>
            `;
            contentScroll.scrollTop = 0;

            // Reset pinned context and chat
            pinnedSnippets = [];
            renderPinnedPanel();

            // Insert initial welcome message directly into DOM without system prompt wrapper
            appendChatMessage('ai', `I have loaded the transcript for "${activeEpisode.title}". What would you like to know?`);

            if (aiAvailable) {

        // --- CHAT & AI LOGIC ---
        
        async function initAI() {
            // Check for the newest Chrome built-in AI Prompt API (global LanguageModel or ai.languageModel)
            // Documentation: https://developer.chrome.com/docs/ai/get-started
            const aiObj = window.ai;
            const globalLM = window.LanguageModel;
            
            if (!globalLM && (!aiObj || !aiObj.languageModel)) {
                aiStatus.textContent = 'API Unavailable';
                chatInput.placeholder = 'Chrome Local AI not detected.';
                appendChatMessage('ai', 'Error: Your browser does not support the LanguageModel API. Make sure you are using Chrome 131+ and have enabled the required flags (see the README).');
                return;
            }

            try {
                let status = 'unavailable';
                
                // Chrome's official docs say to use `window.LanguageModel` globally
                if (globalLM && typeof globalLM.availability === 'function') {
                    status = await globalLM.availability();
                } else if (aiObj && aiObj.languageModel && typeof aiObj.languageModel.availability === 'function') {
                    status = await aiObj.languageModel.availability();
                } else if (aiObj && aiObj.languageModel && typeof aiObj.languageModel.capabilities === 'function') {
                    const cap = await aiObj.languageModel.capabilities();
                    status = cap.available === 'readily' ? 'available' : cap.available;
                }

                // Status can be: 'available', 'downloadable', 'downloading', 'unavailable', or 'no'
                if (status === 'unavailable' || status === 'no') {
                    aiStatus.textContent = 'Model unavailable';
                    appendChatMessage('ai', 'Error: The local model is not supported on this device or the flags are misconfigured.');
                    return;
                } else if (status === 'downloading' || status === 'downloadable' || status === 'after-download') {
                    aiStatus.textContent = 'Model downloading...';
                    appendChatMessage('ai', 'The local Gemini Nano model is currently downloading in Chrome in the background. Please wait or check chrome://on-device-internals.');
                    return;
                }

                // If available
                aiAvailable = true;
                aiStatus.textContent = 'Ready';
                chatInput.disabled = false;
                chatSubmit.disabled = false;
                
            } catch (e) {
                console.error(e);
                aiStatus.textContent = 'Error';
                appendChatMessage('ai', 'Failed to initialize AI: ' + e.message);
            }
        }

        function updateContextTracker() {
            if (aiSession && typeof aiSession.tokensSoFar !== 'undefined' && typeof aiSession.maxTokens !== 'undefined') {
                contextTracker.textContent = `${aiSession.tokensSoFar}/${aiSession.maxTokens} tokens`;
            } else if (aiSession && typeof aiSession.tokensLeft !== 'undefined' && typeof aiSession.maxTokens !== 'undefined') {
                const used = aiSession.maxTokens - aiSession.tokensLeft;
                contextTracker.textContent = `${used}/${aiSession.maxTokens} tokens`;
            } else {
                contextTracker.textContent = '';
            }
        }

        async function startNewChat() {
            chatContainer.innerHTML = '';
            await resetAiSession();
        }

        function handleSelection(e) {
            // Need a slight delay to allow selection to register on mouseup
            setTimeout(() => {
                const selection = window.getSelection();
                if (!selection || selection.isCollapsed || !activeEpisode) {
                    floatingPin.style.display = 'none';
                    return;
                }

                // Ensure selection is inside the transcript or description
                const range = selection.getRangeAt(0);
                if (!contentScroll.contains(range.commonAncestorContainer)) {
                    floatingPin.style.display = 'none';
                    currentSelectionRange = null;
                    return;
                }

                const rect = range.getBoundingClientRect();
                if (rect.width === 0 && rect.height === 0) return;

                currentSelectionRange = range;

                // Position exactly at the mouse cursor
                floatingPin.style.left = mouseX + 'px';
                floatingPin.style.top = (mouseY - 8) + 'px';
                floatingPin.style.display = 'block';
            }, 50);
        }

        async function pinSelectedText() {
            if (!currentSelectionRange) return;
            
            const selection = window.getSelection();
            const text = selection.toString().trim();
            if (text) {
                const pinId = 'pin-' + Date.now();
                pinnedSnippets.push({ id: pinId, text: text });
                
                try {
                    const mark = document.createElement('mark');

                    mark.onclick = function() { highlightSidebarPin(pinId); };

                    mark.appendChild(content);

                selection.removeAllRanges();
                floatingPin.style.display = 'none';

        async function removePin(index) {
            const pin = pinnedSnippets[index];

            // Unwrap the <mark> tag to restore normal text

                const parent = loc.parentNode;
                while (loc.firstChild) {
                    parent.insertBefore(loc.firstChild, loc);
                }
                parent.removeChild(loc);
                parent.normalize(); // merge text nodes back
            }

            const removedText = pin.text;
            pinnedSnippets.splice(index, 1);
            renderPinnedPanel();
            
            appendChatMessage('system', `Context Removed: "${removedText.length > 50 ? removedText.substring(0, 50) + '...' : removedText}"`);

        function scrollToTranscriptPin(pinId) {
            clearHighlights();
            const loc = document.getElementById('loc-' + pinId);
            const side = document.getElementById('sidebar-' + pinId);
            if (loc) {
                loc.scrollIntoView({ behavior: 'smooth', block: 'center' });
                loc.classList.add('active-highlight');
            }
            if (side) {
                side.classList.add('active-highlight');
            }
            setTimeout(clearHighlights, 2000);
        }

        function highlightSidebarPin(pinId) {
            clearHighlights();
            const loc = document.getElementById('loc-' + pinId);
            const side = document.getElementById('sidebar-' + pinId);
            if (side) {
                side.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                side.classList.add('active-highlight');
            }
            if (loc) {
                loc.classList.add('active-highlight');
            }
            setTimeout(clearHighlights, 2000);
        }

        function clearHighlights() {
            document.querySelectorAll('.active-highlight').forEach(el => el.classList.remove('active-highlight'));
        }

        async function resetAiSession() {
            // Keep chat history but recreate session with new context
            if (aiSession) {
                try { aiSession.destroy(); } catch(e) {}
            }
            
            if (!aiAvailable || !activeEpisode) {
                updateContextTracker();
                return;
            }
            
            // Build Context
            let pinnedText = '';
            if (pinnedSnippets.length > 0) {
                pinnedText = "PINNED HIGHLIGHTS BY USER:\n";
                pinnedSnippets.forEach((pin, i) => pinnedText += `[Snippet ${i+1}]: "${pin.text}"\n`);
                pinnedText += "\n";
            }

            // Truncate transcript to fit in context window (Gemini Nano context is relatively small)
            // Strip HTML tags so we don't waste tokens on <p> and <strong>
            const rawText = activeEpisode.transcript.replace(/<[^>]*>?/gm, '\n').replace(/\n+/g, '\n');
            const maxTranscriptLength = Math.max(0, 10000 - pinnedText.length);
            const contextText = rawText.substring(0, maxTranscriptLength);
            
            // In the newest Prompt API spec, instead of jamming everything into `systemPrompt`,
            // you must pass the chat history as `initialPrompts` array of role/content objects.
            const initialPrompts = [
                {
                    role: 'system',
                    content: `You are a helpful assistant analyzing the podcast transcript for "${activeEpisode.title}".\n\n${pinnedText}Transcript Snippet:\n${contextText}\n\nAnswer the user's questions based ONLY on the transcript and pinned snippets. Be concise.`
                }
            ];
            
            // Extract prior chat history to keep context continuity
            const historyNodes = chatContainer.querySelectorAll('.chat-message');
            historyNodes.forEach(node => {
                const role = node.querySelector('.msg-role').textContent;
                const text = node.querySelector('.msg-text').textContent;
                // Only include actual conversation, skip system metadata
                if (role === 'YOU') {
                    initialPrompts.push({ role: 'user', content: text });
                } else if (role === 'ASSISTANT') {
                    initialPrompts.push({ role: 'assistant', content: text });
                }
            });

            // === CONSOLE LOGGING WHAT IS SENT TO THE MODEL ===
            console.log("\n=============================================");
            console.log("🤖 INITIALIZING NEW AI SESSION WITH PROMPT:");
            console.log("=============================================\n");
            console.log(JSON.stringify(initialPrompts, null, 2));
            console.log("\n=============================================\n");

            try {
                const globalLM = window.LanguageModel;
                const aiObj = window.ai;
                
                if (globalLM && typeof globalLM.create === 'function') {
                    aiSession = await globalLM.create({ initialPrompts: initialPrompts });
                } else if (aiObj && aiObj.languageModel && typeof aiObj.languageModel.create === 'function') {
                    aiSession = await aiObj.languageModel.create({ initialPrompts: initialPrompts });
                }
                updateContextTracker();
            } catch(e) {
                console.error("Session creation failed", e);
                updateContextTracker();
            }
        }

        async function handleChatSubmit() {
            const text = chatInput.value.trim();
            if (!text || !aiAvailable || !aiSession) return;

            // Optimistic UI update
            appendChatMessage('user', text);
            chatInput.value = '';
            chatInput.style.height = 'auto'; // reset textarea height
            chatInput.disabled = true;
            chatSubmit.disabled = true;
            aiStatus.textContent = 'Thinking...';

            try {
                // === CONSOLE LOGGING USER PROMPT ===
                console.log(`\n💬 SENDING PROMPT TO AI: "${text}"`);
                
                const response = await aiSession.prompt(text);
                
                // === CONSOLE LOGGING AI RESPONSE ===
                console.log(`🤖 AI RESPONSE: "${response}"\n`);
                
                appendChatMessage('ai', response);
                updateContextTracker();
            } catch(e) {
                console.error(e);
                appendChatMessage('ai', 'Sorry, I encountered an error generating the response.');
            } finally {
                chatInput.disabled = false;
                chatSubmit.disabled = false;
                chatInput.focus();
                aiStatus.textContent = 'Ready';
            }
        }

        function appendChatMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-message`;
            
            let displayRole = 'Assistant';
            if (role === 'user') displayRole = 'You';
            if (role === 'system') displayRole = 'System';
            
            let colorStyle = '';
            if (role === 'system') colorStyle = 'opacity: 0.5; font-style: italic;';
            
            // If it's the AI, render the Markdown to HTML. Otherwise, just escape HTML and keep line breaks.
            let renderedHtml = '';
            if (role === 'ai' && typeof marked !== 'undefined') {
                renderedHtml = marked.parse(text);
            } else {
                // Basic text rendering for user/system to prevent XSS and preserve line breaks
                const escapedText = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                renderedHtml = escapedText.replace(/\n/g, '<br>');
            }
            
            msgDiv.innerHTML = `
                <div class="msg-role">${displayRole}</div>
                <div class="msg-text" style="${colorStyle}">${renderedHtml}</div>
            `;
            
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Run
        init();

    </script>
</body>
</html>
