    <script>
        let episodes = [
  {
    "title": "The honey badger of payments",
    "link": "https://www.complexsystemspodcast.com/episodes/checks/",
    "date": "Thu, 23 Apr 2026 07:14:22 GMT",
    "description": "Patrick McKenzie (patio11) reads his classic Bits about Money essay on how checks shaped the entire American payments infrastructure, from the origins of ACH to why a standard US bank account is, technically, a credit product. He then examines what happened when DOGE tried, via Executive Order 14247, to eliminate federal paper check disbursements by September 2025. The carve-outs Treasury eventually had to make map almost exactly onto the essay&apos;s original argument. Checks are the honey badger of payments: the numbers keep dwindling, but the edge cases are irreducible, and the second-best pathway for reaching them doesn&apos;t really exist yet. Presenting Sponsors: Mercury &amp; Granola Complex Systems is presented by Mercury&#x2014;radically better banking for founders. Mercury offers the best wire experience anywhere: fast, reliable, and free for domestic U.S. wires, so you can stay focused on growing your business. Apply online in minutes at mercury.com . If meetings consistently leave you with hazy action items and lost context, Granola handles the transcription so you can actually participate and gives you searchable notes afterward. Try it free at granola.ai/complexsystems with code COMPLEXSYSTEMS Timestamps: (00:00) Intro (01:12) A brief digression for people who use functioning payment forms (02:45) Check settlement in the pre-computer era (07:28) Some funny consequences of checks underpinning everything (13:20) Money in transit (14:42) Sponsors: Mercury | Granola (17:56) Money in transit (part 2) (21:12) Deposit accounts and their discontents (23:25) The DOGE postscript (29:03) Honey Badger Jingle",
    "transcript": "<p><strong><em>Hi, my name is Patrick McKenzie, better known as patio11 on the Internet. Last year, as </em></strong><a href=\"https://www.washingtonexaminer.com/news/white-house/3321926/doge-suggests-ending-paper-checks/\"><strong><em><u>DOGE made some waves</u></em></strong></a><strong><em> about greatly diminishing the role of checks in federal government payment operations, the Internet summoned me for comment &#x2014; or </em></strong><a href=\"https://x.com/patio11/status/1891500111877849493\"><strong><em><u>Twitter did</u></em></strong></a><strong><em>, at any rate. I do, in fact, have a lot to say about checks and will recap a classic essay about how they structure much of the American payments and fintech experience to this day, and then follow with some observations on why they&#x2019;re difficult to move away from, even with decades of concerted effort on the part of the federal government, large businesses, banks, and other scaled users.</em></strong></p><p>The Long Shadow of Checks, originally published in Bits about Money on December 13, 2023.</p><p>A recurring theme for Bits about Money is that financial infrastructure is heavily path dependent. We&#x2019;re (oft unknowingly) standing atop decades and centuries of work which came before. Sometimes, the specific contours of that work, and of decisions made decades ago, is a roadmap to what continues to work today and what doesn&#x2019;t. Let&#x2019;s talk checks.</p><h3 id=\"a-brief-digression-for-people-who-use-functioning-payment-forms\"><strong>A brief digression for people who use functioning payment forms</strong></h3><p>Checks are the oldest form of widely deployed non-cash payments instruments. As we&#x2019;ve covered previously, all a &#x201C;payment&#x201D; is in the payments industry is a message about the status of a debt. While almost all checks are pre-printed these days, the earliest ones were simply a handwritten letter to one&#x2019;s banker, instructing him to pay money the bank owed to you to the party you named.</p><p>Checks became central to payment systems through a property called &#x201C;negotiability.&#x201D; The earliest checks look like a three-way transaction: buyer of a good or service (who wrote the check), seller (who turned the check into money), and the banker (who facilitated the transaction). It fairly quickly developed that checks were much more useful than this transaction appears on the surface: the person accepting the check could sell it, because the notion of a debt owed to you has value. This would allow them faster access to their cash and allow someone else an opportunity to profit from transactional friction, by reducing it.</p><p>There is a fascinating history of the negotiability of checks, of the deposits at different banks trading at varying (and constantly changing) discounts to par, and of checks being the primary form of paper money for more than a century in the United States. We&#x2019;ll elide most of it here. Let&#x2019;s focus on the most boring possible implication of negotiability: your bank should be willing to accept that other bank&#x2019;s check.</p><p>That is an interesting usage of the word &#x201C;should&#x201D;, right? Should they, because it would be convenient to you? Or should they, because it is good business? Or should they, because other stakeholders in the financial system, like say the government, mandate it? Yes, in all these senses of the word &#x201C;should.&#x201D;</p><h3 id=\"check-settlement-in-the-pre-computer-era\"><strong>Check settlement in the pre-computer era</strong></h3><p>One of the most important standardizations that you&#x2019;ve probably never thought of is the Uniform Commercial Code, which dates to the late 1800s. It was an early and extremely successful implementation of &#x201C;model language&#x201D; for statutes: each of the several United States was convinced to change local state law to match a change being made effectively simultaneously in every other state, without an explicit federal coordination mechanism.</p><p>The most lastingly important thing in the UCC is that it standardized checks. Instead of them being creatures of state contract law, dragging decades of precedent and complex bespoke negotiations behind every specimen, they became almost exactly describable by recounting a short description of the face of the check. We (very intentionally!) made checks &#x201C;dumb&#x201D; to allow the system around them to be much smarter.</p><p>The UCC facilitated banks clearing each other&#x2019;s checks. (&#x201C;Clearing&#x201D; is a magic finance word. Clearing a check refers to completing the process which the check agrees to: the writer sees money leave their account and the person depositing the check sees it enter theirs. This is much more complicated than it sounds in this quick gloss.)</p><p>Note that &#x201C;facilitated&#x201D; does not imply &#x201C;this then became very easy.&#x201D; One infelicity which became increasingly stressed as improved transportation and communication technologies caused more commerce in the U.S. to be other-than-local: you had to physically move checks between banks to clear them. If there are two banks, then you need two messengers, each carrying a bag of checks once a day. If there are four banks, you need twelve messengers, because Bank A needs one each for B, C, and D, and each other bank needs the same. If there are thousands of banks, then each bank needs to&#x2026; oh dear.</p><p>More than a century before we invented the computer science to describe what would have happened, we invented the solution to it: centralized clearinghouses. New York&#x2019;s first was in the 1850s; London had already pioneered the mechanism a century earlier. Instead of your bank sending the check to the originating bank to clear it, it would send it to the central clearinghouse. Each bank thus only needs one messenger a day, not thousands. (As you can imagine, in the real world, there were actually multiple messengers carrying multiple bags. Still, the stylized truth of this is important.)</p><p>And thus we come to an important fact about the U.S. payments ecosystem: every way of moving money between banks was designed in relation to the capabilities necessary to facilitate nationwide clearing of paper checks. The most common method of interbank payments in the U.S. wears this history in its name: ACH stands for &#x201C;Automated Clearing House.&#x201D;</p><p>The historical timeline for interbank payment settlement in the U.S. comes to us, in a direct and at-times maddening fashion, from &#x201C;How long did it take to move data between New York and San Francisco when the best available technology for this was rail networks, the transport protocol was handwritten paper, and the cloud computing was floors full of clerks doing repetitive mathematics using mechanical adding machines and AI (artisanal intelligence)?&#x201D;</p><p><strong><em>As an aside, we&#x2019;re going to come in a moment to other examples of dumb substrates which allow smart systems. One example you&#x2019;re probably intimately familiar with is the addressing system in your nation of choice. Most of these have been relatively unchanged for a very long time. Zip codes in the United States, for example, date back to the 1960s. But if you took a letter that was physically handwritten in 1900 &#x2014; or perhaps even 100 years earlier &#x2014; and dropped it in a mailbox today, it would, with very high probability, actually end up at the destination. And incredibly, vice versa: most letters produced out of a computer database and a mail merge and an automated printing process, printed in 2026, would be successfully deliverable by the post office in 1900. An address which lists my zip code in Chicago would not be useful to a Post Office clerk who had never heard of the word &#x201C;zip code,&#x201D; but the street address would be sufficient to find it on a map and deliver it.</em></strong></p><p><strong><em>These are relatively dumb at the protocol layer. Addresses haven&#x2019;t changed in a very long time, and there are obvious things we would do differently &#x2014; like virtual addressing &#x2014; if we had a chance to redo addressing. But since so much in society depends on the properties of addresses staying constant over very long intervals, we largely don&#x2019;t do that. Instead, we move the smarts to other layers in the system &#x2014; such as, for example, the Post Office&#x2019;s network of OCR machines, and then human-backed facilities where, for letters the machine does not think are automatically routable, a human can very quickly decision those: telling the post office to reject them, return to sender, or giving the correct zip code to route them to the correct area where a USPS official will eventually get them to the correct address. There&#x2019;s a fascinating video on YouTube about this, by </em></strong><a href=\"https://www.youtube.com/watch?v=XxCha4Kez9c\"><strong><em><u>Tom Scott about the USPS&#x2019; Remote Encoding Centers</u></em></strong></a><strong><em> (of which only one survives).</em></strong></p><h3 id=\"some-funny-consequences-of-checks-underpinning-everything\"><strong>Some funny consequences of checks underpinning everything</strong></h3><p>Credit underlies much more than people generally believe it to. Checks are an unusually direct example of this. The capability to write checks requires a credit extension. The capability to accept checks requires a credit extension. Checks, by existing, promiscuously distribute credit. Promiscuously distributing credit has some knock-on consequences.</p><p>Consider the case where you pay for a basket of groceries with a check. (This probably strikes many in the audience as anachronistic. Work with me here because it&#x2019;s actually terrifyingly relevant to modern payments systems.) At the point which you check out, you owe the grocery something, and promise to make good upon this debt. Retailers historically did a direct extension of credit at that point; users would settle up weeks or months later.</p><p>Checks move the extension of credit (in part!), from the store to the banking system. At the point which you write the check, the grocery has to make a decision whether to release your chicken, with extremely imperfect information. Your account may or may not have good funds in it presently; the store cannot know. More importantly, the store cannot know whether your account will have sufficient funds when the check is presented a few days in the future.</p><p>Why did we do this?! Why accept mere promises, promises conditional on unobservable future events? Because systematically taking relatively small amounts of risk created immense value. Groceries prefer selling more groceries to selling less. Extending consumers credit tends to increase the number of chicken breasts they consume at the margin. Consumers prefer to eat chicken versus going hungry. Chicken do not get a vote.</p><p>Note that the extension of credit is recursive and systemic here. The grocery store will issue paychecks; those paychecks each embody credit risk. (We will return to the fascinating topic of credit risk in payroll systems in a later issue &#x2014; <strong><em>or last week&#x2019;s episode if you&#x2019;re listening to Complex Systems.</em></strong>) That credit risk in part comes from the uncertainty as to whether your check for the chicken was good. The credit risk there comes from factors like your general capitalization, degree of conscientiousness regarding financial management, and whether your most recent paycheck is good. It is credit risk all the way down.</p><p>One control which we made for checks to reduce systemic risk continues to have consequences more than a century later. Most disagreements between you and a grocery store are beneath the notice of the law. If you and your grocery store have a disagreement about a check specifically, you can go to jail. The crime is sometimes called &#x201C;uttering&#x201D;, for charming historical reasons.</p><p>It is well within the norms of checking accounts for them to become overdrawn as e.g. users miscalculate the amount of money they have on deposit, timing issues with the posting of checks break in ways that are not perfectly predictable in advance, and users make mistakes. This is something that product managers at banks design into the unit economics of checking accounts. NSF (insufficient funds) fees were for at least two decades or so an important part of the revenue mix.</p><p>We arrested and jailed, and continue to arrest and jail, at least some people for something which looks very, very similar to what earns other people a $30 NSF fee. (And, of course, if you&#x2019;re a desirable banking customer, they&#x2019;ll waive that fee because the waiver is simply good business.) In theory, uttering is distinguished from simple overdrafting by there being an element of intent to defraud. In practice, uttering is when you&#x2019;re a poor person using a checking account and a string of people reviewing your behavior view it unsympathetically. If a grocery store loss prevention employee, a police officer, and a prosecutor each refuse to stop the process, NSF means you&#x2019;re Now Somebody&#x2019;s Felon.</p><p><strong><em>As an aside, some people might think I&#x2019;m exaggerating here. There has been extensive published reporting about the kinder, gentler pre-trial diversion programs some states have stood up to accomplish the twin goals of reducing credit risk to grocery stores while jailing fewer poor people to do it. Those stories are generally written in a breathless tone. &#x201C;The state sent me a letter and says I need to pay $85 to a grocery store or I could go to prison.&#x201D; That is a very fair description of what is happening, if a different emotional valence than the state would use for a program they describe as compassionate leniency.</em></strong></p><p><strong>[Patrick notes: Quoting </strong><a href=\"https://www.consumerfinance.gov/about-us/newsroom/cfpb-takes-action-against-bad-check-debt-collector/\"><strong><u>the NYT</u></strong></a><strong><em>: [Collusion between retailers and the state] shocked Angela Yartz when she was threatened with conviction over a $47.95 check to Walmart. A single mother in San Mateo, Calif., Ms. Yartz said she learned the check had bounced only when she opened a letter in February, signed by the Alameda County district attorney, informing her that unless she paid $280.05 &#x2014; including $180 for a &#x201C;financial accountability&#x201D; class &#x2014; she could be jailed for up to one year.</em></strong></p><p><strong><em>&#x201C;I was so worried driving my kid to and from school that if I failed to signal, they would cart me off to jail,&#x201D; Ms. Yartz said.</em></strong></p><p><strong>The history of kinder, gentler pre-trial diversion programs to avoid sending people to jail over dishonored checks is an extremely spotted one. In 2015, years after the above reporting, the CFPB </strong><a href=\"https://www.consumerfinance.gov/about-us/newsroom/cfpb-takes-action-against-bad-check-debt-collector/\"><strong><u>extracted a settlement</u></strong></a><strong> from one diversion program administrator, arguing that it had misled people who had bounced checks, who are very predictably less able to parse fine distinctions in graduate level English than bank risk managers, that the program was not partnered with the government but actually was the government. This elevated their communications with people who had bounced checks to de facto state power<em>.]</em></strong></p><p>Sometimes your behavior will look unsympathetic because you are a poor person. Sometimes your behavior will look unsympathetic because you definitely were trying to pull one over on the grocery store. Sometimes your behavior will look unsympathetic because you have done this many, many times before. Sometimes these are all the same picture.</p><p>Phrased that way, it sounds almost fantastically unjust. And&#x2026; it&#x2019;s complicated. Many people, of all social classes, consumed many chickens obtained on credit because certain specially-formatted pieces of paper were believed to be money. That belief relied, in material part, on a state guarantee that they were money. That guarantee was backed by the state expressing substantial displeasure about the abuse of certain specially-formatted pieces of paper.</p><p>And from this follows an underappreciated consequence of modern financial infrastructure: credit cards and debit transactions make the economy more efficient. One way you can measure that efficiency gain is that their users rarely go to jail. Partly that is because you can do a near real-time prediction of whether the transaction has good funds behind it at the point-of-sale. Partly it is because we more fully move credit risk from the grocery store to the bank.</p><p>Society frequently considers the sophistication of different participants in determining their level of legal recourse. We consider grocery stores presumptively worthy of a relatively high degree of protection; we will jail someone over $20 of chicken. We consider banks usually capable of doing their own risk analyses, and if they make an underwriting decision that costs them $2,000, well, society assumes banks have people who are good at math. Part of that math is &#x201C;credit card issuance is fantastically lucrative, in part because you can charge the grocery store when it sells chicken to someone using a credit card.&#x201D; And so part of the cost of accepting credit cards is the cash rewards, part is for computers, and part pays for &#x201C;not jailing poor people.&#x201D;</p><h3 id=\"money-in-transit\"><strong>Money in transit</strong></h3><p>It&#x2019;s useful to understand the historical physical reality of check clearing because we loved this model so much we re-used it for most later forms of payments. Banks which routinely cleared checks from particular other banks, due to geographic proximity or because they were large institutions in e.g. New York, would open correspondent account relationships with each other. A correspondent relationship is simply a bank having a bank account inside another bank. Bankers historically use Latin to make this sound more complicated than it is. (For shibboleth value: nostro is &#x201C;our account at your bank&#x201D;, vostro is &#x201C;your account at our bank.&#x201D;)</p><p>This made collecting payment more efficient: instead of frequently having money move between banks, you could total up all of the incoming payments (checks presented by your customers drawn against the other bank today), total up all of the previous period&#x2019;s outgoing payments (checks presented by the other bank&#x2019;s customers drawn against you a while ago), &#x201C;net&#x201D; those against each other, and then make a single internal accounting entry against your correspondent&#x2019;s vostro. Your two banks would then only periodically rebalance where they held their money, which in the old days involved sometimes literally sending a stagecoach over with gold or silver and in more recent days would typically take the form of a wire transfer.</p><p>This relationship decreases the amount of money in transit at any given time, which has important operational efficiencies and decreases credit risk. We have made many, many more improvements over the years.</p><p>One intellectually interesting one: the Check 21 Act was designed to bring check clearing into the 21st century. The most important part of it was bulldozing a coordination problem: banks were split on whether the paper part of paper checks actually mattered or not. Check 21 said definitively &#x201C;Your opinion as a bank is irrelevant: an electronic reproduction of a check is the same as a check. If you absolutely need physical paper, your counterparties are allowed to write that electronic reproduction onto completely new physical paper then send it to you.&#x201D;</p><p>Why did we do this? Because it greatly speeds up presenting checks for payment. They get scanned in at one institution then transmitted electronically and not physically to the clearinghouse. The clearinghouse then will generally electronically send it to the institution the check is drawn on. This can save literally days. It is another step in making checks dumber to make the surrounding system smarter: the check is almost entirely vestigial at this point.</p><p>So how could anyone have been against this? In a recurring theme for this column, many small banks didn&#x2019;t believe that they had the prompt technical capacity to receive their checks reliably electronically. It was 2003, a surprising portion of small banks still had immaterial usage of the internet in their operations. Most of them did not own their technical destiny but rather are at the mercy of various vendors. (Plus &#xE7;a change.)</p><p>Check 21 said &#x201C;OK, the rest of the industry hears that explanation, and we actually sympathize a bit, but we won&#x2019;t let you block an industry-wide improvement. We will instead give you a carve-out: you and you alone will still get the daily delivery of a lot of paper. It will just be new paper, with substitute checks printed on it, from a printer we have arranged to locate very close to your check processing address. We will legally compel you to treat that paper exactly like the special magically formatted check paper. You are very good at processing that sort of paper, because you&#x2019;ve done so for decades; even though you are small, you are still a bank and still operationally competent.&#x201D;</p><p>More interestingly to <strong><em>listeners of this podcast or </em></strong>readers of this column, Check 21 also paved the way for remote check deposit as a product. Your bank&#x2019;s mobile app very likely allows you to take a picture of a check to deposit it. This desirable user experience would be much less possible if the mobile app had to, after you had taken a photo, read the routing number and tell you &#x201C;Actually, sorry about this: that bank needs the check presented physically to pay it. We understand you&#x2019;re angry at us, because we&#x2019;re your bank, but this is out of our hands.&#x201D;</p><p>That sounds crazy, right? But you&#x2019;re dealing with that exact argument today for why you mostly can&#x2019;t do instantaneous payments between U.S. banks. The system which would allow it (FedNow) is opt-in for both sending institutions and receiving institutions. <strong><em>As an aside, RTP is another example here. </em></strong>There are legitimate and heady reasons why some financial institutions think operational and risk issues would make supporting FedNow <strong><em>or RTP </em></strong>very difficult for them to tackle. With those institutions as holdouts, the network graph of &#x201C;Who could you send money to from your current bank account?&#x201D; is currently very sparse. This makes it less likely for your bank to both a) decide to join as a sender and b) actually expose that sending capability in the app, because they know it will generate annoyed customers and little else. Instead, they&#x2019;ll continue pushing you to (slower) ACH payments and (broadly worse) Zelle payments. (An in-depth description of why Zelle is not a particularly good product qua bank payments will probably have to wait for another day.)</p><h3 id=\"deposit-accounts-and-their-discontents\"><strong>Deposit accounts and their discontents</strong></h3><p>A final funny wrinkle for the moment: the &#x201C;standard&#x201D; bank account in the United States is a checking account. (This is not true internationally; checking accounts are sufficiently weird in e.g. Japan that if you have one you&#x2019;re assumed to be much closer to Toyota than to a natural human. Having a checking account is considered weird because Japan has its own quite path-dependent history in the coevolution of bank accounts and business practices. Back home, checks are used almost exclusively for large commercial transactions and routine person-to-business or business-to-person payments happen via e.g. instantaneous bank transfers. <strong><em>They&#x2019;re called furikomi in Japan.</em></strong>)</p><p>Since the standard U.S. bank account is a checking account, even if it cannot write checks, it is necessarily a credit product. Banks must manage credit risk. This makes opening up standard bank accounts far higher ceremony than it is in many peer nations. You can (easily) be declined services, for example because your previous use of bank accounts landed you in ChexSystems, an industry-wide niche credit reporting agency which basically exists solely to blacklist people from accessing checking accounts in the future.</p><p>This is not simply because banks hate poor people and want them to suffer. Routine use of a bank account in the United States will not infrequently cause a credit loss. Margins on small bank accounts are very thin; credit losses can easily be larger than several years of them. Some people will walk away from that credit loss, in which case the bank (basically) eats it. One choice which keeps bank accounts broadly available to people, including people who do not have demonstrable assets or credit history, is defaulting to not handing out bank accounts to people who demonstrably cause credit losses and then walk away from them.</p><p>And so people, including in the financial industry, who want to provide financial services to people in economic precarity run headlong into this. &#x201C;Creditworthy&#x201D; sounds like a value judgement but is, simultaneously, just a prediction about the weather. Some places see more rain; some customers see more credit losses. Frequently advocates who want to bank the un- or underbanked are also simultaneously furious at the banking industry for improvidently extending credit.</p><p>How have we dealt with this? We have seen a fascinating boom in products which exist along a spectrum from &#x201C;definitely not a bank account but has some characteristics you&#x2019;d associate with one&#x201D; to &#x201C;a full, traditional checking account.&#x201D; We&#x2019;ll cover that another day.</p><h3 id=\"the-doge-postscript\"><strong>The DOGE postscript</strong></h3><p><strong><em>Alright, so that was the essay, written back in December of 2023. We then ran a bit of a natural experiment in early 2025 &#x2014; February, if I recall correctly. DOGE made some noise about killing government checks. They had a variety of reasons that they wanted to do this. They said checks were inefficient: it costs $2 a check to process them &#x2014; isn&#x2019;t that highway robbery? Why do we need this when we have good electronic payments in this country? They wanted to zero out the number of checks written by the United States federal government.</em></strong></p><p><strong><em>Then the Internet found out about this and summoned me for comment &#x2014; or at least Twitter did &#x2014; and I wrote an </em></strong><a href=\"https://x.com/patio11/status/1891500111877849493\"><strong><em><u>off-the-cuff, riffing sort of thread</u></em></strong></a><strong><em> about it. It echoes a lot of the observations made in this essay. And then the United States federal government went from just expressing the intention to get rid of checks to actually making some concrete policy steps with regards to that, and discovered something that they probably could have learned earlier.</em></strong></p><p><strong><em>So on March 25th, 2025, </em></strong><a href=\"https://www.whitehouse.gov/presidential-actions/2025/03/modernizing-payments-to-and-from-americas-bank-account/\"><strong><em><u>Executive Order 14247</u></em></strong></a><strong><em> was signed. Treasury was ordered to cease paper check disbursements by September 30th of 2025. Headline numbers from that order: checks were 16 times more likely to be stolen, lost, and altered than electronic funds transfers; there was $657 million spent to maintain the infrastructure for this in fiscal year 2024; and in the 2025 filing season, there were </em></strong><a href=\"https://www.irs.gov/newsroom/modernizing-payments-to-and-from-americas-bank-account\"><strong><em><u>6.5 million paper refund checks</u></em></strong></a><strong><em> issued by Treasury on behalf of the IRS.</em></strong></p><p><strong><em>So what actually happened in October 2025? Treasury just transitioned their check operations to a third-party vendor, but they didn&#x2019;t stop issuing paper checks. They just stopped being the one writing their name on it directly. Why? Well, the essay kind of predicts this for you. The exception categories that Treasury spent six months operationalizing were basically thesis statements in the essay: unbanked individuals, emergency hardships, national security and law enforcement, and a catch-all &#x201C;other circumstances as determined by the Secretary of the Treasury.&#x201D;</em></strong></p><p><strong><em>The AICPA and ABA wrote comment letters about the specifics: international taxpayers who had been regulated out of directly having US bank accounts (boy, do I have stories there), temporary US residents without social security numbers, estates and trusts with complicated signatories, and similar.</em></strong></p><p><strong><em>And I think there is a state capacity issue in talking about many of the things that DOGE attempted to do, but these are not merely state capacity issues. They&#x2019;re failures to model the world as it actually exists. They are just reflections that the US economy is a very complicated beast, and some parts of that economy are well served by an institution that we&#x2019;ve had for literally centuries, and we do not have a great second-best pathway for reaching them.</em></strong></p><p><strong><em>To flip that around a bit: the fact that we have a single API, a single user experience, which reliably reaches almost 100% of the population &#x2014; not quite 100% due to the presence of unbanked people, modulo the existence of </em></strong><a href=\"https://www.bitsaboutmoney.com/archive/the-business-of-check-cashing/\"><strong><em><u>check-cashing businesses</u></em></strong></a><strong><em>, but it&#x2019;s getting very close to 100% &#x2014; that makes it easy for government agencies to say: in addition to whatever else we want to do, as long as we have checks as a fallback pathway, we know that we do not have to put in huge amounts of bespoke intellectual effort into getting people money. If we don&#x2019;t have checks as a fallback pathway, then we do need a lot of bespoke intellectual effort about thinking: who actually receives money from this program? What are their socioeconomic circumstances? Where do they live? We can no longer rely on pervasive national infrastructure to get them that money.</em></strong></p><p><strong><em>I want to point out that this is not the first time the federal government or other large payers have tried to kill checks. Again, we&#x2019;ve made decades of concerted effort here. Treasury&#x2019;s Go Direct program had been trying to move federal benefits to electronic payments for roughly 15 years before the executive order. And the executive order&#x2019;s contribution wasn&#x2019;t a new regime so much as it was a deadline on this process. And as people who have worked in private industry before know, putting an unrealistic deadline on a process does not cause engineering and social reality to adjust themselves to meet the needs of that deadline.</em></strong></p><p><strong><em>And so what actually happened was a third-party provider got a contract &#x2014; congratulations to them &#x2014; and the relevant parties get to declare victory without really changing how Americans and federal vendors receive payments from the United States government.</em></strong></p><p><strong><em>In that Twitter thread, I described checks as the honey badger of payments. I will play you an </em></strong><a href=\"https://suno.com/s/STxAmPD93djhoyNm\"><strong><em><u>amusing jingle about that</u></em></strong></a><strong><em>.</em></strong></p><p><strong><em>But the honey badger of payments is not going anywhere. We&#x2019;re highly likely to use checks in five years or fifteen years. The numbers are likely going to continue dwindling as more people move to electronic payment mechanisms. But those edge cases are sort of irreducible. In particular, the legal-person edge cases &#x2014; like trusts, for example &#x2014; are just very, very difficult to bank in a fully electronic fashion. And the fintechs that are driving a lot of the adoption of non-check payment methods, particularly down the socioeconomic strata which did not previously have great electronic payment methods available to them, largely don&#x2019;t see enough volume in trusts and other complicated edge cases to carve out the product and partnership work that would make supporting payments to trusts easy in an app like Cash App or similar newer payment methods. And thus we&#x2019;re likely to see checks continue to exist for a very long time.</em></strong></p><p><strong><em>With that, thank you very much for listening to Complex Systems. We&#x2019;ll see you next week.</em></strong></p>"

    "description": "Patrick reads his classic Bits About Money essay explaining why revenue recognition in software is more complicated than most engineers, founders, and financial reporters think. Presenting Sponsors: Mercury &amp; Granola Complex Systems is presented by Mercury&#x2014;radically better banking for founders. Mercury offers the best wire experience anywhere: fast, reliable, and free for domestic U.S. wires, so you can stay focused on growing your business. Apply online in minutes at mercury.com . If meetings consistently leave you with hazy action items and lost context, Granola handles the transcription so you can actually participate and gives you searchable notes afterward. Try it free at granola.ai/complexsystems with code COMPLEXSYSTEMS Timestamps: (00:00) Intro (00:56) Accounting for SaaS and swords (03:22) Why revenue recognition matters (05:49) Revenue recognition in SaaS (09:54) Revenue recognition in virtual goods (12:52) Accounting for potions (13:24) Accounting for swords (14:56) Sponsors: Mercury | Granola (18:34) Accounting for swords (cont&#x2019;d) (20:49) Game mechanics as accounting optimizations (22:10) So about that goblin (23:25) Back to the real world (25:00) How this applies to AI labs (32:48) Wrap",
    "transcript": "<p><strong><em>Hideho, everyone. My name is Patrick McKenzie, better known as patio11 on the internet. As has been abundantly discussed recently, the AI labs are some of the fastest growing companies in the history of capitalism, both in terms of revenue and also in terms of their capital needs. Frequently during boom times, games are played with revenue.</em></strong></p><p><strong><em>Some genre-savvy nonspecialists have raised questions about whether games are being played today. Spoiler: probably not. But to understand why, you probably need to understand what revenue means in software in more detail than, say, the typical financial reporter does. And so I&apos;d like to read you a classic Bits about Money essay about software revenue recognition, and then expand on this in the AI lab context.</em></strong></p><p><strong><em>And so, &quot;Accounting for SaaS and Swords,&quot; originally published on March 18th, 2022, in </em></strong><a href=\"https://www.bitsaboutmoney.com/\" rel=\"noreferrer\"><strong><em>Bits about Money</em></strong></a><strong><em>.</em></strong></p><h3 id=\"accounting-for-saas-and-swords\"><strong>Accounting for SaaS and swords</strong></h3><p>One classic misunderstanding by engineers is that data can be compared reliably by computers. On the one hand, this is a foundation on which our civilization now rests. On the other hand, human society doesn&apos;t evaluate data&#x2014;bits&#x2014;like computers do. Bits have history to them, provenance, moral character, intent, and other epiphenomena which are not directly inspectable. Matthew Skala called this the<a href=\"https://ansuz.sooke.bc.ca/entry/23\"> <u>colour of bits</u></a>, in a seminal essay that remains one of the Internet&apos;s best meditations on the topic.</p><p>Intellectual property lawyers, as one example, frequently concern themselves with discerning the colour of bits and then pronouncing whether a program operating on those bits is behaving legally. (Computer scientists, on the other hand, believe that answering whether a program will behave legally is <a href=\"https://brilliant.org/wiki/halting-problem/\"><u>formally undecidable</u></a>.)</p><p><strong><em>As an aside, this is a consequence of the diagonalization proof, which you&apos;ll learn if you take CS classes. The diagonalization proof basically says that for any interesting property about a computer program, you can&apos;t say definitively whether that property holds about the computer program. This is counterintuitive to people because they think, well, I can do reasoning about computer programs all the time. My life requires me to do that. And computer scientists will say yes, but mathematically you can&apos;t. You&apos;re fooling yourself into believing that you&apos;re reasoning about a computer program. And then people who make money writing computer programs, who all went through a degree to get into computer science departments&#x2013;or rather, their job as an engineer as a result of getting the degree in computer science&#x2013;will say, well, it&apos;s slightly more complicated than either side believes here.</em></strong></p><p>Money is also widely believed to be fungible. A dollar is a dollar and a yen is a yen. On the one hand, this is a foundation on which our civilization now rests. On the other hand, human society doesn&apos;t evaluate money like math does. Money <em>also</em> has colour.</p><p>A salary payment is coloured differently than a gift, even if they&apos;re the same amount paid by the same person the same way into the same bank account. Some dollars were<a href=\"https://www.bitsaboutmoney.com/archive/some-dollars-are-more-equal-than-others/\"> <u>re-coloured <em>by implication</em></u></a> recently, without those dollars ever being touched or named or even intended to be acted upon.</p><p>Accountants frequently concern themselves with tracking the colour of money, because business managers, owners, and tax agencies care a great deal about this question.</p><p>Which brings us to a question which sounds deceptively easy: if a customer pays a business money, does that money have the colour of &quot;revenue?&quot;</p><h3 id=\"why-revenue-recognition-matters\"><strong>Why revenue recognition matters</strong></h3><p>If you were paying attention, you&apos;ve probably guessed that the answer is &quot;Money paid from a customer to a business is sometimes revenue.&quot; In the general case it is undecidable, but it is nonetheless extremely important that businesses quickly come to a defensible conclusion about how much revenue they earned in, for example, the current month.</p><p>The process by which a business discerns that some money has the colour of revenue is called revenue recognition. The exact details depend on your jurisdiction, accounting standards, and a myriad of factors, but broadly the accounting profession has three tests.</p><p>Money is revenue when:</p><ol><li>The <strong>amount</strong> to be collected is <strong>known exactly</strong>.</li><li>The thing the business is being paid for has been <strong>performed</strong>; the customer has either taken delivery of the product or received the service <em>completely</em>.</li><li>The business has reasonable confidence that the money will <strong>actually be collected</strong>.</li></ol><p>Why do we do this to ourselves, when we could simply count money as it is received? Because accounting is designed to <em>perceive the world as it actually exists</em>.</p><p>A business which has performed all their obligations to a creditworthy customer should certainly expect to receive money; they a re in a better position than before they performed their obligations. If society did not agree they had received revenue, they would both be allowed to do some incredible tax gamesmanship by delaying receipt of payments until convenient for them, and also they would experience artificial distortions in their apparent health caused by, for example, the banking calendar or implementation quirks of their payment processors.</p><p><strong><em>As an aside, one thing that many small business owners will be familiar with is that the IRS&#x2013;or, for example, the National Tax Agency in Japan&#x2013;might ask you to elect to be a cash-based business or an accrual-based business for your bookkeeping. The difference between the two is relatively simple. In a cash-based business, you recognize revenue and expenses as you pay cash for them, or more typically as money moves in and out of your bank accounts and credit cards and similar. In an accrual-based business, you do somewhat more sophisticated revenue recognition, like recognizing insurance policies rateably over the term of the insurance policy as an expense, or recognizing the contracts that you have with counterparties for software delivery rateably over the term of the software contract, as we&apos;ll discuss in a few moments.</em></strong></p><p><strong><em>And so this is one of the first things that surprises people when they start learning about revenue recognition: that you can recognize revenue in the absence of having actually received money. Totally normal. Many businesses do it every day of the year.</em></strong></p><h3 id=\"revenue-recognition-in-saas\">Revenue recognition in SaaS</h3><p>In a past life, I founded several software-as-a-service (SaaS) companies. They were much smaller than the publicly traded giants who were thrown into a tizzy by <a href=\"https://www.ifrs.org/issued-standards/list-of-standards/ifrs-15-revenue-from-contracts-with-customers/\"><u>IFRS 15</u></a>, an accounting standards update which tried to better align how we performed math about contracts with their economic impact in the actual world. But even though the businesses were small, revenue recognition still came up.</p><p>A fun example: many SaaS companies operate against a non-revenue metric called, to the great disgust of accountants, monthly recurring revenue (MRR). MRR is the number SaaS entrepreneurs selling on the <a href=\"https://stripe.com/atlas/guides/business-of-saas#low-touch-saas-sales\"><u>low-touch model</u></a> live and die by.</p><p><strong><em>As an aside, SaaS is broadly sold on one of two models. The low-touch model, where you have a website, customers show up to the website, they might get a free trial, and then they choose to pay for the service via, most typically, a credit card. Then the high-touch model, where you have teams upon teams of sales representatives who are either taking calls from customers or going out into the world to recruit, most typically, business customers to buy your service. Businesses that are run on the high-touch model care about ARR&#x2013;annually recurring revenue&#x2013;because they will generally have their contracts be annual. Businesses that sell in a low-touch model generally have contracts that are monthly by default, and those contracts are often, in the low-touch model, not really contracts worthy of the name. It&apos;s &quot;click here to say yes&quot; to something, whereas there are actually bespoke contracts being negotiated in many enterprise deals. If you care greatly about the difference between low-touch and high-touch software sales, I wrote a </em></strong><a href=\"https://stripe.com/guides/atlas/business-of-saas\" rel=\"noreferrer\"><strong><em>guide on it for Stripe</em></strong></a><strong><em> a few years back. I will link it in the show notes.</em></strong></p><p>SaaS companies that sell month-to-month services also frequently offer annual plans, generally trading the knowledge that the customer won&apos;t churn for a year and the upfront use of cash for a discount. And then they tie themselves into knots trying to build dashboards which track MRR but adjust for the impact of a 12-month plan sold for the price of 10 months. Almost nobody gets this right.</p><p>Frequently seen bugs include adding all 10 months of the pricing into MRR (will overstate it by a lot since the user will, by definition, not pay you next month), adding a full-priced subscription worth of MRR despite the 2 free months, or having MRR dip during the last two months of the year despite there being no change in the customer relationship.</p><p>Accounting says &quot;We have a simple solution for this. You should recognize revenue for all your plans, monthly or annual, on a daily basis over the lifetime of the period the customer is committed to using you. If you want to predict how much money you&apos;ll make next month, you&apos;re almost past what accounting can do for you, but to a first approximation try multiplying your last day&apos;s revenue by the number of days in the next month.&quot;</p><p>So what happens to the money which is received but not recognized as revenue? It gets a different colour: <em>deferred</em> revenue. Accounting says <strong>deferred revenue is a liability</strong>; it is something you owe society, which you will repay by either servicing your customers as agreed or returning their money.</p><p>Who cares about what the balance sheet says? Acquirers, for one. SaaS companies are largely valued based on revenue multiples. (At the smaller end of the scale, technically <a href=\"http://feinternational.com/blog/how-do-you-value-an-online-business/\"><u>seller discretionary earnings</u></a> multiples.) <strong><em>Both of the businesses I sold were sold based effectively on a negotiated multiple of the SDE.</em></strong></p><p>When I sold my SaaS business which had a mix of monthly and annual contracts, the buyer sensibly didn&apos;t want to pay similar prices for differently coloured dollars. The MRR would almost certainly (net of churn) recur next month, but the annual contracts had (on average) about six months left before the buyer would get paid, and they&apos;d be responsible for performance of those contracts <em>immediately</em>. They&apos;d still have to keep the servers running, pay the CS staff, etc. And so that revenue was valued lower. (This surprises public markets SaaS investors and frequently VCs, because after a certain scale annual contracts are more valuable than monthly contracts all else equal.)</p><p>Once upon a time,<strong><em> </em></strong>I worked for Stripe, which has a <a href=\"https://stripe.com/revenue-recognition\"><u>Revenue Recognition</u></a> product that helps do the heavy lifting of prorating subscriptions over their lifetimes. (As always, this is my own space and these are my own opinions.) This has exposed me to an even geekier accounting question: how do you recognize revenue for sale of imaginary goods?</p><h3 id=\"revenue-recognition-in-virtual-goods\">Revenue recognition in virtual goods</h3><p>Computer games are one of my hobbies. Mobile games are one of my vices. In particular, <strong><em>recently -- well, recently back in 2022 --</em></strong> I have been playing a &quot;merge&quot; game. Merge games take resource management games, a genre which can be wonderfully intellectually satisfying explorations of complex systems with an undercurrent of Chinese techno-optimism like<strong><em> </em></strong><a href=\"https://store.steampowered.com/app/1366540/Dyson_Sphere_Program/\"><strong><em><u>Dyson Sphere Program</u></em></strong></a>, take out all the intellectual content, and replace it with a Skinner box to drive monetization.</p><p>Which is easy to write when I&apos;m sitting at my computer, just like I can easily write that Coca-Cola has no nutritional value, harms health by default, and is terrible for teeth. But sometimes I find myself hankering for that sweet effervescent siren. And sometimes a game like <a href=\"https://apps.apple.com/app/id1550100190\"><u>Merge Adventure Puzzle Master</u></a> hooks me on allowing me to brainlessly click my way through appealing fantasy art.</p><p>Which is why I have this screenshot of an in-app offer handy. <strong><em>I will verbally describe the screenshot for you. </em></strong>Imagine you&apos;re looking at a goblin offering to build a bank for 1,000 gems. The bank will produce 10 gems a day forever. Gems are the game&apos;s premium currency and available for a variety of price points, including 1,500 gems for ~$10.</p><figure class=\"kg-card kg-image-card\"><img src=\"https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/2026/04/data-src-image-625e380c-751f-4093-81f9-d82552d07b86.png\" class=\"kg-image\" alt=\"Cash received is not revenue earned\" loading=\"lazy\" width=\"750\" height=\"1334\" srcset=\"https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/size/w600/2026/04/data-src-image-625e380c-751f-4093-81f9-d82552d07b86.png 600w, https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/2026/04/data-src-image-625e380c-751f-4093-81f9-d82552d07b86.png 750w\" sizes=\"(min-width: 720px) 720px\"></figure><p>Now here is a fascinating question: how do you recognize revenue for selling a perpetual bond with a 1% daily coupon denominated in a virtual currency?</p><p>To answer it, let&apos;s take a brief detour through the fascinating world of<a href=\"https://www.pwc.com/us/en/industries/tmt/library/assets/pwc-video-game-entities-revenue-recognition.pdf\"> <u>virtual goods revenue recognition</u></a> [PDF by PwC]. It&apos;s <em>gloriously</em> geeky.</p><p>Merge Master, like many mobile games, sells a premium currency (gem) for real money. You might naturally think &quot;OK, so when you give them money and they give you gems, you&apos;re even. That payment is revenue within a second after they credit you the gems.&quot; That&apos;s a reasonable first guess. It is the first guess of every engineer who has ever considered this question, including myself. So if you had it, you were in excellent company in being totally wrong.</p><p>It is wrong because accounting tracks the world as it actually exists, and in that world, I&apos;m not paying Merge Master for gems. I don&apos;t want gems. I want the things gems let me get access to in the game<em> I trust Merge Master will continue making available to me</em>. A necessary implicit part of our bargain is &quot;You&apos;re going to be around in a minute so that I can trade in my imaginary gems for imaginary swords to kill the imaginary dragon, right?&quot;</p><p>And so virtual goods accounting for goods bifurcates around the question of whether the goods have a necessary services component in them. If you sell someone e.g. a downloadable e-book, you can recognize the revenue about as quickly as you can if you sell them a real book at a bookstore. (Immediately, modulo their right to return it, which you&apos;ll book a reserve against based on your prior data about... sorry for that digression. I just love this stuff.)</p><p>If you sell someone a virtual good with an embedded service element, there are broadly two treatments based on whether the virtual good is consumable or durable. I like to think of this as potions and swords.</p><h3 id=\"accounting-for-potions\">Accounting for potions</h3><p>This is fairly easy. If you sell someone a potion, revenue is recognized when they drink the potion. Or use their speed boost. Or skip the progress gate to get to the next dungeon. The fiction doesn&apos;t matter. Reality matters, and the economic reality of the situation is that performance has happened after the temporary thing you&apos;ve promised is delivered. (Technically speaking you do have to recognize the revenue over time if your potions last long enough to be close to monthly SaaS contracts, but practically speaking most are over within a day and most accounting systems lose precision below that.)</p><h3 id=\"accounting-for-swords\">Accounting for swords</h3><p>If you trade gems for swords then you can rateably recognize the purchase price of the gems when you satisfy your obligation by giving the player a new sword.</p><p>Hah, just kidding. That would be <em>way</em> too easy.</p><p>&#xA0;You actually need to recognize the prorated cost of the gems exchanged for the sword over the economically useful life of the imaginary sword. &quot;Economically useful life&quot; is a concept with a lot of prior art on it in accounting. You are obligated to, and accountants can point to substantial work on, estimating the economically useful life of factories, cruise ships, CNC machines, bunk beds, Bitcoin miners, dairy cattle, and almost everything else that depreciates.</p><p>But there is not a huge amount of prior art on imaginary swords. So&#xA0; you get to pick one of two methods.</p><p>The first, by far less commonly used, is to put your head together with very expensive accounting professionals and rigorously answer the question &quot;What events in reality, in the universe we actually live in, would cause the owner of this imaginary sword to believe it had no or de minimis future value to them?&quot; And perhaps that conversation would involve questions like power creep, game balance changes, declining player preference for swords now that you&apos;re offering a sale on imaginary nuclear weapons, etc.</p><p>Nobody has time for that conversation or the truly gargantuan amount of implementation engineering required to enforce the decision it comes up with, so they largely use door #2: the economically useful life of a virtual good is by nature upper bounded by the economically useful life of a player&apos;s relationship with our game, so use that instead.</p><p>You are required to use your existing data to make a reasonable estimate of how long either the particular player or, failing that, the hypothetical spherical frictionless average player will continue to play the game after the purchase. Then you recognize the price of the sword rateably over that time period.</p><p>This causes many virtual goods companies to have bookings (player purchases) diverge sharply from revenue. That depresses the value of their companies, in the real world, and those companies then spend substantial amounts of professional labor taking their frustration out on imaginary swords.</p><p><strong><em>As an aside, the difference between the revenue that you as the business owner think you have and the revenue the market credits you with&#x2013;due to, among other things, accounting standards&#x2013;is a real difference in the world that some business owners rail against for quite some time. So, taking a brief detour from imaginary swords for the moment: GoDaddy, back in the day, was a closely held company and looked at going public on a number of occasions. GoDaddy had this issue where they would sell services over rather long time periods&#x2013;five years, ten years&#x2013;because they were largely selling domain names to customers, and would tell customers to renew the domain for many years at a time. And they would book this enormous deferred revenue liability for their customers.</em></strong></p><p><strong><em>What the GoDaddy CEO said in many interviews and investor presentations is: &quot;Look, since we&apos;re not going out of business, and since the cost of serving domain names is essentially the same whether we&apos;re serving a million of them versus a hundred million of them, you should really treat this as a cash-and-carry business. So all of the money that comes in this year is our revenue, regardless of this massive balance sheet item that says deferred revenue.&quot; What sophisticated investors looking at GoDaddy said was, &quot;Well, no. You do have to still keep running the business. And so from my perspective, it looks like GoDaddy is incredibly levered. You&apos;ve got so much debt on the books. The debt isn&apos;t to a bank or to a private credit fund&#x2013;it&apos;s just to your customers. But oh goodness, is there a lot of debt. And since that debt must get satisfied before US equity holders get the residual value of the company, we are not willing to extend equity investment at the valuation you think you&apos;re worth.&quot;</em></strong></p><h3 id=\"game-mechanics-as-accounting-optimizations\"><strong>Game mechanics as accounting optimizations</strong></h3><p>If you&apos;re familiar with gacha games like Genshin Impact, you have probably seen game systems which require sacrificing multiple copies of a character or item to get a new, slightly better version of the same character or item.</p><p>Some people cynically believe this exploits the player&apos;s inability to understand how exponential math works. &quot;Eight levels of upgrades, each burning two imaginary swords, requires buying 256 swords, not 16 swords. If Sword of Awesomeness was honest about its price, no one would actually choose to buy it!&quot; There is some amount of truth to this.</p><p>But again, if you sell someone a Sword of Awesomeness for value, you have to recognize the revenue rateably over the future economic life of the Sword of Awesomeness. If on the other hand you tell someone to burn two Swords of Slightly Less Awesome to get their Sword of Awesomeness, at least one (and maybe two, depending on your accountant&apos;s opinion) of the Swords of Slightly Less Awesome h<em>as no future useful economic life.</em></p><p>Which means you can recognize the revenue immediately. Which means that your large, perhaps publicly traded video game company is worth more, no longer weighed down by the unearned revenue liability that was the existence of the now-burnt Sword of Slightly Less Awesome.</p><p>And that is why accounting standards have destroyed more imaginary swords than all the rust monsters in all the prime material planes combined.</p><h3 id=\"so-about-that-goblin\">So about that goblin</h3><p>Alright, let&apos;s return to the goblin banker with the improbably underpriced 1% daily yield non-resellable perpetuity bonds.</p><p>Is the &quot;bank&quot; a sword or potion? Sword, clearly.</p><p>Do you have to somehow account for the liability implied by the bond? No, you do not, because <strong>the bond is a fiction and accounting is concerned with reality</strong>. Accountants working on a production of the Merchant of Venice don&apos;t recognize revenue during Shylock&apos;s soliloquies; their gaze is on the audience, not the stage, and the audience has been satisfied once the play is over. (I will note that, unfortunately, many depictions of Shylock and many depictions of goblins share some baggage, in a fashion which many of you already noticed.)</p><p>The economic substance of the goblin transaction is not &quot;I will give you an infinite amount of future value in return for a current payment.&quot; The economic substance is &quot;If you pre-pay us now, we will give you a variable discount on your future purchases of in-game items for the duration you choose to play this game.&quot;</p><p>And thus the answer is, somewhat boringly, that you recognize revenue for the goblin bank rateably over the course of the player&apos;s predicted future lifetime (again, unless you do substantial professional services work to establish that the 10 gems per day is no longer valuable to the player).</p><h3 id=\"back-to-the-real-world\">Back to the real world</h3><p>Why does any of this matter? One reason is that systems which operate with money often grow in scope over time, as they have to become increasingly aware of the colour of money. Revenue recognition is just a single example. Some money is KYC-rich and some money is KYC-blind. The risk ratings of money would fill an entire spectrum of colour.</p><p>This is important both for consumers of systems which operate on money (i.e. everyone) and for people who build and adopt those systems. It is crucially important, on a local level, that you pick systems which can actually perceive the colours which you have reason to care about.</p><p>On a societal level, the more colour there is in the world and the more people have to care about it, the greater incentive there is to buy systems which manage money rather than attempting to build them. If your model of money is &quot;It&apos;s just numbers, math operates trivially on numbers, let&apos;s just build a spreadsheet or otherwise simple system and call it a day&quot;, then money problems often look easy. This is <em>extremely deceptive</em>, and as you grow to perceive more colours around you, you will often come to regret that the spreadsheet has colour vision deficiency. This frequently results in you having to update it, sometimes for very large piles of greenbacks.</p><p>This is an interesting thing for policymakers, who can invent new colours and frequently do, to keep in mind. Every additional colour introduced to the world is a vote that there be fewer systems better architected to perceive it. That sometimes exists in direct tension with other policy goals, such as e.g. promoting competition, discouraging centralization or correlated failures, and similar.</p><h3 id=\"how-this-applies-to-ai-labs\"><strong>How this applies to AI labs</strong></h3><p><strong><em>And now, as promised, the applicability of this to AI labs.</em></strong></p><p><strong><em>AI labs sell a variety of products under a variety of service models. But let&apos;s take API access for the moment. Broadly speaking, when they sell in a low-touch fashion&#x2013;so to individual retail customers&#x2013;you show up at the AI lab, you predeposit money often via credit card or similar, and the company gives you a balance which they track internally or using a system such as Metronome, which I believe is now owned by Stripe, which is my previous employer.&#xA0;&#xA0;</em></strong></p><p><strong><em>I should make a disclaimer here. One, most of the AI labs use Stripe under the hood for things. You can read more about that relationship in Stripe&apos;s annual letters. I&apos;m not using any internal information to make the following representations and Stripe has not endorsed what I say in my personal spaces necessarily.</em></strong></p><p><strong><em>Two, as the economic center of gravity in Silicon Valley moves towards all things AI and LLM, you should assume that every technologist, myself included, is sort of synthetically long AI labs, even if they don&apos;t directly hold the equity of AI labs. And so I am not aware of directly holding any equity in the AI labs, but my interests are aligned with theirs in a way. And so if you care about that, you should discount what I say appropriately, but I&apos;d rather think I&apos;m right here.</em></strong></p><p><strong><em>So you have a balance. That balance is deferred revenue or a contractual liability, depending on exactly what lingo your accountants want to use. As you consume tokens, the service delivery is basically over about as soon as the API call comes back with the inference. And I would bet that there are very, very fun conversations within AI labs on things like, okay, in the case where there are multiple API calls or a thinking model or similar which takes multiple turns, is the service complete at the point where we consume the tokens, or is it complete at the point when the API gives a useful result back to the user? Is it complete when the user reads that result?</em></strong></p><p><strong><em>Regardless, I think rounded to: as soon as the token is consumed, the revenue is recognizable. So this is much less complicated than revenue recognition typically is for SaaS companies.</em></strong></p><p><strong><em>However, that model is not the only way that AI software is sold. Another model AI software is sold on is the sort of all-in-one subscription to some of the premium plans for labs&#x2013;their core chat services or their increasingly core services in, say, programming&#x2013;and those are essentially the classic SaaS story. However, they&apos;re the classic SaaS story in that you can pay a certain amount of money for a month, and the business will recognize the revenue rateably over the course of the month. With an asterisk, which is that some users of those products are not paying a fixed price for usage over the month, but they&apos;re paying a metered billing model, which is more similar to the thing that we&apos;ve just discussed with respect to using their API billing directly.</em></strong></p><p><strong><em>Now, there are additional wrinkles on this, and this is stuff that lifts the souls of people who work in revenue recognition, because the actual contractual terms on enterprise deals get very complicated very quickly. So one way that you can typically structure deals in enterprise software&#x2013;which works for all parties&#x2013;is to say there is something that we&apos;re metering here, which kind of proxies for the amount of value that you are getting out of the software. We would like the price of the software to go up as you get more value out of it. So we&apos;re going to use that metered item to price the contract.</em></strong></p><p><strong><em>However, there are various parties here, even at lower levels than the companies&#x2013;like, for example, the sales representatives who don&apos;t want to say, &quot;Well yeah, I sold them an unknown amount of tokens over the course of the next year.&quot; There are some parties that need visibility for budgeting purposes, and there are other parties that need visibility for, for example, calculating their commission purposes. So you might say, okay, indicatively, the price of a million tokens is a certain amount that we&apos;re establishing via contract for these models and see this pricing list. Indicatively, we think that the contract is going to run you about this much money in the next year, and maybe we even make that a hard commit.</em></strong></p><p><strong><em>But what will often happen is the amount of money you spend depends on your actual usage over the next year. However, you get these lovely prices, which are a discount to the publicly available prices for a million tokens or for a seat license, for similar software. You have to agree to what&apos;s called a minimum commit.</em></strong></p><p><strong><em>A minimum commit simply means that if in a given period&#x2013;a month, a quarter, or similar&#x2013;your actual usage of the software would bring in less than a particular dollar amount, your invoice gets grossed up to that dollar amount.</em></strong></p><p><strong><em>So how do you do revenue recognition in the case of a minimum commit? Well, ask your accountant rather than yours truly. But what you can do is configure your accounting software to recognize the revenue of the minimum commit rateably over the course of the minimum commitment period. And then as you get in the actuals over that actual period, you only recognize the revenue from the actuals to the extent it exceeds the minimum commit, and possibly you have some reconciliation process running on either a daily basis or a monthly close basis to make sure that you true up the actuals versus the minimum commits. There are other treatments, and I&apos;m sure your accountants would love to discuss them with you. But that is just one of many potential contractual terms that you can have with a software contract.</em></strong></p><p><strong><em>There are other terms, and they get fascinatingly complicated. For example, software-as-a-service is generally more similar to a service than a product, but there are a variety of deployment topologies for this one. One deployment topology is where you are giving essentially the software that you have made&#x2013;whether it&apos;s a &quot;SaaS appliance,&quot; which is typically an installable version of the SaaS that is typically accessed over the open internet, or say just the weights of an AI company to your customer to run on premises. And in that case, there are elements of that transaction that look more like a service, and there are elements of that transaction that look more like a product. And the accounting for them can be slightly different. But that ends up being quite facts-dependent. And so this is why accountants will continue making money, even in a world where an LLM can answer a lot of relatively easy questions about accounting.</em></strong></p><p><strong><em>By the way, tax time is coming up, and if you have not run your draft tax return against an LLM, I strongly advise doing so. It picked up thousands of dollars for me with mere minutes of work, and I&apos;ve received word from a number of people after I tweeted this out that they should probably do the same. Anyone with a reasonably complex return, or even a relatively straightforward return for working professionals, should run it against an LLM and just say, &quot;Hey, what do you notice about this before I sign it?&quot; I tweeted that and there are multiple people who have already told me that it saved them between thousands and, in one case, rather substantially more than thousands of dollars, despite having very professional, well-paid professionals looking after their tax returns. So my suggestion to you: run your return past an LLM before you sign it. The worst thing that happens is you burn some tokens. The best thing that happens is you get to have a more complete and accurate return to Uncle Sam, and it&apos;ll hopefully have a smaller number on the bottom of it.</em></strong></p><p><strong><em>Anyhow, that&apos;s all for this week, and thank you very much for listening to Complex Systems. I&apos;ll see you next week.</em></strong></p>"
