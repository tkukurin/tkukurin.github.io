    "description": "Patrick McKenzie (patio11) deconstructs the &quot;original sin&quot; of payments: building a global financial substrate on shared secrets that were distributed promiscuously to function. He examines the multi-decade game of Whack-a-Mole played by the industry to balance the &quot;optimal amount of fraud&quot; against the catastrophic conversion hit of high-friction security. From the physical failure of terminal buttons to the smartphone finally solving the lifecycle problem of cryptographic tokens, Patrick explores the technical and social reasons why we&#x2019;ve moved from &quot;something you know&quot; to the &quot;continuity of access&quot; provided by the device in your pocket. Presenting Sponsors: Mercury &amp; &#xA0; Granola If you have more interesting hobbies than managing your money, Mercury Personal is built for you. It allows you to automate movement between accounts&#x2014;allocating paychecks and tax prep the moment they hit&#x2014;with a sensible permissions model for partners or accountants. It works the way tech people expect banking to work. Go to mercury.com/personal to experience banking built by the same folks Patrick trusts for his business. If meetings consistently leave you with hazy action items and lost context, Granola handles the transcription so you can actually participate and gives you searchable notes afterward. Try it free at granola.ai/complexsystems with code COMPLEXSYSTEMS Timestamps (00:00) Intro (01:32) Publishing the shared secret&#x2026; again (03:39) Manufacturing shared secrets at scale (07:51) Something you own, take one (10:10) Sponsors: Mercury | Granola (13:48) Something you own, take two (18:26) Something you own, take three (21:24) One other semi-successful method: positive pay (24:45) Wrap",
    "transcript": "<strong>Transcript</strong></h2><p><strong><em>Hideho, everybody. My name is Patrick McKenzie, better known as patio11 on the Internet. I&#x2019;ve got a bit of a wonky one today: secondary authentication mechanisms in payments. It says a bit of everything: widely distributed infrastructure you&#x2019;ll touch dozens of times this year, curious historical decisions we&#x2019;ve paid the price for for decades, a balancing act between security and ease-of-use, and a bit of a policy angle. And so here are my off-the-cuff thoughts, which I&#x2019;m working into a Bits About Money issue for publication later this month.</em></strong></p><p>Authentication and authorization (&quot;auth/auth&quot; for the geeks) classically are demonstrated by some combination of &#x201C;something you have, something you know, and something you are&#x201D;. The original sin of auth/auth in payments systems is, to maximize for ease of adoption, they used shared secrets (something you know) between users and their payment providers, but then widely distributed the information which was theoretically secret, such as e.g. bank account numbers and credit card numbers.<br><br>We have played a fun multi-decade game of Whack-a-Mole since then, attempting to use so-called &#x201C;secondary&#x201D; authentication to defang abuse of payments systems while compromising as little as possible on the ease of use and range of deployment which caused them to be adopted pervasively. Much of it is (intentionally) somewhat opaque to users of the systems, and so I thought I&#x2019;d make a brief survey of it.</p><h3 id=\"publishing-the-shared-secret%E2%80%A6-again\">Publishing the shared secret&#x2026; again</h3><p>Many credit cards have an extra special super duper secret written on the back of them (or, for Amex cards, on the front, presumably not because someone foresaw the development of the Internet and wanted to complicate a hundred thousand web pages trying to direct a customer to the correct location on their card). This is called a Card Verification Value (CVV) code. The industry calls the longer number on the card the Primary Account Number (PAN).</p><p>Your PAN is distributed very promiscuously in the standard operation of your credit card, back in the day via embossing it onto paper, for decades via reading it over the telephone, and on the Internet via typing it into web pages fair and foul. Importantly, it is also maintained relatively promiscuously within card-accepting businesses. Compromises of internal infrastructure were probably a larger mechanism for PAN compromises than scammers convincing customers to tell them the number. No matter how good your criminal gang is at scaling operations, Target is better, so you <a href=\"https://www.nytimes.com/2014/03/14/business/target-missed-signs-of-a-data-breach.html\"><u>target Target</u></a>&#xA0; for one-stop-shopping <strong><em>for all your illegitimate needs</em></strong>.</p><p>Thus the CVV. It&#x2019;s a double-plus secret: secret like the PAN is, where you maintain its secrecy by always communicating it to businesses who you want to pay. Double-plus secret, though, because the business is told to forget it immediately. This is a charming feature of the <a href=\"https://www.pcisecuritystandards.org/standards/pci-dss/\"><u>Payment Card Industry Data Security Standard</u></a> (PCI-DSS), and has been slightly more effective than King Canute ordering the tide to not come in. One of the relatively few value adds of a PCI DSS audit, which is required for largely businesses and largely handwaved away for smaller ones, is that someone will actually check whether the CVV gets saved to a database record or written to a log file.</p><p>In a recurring theme for secondary authentication mechanisms, CVV is not actually required to charge a credit card. There is a tradeoff between conversion rate (driven by ease of transacting) and fraud rate (driven by ease of transacting); the <a href=\"https://www.bitsaboutmoney.com/archive/optimal-amount-of-fraud/\"><u>optimal amount of fraud is not zero</u></a>, and broadly businesses are allowed to pick from a menu of options the financial industry makes available. Much like your restaurant of choice, many menu items have <a href=\"https://merchants.fiserv.com/en-ca/client-support/rates-fees/pass-through-fees/\"><u>prices next to them</u></a> . CVV is a trivial database lookup but that lookup costs someone money (generally a fraction of a penny).</p><h3 id=\"manufacturing-shared-secrets-at-scale\">Manufacturing shared secrets at scale</h3><p>When the payments industry attempts to improve security it runs into a slight problem: there is an installed base of hundreds of millions of users and millions of businesses, and it is broadly a non-starter to make breaking changes to the operations of that installed base. And so early attempts to find a secret so secret we wouldn&#x2019;t just put it on a piece of plastic handed to a waiter could not, for example, coordinate a global campaign to have banks get in touch with all customers and tell them a new randomly generated code.</p><p>So the payments industry put on the thinking cap and asked what information a bank would certainly know about a customer, which a customer would certainly know about themselves, where that was less likely to be known by an attacker in a scaled fashion. They concluded that, because of <a href=\"https://www.bitsaboutmoney.com/archive/kyc-and-aml-beyond-the-acronyms/\"><u>Know Your Customer</u></a> (KYC) requirements and the operational exigencies of mailing credit cards and statements, the bank would certainly know the customer&#x2019;s address. And so, how about we have businesses wanting to charge cards ask the user for their address, and we&#x2019;ll have a computer system do a real-time comparison of whether that address is correct, and then refuse transactions where the address is incorrect? And because the payments industry likes its three-letter acronyms to avoid needing to say painfully generic product names, we&#x2019;ll call it the Address Verification Service (AVS).&#xA0;</p><p>AVS almost universally ditched the global scope, because prior to convincing technologists to adopt a universal schema for addresses one has to do so for names, and <a href=\"https://www.kalzumeus.com/2010/06/17/falsehoods-programmers-believe-about-names/\"><u>that is futile</u></a> no matter how many requirements documents think otherwise. <strong><em>See my classic essay on this topic: &quot;</em></strong><a href=\"https://www.kalzumeus.com/2010/06/17/falsehoods-programmers-believe-about-names/\"><strong><em><u>Falsehoods Programmers Believe About Names</u></em></strong></a><em><strong>&quot;</strong>. </em>Even scoped within a particular nation (or, as in North America, a pair of nations where cross-border commerce is quite common but where socio-legal substrates have substantial variance), AVS was quite difficult to make work. <br><br>One reason is, KYC requirements aside, very frequently banks will not actually have the correct address for a user on file. <br><br>Frequently &#x201C;billing address&#x201D; means &#x201C;the address on file for <em>this</em> account, as opposed to the address you use for most purposes this year.&#x201D; There are periodic attempts at various financial institutions to refresh billing addresses on portions of their portfolios, and those are stressful for all concerned. The financial institution usually does not want to actually close accounts over infelicities with the information, gaining the cooperation of hundreds of thousands of people is <em>deeply non-trivial </em>particularly <em>in the absence of a scalable contact method</em>, and most users do not perceive their information not being up-to-date as the sort of prompt emergency that e.g. an account deficiency is. This is in major part because, unlike an account deficiency, one&#x2019;s information being stale doesn&#x2019;t block one&#x2019;s use of the card.</p><p>But even in the case where a financial institution and customer agree where the customer lives, it is non-trivial to have a non-involved computer system successfully compare addresses. Many addresses are written differently but semantically equivalent (123 Main Street and 123 MAIN ST). Many addresses are semantically different but <em>routinely not treated as such.</em></p><p>Post offices are welcome to their opinions as to how national addressing schemes work, but financial institutions live in the real world, and so <a href=\"https://pe.usps.com/text/pub28/28c2_003.htm\"><u>regardless of what a detail-oriented postal professional might say</u></a> about the matter, both &#x201C;Apt 2&#x201D; and &#x201C;#2&#x201D; are acceptable ways to identify an apartment. Similarly, business users routinely label private mailboxes with the pound sign (#) (to avoid calling attention to the fact that it is a private mailbox) which the Post Office believes is contrary to the purpose of private mailboxes. <strong><em>They&apos;re welcome to their opinion. I&apos;ll keep using the # sign.</em></strong></p><p>And so AVS does not provide a binary match/doesn&#x2019;t match determination for addresses. It provides <a href=\"https://developer.paypal.com/api/nvp-soap/AVSResponseCodes/\"><u>a Russian doll of nested statuses</u></a>. Some combination of businesses relying on AVS and the financial infrastructure they&#x2019;re touching can either use those statuses in an advisory fashion or fail the transaction without a status at least as good as some threshold. <em>Generally speaking</em>, most businesses do not get sufficient additional improvement on fraud after matching a five-digit zip code to justify how many legitimate transactions they&#x2019;d decline over e.g. a user failing to &#x201C;exactly match&#x201D; the spelling they used on an account application several years ago.&#xA0;</p><p>But AVS gives you some options in the middle, such as just requiring someone get the numeric portion of the street right, on the theory that this is the least likely part of the address (after zip code) to have a user give different businesses different representations of it.</p><h3 id=\"something-you-own-take-one\">Something you own, take one</h3><p>Prior to ubiquitously available mobile phones, there was brief experimentation with giving single-purpose electronic devices to payments customers. One mechanism these devices used was time-based one-time passwords (TOTPs), where essentially there is a secret embedded physically in the device, used with the time of operation to generate a short pseudorandom number. Your financial institution knows which secret is on your device and knows what time it is, and so they can predict what your device should display right now, and require you to know that number to transact.</p><p>TOTPs via single-use devices have largely fallen out of favor. One of the reasons is that the logistics of device management are terrible. This is sometimes referred to, in industry, as the &#x201C;lifecycle&#x201D; problem. Conveying someone a TOTP device is not harder than conveying them the original credit card, though an early fly in the ointment is that you&#x2019;ll generally send them in separate envelopes to avoid interception by casual bad guys, and your customer will not understand this and wonder why their brand new card/bank account/etc doesn&#x2019;t work.</p><p>But the loss of the devices is really, really annoying for the bank operationally, and happens frequently. They&#x2019;re modestly more expensive at industrial scale than cards, but unlike cards the bank doesn&apos;t have a finely-tuned process for taking reports of loss and immediately couriering out a replacement to anywhere on earth. (Many banks will happily ship a replacement card to any hotel in the non-sanctioned world. Security professionals are occasionally askance at this, not really understanding that card program managers consider &#x201C;don&#x2019;t ever annoy the user on holiday&#x201D; to be more important than &#x201C;zero fraud losses.&#x201D;)</p><p>A non-electronic version of this was giving the user a password grid. It would be a sheet with e.g. 12 rows and columns of random numbers on it. When attempting to authenticate a transaction, you&#x2019;d ask the user for e.g. the 7th row, 3rd column and 2nd row, 5th column. Since you would rarely re-use particular combinations, the theory was that an attacker would not successfully discover enough of the grid to authorize their own transactions in the future, even if they successfully compromised some transactions in flight or convinced the user to divulge a few grid spaces to them.</p><p>We don&#x2019;t see these much anymore, because users <em>hated these password grids</em> and frequently did not succeed with using them. A lot of people who control financially important transactions cannot successfully retain a piece of paper indefinitely or will not successfully navigate the instruction &#x201C;find the 7th row and 3rd column on your secret card.&#x201D;</p><h3 id=\"something-you-own-take-two\">Something you own, take two</h3><p>The industry put its heads together and really, really wanted to put the secret on the card itself, but in some fashion that a nosy waiter could not simply compromise it by looking and that an inattentive business would not copy to their records in the ordinary course of transacting. Embracing public key cryptography, which was proving extremely useful in securing Internet transactions, the solution was conceptually simple and a massive technological and operational lift: put a chip on the cards with the secret on the chip, and have the card sign transactions with its secret, rather than conveying that secret to others.</p><p>The standard was written in the 1990s, but actually rolling out enhanced cards would have been useless without also rolling out enhanced terminals capable of interacting with the cards. This also required effectively constantly-on Internet connections, which younger readers may not understand were something of a novelty at the time, and operationally difficult for many businesses to procure.</p><p>Many businesses had, for decades, operated in a model where terminals probabilistically approved transactions without phoning into credit card infrastructure, then processed the transactions in a batch at, for example, the close of the business day. This didn&#x2019;t require keeping a telephone line in constant use. The security guarantees a terminal can make without talking to the network are very minimal: &#x201C;Well, that certainly <a href=\"https://en.wikipedia.org/wiki/Luhn_algorithm\"><u>looks like a credit card number</u></a>,&#x201D; <strong><em>yet&#x200A; there is a check some algorithm called the Luhn check, which, uses most digits of the credit card number to identify your account, and then the final digit basically checks to make sure that the proceeding digits &#x201C;look like a credit card number&#x201D;. A Luhn check was once considered a bit of secret information, but of course we had to tell the entire world how to perform this algorithm, and there is a Wikipedia page where a high school student can easily create things that pass that first pass filter as being plausible credit card numbers.</em></strong> Clerks were a weak secondary form of authentication: &#x201C;Well, that piece of plastic certainly looks like a credit card.&#x201D; This was weak because cloning a credit card onto a blank magnetic stripe was technically trivial, and if you didn&#x2019;t know how to get a blank magnetic stripe, buying a magnet and then using on any legitimate card was reasonably effective. This made the bad guys not even have to do supply chain attacks, though they also did supply chain attacks to get plausibly-looks-like-an-issuer-marketing-department-designed-this plastic.</p><p>The chip was designed to defeat two attacks: enduring compromise of the PAN secret and also physical theft of the card. It did this by allowing a user to set a PIN, which would be programmed onto the card, and the chip would refuse to sign transactions unless the terminal it was connected to provided the proper PIN (presumably after asking the user to key it in).&#xA0;</p><p>This doesn&#x2019;t sound like it necessarily requires a quantum leap in payment terminals, but it factually did, and some regions prioritized the rollout more than others did. &#x201C;Chip and PIN&#x201D; was ubiquitous in the UK by the mid-2000s. In the U.S. there was a legal shift in fraud liability in October 2015, but adoption lagged even that, as businesses which were not routinely fraud targets didn&#x2019;t prioritize upgrading their terminals. (At larger businesses, especially, this required upgrading a fleet, often upgrading the software at the same time, perhaps retraining staff, and similar.)</p><p>This also exposed businesses to a predicted but handwaved away operational problem: wear and tear on the terminals. Previously, the physical point of contact for terminals had been a card magstripe, and if it was abraded the user could easily get the card reissued; the magnetic reader broke very infrequently as it generally did not have a critical part exposed to friction.</p><p>The chip readers, on the other hand, had the same reliability problems that the NES generation remembers at the physical interface between the chip and the reader. That was not the biggest problem, though. It was those darn buttons. Fingers are, at scale, disgusting. Buttons are physically actuated. Buttons which are physically actuated tens of thousands of times sometimes break or become unreliable. </p><p>And so, to this day, the equilibrium that prevails in the US is &#x201C;chip and signature,&#x201D; often accepting a simple swipe as a backup. There is a bit of risk transfer and pricing incidents to this, but most businesses do not prioritize caring about it.</p><p>More to the point: chips are difficult to read in &#x201C;card not present&#x201D; (CNP) transactions, such as those conducted over the Internet. They accounted for a huge growth of volume and were a rich target for fraudsters. The industry, in the throes of experiencing the disinterest of professionals at businesses in upgrading their hardware to decrease fraud, was sure that asking users to buy a chip-reader to plug into their PC was a non-starter. (Japan actually tried this, and one of the salaryman&#x2019;s collection of technical oddities is a peripheral chip reader, useful for e.g. submitting one&#x2019;s taxes electronically while in possession of a chip-bearing identification card. I&apos;ve never seen a fax machine with an embedded chip reader, but it seems like the sort of thing that came up in a meeting at least once.)</p><h3 id=\"something-you-own-take-three\">Something you own, take three</h3><p>Worldwide deployment of specialized hardware capable of public key cryptography is very hard, and needed a forcing function to make happen. As it turns out, that forcing function is called &quot;a smartphone&quot; and we give them to basically everyone these days.</p><p>The payments industry has, as smartphone adoption increased, deprecated many of its prior art on distributing tokens and upgrading terminals, in favor of moving the transaction to the user&#x2019;s device. For various reasons, the combination of device and phone number is less amenable to compromise at scale than the combination of PC and email address, and it is easier to demonstrate reliably that a particular device is indeed the same one the user has used before.</p><p>There are a variety of ways you can use the fact that the user has a smartphone to perform secondary authentication of transactions. One wrinkle is biometrics: <em><strong>something you are.</strong> </em>Your phone can scan your face or read your thumb to authorize transactions. The payments industry considers that amusing flavor text but doesn&apos;t actually think the biometrics is the interesting part of that story. The interesting part is that the biometrics unlocks the phone, which can demonstrate continuity of access to the device, and the bad guys have difficulty replicating that at scale.</p><p>Also, in terms of lifecycle management: it&#x2019;s difficult to get users to care about their password cards. Their phones, on the other hand, basically never leave their hands, and get replaced quickly when lost or stolen, at somebody else&#x2019;s urgency and expense. Enrolling the new phone as a trusted device sometimes requires a bit of operational work from the company, but it is operational work amenable to facilitation by a scaled call center, which doesn&#x2019;t require touching atoms under someone else&#x2019;s physical control or waiting for a package to reach the user.</p><p>Some jurisdictions have experimented with mandatory two factor authentication built around mobile phones. For example, in Europe, Strong Customer Authentication (SCA) has for the last few years required businesses taking payments to require a second factor. The dominant one first was SMS-based one-time-passwords, but this has mostly been supplanted by push notifications to banking apps. This is to minimize the impact on conversion. Though, worth noting: conversion rates for legitimate transactions declined measurably across the board after SCA was mandated.</p><p>This is an interesting policy choice, and different polities made it differently. In the US, businesses largely are liable for fraudulent use of payments at them, following a waterfall established by Reg E and contracts in the payments industry. Businesses with low margins and high fraud rates are incentivized to adopt toothier secondary screening of transactions; other businesses are more trusting-by-default and achieve better conversion rates.</p><p>In Europe, customers bear losses much more frequently, and that was sufficiently intolerable that businesses were not given the discretion to choose their level of fraud countermeasures, as they mostly have in the US. This essentially socializes some of the burden of fraud from the worst targeted businesses / communities to broader ecosystem, in the form of across-the-board impacts to conversion rates.</p><p>It is worth noting that the SCA regulations have a thicket of carveouts, but explaining the interaction of risk scores and subscription systems would get us even further on a tangent.</p><h3 id=\"one-other-semi-successful-method-positive-pay\">One other semi-successful method: positive pay</h3><p>The taxonomy of payment methods is often first split by push versus pull: whether a user paying a business initiates the payment (including choosing amount and timing), or whether the business initiates the payment. Credit cards are, to specialists, the paradigmatic &#x201C;pull&#x201D; payment method; although you present your card, it is historically at the business&#x2019; discretion when and how much to charge.</p><p>[<strong>Patrick notes</strong>: One reason credit cards took over commerce on the Internet was because the pull is relatively easy to code even with somewhat primitive technologies and poor Internet connectivity, but still returns a result fast enough to plausibly cover with a single HTTP request/response cycle. This is very easy for programmers to reason about</p><p>When Stripe, where I used to work (and which doesn&#x2019;t necessarily endorse what I say in my own spaces), introduced PaymentIntents to make the API robust enough to accommodate push payment methods and credit card payments which had a potential off-device interaction (such as a 3DS secondary verification), this ballooned complexity of the typical integration. I sympathize with users who were frustrated with it, particularly those who didn&#x2019;t understand why payment methods their customers didn&#x2019;t use or decisions of governments they never voted for would change their future integration pathway. (The answer was broadly &#x201C;The world is moving away from a card-centric model even in the U.S., and future U.S. payment volumes will flow over payments that do not map well to the single synchronous pull abstraction. For example, Apple Pay looks like a credit card charge to the user but doesn&#x2019;t look like one to an integrating developer.&#x201D;)]&#xA0;</p><p>Many payment methods, such as bank transfers, support both modes: you can push an ACH payment from your banking app, or you can give a business your routing and account numbers and have them pull payment from you. (Confusingly, the paradigmatic push payment, a check written, is actually a pull payment thanks to electronic check presentment. The shared secret between you and the bank authorizing the pull is&#x2026; written in plain text on every check and we spent extra effort on making it machine readable. This decision cost at least a few tens of billions of dollars, which seems like a large number until you divide by how many checks have been presented over the intervening decades.)</p><p>To defang fraud in pull systems, someone had the bright idea of requiring a pull to have a matching push: both parties to the transaction agree on the details or no transaction takes place. The most prominent deployment of this is in positive pay in large U.S. enterprises. The enterprise receives invoices from various parties it owes money to, and a specialist team in the Accounts Payable department communicates to its bank which payments it anticipates making. They then send out checks in the mail. Those checks are presented at various banks, and the bank they are drawn on matches them against pre-authorized checks, rejecting any which are not known to be pre-authorized.</p><p>This prevents the quite common attack on checks, where any computer printer is capable of producing a facially valid check given the account and routing number, which&#x2014;I repeat&#x2014;we promiscuously distribute to the entire world. At scaled enterprises making large numbers of payments per year, absent Positive Pay, a bank might not successfully guess which checks are authorized or not.</p><p><strong><em>&#x200A;There&apos;s also, as an aside, a common attack where someone intercepts a legitimate check and then simply writes different numbers on the check than were printed before. And so even if you have security features in a physical check such as watermarking or similar, the good use of whiteout or other household chemicals, can allow someone to substitute their own numbers and their own payee onto to that check. And then the bank doesn&apos;t successfully detect that before paying out the fraudster.</em></strong></p><p>So why didn&#x2019;t we do this for consumers? Mostly, because the financial industry meets people where they are. Most consumers do not have a full-time staff managing their household finances. The economy depends on them being able to consent to transactions in advance before knowing the exact timing or amount of them; the electricity bill, for example, probably comes on a predictable cadence but in an unpredictable dollar amount. Neither the bank nor the utility nor the consumer want to negotiate a three-way conversation about that $90 bill, and so we simply accept that some small portion of $90 payments are fraudulent, in the interest of lubricating the interactions of businesses and households of all sizes.</p><p>You can think of real-time authorization loops with phones as not-quite-positive pay, capable of being understood by non-specialists, with a far more modest conversion hit than preidentification would have required. And they&#x2019;re still nascent and painful for businesses.</p><p><strong><em>And so that is several decades of iterative improvements on transactional security. They&#x2019;re not the entirety of the discipline; much of what is happening happens under the hood and is not directly legible to consumers. For examples, see the </em></strong><a href=\"https://www.complexsystemspodcast.com/episodes/the-past-present-and-future-of-ai-with-stripe/\"><strong><em><u>previous episode with Emily Sands</u></em></strong></a><strong><em> on how the financial industry deploys machine learning models to sift fraud from legitimate use at scale, without requiring the user do anything special. But this should help you understand the secrets in your wallet a bit better than most people.</em></strong></p><p><strong>Thanks very much for listening and see you next week on Complex Systems.</strong></p>"

 standards inflate IT scope (26:57) Market consolidation and the lack of competition in procurement (33:47) Aligning program administrator incentives with successful service delivery (36:03) Using in-house technologists to push back on vendor change orders (39:27) Shifting from &quot;Big Bang&quot; contracts to iterative, agile development (53:10) The moral incoherence of asset limits (01:11:36) Insourcing electronic income verification databases (01:16:56) Building public sector competence to manage modern technical risk (01:20:08) Wrap",
    "transcript": "<strong>Transcript:</strong></h2><p><strong>Patrick:</strong> Welcome to Complex Systems, where we discuss the technical, organizational, and human factors underpinning why the world works the way it does.</p><p>Hideho, everybody. I&#x2019;m Patrick McKenzie, better known as patio11 on the internet. And I&#x2019;m here with Luke Farrell, a fellow at the Better Government Project at the University of Michigan.</p><p><strong>Luke:</strong> Thanks so much for having me. I&#x2019;m thrilled to be here.</p><p><strong>Patrick:</strong> Thanks very much for coming on. I think government contracting is one of these just huge portions of the economy that is largely opaque to most of us who aren&#x2019;t in it on a day-to-day basis. It drives a large and I think <a href=\"https://www.govconwire.com/articles/federal-contract-spending-in-the-last-5-years\"><u>increasing</u></a> portion of service delivery to citizens &#x2014; everything from unemployment benefits to SNAP (food stamp) benefits to other services delivered by the government.</p><p>So it behooves us to understand how that sausage is actually made. This has cost control implications, efficient delivery of government implications, and also some policy-adjacent implications that we&#x2019;ll get into later with some worked examples. And I think it&#x2019;s always useful to be a more informed consumer of what you&#x2019;re using.</p><p>Given that most people don&#x2019;t understand how this interface between private industry and the government determines the government&#x2019;s interface with citizens and residents, they make poor choices. This happens both in their retail encounters with those interfaces, and also in a special class of retail encounter with the government, which is when you&#x2019;re <em>a legislator</em> attempting to get the government to do what you want.&#xA0;</p><p>[<strong>Patrick notes</strong>: This joke works on two levels. The primary one is the legislative process, of course, but a core designed escalation system for the American government is that legislators can intervene in individual decisions of agencies, down to the last individual passport or food stamp application. Your Congresscritter of choice has full-time staff who do this; their job title is often Constituent Services. You do not have to be &#x201C;important&#x201D;, a donor, or to have voted for the legislator at issue; calling their in-district or in-capitol office and being able to demonstrate you live in the district (often helpful, if truthful, to say that you <em>are a registered voter</em> in the district, too, but they will also do casework for immigrants and in fact that is quite common) is enough.]</p><p>And legislators mispredict <em>how their own operation operates</em> based on lack of knowledge of some of these things. So I want to socialize some of that knowledge more broadly.</p><p>With that framing, how did you walk through a path in life that caused you to be more exposed to government contracting than most people?</p><h3 id=\"transitioning-from-google-to-the-us-digital-service-usds\">Transitioning from Google to the US Digital Service (USDS)</h3><p><strong>Luke:</strong> Yeah. Not exactly the path I necessarily planned, but it&#x2019;s where I found myself. I was originally at Google where I was an APM &#x2014; product manager &#x2014; doing tech stuff. Then, toward the end of the pandemic, I was invited to come join the United States Digital Service at the White House, where they bring private sector technologists in to take on some of the hardest challenges in government.</p><p>[<strong>Patrick notes</strong>: <a href=\"https://www.google.com/about/careers/applications/programs/apm/\"><u>APMs</u></a> are not just program managers at Google, in the same way that the Senior Executive Service is not simply staffed with senior government executives. It&#x2019;s a brainchild from the early 2000s where Marissa Mayer et al recruited a cadre of a few dozen new recruits (out of a population of thousands) for being fast-tracked to senior leadership.]</p><p>There I was focused on a whole bunch of stuff, including crisis response (like the <a href=\"https://www.nationalacademies.org/read/27765/chapter/7\"><u>infant formula crisis</u></a>), and then ultimately found myself working on the government&#x2019;s social safety net and the federal benefits that are provided through the government &#x2014; including Medicaid and SNAP and unemployment insurance, and the whole host of services that the federal government provides along with states or directly to residents. These touch hundreds of millions of Americans and make sure that they can access healthcare, get food, and continue to survive if they experience a bout of unemployment.</p><p>As a result of that, I ended up in the weeds of some of these monster government contracts, these highly complex systems.&#xA0;</p><p><strong>[Patrick notes</strong>: <em>Roll credits!</em>]</p><p>And as you&#x2019;re trying to fix these programs, you really start to learn about the mechanics that actually drive them, which are often procurement, personnel, HR stuff. That&#x2019;s all the boring things that make government tick.</p><p>And then I was also the Senior Advisor for Technology on the President&#x2019;s Domestic Policy Council, where I took a broader look at some government programs in crisis and how to use technology to make sure that they&#x2019;re delivered in a more dignified, efficient, and successful manner to hundreds of millions of Americans.</p><p><strong>Patrick:</strong> I&#x2019;ll make the obligatory disclaimer. I am largely non-partisan in professional spaces. We might not be coming at this from exactly the same point of view. [<strong>Patrick notes</strong>: To be slightly more explicit in the notes than this Japanese salaryman was out loud: The Law and Political Economy Project, which published the essay discussed later in the conversation, is a progressive legal academic publication. I would not describe my personal politics that way. I invited Luke because the operational details of how government benefits delivery works (and fails) are underexplored in my usual haunts, and because the specific observations about contractor dynamics, data broker economics, and systems architecture are separable from the policy preferences.]</p><p>But I&#x2019;ve also done a tiny bit of government contracting in the past, and can speak from the perspective of someone who has written the response to a request for proposal, and has experienced some of the complexities there firsthand.</p><p><strong>Luke:</strong> I&#x2019;m sorry you had to go through that.</p><p><strong>Patrick:</strong> Yeah. Nobody wants to. I&#x2019;ve also been a citizen and a resident, subject to various governments over the years, and know what it looks like from that angle as well.</p><p>[<strong>Patrick notes</strong>: You will, several times in the audio, hear me say American citizens and either catch myself and add &#x201C;... and residents&#x201D; or not need to catch myself. This is something of a politicized shibboleth in some places, and in the current political environment perhaps some might imagine some valence in that phrasing. From me it&#x2019;s just one immigrant&#x2019;s preference for being <em>very precise</em>.]</p><p>I think people from a broad spectrum of political persuasions can, at least in theory, be in favor of maximizing for more dignity and more efficiency in government services. And we&#x2019;re certainly not at the local optimum for either of those right now.</p><p><strong>Luke:</strong> Yeah, I think that&#x2019;s right.</p><p><strong>Patrick:</strong> One of the things I write about quite frequently is that the social class that the two of us are in &#x2014; the one that spends most of its time thinking about how these programs should be constructed &#x2014; doesn&#x2019;t need to apply for unemployment benefits or welfare benefits all that frequently. So we might not have the lived understanding of what these applications look like, or the various windows into the government and the private sector that you encounter while navigating them.</p><p>So, for people who are surprised that contractors are large portions of the data sources and labor workforce for evaluating these applications &#x2014; why did that happen?</p><h3 id=\"how-rule-buildup-and-administrative-burdens-create-kafkaesque-mazes\">How rule buildup and administrative burdens create &quot;Kafkaesque&quot; mazes</h3><p><strong>Luke:</strong> So I think the complexity on the front end for the user &#x2014; where you might have to go through a 20-page application to get health insurance through the government &#x2014; is something anyone who&#x2019;s had employer-sponsored health insurance knows can be confusing. It&#x2019;s even more confusing when you&#x2019;re applying through a government program. You might have to answer a whole manner of questions that aren&#x2019;t clearly related to your eligibility or to the program you&#x2019;re applying for. And that&#x2019;s kind of a result of just the buildup of rules over time &#x2014; well-meaning legislators and policy people might have thought those requirements were important to the program&#x2019;s design, but 50 years on they&#x2019;re no longer super relevant to an application. And it&#x2019;s really hard to remove rules, but very easy to add them.</p><p>So this causes &#x2014; and there&#x2019;s a whole body of literature around administrative burdens &#x2014; just this enormous amount of work that we&#x2019;re putting on people to access benefits they&#x2019;re entitled to. Anyone who&#x2019;s filled out their taxes is very familiar with this experience. It&#x2019;s kind of the same on the government program side.</p><p><strong>Patrick:</strong> Can I give a tiny example of this?</p><p><strong>Luke:</strong> Yeah.</p><p><strong>Patrick:</strong> So we got back to the United States recently after 20 years in Japan, and needed to find health insurance. Since I&#x2019;m self-employed and the Affordable Care Act exists these days, going to the ACA exchange is the obvious option. That was <em>fun</em>.</p><p>Boring backstory: my wife is not a US national. My children are. We&#x2019;re a mixed-status household, which is something of a jargon word in service delivery. The web application became convinced that she was a US national and prompted me to upload evidence of her citizenship, which she doesn&#x2019;t have.</p><p>I didn&#x2019;t understand why the web app had made this decision. Maybe I miskeyed something, although that&#x2019;s uncharacteristic. Maybe I was in some crazy error state. Maybe they don&#x2019;t model mixed-status households. So I thought, I&#x2019;ll just upload a copy of her green card and the person on the other end of this form will figure it out, right?</p><p>A week later I get back a response: &#x201C;We&#x2019;ve reviewed your evidence of US citizenship, but the green card doesn&#x2019;t demonstrate that you have US citizenship.&#x201D; I&#x2019;m like, yes &#x2014; wow, clearly top minds here. But if she has a legal status of residence, she is still eligible for the ACA. So does this individual have legal status of residence?</p><p>You are <em>looking at the green card</em>. Yes. (A green card is colloquial language for the document attesting to <a href=\"https://www.uscis.gov/green-card\"><u>lawful permanent residence</u></a>.) So I say yes, they have lawful permanent residence. The person clicks the button, and then 48 hours later I get an automated email saying: &#x201C;Okay, given that you&#x2019;ve said this person has lawful permanent residence, you need to upload a copy of their green card.&#x201D;</p><p><strong>Luke:</strong> Yeah. And &#x2014;</p><p><strong>Patrick:</strong> I smacked my head nearly hard enough to concuss myself and take advantage of ACA benefits.</p><p>And I deal with this sort of friction professionally, so it&#x2019;s kind of entertaining for me. But I have to imagine that if you put 10,000 people in mixed-status households &#x2014; people who may have varying levels of ability to decode paragraphs upon paragraphs of inconsistently bolded, graduate-level English &#x2014; a lot of people are just going to get discouraged, or not be able to find the correct path, the cheese, and end up without the thing that theoretically speaking we want them to have. This is enormously frustrating, and it&#x2019;s where the rubber hits the road for people actually trying to consume services.</p><p><strong>Luke:</strong> A hundred percent. And I think what&#x2019;s so maddening is that your experience is not unique. That is the modal experience of someone trying to interact with a public benefits program. It&#x2019;s often frustration, confusion, having to parse complicated plain-language websites. And it might be a person who is working a blue-collar job every day and can&#x2019;t go into the office or call into the call center during call center hours in order to troubleshoot the problem they&#x2019;re having.</p><p>So you have millions of people who actually aren&#x2019;t getting access to their benefits &#x2014; not because they&#x2019;re not eligible, but because of the maze, the Kafkaesque bureaucracy we&#x2019;ve built around these programs that prevents them from accessing it.</p><p>And one example I think is really instructive here on the backend too &#x2014; very &#x201C;Complex Systems&#x201D; &#x2014; is when I was working on Medicaid, we found that over 500,000 children had lost their Medicaid coverage. Not because they weren&#x2019;t eligible, but because states had actually designed the software improperly.</p><p><strong>Patrick:</strong> You mentioned that the modal experience for these programs is kind of bad. Are you using &#x201C;modal&#x201D; explicitly there, like we have actual data to show this, or just impressionistically?&#xA0;</p><p>[<strong>Patrick notes</strong>: The modal data point in a set of observations is the one which is most common among all data points. Technologists have been known to use modal to actually identify the mode of a data set, or in the more colloquial sense, and thus I asked.]&#xA0;</p><p>Because one of the things I&#x2019;ve heard is that the government often doesn&#x2019;t instrument these applications, so they can&#x2019;t give you an answer on questions like &#x201C;what question is the hardest&#x201D; or &#x201C;where do people fall out of the funnel&#x201D; &#x2014; until they actually get to the point where the applicant has basically disengaged. Which is a crazy point of view if you&#x2019;re a program manager at a tech company.</p><h3 id=\"using-diagrams-and-funnels-to-visualize-benefit-denials\">Using diagrams and funnels to visualize benefit denials</h3><p><strong>Luke:</strong> Yeah. So the word &#x201C;modal&#x201D; there is not really derived from instrumentation we have inside of these systems. And I love that you used the word &#x201C;funnel.&#x201D; When I was working after the pandemic to re-enroll 90 million people in their health coverage after the COVID public health emergency, we were basically showing up in state governments and building those funnels for the first time. Because everyone knew there was a problem, right?</p><p>Folks knew that there was a huge number of procedural denials &#x2014; in air quotes &#x2014; which means people who are not deemed ineligible, but who fall out somewhere in that funnel. Their paperwork never shows up. They sent in the wrong documents and then never replied again. Maybe they were unreachable because they changed their address during the three years that redeterminations were paused. There are all sorts of reasons why someone might be procedurally churned out, but there was no instrumentation to understand why this person fell out and at what point they were disenrolled.</p><p>So we kind of drove around the country in a van, showing up at state governments and state capitals, working hand in hand with them to instrument that full funnel and say, &#x201C;Actually, it&#x2019;s this notice that&#x2019;s knocking out a hundred thousand children from the program who should otherwise be covered.&#x201D; Or, &#x201C;Actually, this line of logic in the software is from the nineties and is no longer compliant with the law and should be struck from the system.&#x201D;</p><h3 id=\"software-logic-errors-that-improperly-kicked-children-off-medicaid\">Software logic errors that improperly kicked children off Medicaid</h3><p>One example of a huge problem we found in a number of states: they had actually designed the software to determine eligibility for a whole household as opposed to the individuals in that household for Medicaid. So in some states, the threshold at which children qualify for Medicaid is much higher than for adults &#x2014; which makes sense, we want the program to be more generous for children. But if there was a household where the parents didn&#x2019;t qualify and the children did, the whole family was getting kicked off their coverage. Which is explicitly against the law, but no one knew about it because it was buried in a software logic error derived from misinterpretations layered on over many years.</p><p><strong>Patrick:</strong> For want of a Sankey diagram, the war was lost.</p><p>[<strong>Patrick notes</strong>: A Sankey diagram is a type of flow chart where the width of each arrow is proportional to the quantity it represents. If you started with a million Medicaid applicants on the left side and drew arrows showing where each one ended up &#x2014; approved, denied for income, denied for paperwork, lost to a software bug, simply stopped responding &#x2014; you&apos;d immediately see which arrows were unacceptably fat. It is particularly useful in complex multi-stage processes where e.g. the experience of users who resubmitted applications might sharply diverge from first-time applicants. The form was invented in 1898 to visualize energy loss in steam engines, because they didn&#x2019;t have Factorio Space Exploration to do so.]</p><p><strong>Luke:</strong> Exactly. And I mean, we were literally building Sankey diagrams and state Medicaid directors were amazed that they could have that level of insight into where people were falling out. It was just so beyond the normal course of systems design and improvement inside of state government. Just putting that Sankey diagram on a screen unlocked all of this headroom for improving the program, because no one had ever really taken the time to thoughtfully go through it.</p><p><strong>Patrick:</strong> I feel like there&#x2019;s a path dependence here &#x2014; and you can tell me if this matches your experience talking to the people who actually run these systems. Much of the economy has changed in the last 70 years or so, but broadly speaking, service delivery looks a lot like service delivery did in, say, 1950. We had a paper-based workflow then, and the government is pretty good, relatively speaking, at architecting workflows where: we need a floor of clerks, we need a front office, the front office passes paper to the floor of clerks, they get 10,000 papers on Monday, we successfully drain that stack within six weeks, and everything is operating as designed.</p><p>And if you asked in 1950, &#x201C;Give me a real-time count of how many papers are in process,&#x201D; they&#x2019;d say: one, that&#x2019;s a crazy thing to ask for, but two, if you want an approximation, go look at the physical floor and count how many inches of paper there are in the to-be-done box. That&#x2019;s your count.</p><p>These days we have computer systems that are pretty good at doing real-time counts. But because the institutional memory of the system is that tracking the progress of an in-flight application is just strictly beyond the bounds of what&#x2019;s materially possible &#x2014; and I can&#x2019;t even ask a web app to look at how many inches of paper there are because the paper doesn&#x2019;t exist anymore &#x2014; I&#x2019;ve actually lost fidelity by moving to the computer system.</p><p>The management of these programs often doesn&#x2019;t do things that are pretty table stakes for private industry, which came up in a post-computer age. Private industry writes SQL queries because it has business analysts. It&#x2019;s not that the government has no business analysts, but I often think there is a crushing undersupply of them relative to need, and a management culture that doesn&#x2019;t really make data-driven decisions &#x2014; in a number of places, both in the management of the agencies and in the legislative branch.</p><p><strong>Luke:</strong> Totally. I think that&#x2019;s exactly right. Two thoughts on that. First, for example, in Medicaid, it&#x2019;s in regulation that states need to have an online application for Medicaid. To me that doesn&#x2019;t mean it needs to be good. It doesn&#x2019;t mean it needs to be mobile friendly. It doesn&#x2019;t mean that one person ever needs to successfully make it through the flow. Our modernization efforts in government &#x2014; or those mandated by legislators &#x2014; have been: &#x201C;You need to make a website.&#x201D; But they don&#x2019;t take the second step of asking how you instrument it, or what the expectations are around performance of that particular tool.</p><p>I&#x2019;m not suggesting that legislators should do that, but I think the folks who are actually managing the programs day-to-day should. And it comes up in procurement too, where we use the same mechanisms to procure buses and pencils and office space &#x2014; things you need many copies of in different states and jurisdictions &#x2014; as we do for software, where in theory software is infinitely replicable for marginal cost. Instead we&#x2019;re kind of building stuff from scratch 56 times over.</p><p>That&#x2019;s a little bit of what the piece gets at: the brokenness of that process, and the conception of these government programs as paper-based is ingrained all the way into how we do the contracting for software, which should be dramatically different from how you might procure office space or paper or pencils.</p><p><strong>Patrick:</strong> I think part of the reason that the bespoke process for negotiating software deliverables is the way it is comes from the experience of past generations. The laws were written during past generations with respect to graft, waste, and abuse, and so we&#x2019;ll tighten the screws by making people say, &#x201C;Okay, put a line in the request for proposal that you have to be compliant with all laws of the United States and the state of Idaho and any local regulations.&#x201D;</p><p>It&#x2019;s very easy to say that sentence. But it blows up the complexity of the project by many orders of magnitude, because there is almost no one who is actually capable of telling you what are all the relevant laws of the United States.</p><p>An example I&#x2019;ve used with respect to government payroll systems: payroll systems are their own separate fun ball of wax that explodes and deals damage to a politically powerful group &#x2014; government employees &#x2014; in the most direct way possible, hitting them in their pocketbooks. One of the reasons these systems are so bad is nobody stands up in the scoping meeting and says, &#x201C;By the way, we need to have the option for Chinese language translations on the back of pay stubs.&#x201D; It&#x2019;s a hard requirement. That actually is a hard requirement because of the sedimentary layers of laws.</p><p>There are hundreds of thousands of hard requirements like that. Which is why this is not the &#x201C;a payroll system should be done by three developers in six weeks&#x201D; &#x2014; that doesn&#x2019;t sound reasonable to me at all. It touches real money. It&#x2019;s going to be a multi-month project.&#xA0;</p><h3 id=\"why-government-payroll-it-costs-hundreds-of-millions-of-dollars\">Why government payroll IT costs hundreds of millions of dollars</h3><p>But then how do they routinely spend more than a hundred million dollars on a payroll system? The answer is that if you start writing computer programs that have hundreds of thousands of countable requirements, AI can&#x2019;t write them all for you &#x2014; at least not yet.</p><p>So, contracting and procurement &#x2014; which are often synonyms for each other &#x2014; can you give people a bird&#x2019;s-eye view of: okay, I&#x2019;m a program administrator for a state. I&#x2019;ve just been told that Congress says I need to have a website. I don&#x2019;t know how to spell PHP. How do I go get a website?</p><p><strong>Luke:</strong> Yeah. It&#x2019;s complex. And to start: in these federally funded, state-administered programs, it actually starts up at the federal level. In the case of SNAP or Medicaid, a state is making a request for funding to buy one of these IT systems from the federal government, and the federal government will provide matching dollars. In the case of Medicaid, they&#x2019;ll provide 90% of the funding to develop a new IT system for a state government.</p><p>So a state sends up a request for that, and that&#x2019;s a very compliance-driven process. The federal government isn&#x2019;t checking to say, &#x201C;Is this going to be a good website? Is this mobile friendly?&#x201D; What they&#x2019;re asking is: &#x201C;Did they check all the legal boxes in order to be qualified to receive this financing?&#x201D; So from the very start, it is a legal process and not a product development process. And the person on the federal side is someone whose expertise is in analyzing those legal requirements, not in asking whether this is going to be a good product.</p><h3 id=\"how-recursive-legal-requirements-and-dod-standards-inflate-it-scope\">How recursive legal requirements and DOD standards inflate IT scope</h3><p><strong>Patrick:</strong> One of the things that routinely trips people up is that this is a recursive process. A lot of the legal requirements incorporate by reference just huge bodies of documents. In a single sentence, you can say something like, &#x201C;Oh, by the way, the website needs to be secure.&#x201D; And that doesn&#x2019;t actually mean anything in the material world. What it means is there&#x2019;s this Federal Information Security standard &#x2014; <a href=\"https://www.cisa.gov/topics/cyber-threats-and-advisories/federal-information-security-modernization-act\"><u>FISMA</u></a> &#x2014; which defines what security means in the context of government systems. It was written by some wonks at the DOD fifteen years ago, and relatively few people in the financial industry would say, &#x201C;Actually, I want my security team&#x2019;s Q3 plan to be defined by what is in that document.&#x201D;&#xA0;</p><p>[<strong>Patrick notes</strong>: My apologies to my friends at the Department of Commerce; I misremembered where NIST was on the org chart.]</p><p>But the government says no &#x2014; we need to understand what these words mean, and we have no understanding other than this 400-page PDF file.</p><p>So here&#x2019;s 400 pages of new requirements. And there are individual sentences in there that routinely cause many millions of dollars of extra work for little, if any, marginal gain. They&#x2019;re occasionally prescriptive about things like what your backup strategy needs to be, in a way that a talented technologist might not actually endorse. But the United States federal government in its infinite wisdom says the one true backup strategy is the one on page 37, and you&#x2019;re going to implement it. And if you can&#x2019;t buy it off the shelf &#x2014; because no one would do that, because it&#x2019;s crazy &#x2014; then you pay the engineers to rewrite it from scratch for the 437th time.</p><p><strong>Luke:</strong> Yeah, that&#x2019;s exactly right. And the complexity is kind of fractal &#x2014; whether it&#x2019;s security or accessibility or any of these kinds of requirements, there&#x2019;s a whole body of potential legal flags that anyone could raise that might slow down the process.</p><p>So once the federal dollars theoretically move to reimburse a state for taking action, the state is now doing a procurement where they&#x2019;re putting out a request for information or request for proposals &#x2014; &#x201C;Hey, we need to build this thing, folks come and bid on this contract so you can be the one who actually develops it.&#x201D;</p><p>In practice, when you&#x2019;re putting out to bid a Medicaid eligibility and enrollment system, these might be hundred-million-dollar contracts &#x2014; huge software development contracts for systems that are, at the end of the day, rules engines. The sticker shock to a private-sector person would be pretty amazing.</p><p>And in those rules are quite often criteria that only very few players can actually satisfy. So if Luke and Patrick made a startup and wanted to go bid on a $100 million Medicaid contract, one of the requirements might be: &#x201C;Has built a Medicaid eligibility enrollment system before.&#x201D; So how are we supposed to develop the expertise required to actually go and bid on that thing? It&#x2019;s a risk-reduction exercise. That requirement is in there because no one&#x2019;s going to blame you if you hire the guy who did the last one. But if you hire an untested party, you might catch some flak for that.</p><p><strong>Patrick:</strong> Yeah. There&#x2019;s an interesting kind of cat-and-mouse game &#x2014; or I guess a tug-of-war &#x2014; here. On one hand, we always say we want more small businesses in government contracting, more people to get a leg up, more innovation in service delivery. And then we have things that are dramatized in a movie like <em>War Dogs</em>, where two people out of their bedroom end up selling hundreds of millions of dollars of weapons to Uncle Sam for delivery to third parties. And you say, &#x201C;Well, okay, we want a small business, but <em>not like that</em>.&#x201D;</p><p><strong>Luke:</strong> Yeah.</p><p><strong>Patrick:</strong> So we ratchet things such that there are only, say, five firms capable of contracting government services above a certain level. And of those five firms, the number that play in a particular area might be two or three. Even if you&#x2019;re dissatisfied with the bids, who are you going to go with? There are not seven options here.</p><p>You mentioned these can be hundred-million-dollar-plus systems. Absent specific legislative authority or similar, the rules that govern the hundred-million-dollar systems are the same rules that govern the $30,000 systems. I once bid on a contract with an annual contract value where my bid was $30,000. I lost out to someone who bid $15,000 for bespoke software development. I was already feeling the pinch at $30,000, and it&#x2019;s anybody&#x2019;s guess how much legal compliance you can actually buy at $15,000 a year.&#xA0;</p><p>[<strong>Patrick notes</strong>: The state of Hawaii needs to tell a certain class of individuals to come to their appointments in a timely fashion. I once ran a business which did <em>broadly</em> that, but of course the integration work would have been bespoke software development. After spending several weeks responding speculatively to the RFP and losing, the only long-term impact to my business was the state hit me with an income tax audit the following year, certain that I was a government contractor not telling the government how much money he was making. They were annoyed with me when I told them that the reason they had not received a tax return was because Hawaii-source revenue for the year was $180 and therefore below the statutory threshold.</p><p>I feel this has more than zero relevance as to why government contracting is done by large Lovecraftian horrors and not nimble tech businesses.]</p><p>But we <em>certainly pretend</em> that you&#x2019;ve bought <em>all</em> of it.</p><h3 id=\"market-consolidation-and-the-lack-of-competition-in-procurement\">Market consolidation and the lack of competition in procurement</h3><p><strong>Luke:</strong> No, that&#x2019;s exactly right. And one of the unfortunate consequences is that when only five firms can satisfy those constraints, you get a really natural market plagued by the problems of consolidation. It becomes quite easy to buy up the other three that can also do this, and then suddenly you have one Medicaid IT contractor providing 32 of the state systems &#x2014; or 26 of all the state systems &#x2014; and their ability to capture the market is straightforward because of the huge barrier to entry. The design of these procurements favors the incumbent. So you get these really bad market dynamics, which create all sorts of downstream negative consequences.</p><p><strong>Patrick:</strong> I often think that people worry &#x2014; and many of the rules were explicitly motivated by the worry &#x2014; that the contractors are going to go in a smoky back room by themselves and divvy up the world, such that even if we get three bids for something, they&#x2019;ll have decided the winner in advance. Certainly collusive behavior by people to take advantage of the government has happened in the history of the United States. However, I think it&#x2019;s important that people and policymakers understand that collusive behavior is not the only way this can play out. It can happen naturally and organically too.</p><p>One example: the financial industry, which doesn&#x2019;t have quite as hard requirements around who you can purchase services from, nonetheless decided to effectively sole-source an endpoint monitoring system. Not a hundred percent sole-source, but there were call it four plausible endpoint monitoring systems &#x2014; like antivirus, but for enterprise, when you&#x2019;re deploying it on a hundred thousand machines at once. A large portion of the financial industry picked a system from CrowdStrike called CrowdStrike Falcon.</p><p>CrowdStrike Falcon <a href=\"https://www.bitsaboutmoney.com/archive/crowdstrike-bug-hit-banks-hard/\"><u>had a bug one day</u></a> in 2024 and took down a large portion of the largest US banks all at once &#x2014; a terrible single-point-of-failure issue. And this is why we worry about software monocultures and about competition in critical industries. Theoretically, if you have 4,500 banks and one bank is down for a day, your economy can keep running. But when all the banks are on the same computer and the computer has a flu, you&#x2019;ve got a problem.</p><p>Did all the banks get their IT departments together in a room and say, &#x201C;We only go with CrowdStrike now&#x201D;? No. What happened was a regulatory decision was made &#x2014; under authority I&#x2019;m somewhat unclear on &#x2014; by the FFIEC, the <a href=\"http://www.ffiec.gov/\"><u>Federal Financial Institutions Examination Council</u></a>, which is a meta-government body that unifies five different government agencies that do bank examinations. They had an <a href=\"https://ithandbook.ffiec.gov/\"><u>IT rulebook</u></a>, and that rulebook had what I&#x2019;ll call &#x201C;strongly worded suggestions&#x201D; for what a compliant bank would have.</p><p>When an examiner visits your bank in small-town Omaha, he&#x2019;s not going to do bespoke engineering work. He&#x2019;s just going to read from the strongly worded suggestions. And you, wanting to pass your bank examination and continue operating, will say, &#x201C;Yes, absolutely, I will do all the things on the strongly worded suggestions.&#x201D; One of those suggestions was basically: you should buy an endpoint monitoring software.</p><p>So as the bank&#x2019;s IT department, you don&#x2019;t have strong opinions on which endpoint monitoring software to have, but you know it needs to be the one that your examiner is going to say yes to. The natural dynamic in the market was that CrowdStrike&#x2019;s sales and marketing department figured out: we&#x2019;ve won a lot of financial sector business. We will win more of their business by writing collateral &#x2014; white papers on our website about how buying our thing satisfies this specific requirement, and we&#x2019;ll even pre-write your risk analysis that you&#x2019;ll have to pass to your examiner. So we&#x2019;ll help you check all the boxes, and in return for checking these boxes, you&#x2019;ll pay us money.</p><p>Without anyone getting together in smoky back rooms, and while the other three endpoint monitoring solutions were focusing on e-commerce shops, the natural market dynamic was that CrowdStrike Falcon sewed up the financial industry. And then one day the financial industry went down from a single engineer bug.</p><p><strong>Luke:</strong> The analogy is perfect to what I think happens in the government sector. That instance I mentioned earlier, where children were being kicked off their health insurance improperly? That bug was forked across 29 states, presumably from the same original code base that was first operated in one state. When they won another state contract, they kind of lifted and shifted and changed the branding a little bit. And we still paid full price for it, by the way.</p><p><strong>Patrick:</strong> Full price. Twenty-nine times.</p><p>A long time ago in a place far, far away, I worked for a software consultancy, and yes &#x2014; you are paying for the rewrite every time.</p><p>[<strong>Patrick notes</strong>: I was an engineer, and not a sales representative. Had I been a sales representative, I would of course have said that you&#x2019;re not paying for the rewrite, you&#x2019;re paying less because we will only be configuring the pre-existing software to match your unique business requirements.]</p><p><strong>Luke:</strong> And again, that makes sense if you&#x2019;re buying office space in Idaho and Michigan. But if you&#x2019;re buying software in Idaho and Michigan, you could in theory benefit from &#x2014; well, two instances of the same software you buy once.</p><p>So I think that created that same kind of single-point-of-failure dynamic. In SNAP, EBT payments processing is operated by two vendors, and that is a kind of single- or two-point-of-failure risk in that industry. The good news, compared to the financial sector, is that it&#x2019;s the government that&#x2019;s the buyer here. We set the rules of the road, and we can change the rules to help prevent some of this consolidation and bad outcomes.</p><p>For example, instead of doing a $100 million contract for software, maybe you can modularize your contracts &#x2014; have someone build the front door that connects into the eligibility logic, and have two different vendors do that, with a more capable state managing those two things and making sure they&#x2019;re integrated appropriately. There are pros and cons to an approach like that, but it changes the market dynamic.</p><p>And this is an example where the government is a monopsony, right? Like, we are the sole buyer. No one else is buying Medicaid eligibility software out in the world. So we can kind of set the rules of engagement around the kind of market we want in this sector. And it&#x2019;s pretty clear that the current setup is not serving us well. The government has a lot of tools in its belt to actually change the market dynamics here.</p><h3 id=\"aligning-program-administrator-incentives-with-successful-service-delivery\">Aligning program administrator incentives with successful service delivery</h3><p><strong>Patrick:</strong> Yep. And to exercise a bit of empathy for government employees here: the individual program administrator might say, &#x201C;On a theoretical level, sure &#x2014; government contractor reform, everybody is for it. And you might have an opportunity to do it legislatively every 20 years. But in between those 20 years, my hands are totally tied by the law.&#x201D;</p><p>Even if I&#x2019;m in charge of a hundred-million-dollar program or a hundred-million-dollar contract for a program that spends tens of billions of dollars a year, I can do nothing. I&#x2019;ve got all the existing laws and regulations that I have to take care of, and I don&#x2019;t own this outcome. There is no success case for this contract in which my life gets better. The only case in which my life changes as a result of this contract is if I break one of these laws &#x2014; then I get in trouble. If a legislator notices, and I get a phone call, my job&#x2019;s actually at risk.</p><p>If the program merely fails to deliver services to &#x2014; I guess this is a two-part question, and maybe I&#x2019;ll ask the big one later &#x2014; but if we had that 20-year window open up for changes in what we want from government contracting, what would some of those changes be? And how do we change the incentive system for Bob &#x2014; the program administrator &#x2014; so that Bob&#x2019;s incentives are aligned with the program succeeding, not just with avoiding getting in trouble?</p><p>I&#x2019;ve met a lot of Bobs.</p><p><strong>Luke:</strong> Same.</p><p><strong>Patrick:</strong> And Bobs often say it&#x2019;s calumny that people in the press and civil society think they don&#x2019;t care about the program succeeding. They keenly care about the program succeeding. So without addressing Bob&#x2019;s mental state &#x2014; how do we change Bob&#x2019;s incentives such that they&#x2019;re aligned with the program succeeding and anti-aligned with failure?</p><p><strong>Luke:</strong> Totally. It&#x2019;s an excellent question. And shout out to all the Bobs out there, because you will find those people everywhere. People know this isn&#x2019;t working, right? You won&#x2019;t talk to a state Medicaid director who thinks things are going super well in their state. I&#x2019;ve talked to nearly all of them. No one has ever said that to me. The folks who are in the procurement office or the IT shop feel hemmed in by the system they&#x2019;re a part of. So you&#x2019;re a hundred percent right that their hands are &#x2014; or at least they perceive that their hands are &#x2014; meaningfully tied.</p><h3 id=\"using-in-house-technologists-to-push-back-on-vendor-change-orders\">Using in-house technologists to push back on vendor change orders</h3><p>So how do you make those incentives better? I think one approach &#x2014; and this is what I saw from my government experience &#x2014; is hiring technologists into government: software engineers, data scientists, user researchers, product managers. Those people can call a spade a spade in a way that lawyers might not be able to. If a government contractor says, &#x201C;Oh, this bug you want us to fix is going to take us a thousand hours and a million dollars,&#x201D; a software engineer can share his screen and say, &#x201C;I&#x2019;m going to fix it in this 30-minute meeting right now.&#x201D; That&#x2019;s a really powerful tool for pushing back on the kind of day-to-day slog that Bobs everywhere are experiencing, where they&#x2019;re not empowered with the skill set to push back on the contractors they&#x2019;ve hired to do some of this work.</p><p><strong>Patrick:</strong> There was a particular government contractor doing a thing &#x2014; I won&#x2019;t throw them under the bus, but I&#x2019;ll throw this example under the bus &#x2014; in the VaccinateCA days. They were contracting with the federal government under some authority. One part of that contract was: you need to produce a CSV file, and then we&#x2019;re going to distribute it to a lot of places. The CSV file was materially about locations, and it became very useful for many consumers of that CSV file to have the latitude and longitude of those locations &#x2014; which the organization clearly knew, because they were also producing a map as a different deliverable.</p><p>So: hey, can you put the latitude and longitude in the CSV file? And that organization said, &#x201C;Yes, we can absolutely do that. We&#x2019;re going to need a change order and six weeks of process to do it.&#x201D; And I&#x2019;m like, &#x201C;Really? That&#x2019;s two lines of code.&#x201D;</p><p>So VaccinateCA &#x2014; to accelerate the delivery of services to people living in the United States of America &#x2014; went to the government and said, &#x201C;Look, you&#x2019;re also getting a file from us. We know the latitude and longitude of these places. We&#x2019;ll just publish that, and then you can do the trivial SQL join to put the latitude and longitude together. Also, we&#x2019;re going to go to the downstream consumers and tell them: hey, while you&#x2019;re waiting for that, you can just pull it from this file, and you can trust us not to hallucinate them because we&#x2019;re working from the same underlying data sources.&#x201D;</p><p>So yes &#x2014; it is very useful to have someone in the room with the authority to say: &#x201C;Six weeks to do two lines of code? And you&#x2019;re telling me you&#x2019;re going to do six weeks of manual testing on it? Pull the other one, it&#x2019;s got bells on. Let&#x2019;s bring some adults into the room here.&#x201D;</p><p><strong>Luke:</strong> Yeah, I think that&#x2019;s right. The folks who are at the table today are policy people and lawyers and analysts who might not be able to push back on a vendor who says, &#x201C;Oh no, you don&#x2019;t get it &#x2014; those two lines of code really need six weeks of manual testing.&#x201D; I think there is a huge amount of headroom in growing technologist state capacity, even just to push back on that. You see millions of dollars&#x2019; worth of change orders disappear overnight if you have even one software engineer, paid a reasonable salary, just to push back on those things every day. Huge ROI in bringing those folks in.</p><h3 id=\"shifting-from-big-bang-contracts-to-iterative-agile-development\">Shifting from &quot;Big Bang&quot; contracts to iterative, agile development</h3><p><strong>Patrick:</strong> I would also love to get them involved at the legislative stage &#x2014; whenever we do this big contracting reform, if that ever happens, or even in the year-to-year business of updating regulations. Because there are some fundamental, difficult-to-fix issues. I don&#x2019;t remember how many members of Congress are lawyers &#x2014; it&#x2019;s like 400-plus.&#xA0;</p><p>[<strong>Patrick notes</strong>: Overestimated by <a href=\"https://www.congress.gov/crs-product/R48535\"><u>~2X</u></a>. Sorry, counselor(s).]</p><p>Lawyers are going to get really into fine distinctions of language and writing complex state machines, ba dum bum, but they don&#x2019;t really have a lived feel for the software development process. So basically all of the Big Bang contracts assume you&#x2019;re going to put 90% of the engineering effort in before launch day and only 10% for changes in operations &#x2014; which industry has been screaming about since the waterfall-versus-agile distinction, which is 25-plus years old at this point.</p><p>That is not the way successful software actually gets shipped in the world. You ship the minimum viable product to start experiencing what users actually need, and then you change the software rapidly in response. Because attempting to identify all of the requirements for the software before you&#x2019;ve spoken to users and shown them something they can play with is a fool&#x2019;s errand. We&#x2019;ve lost tens of billions of dollars chasing that fool&#x2019;s errand, the private sector stopped chasing it, and the government continues.</p><p>And one of the things that has happened in some contracts is they say, &#x201C;You must use agile development methodology,&#x201D; which is then defined in a way that I would say describes waterfall, not agile &#x2014; because that is apparently the controlling definition for the purpos
