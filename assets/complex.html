    "transcript": "<strong>Transcript:</strong></h2><p><strong><em>Hideho, everybody. My name is Patrick McKenzie, better known as patio11 on the internet. I love infrastructure as a lens on society because it&apos;s an exploration of why our world works the way it does and how a better world is possible.</em></strong></p><p><strong><em>Unfortunately, not all bits of infrastructure that you look at are optimistic &quot;up into the right&quot; explorations of things that you are happy to use every day.</em></strong></p><p><strong><em>Today&apos;s episode is a bit of a downer on debt collection, but I think it&apos;s something that more people should understand, hopefully without experiencing it directly.</em></strong></p><p><strong><em>My own path to becoming an accidental expert is a bit of a funny story.</em></strong></p><p><strong><em>Some years ago I had graduated university and had just gotten my first real job in Japan. I did what all the guides said you should do as a young professional who was newly independent and becoming financially savvy and sophisticated, coming from no background in that whatsoever. &#x201C;The first thing you should do is try to get a free copy of your credit report.&#x201D; When I asked for a free copy of my credit report, expecting to see just my student loans on it, because of course this was the start of my financial life as an independent adult. What the credit report actually said was that I owed more than $100,000 to a variety of lenders I had never heard of, in some cases dating to before I was born.</em></strong></p><p><strong><em>I was unimaginably panicked by this, so I did what anybody would do: I Googled &quot;my credit report says I owe a hundred thousand dollars to people, what the heck do I do?&quot; I ended up on some internet forums that basically answered this question for people. I figured out quite a bit about the Fair Credit Reporting Act (FCRA) and the Fair Debt Collection Practices Act (FDCPA) and what one would need to do to work through this situation.</em></strong></p><p><strong><em>Because I love internet forums, I stayed on those forums for a few years. A lot of people, after I had fixed my problem, had their own sets of problems with debt collectors or with banks. They would ask, &quot;What do I do about this?&quot; and I would often reply, &quot;Oh, you just need to send a quick professional letter to the bank saying this.&quot;</em></strong></p><p><strong><em>The population of people who have issues with banks and debt collectors is not randomly selected from all people in the world. Many of them have quite a bit of difficulty writing quick professional letters to bank vice presidents. While I knew nothing about anything in my early twenties and did not have a position of authority or responsibility, I was able to write quick professional letters because I had been exhaustively trained in doing so by the wonder that is the US educational establishment. I had a lot of free time on my hands because I was a Japanese salaryman and underemployed in one&apos;s twenties as one is, so I ghostwrote a few hundred letters between people and their banks or debt collectors, trying to essentially quarterback them through these problems. Some of those letters were sometimes effective.</em></strong></p><p><strong><em>Eventually I got into different hobbies and moved on in life, but this gives me some accidental expertise about the Fair Debt Collection Practices Act (FDCPA) and the Fair Credit Reporting Act (FCRA) and how these are actually operationalized within the US financial industry. That heavily informs both some of the representations I&apos;m going to be making in this essay and also some of the moral valence that I have for this. I&apos;ll try to keep it to a dull roar, but I am definitely not &quot;true neutral&quot; with respect to this topic.</em></strong></p><p><strong><em>And so with no further ado: &quot;Credit card debt collection,&quot; which was originally published in Bits About Money on August 11th, 2023. As always for the style of episode, I&apos;ll be giving some live author&apos;s commentary as asides.</em></strong></p><p>One interesting lens for understanding how industries work is looking at their waste streams. Every industry will by nature have both a stock and a flow of byproducts from their core processes. The waste has to be dealt with, or it will figuratively or literally clog the pipes of the industry, and frequently has substantial residual value.</p><p>Most industries develop ecosystems in miniature to collect, sift through, recycle, and dispose of their waste. These are often cobbled together from lower-scale businesses than the industry and themselves. They involve a lot of dirty work. They&apos;re considered low status. Few people grow up wanting to specialize in, for example, sales of used manufacturing equipment.</p><p>One core waste stream of the finance industry is charged-off consumer debt. Debt collection is a fascinating and frequently depressing underbelly of finance. It shines a bit of a light on credit card issuance itself, and richly earns the wading-through-a-river-of-effluvia metaphor.</p><p>A disclaimer: I&apos;ve had substantially more at-bats with debt collectors than most people as a result of an old hobby of writing letters on behalf of debtors to their lenders and non-affiliated debt collectors. I did this over the internet on my own volition because it seemed pro-social and I was extremely underused by my actual job at the time. This experience leaves me with strong opinions on the debt collection industry. A frequent archetypical person in need of a letter was a Kansan grandmother in diminished financial circumstances who had been harassed for months. I&apos;m going to try to keep these views to a dull roar here. In the spirit of spending more mental energy on discussing why the system presents as so broken.</p><h3 id=\"the-lifecycle-of-a-defaulted-debt\">The lifecycle of a defaulted debt</h3><p>The majority of debt which defaults in the United States is revolving credit card debt. Without addressing the politics of it, the impression among many informed&#xA0; people that most defaulted debt is medically related is the result of successful advocacy work rather than being substantially based in reality. Trustworthy numbers are not hard to come by due to a combination of regulatory supervision and the US&#x2019; almost unique degree of population-wide debt surveillance via credit reporting agencies. (We&#x2019;ll return to credit reporting some other day.) Assume I&#x2019;m talking about credit card debt below, though the mechanics for medical debt bear overwhelming similarity. (I&#x2019;d address it specifically except that healthcare economics are a fractally complex topic once you bring in, for example, insurers, public programs, and the like into the mix.)</p><p><strong><em>For a quick aside, as long as we&apos;re here. So the original scholarly work that people have cached in their minds as establishing that bankruptcy is heavily medically related, and that maybe medical debt is a large share of US consumer debt, was by Himmelstein, Thorne, Woolhandler, and Warren back in </em></strong><a href=\"https://papers.ssrn.com/sol3/papers.cfm?abstract_id=664565\"><strong><em><u>2005</u></em></strong></a><strong><em> and </em></strong><a href=\"https://www.pnhp.org/new_bankruptcy_study/Bankruptcy-2009.pdf\"><strong><em><u>2009</u></em></strong></a><strong><em>. Senator Warren is now better known for other work.</em></strong></p><p><strong><em>Those papers establish a correlation between medical debt and bankruptcy, which is not causational, but is read as causation by a lot of people. The specific mechanism for this is extremely frustrating to explain to advocates. Advocates are quite morally committed to the proposition that people have health issues, and then those health issues cause them to have financial crises through basically no moral fault of their own.</em></strong></p><p><strong><em>The mechanism is that you have revolving credit lines in the United States for your credit card, and you spend all sorts of things on them: food, travel, your entire basket of goods. Then you have one special kind of revolving credit line, which is trade credit provided by medical providers.</em></strong></p><p>[<strong>Patrick notes: </strong>Apologies, this is non-standard usage of &#x201C;trade credit.&#x201D; What I meant was, by being willing to provide service in advance of payment, medical professionals routinely extend credit to patients in the U.S. healthcare system. This is partly a considered decision; many firms in many industries extend credit to increase consumption. This is partly an artifact of U.S. medical billing practices, which frequently are operationally incapable of computing a bill at the time a service is rendered, or have not yet had a multi-party negotiation which definitively settles which of several parties is responsible for the bill.]</p><p><strong><em>That trade credit is broken out on your credit reports; they get individual tradelines for when you owe a doctor money.&#xA0;</em></strong></p><p>[<strong>Patrick notes: </strong>Tradelines, on the other hand, are properly used jargon here. They are the basic organizational unit for your credit report. You typically have one per credit account. A tradeline includes basic information on the issuer of the debt it describes, simple and sometimes fragmentary summary statistics like original amount and/or peak balance, and then the all-important time series of balances and whether you were current on the obligation or not for each month of its history.]</p><p><strong><em>Now, if you stop paying on your revolving credit line, your bank will stop letting you charge new things to it, and you&apos;ll have diminished purchasing power. And so people can continue paying on their revolving credit lines and stop paying their doctors when they&apos;re under substantial financial distress. And then at the point of bankruptcy, it will look like they owe a lot of money to doctors and relatively little money to revolving credit lines.And so through this crisis of legibility, one&apos;s expenditures on food and one&apos;s expenditures on medicine, both required for oneself and one&apos;s family to live a normal, healthy life, are treated differently. Your credit report will only show the expenditures on medicine and not the expenditures on food. </em></strong>[<strong>Patrick notes:</strong> Please read this as being &#x201C;disproportionate to actual usage&#x201D; rather than a strict statement that no one ever defaults on credit cards they used to purchase food.]</p><p><strong><em>And so researchers have convinced themselves that people spend much more on medicine than on food. This is not quite the right analytical lens, but it has some amount of data to support it because of this legibility issue.</em></strong></p><p><strong><em>And it&apos;s intuitively quite persuasive to advocates, and as a sometimes advocate myself, I worry that this will cause people to adopt policy responses that don&apos;t actually help. For example, subsequently to the publication of this essay, there was </em></strong><a href=\"https://claude.ai/chat/7b26beea-c61e-4ea5-9693-6f2b979924b5#:~:text=https%3A//academic.oup.com/qje/article/140/2/1187/7933321\"><strong><em><u>rigorous research done</u></em></strong></a><strong><em> with respect to the non-government organization, </em></strong><a href=\"https://unduemedicaldebt.org/\"><strong><em><u>RIP Medical Debt</u></em></strong></a><strong><em>.&#xA0;</em></strong></p><p><strong><em>RIP Medical Debt&apos;s theory of the case was: well, people go into medical debt for the usual set of reasons and that impacts their credit report scores and is terrible. Therefore, we should buy the medical debt back from the debt collection industry, we will forgive it, the people will owe less debt, and then they will regain access to consumer credit. I did not think in advance that this was likely to be successful, and indeed the rigorous research on it suggests that it was basically ineffective at all goals of the program. But if your thinking here is informed by the medical crisis theory, you will have an incorrect theory of reality, and thus present policy proposals which do not affect reality despite the amount of money that you pour into them.</em></strong></p><p>[<strong>Patrick notes: </strong>There were some other parts of the program which I thought contemporaneously were underbaked. One is that the organization apparently thought that paying down previously defaulted debt would increase credit scores. That&#x2026; is not something that a consumer credit advocate would endorse, because FICO does not work that way. When I originally heard of the effort I thought it was extremely unlikely that an NGO would spend a lot of money prior to talking to anyone who understood their cause area. I am, today, older and wiser.]</p><p>[<strong>Patrick notes:</strong> Having given the aside why I do not believe what many advocates believe about the causes of debt, you might reasonably ask what I do believe.</p><p>There are a hundred different symptoms of the same underlying issue: spent more money than one had, income shock, default. Some involve poor choices. Some involve moral culpability. Some involve bad luck. Some are a complicated alchemy of all of them.</p><p>As an advocate, my perspective was similar to a public defender&#x2019;s: it generally is not relevant to me whether a person habitually lived an orderly or disorderly life. (The way people found me selected against maximum disorder, but selected for substantial financial problems.) There is just one tiny interaction in a life&#x2019;s story where a person has what they consider a prompt emergency. In the United States, that person has some rights under the law (and contract / standard practice). My job was facilitating someone in exercise of those rights, hopefully in the overall service of bettering their situation.]</p><p>Credit card issuers bucket users into various archetypes, personas, and predicted lifecycles because behavior is extremely heterogeneous, and this is important from both a marketing and risk management perspective. Most users of credit cards, probably including readers of this column and listeners to this podcast, believe they&#x2019;re the typical users of credit cards. No bucket is typical. If I were to make some informed guesses relative to the population-wide distribution, you, listener, use credit cards in preference to debit cards as a payment instrument, you do not routinely revolve balances, and you hold some combination of student loans, auto, and mortgage debt which dwarfs your credit card debt. And so it is critical to understand that most defaulting credit card debt is not held by people that act like you. Most credit card debt which defaults non-fraudulently was incurred in the relatively distant past. Credit cards are revolving accounts; one&#x2019;s balance can increase (even as one successfully makes payments) for years as one pays off a portion of prior purchases but continues purchasing with the card. This is normal and expected use of the card, planned for thoroughly, much like never carrying a balance is also normal and expected use of the card, planned for thoroughly. A small percentage of borrowers, carefully tracked and generally oscillating between 2.5% and 5% depending on the overall health of the economy, will go delinquent on credit card debt. (Some issuers specialize in certain parts of this credit spectrum and, as a result, will have sharply lower or sharply higher delinquency rates. American Express, for example, specializes at the high end and typically has delinquency close to 1%. Capital One made its name in so-called subprime credit cards, though it has diversified since and typically tends towards the higher end among banks whose names you know. There is also a largely hidden ecosystem of banks you don&#x2019;t know that issue very expensive products to poor people; you can accurately predict their default rates exceed anything mentioned above.)</p><p>Default typically begins by missing (or underpaying) a scheduled payment. That is in itself a theoretical breach of contract but not very outside the ordinary for a credit card issuer; they will generally automatically assess a fee but take very little action. Most borrowers will recover before they are 30 days late, which is the point at which most issuers start to treat an account as being a credit risk rather than a minor operational issue.</p><p>After 30 days, issuers will typically work the account internally, using a combination of communication methods to nudge the user into payment until one of a few things happens. The happiest is the customer gets current on their account. An outright refusal to pay is substantially less likely and can result in the issuer moving up timelines. But the most common is that the borrower ghosts the issuer for a few months.</p><p>Consumer debt issuance is generally by law an exclusive privilege of regulated financial institutions. (The other big one is taking deposits.) Society wants many things from regulated financial institutions; one of those things is having accurate books because stealth losses cause financial institutions to fail and frequently leave society holding the bag. As a result, the Federal Reserve has a <a href=\"https://www.federalregister.gov/documents/2000/06/12/00-14704/uniform-retail-credit-classification-and-account-management-policy\"><u>Uniform Retail Credit Classification and Account Management Policy</u></a>. This tail wags the dog. Many decisions about account servicing, which a naive conception of debt might assume are between borrower and lender, are done with the goal of aligning servicing to accounting standards. In this way, the books impose their will on reality, and where the books and reality differ, reality frequently adjusts itself to accommodate the books. (As my buddy <a href=\"https://twitter.com/kevinriggle\"><u>Kevin</u></a> frequently muses, <a href=\"https://www.amazon.com/Seeing-like-State-Certain-Condition/dp/0300078153\"><u>&quot;States are gonna see.&quot;</u></a> Organizations which are tightly tied to the state, like regulated financial institutions, will develop a vocabulary and processes for seeing like the state sees. That edifice tends to capture non-state methods of seeing that they run in parallel.) <strong><em>As an aside, yes, obviously I am commenting on the book &quot;Seeing Like a State&quot;.</em></strong>&#xA0;</p><p>In particular, credit card classification requires that financial institutions &quot;charge off&quot; delinquent debt. Mechanically, they have previously accumulated an allowance for delinquency on their books as a liability; they move a bit of that allowance to a bad debt expense.</p><p>In principle, nothing has to happen to the actual debt. In practice, financial regulators encourage institutions to seek <em>certainty and finality</em> around this.&#xA0;</p><p>Financial institutions achieve certainty and finality by packaging portfolios of bad debt together and selling them to non-financial institutions. This durably moves them off the books and realizes a very, very small residual value.</p><h3 id=\"the-debt-collection-industry\">The debt collection industry</h3><p>There are essentially two halves of the debt collection industry. A portion of it works on an agency model: a lender can have, for example, a law firm or similar work debt on its behalf during the several month period when the delinquent debt lingers on their books. In return for a performance fee (often 15&#x2013;30% of the face value), the collector is paid if the borrower makes good on the debt during that period.</p><p>But debts, much like people, only age in one direction. Unlike people, debts universally decline in value as they age. Will return to that topic in a moment. Most debt which is not being serviced successfully by the first-party lenders will not long be worked by their agents. It is instead sold to debt buyers who will then attempt to collect the contracted amount (plus fees provided for in the contract, which are legally legitimate, and, not infrequently, fees which are not provided for in the contract, which are frequently <em>extremely questionable</em>). Subtract the original cost of buying the portfolio and their substantial operational costs, and the remainder is profit.</p><p>Most defaults are <em>small</em>. This fact drives everything about debt collection; it has to be done scalably by the cheapest labor imaginable with a minimum of customization or thoughtful weighing of competing interests. The average defaulted credit card debt is on the order of $2,000; the median is between $500 and $1,000. These are processed like McDonald&#x2019;s burgers, not like grant proposals.</p><p>Debts are sold as part of a portfolio where (typically) thousands of relatively similarly situated debts in a cohort are sold as a packet. The value of portfolios is a huge discount to the face value of the debts; at a point where a lender has worked it themselves and the debt is a few months delinquent, portfolios generally fetch about <a href=\"https://www.ftc.gov/sites/default/files/documents/reports/structure-and-practices-debt-buying-industry/debtbuyingreport.pdf\"><u>5 cents on the dollar</u></a>. That value will continue to decay over time. There is an entire ecosystem of brokers supporting contractual infrastructure to convey these debts to buyers and insulate the issuing financial institutions from the actions of the debt buyers.&#xA0;</p><p>Partly that is due to regulatory risk. (Particularly in recent years, regulators have begun using prudential regulation of financial institutions to <em>strongly suggest </em>that financial institutions adopt their social goals. There is a tortured argument by which a debt collector being unsavory in the process of debt collection would damage the reputation of the bank, which would damage an item on its balance sheet, which would damage its financial stability, which fact a regulator actually has jurisdiction over, and therefore regulators can discourage debt sales.)Probably more surprisingly, financial institutions care acutely about brand damage, particularly to their own partners that can contractually obligate them to care about that. Many credit cards are co-branded; you, as an unsophisticated consumer, might think you have a credit card from Amazon or Best Buy or Apple. You don&#x2019;t. Those three firms are acutely aware of your misconception, and they want to continue earning your business for the next 40 years. And so they might, hypothetically, contractually bind Chase, Citibank, and Goldman Sachs respectively <strong><em>(although Goldman has </em></strong><a href=\"https://www.jpmorganchase.com/ir/news/2026/chase-to-become-new-issuer-of-apple-card\"><strong><em><u>passed the torch</u></em></strong></a><strong><em> since writing of this essay)</em></strong> to never mention their co-branding partner in connection with debt collection and to bind subsequent debt buyers to the same.</p><p>This is the frequent cause of debtors mistakenly believing that debt collectors are confabulating debts against them. &quot;I&#x2019;ve never done business with Citibank!&quot; I&#x2019;m slightly-more-than-unsympathetic to that because of the relative sophistication of borrowers versus Best Buy&#x2019;s marketing department. On the topic of true confabulation: oh yes, it happens minimally hundreds of thousands of times per year; debt collectors adopt business processes which simply <em>make debts up</em> because accuracy requires competence and costs money.</p><p>The debt collection industry is, and I say this as someone who is capitalist as the day is long and attempts to be non-political in public, among the most odious hives of scum and villainy as exists in the United States. The business is sordid and virtually immune to reform despite decades of trying. The Fair Debt Collection Practices Act was passed <em>in 1978</em>! It&apos;s older than me! I learned to cite it in 2004 against the same abuses it was designed to prevent. The situation did not markedly improve in the last 20 years!</p><p>This is not because of a lack of virtue or lack of laws; the <em>structure</em> of the industry colliding with the socioeconomic reality of defaulting debtors basically ensures that it will be a miserable place populated by miserable people who will project leveraged amounts of misery into the outside world in the hopes of collecting a tiny sliver of defaulted debt.</p><p>Debts are conveyed to the debt buyers as large CSV files with minimal supporting documentation. The legal reality of a credit card debt begins with a contractualized promise to pay. You might assume that the owner of the debt necessarily has read that contract. If the debt has been sold, they have not merely not read that contract, they have likely not received a copy of that contract. They <em>might</em> have the contractual right to ask the seller of the portfolio to ask the entity it bought the portfolio from to follow a few more links in the chain to eventually ask the financial institution for a copy of the contract. In principle, financial institutions always have the contract... somewhere. In practice, they will frequently not organize themselves to actually locate it; this business is off their books, and operations has better things to do than hunting in the archives for a paper copy of a low-value contract signed several years ago.&#xA0;</p><p>Again, we&#x2019;re talking about promises frequently denominated in the hundreds of dollars. It is a consensual social fiction that there is actually a legal process operating here.That consensual social fiction has real consequences, and sometimes bubbles up uncomfortably in actual courts of law, which we&apos;ll return to in a moment.&#xA0;</p><p>The rights of debtors are observed by both primary lenders and eventual debt buyers mostly in the breach. One of those rights is to a written &quot;debt verification&quot;, a term of art with specified information in it, and (surprisingly, if you haven&#x2019;t worked in this field) despite that being the law, many debts are sold in such a fashion that the buyer couldn&#x2019;t produce a responsive verification even if they wanted to. That isn&#x2019;t even a political claim; it&#x2019;s just the engineering reality of which columns are in their CSV file.</p><p>The former advocate in me will observe that the single most effective method for resolving debts is carefully sending a series of letters invoking one&#x2019;s rights under the Fair Debt Collection Practices Act (and other legislation) to a debt collector who is <em>operationally incapable</em> of respecting those rights, then threatening them with legal or regulatory action when they inevitably infringe upon them in writing, leading to them abandoning further efforts at collection.</p><p>This effectively makes paying consumer debts basically optional in the United States, contingent on one being sufficiently organized and informed. That is likely a surprising result to many people. Is the financial industry unaware of this? Oh, no. Issuing consumer debt is an enormously profitable business. The vast majority of consumers, including those with the socioeconomic wherewithal to walk away from their debts, feel themselves morally bound and pay as agreed.</p><p>Why are debt collectors <em>so bad at debt collection</em>? Partially it is because the credit card issuers are large national institutions with large automated processes sitting on top of a legacy of corporate acquisitions, IT migrations, and similar that makes availability of non-critical information extremely fragmentary. They then want to dump all of that complexity through a very small pipes (CSV files) onto the debt collection industry.</p><p><em>That</em> industry is largely not characterized by large, nationally scaled, hyper-competent operators who happen to have decades of institutional inertia. Instead, it is heavily fragmented into a strata of mid-market and smallest-of-small-business firms governed by a patchwork of regulation on the national, state, and local levels and runs (in large part) on faxes and post-it notes.</p><h3 id=\"the-operations-of-a-debt-collection-firm\">The operations of a debt collection firm</h3><p>Roughly three quarters of debt is bought by 10 large firms, and one quarter is bought by so-called &quot;mom-and-pops&quot;. But this is complicated by the resale of portfolios which were worked by the majors. Mom-and-pops then buy them at a deep discount with the goal of getting the residual value which the majors did not successfully capture.</p><p>Suppose the debt collection firm has bought a portfolio; they will first &quot;scrub&quot; it, which means using automated or semi-automated processes to enhance the fragmentary data they have and prioritize the portfolio for collection efforts.</p><p>For example, one stage of the scrub will be associating a credit profile with as many debts as possible. Credit scores are extremely good predictors of who pays their debts; that is what they were designed to measure. You&#x2019;ll get sharply better results on a per-call basis calling people with 750 FICO versus a 450 FICO; accordingly, you should call all the 750s first and more frequently.</p><p>A second scrub will typically remove dead debtors because they infrequently answer their phones. (Debts are not inherited in the United States, a fact which the debt collection industry frequently demonstrates strategic ignorance of.)</p><p><strong><em>As an aside, there are polities in the world that have made the opposite decision where debts are inherited either as a matter of law or the de facto practice. Japan, for example, has a recurring trope in fiction: a family reduced into multigenerational indentured servitude, often as a result of a small business which has fallen into debt, and where succeeding generations of family are just yoked to the mast. That is an enduring trope in Japanese fiction because it is an enduring trope in actual practice of Japanese lending. And I and my family have known people who have been in that situation and see no relief likely in the next couple of decades.</em></strong></p><p><strong><em>[exasperated noise] The choices we make about how we structure society.&#xA0;</em></strong></p><p>[<strong>Patrick notes:</strong> Japan has a legal procedure with a time limit by which you can all-or-nothing disclaim an inheritance and therefore individually get out from under the past generation&#x2019;s debt. For a variety of social reasons, many heirs do not disinherit themselves from e.g. the business that they are the fourth generation to run, condemning themselves to a lifetime of immiseration to service loans that have no reasonable prospect of ever being repaid. At the end of it, the fifth generation will be explained the same opportunity.]</p><p>While reading government reports, I chanced across a mention that a novel form of scrub uses third-party databases of so-called &quot;litigious debtors&quot;. This was surprising to me (<strong><em>as far as I know, it was not a thing when I was doing advocacy</em></strong>) but makes a lot of operational sense. You can trivially Google providers with &quot;litigious debtor scrub&quot; as a keyword.&#xA0;</p><p>The FDCPA and state legislation provides for automatic damages for illegal behavior from collectors. If the incidence of illegal behavior is extremely high, and a debt collector with a high school education and three months of experience will frequently commit three federal torts in a few minutes of talking to a debtor then a follow-up with confirmation of the same in writing. (You might think I am exaggerating; I am not. &quot;If you don&#x2019;t pay me, I will sue you and then immigration will take notice of that and yank your green card&quot; contains three separate causes of action: (frequently) a false threat to file suit where that is not actually a business prospect of the firm, a false alleged affiliation with a government agency, and a false alleged legal consequence for debt nonpayment not provided for in law.)</p><p>As a result, private companies compiled databases of (public in the US) court filings and organized them by social security number, address, and similar to allow debt collectors to identify which debtors are aware of their legal rights. In principle, a debt collector could do anything they wanted with that fact, like being extra careful to follow the law in contacting them. But the economics of debt collection do not counsel careful, individualized consideration of credit card debt.&#xA0;</p><p>I will bet you that, in practice, they simply avoid collecting against anyone who demonstrates ability and financial resources to enforce their rights. This is one for the history books of borked equilibria. We devote substantial efforts to pro-consumer legislation to address abuse of (mostly) poor people. We gated redress behind labor that is abundantly available in the professional managerial class and scarce outside of it, like writing letters and counting to 30 days. <em><strong>That isn&apos;t a joke.</strong></em> (People telling me they were incapable of doing those two things is why I started ghostwriting letters for debtors.) We now have literal computer programs exempting heuristically identified professional managerial class members from debt collection, <em>inclusive of their legitimate debts</em>, so that debt collectors can more profitably conserve their time to do abusive and frequently illegal shakedowns of people the legislation was meant to benefit.</p><p>After scrubbing their lists, debt collectors will attempt to locate contact information for the debtors. You would think this would be straightforward given they were given that information in the CSV file they purchased. But information is fragmentary and outdated; people likely to default on debts have complicated and frequently changing relationships with their addresses and phone numbers. So there exists an ecosystem of &quot;skip tracing&quot; providers, delightfully (ugh) borrowing the jargon from the business of bounty hunting, to match up fragmentary information with current contact information.&#xA0;</p><p>Operational and IT issues at this stage create a lot of the harm in the debt collection industry. For example, to use one ripped from my own experience (<em><strong>which was part of the $100,000 of confabulated debt that caused me to fall down the advocacy rabbit hole</strong></em>): consider a piece of fragmentary information identifies a &quot;PJ Mackenzie&quot; at an unspecified town in Illinois as owing a debt in the few hundred dollars range. That name is a fuzzy match to one Patrick Jonathan McKenzie of Chicago, Illinois. Here you are welcome to your moral intuitions as to whether simply asserting that I owe you a few hundred dollars is legitimate. The debt collection industry institutionally frequently assumes, as a matter of business practice, &quot;I mean, probably factually you do owe me, and if you don&#x2019;t, oh well, then you won&#x2019;t be one of the ~8% of people that we successfully collect from&quot;. No individualized application of human labor is required to reach this conclusion. No one is accountable for the mistake; no one <em>made</em> it, not in the usual sense of people making mistakes. People architected a system which generates this outcome by default.</p><p>And then begin the calls. To you, if the above processes have successfully found you, and to your friends and relatives if they have not. (The FDCPA provides that debt collectors are only allowed to contact a debtor&#x2019;s family to find current contact information. They do this with gusto, including when they have current contact information. It is used coercively because many debtors will make sacrifices to find $250 so that <em>their mother </em>stops getting calls.)</p><p>Debt collectors typically work in call center environments assisted by technological improvements to greatly increase the number of calls per hour each collector can do. These include so-called &quot;predictive dialers&quot; which (as a sketch) dial several debtors in parallel for each collector since most calls will not be answered or will go to voicemail, then connect only those that pick up to a debt collector waiting in the queue.</p><p>Maximizing the efficiency of callers is key to the economics of debt collection; labor frequently costs more than the underlying debt does, even when one is paying 4 cents on the dollar and hiring collectors straight out of high school. An unhappy consequence of this is that debt collection firms build extremely scaled systems to project externalities into the phone network and the people attached to it, including very many people who never owed them a dime. But for the (dubious) cover of law, this is what technologists would call a volumetric denial of service attack: a relatively small expenditure of resources allows the collector to disable a relatively large number of phones.</p><p>If there is one thing that unites debtors, it&#x2019;s the cacophony. The phones ring and ring and ring. They ring at all times legally permissible and many times not. They ring from the same collector calling you twice a day. They ring from the same debt being collected by multiple different agencies, several of which sold the debt on but neglected to update their internal systems to stop calling on the debt they no longer own. They ring from dozens of different firms because the circumstances which caused you to go delinquent on one debt caused you to go delinquent on several debts. Each of those is collected in parallel by a process that considers every other debt collector a competitor for your scarce dollars, and so they must outcompete them by ringing you harder, faster, and more persistently.</p><h3 id=\"what-does-the-debt-collector-hope-to-get-from-a-call\">What does the debt collector hope to get from a call?</h3><p>The goal of calls is to get a verbal promise to pay and payment credentials. The most useful payment credential from the perspective of a debt collector is a checking account number, but in a pinch, they will also usually take debit cards or credit cards. (Many people who have defaulted on debts still have access to credit because, in deteriorating financial circumstances, one could default on some but not all credit lines. There is also an extremely efficient financial industry capable of extending credit profitably at a wide variety of predicted repayment likelihoods.)</p><p>Many promises to pay are not promises to pay in full but rather a plan to pay the face value of the debt plus accumulated (and accumulating) interest over time. Most debtors who agree to payment plans will not successfully complete those plans. This is, from the perspective of a debt collector, <em>not a problem</em>. If they paid 5 cents on the dollar for your loan and successfully convinced you to pay 20 cents today and the balance over monthly payments over a year, you know what they&#x2019;re left with in month three when you default? Ability to collect from you again or to sell your debt for more than they paid for it because you are a better credit risk than most in the portfolio. You proved that by paying.</p><p>Many less sophisticated consumers assume that they have substantial control over sending payments via check. All checks have an account number printed on the face of them, and collectors will push aggressively to get that number over the phone versus waiting for a check to arrive. The goal of having the number is to present the bank holding the checking account with an electronic ACH debit or what is called a &quot;demand draft,&quot; in both cases representing the account holder has preauthorized the debit. How many debits did the debtor agree to in the above sketch plan? Not less than thirteen.</p><p>They will frequently be very surprised to learn that, and they will frequently be surprised when their financial institution backs the debt collector, who often has the sudden fit of competence and manages to record this part of the conversation.</p><p>The amount of gamesmanship that debt collectors get up to regarding payments could use its own column. The verbal authorization to debit your account (&quot;payment plan&quot;) was probably silent on timing, so they will use their substantial expertise in dealing with people in poor economic circumstances to target the dates and times of day when benefits payments or paychecks have posted to your account. They&#x2019;ll surge collection attempts at 3:00 AM on the first of the month; they&#x2019;ll learn the differences between various banks as to when social security payments post, etc.. They&#x2019;ll also do things like, for example, splitting the agreed-upon payment into smaller payments with the goal of getting at least one rather than having the payment decline for insufficient funds (NSF, in the financial industry parlance). This is frequently magnified fees assessed by banks to debtors because NSF fees are frequently assessed per occurrence.</p><h3 id=\"why-does-this-continue-being-so-broken\">Why does this continue being so broken?</h3><p>Incentives rule everything around us. The structure of the industry, technical issues, and similar alluded to above cause most of this, and they have continued causing it despite decades of effort to correct.</p><p>There are also human capital issues at play. Discussing them is a bit difficult, because the people who physically make phone calls for debt collectors share many of the life challenges of debtors as a class. They are poorly educated, poorly paid, poorly managed, and churned through viciously. The work is soul crushing; turnover at the large firms is 75-100% annually. Call centers are already generally a high-stress, terrible working environment even when one is doing routine customer service or order entry work; a debt collector is the type of call center worker that no one wants to talk to. Successful debt collectors need to both harden their hearts against tales of woe (and personal abuse) from debtors and also successfully execute on some combination of moral suasion and threats to eke out a few percentage points at the margin in collections. Success in the field is the difference between e.g. 7% and 8% collection.</p><p>Few competent people remain in this field over an extended period of time; an effective, morally upright debt collector would be a better telephone sales rep at a tenth the stress and two to five times the total compensation. As a result, most calls being made today are not by effective, morally upright debt collectors. Illegal threats may be more effective than diligent suasion and management frequently, through incompetence or careful refusal to watch the sausage being made, ignores that collectors are making threats but tracks per-collector productivity very carefully. Solve for the equilibrium.</p><p>As a former advocate, I&#x2019;d report that it is never in a debtor&#x2019;s interest to verbally speak to a debt collector under any circumstances. One&#x2019;s likelihood of being abused or lied to, including in financially consequential fashions, is high, and one&#x2019;s ability to counter that is minimal. Instead, force them to do all correspondence on paper, where lies are self-documenting, illegal threats are immediately admissible to regulatory processes or court, etc.</p><p>The incentives and hiring pool available to debt collection firms cause them to put most of their limited competence into scaling phone teams and very little competence into individualized written correspondence. That would require them to successfully keep a folder about a debtor for a month and route communications to the desk with that folder; this is an edge case for them and uneconomical to do at the hundreds of dollar range. This means they will, through a combination of incompetence and strategic decisions by management, frequently simply abandon collection activity where that would require them to read and write.</p><h3 id=\"suing-people-with-robots\">Suing people with robots</h3><p>Most debts are not litigated, but various debt collection firms have various strategies here. Almost no consumer debts are worth serious amounts of professional attention, but above about $1,000 or so (depending heavily on jurisdiction), they can be worth doing high-frequency lawyering on.</p><p>Basically, the debt collector will either itself or, through use of a law firm, file hundreds or thousands of lawsuits in a single court against its roster of uncollected debtors. Those lawsuits will be entirely templated. A frequent detail that emerges in news reporting is that they&#x2019;ll often be physically robosigned, so that the relevant lawyers don&#x2019;t give themselves repetitive stress injuries by needing to affix their name to all of the things they are swearing to under penalty of perjury.</p><p>You might have a view of the judicial system where two highly educated advocates joust in front of a neutral finder of fact like a judge or jury. This ain&#x2019;t that.</p><p>The goal of this business process is generating so-called <em>default judgements</em>. They&#x2019;re both judgment that a default happened and also the judgment that happens by default; the overwhelming case for issuance is when one party is summoned to court and does not show up. Many debtors will ignore correspondence about court cases believing that ignoring them will make the problem go away; this is the opposite of the truth. Many will lack transportation, not be able to take off work, etc. In any event, filling 100 court cases means that, in <a href=\"https://www.ftc.gov/sites/default/files/documents/reports/federal-trade-commission-bureau-consumer-protection-staff-report-repairing-broken-system-protecting/debtcollectionreport.pdf\"><u>expectation</u></a>, your lawyer will collect 60-95 default judgements or more. Not a bad day&#x2019;s work.</p><p>Default judgements turn a debt that hasn&#x2019;t been collected voluntarily into a financial asset with value. They can be used to garnish the contents of bank accounts or wages paid to debtors, in many jurisdictions. For debtors who own property, which is a fact pattern that occurs much more commonly than you probably would guess, a default judgment can frequently be turned into a lien against the property. This swaps an unsecured consumer debt for a senior claim against the debtor&#x2019;s home equity. That claim is itself salable into an ecosystem of lien investors, and the debt collector will frequently sell it for (say) 80 cents on the dollar, realizing a profit over their low basis in the debt and collection costs.</p><p>Should a debtor actually show up to the courthouse, the lawyer will almost invariably offer an on-the-spot settlement. Fifty cents on the dollar seems to be popular, anecdotally. Avoid the expense and stress of a legal proceeding, etc etc, this is obviously incentive compatible.</p><p>When debtors actually contest their debts, or have competent legal representation, the debt collectors frequently get beaten like drums. Many judges take an unsurprisingly dim view of lawyers who profess to have personal knowledge of the facts of the case then can&#x2019;t locate the contract they are suing over. (Again: they do not and never did possess a copy of the contract. The lawyer does not actually know any facts of the debt other than that the firm purchased a name, address, and perhaps a Social Security number in a CSV file. They don&#x2019;t have the contents of any previous correspondence about the debt, owing to some combination of incompetence and unwillingness to present evidence of crimes in court.) Then comes some gamesmanship, where the debt collector will attempt to ask for an extension to get their paperwork in order and the debtor&#x2019;s attorney will push for dismissal, claims under the FDCPA and similar, and costs.</p><p>This makes for good human interest pieces occasionally, but the economics make the lawsuit machine very profitable to run even accounting for losses, and accordingly it continues robosigning cases by the tens and hundreds of thousands.What can be done about this?</p><p>Many people have suggestions for obvious improvements here, which might rhyme with the Federal Trade Commission suggestions <a href=\"https://www.ftc.gov/sites/default/files/documents/reports/federal-trade-commission-bureau-consumer-protection-staff-report-repairing-broken-system-protecting/debtcollectionreport.pdf\"><u>from 2010</u></a>, or the Consumer Financial Protection Bureau&#x2019;s <a href=\"https://www.consumerfinance.gov/rules-policy/final-rules/\"><u>spate of rulemaking</u></a> from 2021 through 2023, or the FDCPA from 1978.</p><p><strong><em>I&apos;ll mention as an aside for people who have not noticed since 2023 when this essay was written: the Consumer Financial Protection Bureau was, well, </em></strong><a href=\"https://www.gao.gov/products/gao-26-108448\"><strong><em><u>gutted</u></em></strong></a><strong><em> early in the current administration. And while there&apos;s some </em></strong><a href=\"https://bankingjournal.aba.com/2026/01/d-c-circuit-court-grants-en-banc-rehearing-of-cfpb-layoff-lawsuit-district-court-clarifies-preliminary-injunction/\"><strong><em><u>legal wrangling</u></em></strong></a><strong><em> over whether those cuts will take, they are not currently aggressively enforcing rulemaking from the 2021 to 2023 era.</em></strong></p><p>I&#x2019;ll leave rulemaking to the rulemakers, as this essay has gone on long enough. The state of reality here is very bad, not because any single person woke up this morning attempting to maximize evil, but because a complex interaction of structural factors over multiple different parts of society got us to where we are.&#xA0;</p><p>Untangling that Gordian Knot is hard and has empirically eluded us.</p><p>Thanks very much for listening to Complex Systems this week. We&apos;ll see you next week.</p>"
