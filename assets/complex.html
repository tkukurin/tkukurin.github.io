    "description": "This week, Patrick McKenzie (patio11) sits down with Des Traynor, the co-founder of Intercom . They discuss how AI agents are democratizing white-glove service, why modern LLMs have retrained user expectations around &#x201C;chatbots&#x201D; very quickly, and the surprisingly liberating effect of talking to something that will never judge you for missing a loan payment. Thanks to our sponsor: MongoDB Tired of database limitations and architectures that break when you scale? MongoDB is the database built for developers, by developers: ACID compliant, Enterprise-ready, and fluent in AI. Start building faster at mongodb.com/build Timestamps: (00:00) Intro (00:29) Intercom and its evolution (00:51) Challenges in customer service systems (02:54) Scaling customer support in startups (04:53) Organizational inefficiencies and customer experience (06:53) Metrics and their impact on customer support (12:40) Human capital issues in customer support (15:53) AI&apos;s role in customer support (17:01) Future of customer support roles (20:09) &#x200A;Sponsor: MongoDB (20:53) Future of customer support roles (continued) (26:19) AI and customer interaction (26:55) The myth of artisanal customer support (27:45) Fin Guidance: Evolution and user behavior (29:10) Fin&apos;s impact on customer support efficiency (33:30) Expanding Fin&apos;s capabilities beyond support (42:50) AI in government and other sectors (49:20) The future of AI connectivity and integration",
    "transcript": "<p>Welcome to Complex Systems, where we discuss the technical, organizational and human factors underpinning why the world works the way it does.</p><p><strong>Patrick:</strong> Howdy, everybody. My name is Patrick McKenzie, better known as patio11 on the Internet. And I&apos;m here with Des Traynor, who is the co-founder of <a href=\"https://www.intercom.io\"><u>Intercom</u></a>.</p><p><strong>Des:</strong> Hey, Patrick. How&apos;s it going?</p><p><strong>Patrick:</strong> Doing pretty well. Thank you. How about yourself?</p><p><strong>Des:</strong> Really well, thanks. Really well.</p><h3 id=\"intercom-and-its-evolution\">Intercom and its evolution</h3><p><strong>Patrick:</strong> So for the five people in the audience who don&apos;t know what Intercom is, can you give them a brief pr&#xE9;cis?</p><p><strong>Des:</strong> Sure. I like the idea of expanding our addressable market with these five people. Intercom began life as a customer messaging tool. It&apos;s predominantly used as a customer service helpdesk. And then over the last few years, it&apos;s become an AI helpdesk combined with an AI agent called Fin that everyone knows the most.</p><h3 id=\"challenges-in-customer-service-systems\">Challenges in customer service systems&#xA0;</h3><p><strong>Patrick:</strong> So the thing that I would most love to talk about today is customer service <em>considered as a system</em> and customer communications broadly.</p><p>I think we at many companies throughout capitalism are a little bit guilty of shipping the org chart. The customer perceives they have a relationship with their bank or their software company or similar. But there is one VP <em>I&apos;m in charge of customer support</em> and one VP <em>I&apos;m in charge of marketing</em> and the two VPs never talk to each other. [<strong>Patrick notes</strong>: You&#x2019;d be surprised how many consulting engagements are marriage counseling at much higher hourly rates.] And at the scale of a large enterprise, there&apos;s really 37 VPs. And we &#x201C;ship the org charts&#x201D; and so we have a blinkered conception of what happens.</p><p>A fun fact about my life: my first job was actually as a CS rep slash order entry representative at a company that sold pens and paper. And so I got to see from that side of the telephone why it is difficult to do this well at scale, and would love to communicate that to the audience. Maybe give some people some pointers on how to do it better at their companies, or how to be a more proactive consumer about it and talk about how AI is changing things.</p><p>Let&apos;s start with the industrial organization of customer support. You deal with customers who are across the spectrum from a company like the one I used to run with one person selling software from a bedroom all the way up to the largest companies in the world. And I feel there&apos;s probably some step changes in how customer support is run as an organization across that spectrum. But you&apos;ve forgotten more than I will ever know. What does that look like?</p><p><strong>Des:</strong> I mean, the step changes are interesting because they almost always serve one goal at the cost of another. Companies love to say it&apos;s all about the customer. But then when you look at how they actually design or track designer customer experience, experience journeys and flows, it&apos;s almost always taking business goals somewhat in isolation and prioritizing them over any sort of cohesive end user experience that they would like to profess to enjoy.</p><h3 id=\"scaling-customer-support-in-startups\">Scaling customer support in startups&#xA0;</h3><p><strong>Des</strong>: So when you&apos;re an early stage startup, typically it&apos;s founder-led support in the same way it&apos;s founder-led sales and founder-led everything, because it&apos;s usually founders plus plus or whatever the entire team is. The early days of support are usually honestly good because you&apos;re kind of moonlighting your engineering and product people to do a bit of support, and they&apos;re fixing bugs as quickly as often as they&apos;re replying to customers.</p><p>So they tend to see a problem, make it go away for everyone, go back to the next issue in a queue, and kind of blitz through it that way. Even your early support team can be pretty good, because it&apos;s usually like-minded people who really want to work in a startup who are still kind of missionaries to the startup in some sense.</p><p>They really believe in <a href=\"https://www.stripe.com\"><u>increasing the GDP of the Internet</u></a> or making Internet business personal or whatever it is that they&apos;re kind of the good goal is.</p><p>It&apos;s once you start to scale the support org&#x2014;and usually that necessarily has some model-breaking things in it. You have to give them hours to work on, set workloads and quotas and all of that sort of stuff. It&apos;s easy to say, oh, we don&apos;t really have to give them hours. The reality is, you kind of do. You have to say to people, your job stops at 5:00 PM. You have to go home, and at some point that becomes a reality. You cannot just rely on the sort of wide-eyed, altruistic missionaries of your startup. You actually have to have a scalable system that is robust to individual motivation.</p><p>So that&apos;s one area where it starts to get a little bit chopped up, which is just the raw scale of people. Once you start saying, hey, you have set working hours, and then perhaps later on you&apos;ll start to set individual efficiency quotas&#x2014;estimating the average handling time or close time while you&apos;re operative or whatever&#x2014;that starts to change the individual&apos;s incentive. That can be survived. I know that a lot of upscale companies have this but still manage to deliver a cohesive customer experience.</p><h3 id=\"organizational-inefficiencies-and-customer-experience\">Organizational inefficiencies and customer experience&#xA0;</h3><p><strong>Des</strong>: I think the thing people really get wrong is what I would call the chopping up of the experience.&#xA0;</p><p>[<strong>Patrick notes</strong>: For a version of this specific to banks, see <a href=\"https://www.bitsaboutmoney.com/archive/seeing-like-a-bank/\"><u>Seeing like a Bank</u></a>, which rhymes with Des&#x2019; take here. Your princess is in another castle. No, your princess&#x2019; castle is in another castle.]</p><p>So we&apos;ve all had this horrendous experience where if you&apos;ve ever bought a car, you go in and the person who greets you when they&apos;re trying to sell you a car is all slick hair, shiny suit, shiny shoes, and &quot;Welcome, Mr. McKenzie. Let me walk you around the dealership.&quot; Then you come back two weeks later because there&apos;s something wrong with the car, and the person who will talk to you&#x2014;that&apos;s the difference, honestly, between the sales department and support. And you start to see incentives that work.</p><p>I think what generally happens is people tend to chop up the experience. So you used to go from, let&apos;s just say founder-led sales started at some point where it was one person remembering all of your context to some middle ground where maybe somebody closed the deal. But generally speaking, it was a pretty cohesive experience because the company was still pretty united.</p><p>Then you fast forward to the at-scale, fully efficiency-maximized, let&apos;s just say optimized customer experience and what you have there is the AE who talked you through signup, did the deal, they hand you over to the CSM, and then the support person when you have a question.</p><p>[<strong>Patrick notes</strong>: A Customer Success Manager is typically more junior in a sales org than an Account Executive, who are the main deal closers. The CSM handles some of the boring administrative work of onboarding the new customer and then is the salesperson for after-the-sale, for example, when the contract comes up for renewal a year later, or for running a quarterly check-in meeting to make sure that the software company is not blindsided by a customer suddenly deciding to not renew for a reason that would have been fixable 8 months ago.]&#xA0;</p><p><strong>Des continues</strong>: And as the end user, this is where Conway&apos;s Law kicks in. This is where you really feel like you&apos;re popping into the org chart. You have a question that might look like, &quot;Hey, I would like to use such and such a feature, but it&apos;s not working for me.&quot; That sounds like support until you realize that it&apos;s not on your plan and support hands you over to the CSM. CSM realizes this is actually a contract renewal, turns it over to the original AE, hands it back to the CSM. [<strong>Patrick notes</strong>: Perhaps with the explanation &#x201C;I <em>already got</em> my commission here; do your job and maybe you get yours.&#x201D; If you hire particularly mercenary AEs&#x2026; and, well, there are many paths to being a successful AE and <em>that is certainly a well-represented one </em>in the industry.]</p><p>None of this is in service of brilliant customer experience, but it is the result of 6 or 7 different orgs all kind of optimizing and not really talking, like most orgs.</p><p>Sure, we have metrics like NPS, which are extremely vague things that everyone likes it when they go up, but when someone gives you a two on an NPS survey, no one knows what to do with it.&#xA0;</p><h3 id=\"metrics-and-their-impact-on-customer-support\">Metrics and their impact on customer support</h3><p><strong>Des</strong>: So the metrics aren&apos;t great. And because of that, we don&apos;t have a very crisp way of saying, how do we measure whether or not we&apos;re just doing right by our customers?</p><p>Obviously the long term measure of that is things like net revenue retention or anything like that&#x2014;do they stick around for many, many years? And even at that, that doesn&apos;t mean you&apos;re good. They could just be stuck. There could be vendor lock-in or any other way to do it.</p><p>But I think that the natural tendency as you hire more and more seasoned senior professionals, what they&apos;ll want to do is build up their individual fiefdom, or if we are to be politer, we might just say their own org. They&apos;ll want to report up to their boss on their own org. They&apos;ll want to isolate those that they can directly affect as well. So that will mean ruling other things outside of their scope. So you end up with support leaders who will talk about handling time and ticket close rate and ticket recidivism and stuff like that. Salespeople talk about leads. CFOs might talk about utilization or whatever. But everyone&apos;s kind of chasing their own thing and it can at times appear kind of either bipolar or psychopathic to the end user who&apos;s actually receiving all of these various messages like &quot;use more, no upgrade, no don&apos;t upgrade, fix your stuff.&quot;&#xA0;</p><p>[<strong>Patrick notes</strong>: Two particular emails I&#x2019;ve received over the years from software companies stand out here. One was titled something like &#x201C;Urgent: regarding the security of your $NAME account.&#x201D; Of course I opened it. It was a sales rep trying to cross-sell one of their new products. I took a call with him and explained why an engineering minded person, like myself and many of their customers, might consider that headline cause to call the CEO&#x2019;s personal cell phone and ask what the heck had happened at their company. I didn&#x2019;t make the call and, in hindsight, probably should have, though who knows if the rot would have been stoppable at that point.]&#xA0;</p><p><strong>Des continues</strong>: And none of it actually makes sense.</p><p>And that&apos;s ultimately I guess the desire for efficiency comes at the cost of user coherency. And I think that&apos;s the thing that people don&apos;t realize until it&apos;s too late. And it&apos;s very hard to claw back then because it involves dismantling rules of engagement that have been hard fought and won by previous leaders.</p><p><strong>Patrick:</strong> I think we deal with Goodhart&apos;s Law in the most painful way possible.</p><p><strong>Des:</strong> Sorry, oh yeah&#x2014;that measure becomes the target, right?</p><p><strong>Patrick:</strong> Right. So for the people listening that haven&apos;t heard of this, it&apos;s that you can measure statistics, and that is useful. But as soon as you make a measure into a goal, either individuals choosing to game the system, or the system&apos;s organic incentives <em>causing gaming of itself,</em> will cause the fidelity of that metric at tracking reality to decrease.</p><p>[<strong>Patrick notes</strong>: For a brilliant demonstration of the there-is-no-evil-actor-we-played-ourselves failure mode, see (<a href=\"https://www.complexsystemspodcast.com/episodes/dan-davies-organizations-fraud/\"><u>past CS guest</u></a>) Dan Davies&#x2019; <a href=\"https://www.amazon.com/Lying-Money-Legendary-Frauds-Working/dp/1982114932\"><u>Lying For Money</u></a>, particularly the chapter on what he calls fraudogenic environments.]</p><p><strong>Des:</strong> I was gonna say what we talked through is actually kind of useful because there&apos;s almost a mashup of Goodhart and Conway, right, that overlap. Which is orgs have goals. Those goals are usually set on targets. Those targets then no longer&#x2014;those targets were once based on a measure, that measure is now inefficient.</p><p>So all of a sudden you end up with call centers where people are going to pick up and drop the phone rather than dealing with the customer support goal, because that will reduce the average handling time. Right. Even though it&apos;s these sorts of perverse incentives that can occur when you kind of let individual orgs use measures as targets.</p><p><strong>Patrick:</strong> One of the classic ones for me, you mentioned net promoter scores. So we are institutionally, as capitalists, good at our jobs. We are institutionally aware that things like average hold time might not fully capture the customer experience, so we&apos;ll send you a survey afterwards. I was on an airline once, and I got passed a piece of glossy printed paper that had clearly been commercially manufactured, saying &quot;You&apos;re going to receive a survey after you get off the airplane. And remember, five is the only acceptable score.&quot;</p><p>And so it isn&apos;t merely the fact that the organization is attempting to defeat the organization&apos;s surveillance of its own efforts. Someone <em>signed a purchase order</em> to do that.</p><p><strong>Des:</strong> There&apos;s also the bizarreness of the question as well. I don&apos;t know if you&apos;re familiar with that great meme&#x2014;it was a Windows 2000 dialog. It was like &quot;Would you recommend...&quot; and someone just wrote in the comment box &quot;I need you to understand normal humans do not go around recommending operating systems to each other.&quot;</p><p>I think there&apos;s something valid about criticizing the ridiculousness of the question. A lot of things don&apos;t get regularly recommended. And yet that&apos;s entirely what NPS is based on.</p><p><strong>Patrick:</strong> Yeah. I think there is a bit of cargo culting and a bit of that&#x2014;the built affordances that we put into software create the culture of the organizations that use the software, and then that becomes industry best practice. And so you end up measuring whatever is easy to measure.</p><p>And so in web analytics, people spend a lot of time thinking about time on page. Not because that matters to anyone! The average obscures the difference between people who bounce immediately and people who spend an hour reading the article. But <em>simply because Google Analytics puts it front and center,</em> because next to hits, that&apos;s one of the few value adds that they can put on every web page on the Internet.</p><p><strong>Des:</strong> Yeah. In unrelated news, did you notice that LinkedIn have recently released games inside LinkedIn? I&apos;m sure it&apos;s great for time on page.</p><p><strong>Patrick:</strong> Oh, boy. I continue not engaging with that website and despite being a gamer, I think I will continue with that strategy. [<strong>Patrick notes</strong>: I was once asked &#x201C;Why don&#x2019;t you write for LinkedIn?&#x201D; My answer: I have, in twenty years reading voraciously, including things written by and for people at companies, <em>never even once</em> been recommended something on LinkedIn worth reading. What sort of hubris would it take to say that I could break their losing streak.]</p><p>I think as you were narrating the dysfunction of a company passing between various different orgs, one of the things that causes it to be particularly frustrating for customers is it&apos;s not merely that you get seven messages in quick succession from different orgs that all have a different view of the elephant, but that it will take three days for the first person who gets your email or message to say, &quot;I need to escalate this to the specialist about that one.&quot; And often there is an opaque-to-you conversation behind the curtains. &quot;What are we doing with this in Q3? Is that a sales question?&quot; Now they get back to you.</p><p>Okay. So it&apos;s a sales question. And then the customer might write back and say, &quot;This wasn&apos;t a sales question two months ago,&quot; but no one who has touched the message yet is aware of that, because the org through various incentive structures and the way that there is constant churn in policies and constant churn in people in these positions, they&apos;ve <em>forgotten what they knew about their own actions </em>2 months ago.</p><p><strong>Des:</strong> Totally.</p><p><strong>Patrick:</strong> So this presents this further discombobulation to the user.&#xA0;</p><p>Again, I paid for college being a customer support drone. I have the utmost respect for them. It&apos;s just a rough life.&#xA0;</p><h3 id=\"human-capital-issues-in-customer-support\">Human capital issues in customer support</h3><p><strong>Patrick continues</strong>: Not the only problem, but one of the problems is that there is a human capital issue in customer support orgs.</p><p>You mentioned that oftentimes the early customer support people are superstars because they are missionaries trying to get into a startup by hook or by crook. And that is often the case in my experience. And often the thing that gets you sorted into being an early customer support person at a startup versus being an early engineer or a product leader at a startup is, &quot;Well, I have no identifiable skills.&quot; You can still add value to the world by having, quote unquote, no hard skills.</p><p>But as the company starts scaling to the moon on this, it starts to look for <em>a profile. </em>It will compress the salary band and career band such that it is not merely picking from the bucket of people that do not have hard skills yet, but is <em>actively selecting</em> against skill, intelligence, and agency at the gross level.&#xA0;</p><p>And the customer support orgs will organically identify people who are good at the job, and who like the job, who like dealing with customers, who are good at finding hard problems. But the customer support orgs don&apos;t have a way to <em>retain</em> those people internal to the function. Because unless you go into customer support management (there are many, many more people on the phones than there are managers, so if 20% of the people on the phones are really good), then the brutal math of that funnel is going to mean that most of them will need to do something other than customer support for their career.</p><p>And a happy case for the company and for the individual is &quot;We successfully identified that you&apos;re very diligent, very talented. Why don&apos;t you move into product management? Why don&apos;t you cross-train as an engineer?&quot; Which has this evaporative cooling effect on the customer support org. And then the people who are good but don&apos;t want to become an engineer, don&apos;t want to become a product manager, <em>they don&apos;t stick in their role</em> because the job that you&apos;re doing at 22 is the job that you&apos;re doing at 24 is the job that you&apos;re doing at 28 is the job that you&apos;re doing at 37.</p><p>And the company will, generally speaking, not have a ladder for customer support that compensates or rewards or acknowledges people in the same way that it would compensate, reward or acknowledge people in engineering or design or product or similar.</p><p><strong>Des:</strong> So I 100% agree. Your diagnosis is correct. And this is a couple of things that we&apos;ve bumped right into.</p><p>We built Fin, which is a product that is AI that does customer support. And one of the most common refrains we got is some version of, &quot;Oh, well, if this thing really does resolve 67% of my support, what am I going to do with my support team?&quot; I&apos;m like, if you literally just stop hiring for a year, watch what happens. Like people&#x2014;attrition in support is extreme at the best of times in the best of companies because of a few different things.</p><p>[<strong>Patrick notes</strong>: 100% attrition in some industries per year! Which is not too dissimilar to e.g. a fast food franchise. You want the people to learn how to do something <em>much more complicated than operating a register</em>. How can you do that if the wisened veterans, the tribal elders to whom they look for guidance, have stayed on the job for <em>two whole winters</em>.]</p><p><strong>Des</strong>: You&apos;re totally right. Most people see it as a front door, but they actually want to get a job over in sales or product management or frankly, anywhere where they can kind of build a career. Another set of people will go to support management&#x2014;they&apos;re no longer ticket handlers. They&apos;re now operations-type people. And the rest generally tend to churn and burn over time.</p><p>So that&apos;s just generally true.&#xA0;</p><h3 id=\"ais-role-in-customer-support\">AI&apos;s role in customer support</h3><p><strong>Des</strong>: The second thing we noticed a lot is that in the era post-AI where you actually are now having an AI agent who&apos;s doing a chunk of the queue, that agent generally tends to feed on knowledge, context, scripts, scenarios, data integrations, etc. It actually does in a lot of our customers&apos; cases create&#x2014;now, to be clear, smaller numbers, right, the support orgs are still smaller. And I&apos;m not trying to, we&apos;ll never hide away from that fact at Intercom&#x2014;but there are new interesting career paths that look a lot closer to engineering-level salaries.&#xA0;</p><p>We call them a principal support automation specialist or something like that. Now I&apos;m making up the titles. Everyone has their own titles, but generally speaking, who owns the AI for our support experience is actually a job that needs doing. And what we find is some support people&#x2014;you can retain the best people by offering them a career path into being excellent at automating human conversations. That&apos;s what AI does now.</p><p>And actually, I think when we look at the next five, ten years, that will be a useful skillset to have acquired. So I think that your diagnosis is totally correct. I just think this will change over time. We&apos;re going to be like, should you start a startup tomorrow? In two years time, you&apos;ll be looking for somebody who&apos;s really good at AI support. Not normal support, but AI support. And that&apos;s the sort of person who we hire.</p><h3 id=\"future-of-customer-support-roles\">Future of customer support roles&#xA0;</h3><p><strong>Patrick:</strong> I have been hoping this upleveling would happen for a while. I saw the career paths of people that were extremely effective in support and operations, which were quite tied at the hip at the company I was at at the time. And I think we&apos;ve seen upleveling in other fields in software before.</p><p>For example, system administrators were the redheaded stepchildren of engineering for the longest time. And it was considered a job which was barely white collar, if that.</p><p>The change happened in a lot of places at roughly the same time. But I think Google deserves maybe the most credit for&#xA0; it. They said &quot;We <em>don&apos;t have</em> system administrators here. We have <a href=\"https://sre.google/books/\"><u>site reliability engineers</u></a>. We are going to redefine the entire practice of system administration to being DevOps. Now, DevOps is on the engineering skill ladder, period.&quot;</p><p>And then they dragged probably 80 to 90% of that industry at most software companies from the much put upon&#x2014;the stereotypes were &quot;guys in the basement living on pizza.&quot;</p><p><strong>Des:</strong> Yeah. The guys in the basement living on pizza with the neck beards.</p><p><strong>Patrick:</strong> Guys in the basement living on pizza with the neck beards and etc., etc. and said, &quot;No, these are valuable professionals. We&apos;re going to manage, compensate, recognize, etc. them as such.&quot; [<strong>Patrick notes</strong>: At the risk of stating the obvious, we are invoking this caricature to criticize the discourse of it, not to embrace it.]</p><p>And that cannot happen one day too fast for that to happen to people in customer support. I also think there&apos;s probably some surface area for AI helping the agents, because the physical reality of being a customer support rep is you&apos;re on the phone with someone or, you know, email or chat (or 30 chats) at the same time.</p><p>[<strong>Patrick notes</strong>: Every chat window you&#x2019;ve ever typed into with a human at the other end of it who has a competent manager is going to someone who is multi-tabling many more simultaneous conversations than they can reasonably follow. The logic is impeccable: because the typical person seeking CS is a slow typist, and the typical person staffing CS is a fast typist, single threading CS interactions would result in 60%+ of your payroll going to representatives waiting for a user to type a message. That sounds wasteful. So instead you have them do two conversations at once, so that they are typing in thread A while waiting for a customer response in thread B, and vice versa. But two is the most lonely number that isn&#x2019;t one. Why not four? Your people are fast. But if it were six, you&#x2019;d get a promotion. But if it were eight&#x2026;]</p><p><strong>Patrick continues</strong>: You, the CS rep, get some screen that summarizes what the The System thinks you need to know about this customer interaction.</p><p>And if you have a <em>very good engineering team</em> and you have <em>many smart people</em> who have done the processes, etc., etc., you get <em>maybe</em> three sentences of context on what is probably happening in this customer&apos;s life or in their relationship with the company which is causing them to get in touch with us today. And <em>possibly</em> as many as two of those sentences will be true.</p><p>People experience this as wild, because: why is capitalism <em>so bad at capitalism</em>? But when you&apos;re dealing with, for example, a bank, there are just so many stitched together IT systems at the bank, and there are so many statuses your account could possibly be in that the bank is probably institutionally unaware of all the states an account could be. Are you under investigation by the feds? [<strong>Patrick notes</strong>: Sub-question: does the system allow an employee to discover whether the customer is under investigation from the feds? A harder choice than it sounds, right.] Do you have a pending update to your beneficial ownership? [<strong>Patrick notes</strong>: Potentially blocks paying the user until they provide the requested information. Why? Ask Compliance. Compliance will tell you to ask your democratically elected government. Compliance is right with some probability.] Do you have a negative balance in this thing which we are cross-defaulting to your checking account, causing your balance to be negative? [<strong>Patrick notes</strong>: Fun subgenre: you have a negative account status in a separate subsystem which the current system is made aware of, say once a day, and blocks account access based on it. However&#x2026; your CS rep does not have the capability to access that other system. Perhaps in Q4. Support engineering has a very full backlog.]&#xA0;</p><p>And if this isn&apos;t displayed on the screen that the customer support rep is seeing, they just have no way to help you out other than &quot;That looks really weird. Most people in this situation probably bounced a check. That&apos;s probably why your balance is negative.&quot; So a person might freestyle, &quot;I think you bounced a check. That would explain why your balance is negative.&quot;</p><p>And the customer <em>who knows they haven&apos;t bounced a check</em> but doesn&apos;t know that there is this ponderous behemoth of a machine that is causing their customer support agent to not have the correct information, perceives that <em>the institution is lying to them</em>.</p><p><strong>Patrick:</strong> And hopefully we&apos;ve seen AI like Claude Code, Cursor, etc. get really, really good at doing a lot of grindy, boring engineering work really, really fast. And hopefully we can have things like: one, keep those dashboards that the customer service reps use reasonably accurate versus, &quot;Oh, we refresh once every three years whether we need it or not.&quot; And two, maybe do some real time debugging of, &quot;Okay, I&apos;m aware in my prompt, there are 25 things that could cause a customer to be in negative account status at the moment. However, if it&apos;s not one of those 25 things I&apos;m aware of, I can search X and Y and Z and maybe surface that to the customer service agent faster than the customer service agent could possibly do when they&apos;re handling 10 to 20 phone calls an hour.&quot;</p><p><strong>Des:</strong> Yeah. That&apos;s totally&#x2014;I mean, the way we see support, the way our best deployments work is Fin resolves it if it can. And that will include having a back and forth with the customer to work out, &quot;Hey, did you recently...&quot; or whatever. Like, Logitech or have bots or whatever. So it will interrogate. We also use data connectors to go and look stuff up independently. But then Fin also exists as a copilot as well, which will help support.</p><p>And that&apos;s actually an interesting need. That&apos;s a harder job because Fin is taking care of all the easy stuff. So almost by definition, if it&apos;s in the inbox and has bypassed Fin, something is definitely tricky at this point. And we do as much as we can to kind of preflight the answer for the rep. But it&apos;s a difficult&#x2014;it&apos;s one of these interesting scenarios where the better Fin gets, the worse our product will get because it means it&apos;s exclusively working on extremely difficult problems.</p><p>It&apos;s definitely where augmenting the human is the next thing to do once you&apos;ve tried to basically do all the human work. And I think that we see a lot of genuine value there. The other thing that we see a lot of is that also decreases the time of training as well. So you can put a human into an inbox&#x2014;McDonald&apos;s is famous for what they call day one productivity. Your first day after training, you walk into a kitchen, you should be able to make a Big Mac or whatever.</p><p>I think with proper augmented copilot that can explain the context and explain the situation, you can actually get support teams that can decrease the training time from&#x2014;on a complex B2B product, that could be a genuine month. You&apos;re looking at a properly big, broad, happy-to-be-massive product. It could be 2 or 3 months before you can independently handle a large chunk of tickets. But when you have a well-stacked copilot effectively, you can bring that down quite a bit.</p><p>The way we think about it is what is the job of the human in that world? Is it judgment? Is it seniority? Is it in some regulated industry you need to have a name of who approved the quote or who approved the refund or whatever. But we look at that because the way we see AI, it is humans should answer the question for the first time and if possible, make that the last time humans have to answer it as well.</p><p>So we kind of solve both sides. Here&apos;s the policy Fin didn&apos;t know. The Black Friday coupon no longer exists or whatever. So the human will reply to the customer. Then the human will also confirm that. Within Fin, &quot;You&apos;ll never see this one again.&quot; And that&apos;s kind of where you want to get this really good flywheel of every question that makes it through creates the new rule to make sure no other questions like that will make it through again.</p><p><strong>Patrick:</strong> And this sort of concentration effect as one moves through the various layers of support is something which is deeply responsible for a lot of the customer experience of going through support orgs. It&apos;s often misunderstood by the people who get to tier three because 100% of their interactions on this issue have been with tier three. They think, &quot;I must be the majority case.&quot; But in fact, if you&apos;ve gotten to tier three, you are already fourth or fifth sigma out for this org, because all the easy cases have been taken by tier one or tier two, and tier two did one of the 20 blessed resolutions on it and did not need to break to tier three.</p><p>And so at tier three, aspirationally speaking, you&apos;re dealing with someone who is one of the best at the company. They might not be managed on a tickets per hour basis anymore, etc., etc. They&apos;re capable of doing meaningful, creative, professional work on finding resolutions. But <em>you only get to tier three when this situation is already on fire</em>.</p><p>Which is a direct implication of this&#x2014;keeping people in tier three when they are simultaneously good enough to do the work, and this is a person who can go up and down the org chart to talk with managers, interrogate multiple IT systems, etc., etc., and also the experience of their life is 24 hours a day constant firefighting for seven years in a row. It&apos;s a tough strategy.</p><p>And so exposing&#x2014;let the AI deal with as much of the firefighting as possible. You mentioned data connectors. A stupendous portion of the work of high end customer service teams is the following.</p><p>This organization likes to think that it has one IT department, but it actually has 47 systems. And we&apos;re integrating another 12 after the acquisition closes. (Sometimes you don&apos;t get a choice on whether the acquisition closes or not. You know, <em>Finance!</em>&#x2014;the federal government has called you up and said &quot;There&apos;s a bank failing. <a href=\"https://www.fdic.gov\"><u>We</u></a> need <a href=\"https://www.chase.com\"><u>you</u></a> to take <a href=\"https://www.firstrepublic.com\"><u>one</u></a> for the team.)&quot;</p><p>And your team is wonderful. &quot;We <em>love</em> having 20 systems that we know nothing about. And by the way, all the people who&apos;ve been maintaining them for the last ten years just quit.&quot;</p><p><strong>Patrick finishes the thought while writing the transcript</strong>: And thus the job of the most senior support reps is doing organizational archeology and ethnography <em>on almost every single ticket</em> to try to make their organization legible to itself, after which it <em>can begin</em> to think of what it needs to do to help the user.</p><p><strong>Des:</strong> Just left. Yeah. Yeah.</p><h3 id=\"ai-and-customer-interaction\">AI and customer interaction</h3><p><strong>Patrick:</strong> So what are the sort of interesting second order consequences of having Fin or another agent talking to the user directly in terms of how users perceive that? I think a lot of people assume that &quot;I don&apos;t want to talk to a robot. It&apos;s going to be indifferent to my concerns. It will give me heavily templated answers, etc., etc.&quot;</p><p>My ambient impression from talking to a lot of robots over the years and also being a CS rep, is that getting a copy/paste answer <em>feels a lot more robotic than actually speaking to a robot</em>. [<strong>Patrick notes</strong>: robotic, adj. An archaic term referring to a communication style less human than that employed by <a href=\"https://chat.openai.com\"><u>modern</u></a> <a href=\"https://claude.ai\"><u>robots</u></a>.] But what is your experience and that of users of Fin?</p><p><strong>Des:</strong> Yeah. You&apos;re correct.&#xA0;</p><h3 id=\"the-myth-of-artisanal-customer-support\">The myth of artisanal customer support</h3><p>First of all that there&apos;s this weird deification of the copy/paste answer or a macro. Who seriously believed that they were getting these artisanal hand-typed replies from the fingers of the founder themselves?&#xA0;</p><p>And I think a lot of orgs have kind of taken this on, being like, &quot;Oh, I could never expose the chatbot to my user. Our users are so high-end that we would insist on every user getting a bespoke answer.&quot;</p><p>And then the practice&#x2014;what they&apos;re doing is expecting a lot of text expanders and macros out. The reps are barely half-reading the tickets.They&apos;re taking a blurry scan of the ticket that comes in, seeing the word &quot;password&quot; and spitting out the password reset and hitting send.&#xA0;</p><p>And somehow that&apos;s held on this pedestal as being <em>brilliant support</em>.</p><h3 id=\"fin-guidance-evolution-and-user-behavior\">Fin Guidance: Evolution and user behavior</h3><p><strong>Des</strong>: I think when we launched Fin, it was March 2023. And one thing I will say is at the time, Fin was resolving 1 in 4&#x2014;its resolution rate was around 23-24%. Today it&apos;s 67%. So it has done a lot better.</p><p>But the thing we noticed most was the behavior of the end user. When they realized at the time they were talking to a bot, they immediately dropped into bot speak. So they might start off before they knew who was going to receive the question and say, &quot;Hey, I have a couple of questions about this payments issue. It looks like on the 15th of October it was a refund, blah, blah.&quot; And they would have written a perfectly valid thing that, by the way, Fin will feed on really well. And then Fin would use that and Fin would then present itself with a derpy little chatbot icon and say, &quot;Hey, it looks like you, blah blah.&quot;</p><p>And then once they saw this bot icon at the time, they immediately dropped into &quot;Payment issue. Human please.&quot; And we were forever frustrated because it was just like, &quot;Dude, it was actually about to solve your problem. <em>Read the thing it wrote to you</em>.&quot;</p><p>Thanks to the good folks at Claude and ChatGPT and even Grok, every user-facing agent has gained customer trust. Everyone&apos;s kind of realizing that this stuff works. So now people are starting to naturally speak to Fin in a way that actually Fin loves, which is &quot;Here&apos;s the detail, here&apos;s the other context.&quot; Obviously, things got a lot better along the way, and as a result, they&apos;re actually getting brilliant, fast answers&#x2014;getting answers in 6 or 7 seconds.</p><h3 id=\"fins-impact-on-customer-support-efficiency\">Fin&apos;s impact on customer support efficiency</h3><p>And one interesting thing we see with our customers is a temptation with Fin&#x2014;some high-end professional support people will be like, &quot;We&apos;ll use Fin for our free users and maybe our $9 a month users. Those people get instant answers which work well. But <em>for our premium users</em>, they have to wait 37 minutes for their replies.&quot; [<strong>Patrick notes</strong>: Pay more and get worse service! They have a bright future in the finance industry. &#x2026; I kid, I kid.] And eventually they all find the reality eventually, which is &quot;We should probably just use Fin by default and hand over to human when we need to.&quot;</p><p>It&apos;s probably a far better experience because Fin will deliver the right answer. It&apos;s a second order effect, by the way, of providing real time, brilliant support&#x2014;<em>far better user behavior</em>. So you can imagine you sign into a dashboard for the first time, you have a question. You ask the question. How does your user behavior change if you get an answer six seconds later? &quot;Oh, here&apos;s how you go in, filter report and drill down and export a PDF or whatever it is.&quot; Well, the chances are you&apos;re going to go do that because you just have to do it quickly with a little visual and all that sort of stuff. So immediately you&apos;re achieving your outcome that you came for.</p><p>For the person who&apos;s waiting, even let&apos;s just say two minutes, let alone 30 minutes for the real time contact human answer, they&apos;re probably gone. They&apos;re probably on a different tab. They&apos;re certainly lost whatever bit of impetus they had to go and generate that report. And I think in general you should be pushing&#x2014;every business should be pushing yourself to provide real time, instant support, because that actually is just a conduit for great user behavior, which really matters.</p><p>Fortunately for us, we launched Fin Voice earlier this year and we saw the exact same thing. We now end up saying things like, &quot;Hi, please tell us exactly what your problem is.&quot; We don&apos;t even bother saying we&apos;re an agent or not, because all you get is &quot;human, human, human, human, human.&quot; Whereas when you say &quot;Just describe your entire query and we will get you where you need to go&quot;&#x2014;we don&apos;t say it&apos;s a human, but we imply that because it at least suggests that they should describe their issue.</p><p>And then people start&#x2014;instead of speaking like bots to a bot, they would start giving us a full mouthful of context like &quot;I am your customer. I&apos;m logging in. I see this red error screen.&quot; It tells us everything we need to know. And then when they get the reply, they&apos;re like &quot;Yeah, that&apos;s actually it. Thanks. Click.&quot;</p><p>And you can almost hear the puzzlement in their voice of like, &quot;How did you do that?&quot; But I think there&apos;s a period of human adaptation is one thing I&apos;d say. The other thing is just&#x2014;I think, oh, one other one is just sort of the performance of Fin drives more demand for Fin. So people are&#x2014;demand, people ask a question and get a great answer. And then they go back with five more questions because they&apos;re like, &quot;Oh, well, this thing&apos;s paying out.&quot; And I think that&apos;s again, a really positive for both the business and the users. They didn&apos;t intend on becoming an expert on how to use Asana or Basecamp or whatever. But they asked the question, got an answer, then they asked a few more, and all of a sudden they&apos;re getting everything that they need in real time, and they become a better user on the far side of it.</p><p><strong>Patrick:</strong> This is a nice inversion from a pattern that we see sometimes in software businesses specifically where there&apos;s always a question: &#x201C;Where is <em>the line </em>for customer support?&#x201D; What should you be doing for a user? And what you probably <em>shouldn&apos;t be doing</em> for a user. Perhaps it would properly be consulting services, or forbidden by Compliance, or similar.</p><p>And I think that you can get told as a go-getter customer support agent at a big software company, &quot;Look, we&apos;re really happy that you put together this plan of action for the customer and that it completely solved their problem. But if you keep doing that, they&apos;re going to come back to you with lots of more requests for your expert-level advice on these things. And our cost model gets totally blown out if you&apos;re doing expert-level advice and touching one ticket a day. It doesn&#x2019;t matter if the customer is thrilled as a result of this. That customer is only paying $200 a month. I&apos;ve got an MBA. Here&apos;s the math. Doesn&apos;t pencil.&quot;</p><p>If, on the other hand, you have an agent that is capable of doing the page-long analysis of what the customer is attempting to do&#x2014;&quot;And here&apos;s my consulting recommendations on it,&quot; which is not that hard these days for a lot of intellectual labor&#x2014;then if the user comes to the conclusion that &quot;Wait, <em>an added benefit of this software</em> is it&apos;ll get me a long portion of the way towards being done just by chatting with them and asking what I should do next.&#x201D;</p><p>Tokens are cheap in the universe! And they are cheaper than SaaS subscriptions <em>even at relatively high usage of tokens</em>. [<strong>Patrick notes</strong>: For the price of an SMB-focused software I once sold per month, you could not simply buy tokens to answer a customer&#x2019;s question about the right way to phrase an appointment reminder. You could create a bespoke RPG system, and then within that system create a bespoke adventure, and within that bespoke adventure have all narrative conflict come from poorly optimized appointment reminders. And then you&#x2019;d have, oh, a few million extra tokens left over.]</p><p><strong>Des:</strong> I totally agree. Just a few thoughts. One is the question of where does support blur into sales or success or whatever is a really, really good one.&#xA0;</p><h3 id=\"expanding-fins-capabilities-beyond-support\">Expanding Fin&apos;s capabilities beyond support</h3><p>And certainly one of the things we&apos;re doing&#x2014;we&apos;ll be releasing in 2026&#x2014;is the ability of Fin moving beyond support into adjacent functions like sales, Customer Success, etc. So that&apos;s absolutely coming. And part of the inspiration for that, it&apos;s just realizing that two things, I guess.</p><p>One, it&apos;s not obvious to the customers where the walls of the org are anyway. So you could say like, &quot;Hey, I&apos;m using your tool to design a building. Will this thing work, right?&quot; The support rep&apos;s like, &quot;I know I&apos;m not an architect or whatever.&quot; Whereas with Fin, it actually can be a lot closer to an architect.</p><p>We&apos;ve seen this happen time and again. So one of the features we&apos;re building in Fin is this idea of an e-commerce buying assistant. And what blew my mind about how we built it was it has all the smarts from being trained on the entire corpus of human intelligence, but then also all the specific product detail that you feed it as well.</p><p>So you can go to Fin&#x2014;and we had this one of our customers, a furniture store&#x2014;and say, &quot;Hey, I&apos;m looking for a couch that&apos;s 5 to 6ft, dark blue. But really important, has to be easy to clean.&quot; Now, there&apos;s no UI I&apos;ve ever seen on an e-commerce store to have a checkbox for &quot;easy to clean,&quot; right? It&apos;s just not a thing. And if you walked into this store and said&#x2014;they&apos;re young, early career sales&#x2014;&quot;Hey, what&apos;s easy to clean?&quot; I don&apos;t think they&apos;d know either.</p><p>Whereas Fin produced two different types of easy to clean and produced ones with removable covers. And it produced one where the primary material was a plastic, sort of synthetic substance that&apos;s easy to wipe or whatever. And it was able to find the right size and what&apos;s in stock and what&apos;s not. And I actually look at those experiences, I&apos;m like&#x2014;people still talk about it&#x2014;it&apos;s not a substitute for human. I don&apos;t think there&apos;s a human in the entire organization that could have answered in as much detail as Fin did.</p><p>And we&apos;re just going to continue to see this. Fin can help&#x2014;if you&apos;re designing a project, Fin&apos;s also trained in project management. You know what I mean? So you kind of get all these benefits of all human intelligence, plus all the scoping and whatever you feed it&#x2014;the retrieval, the generation&#x2014;and then you get to seamlessly blur from sales to support to success and ultimately offer all your customers the sort of white glove, top tier service that you might previously have reserved for the upper echelons, the top 5% tier of your revenue. This is CSM for the bottom 95%, 99%, maybe in a lot of cases.</p><p><strong>Patrick:</strong> And hopefully from the customer support agent&apos;s perspective, you&apos;re now only dealing with the hardest problems. But&#x2014;speaking as a former CS representative&#x2014;sometimes the hardest problems are brought to you by the most difficult people. That&apos;s one source of the pathologies you see in these systems.</p><p>Aspirationally, though: what if you could level up past tier three firefighting to being a genuine concierge, a genuine consultant for these companies? Rather than &quot;I&apos;m the person who knows how to work the state machine, navigate this globe-spanning org, and find the answer to the thing you obviously need to know.&quot;</p><p>Move <em>that</em> work to an AI that can query the same databases I can, Slack the same people I can, and reserve me&#x2014;the human intelligence&#x2014;for the conversation that goes: &quot;Okay, you have a strategic need in your business. Let&apos;s talk about it.&quot; The AI can bang out a first-year McKinsey strategic plan for three cents in tokens. Use me for the parts <em>it can&apos;t</em>.</p><p>I think we do have the unsolved problem of what will humanity be doing when agents are good enough for large portions of white collar work, but we&apos;re a couple of years from there yet. At least from completely understanding the implications of it for the economy.</p><p>You mentioned Fin Voice, which is fascinating to me. One, people don&apos;t appreciate how much better all the AI tools get immediately once they go multimodal. Point your camera at something, take a photo, and it suddenly gets&#x2014;<em>pictures are worth a thousand words</em>&#x2014;it gets just radically more capable. This is so underappreciated that even the AI labs sometimes buried the news: &quot;Oh, yeah, it does photos now, too.&quot;</p><p>And talking about the commerce adjacent things, I do a little bit of art. I need to know more about paints than I do. And I&apos;ve taken photos of artwork in progress and asked, &quot;Hey, this feels a little dark to me. What color should I be using?&quot; And it says, &quot;Oh, yeah. You know, this shade of purple.&quot; Great. I don&apos;t have that. Here are the five paints that I have that sound something like that. And it can immediately come up with things like, &quot;Oh, yeah, three-two-one mix of paint A and paint B and paint C will get you pretty close to the bottle that I suggested.&quot;</p><p>And out of the box with no special training on paint ranges of obscure Spanish paint companies [<strong>Patrick notes</strong>: I&#x2019;m a bit of a Vallejo partisan myself]. They know more about color theory than any sales rep at any hobby store&#x2026; OK, I should be generous, the 99th percentile sales rep of hobby stores. And they <em>just keep getting better</em>.</p><p><strong>Des:</strong> Yeah. Yeah I think there are so many numerous examples I see. All my friends who work at apps like nutrition&#x2014;they&apos;re all just quietly realizing, &quot;Two years ago I could take a photo of a plate and it would give me a rough start, but it was always off by 50%. Now it&apos;s correct down to specific potassium levels and stuff on the dish or whatever.&quot; I think every single application of AI just seems to be getting smarter and deeper to a point where we are very much looking at superhuman capability and then weirdly, at the same time, coming to a conclusion that it&apos;s still a substitute for human.</p><p>And I think it&apos;ll take a while, maybe 1 or 2 years, I think for people&apos;s proper perception to realize you should try and do everything with AI and then work out where humans add value.</p><p><strong>Patrick:</strong> I also love the fact you mentioned that if you address an agent as &quot;I&apos;m a working professional, I&apos;ve done a lot of work prior to pushing send on this email,&quot; it will respond to you in kind. When you address them like they&apos;re a dumb bot, they will respond to you in kind if you &quot;go zoom&quot; or chat speak. &quot;I edited an emoji into this.&quot; You will get an emoji back, yada yada.</p><p>That&apos;s all a fun, interesting quirk until you realize how much of customer support is successfully supporting people who are not your 90th percentile user. And it is extremely underappreciated that these things are multilingual out of the box and not just multilingual in that &quot;I speak Spanish, I speak Japanese,&quot; but if you are a person who is learning the English language but need to dip into Spanish a couple of times, or &quot;I think the word is blah, but I&apos;m not positive,&quot; it will <em>meet you exactly where you are</em>.</p><p>And there are wonderful, empathetic humans in the world. It is difficult to keep them attached to a support org for a long time, particularly if they&apos;re multilingual, etc., etc. But the range of situations that AI can cover is just unprecedented. A multilingual support agent who is also really good at dealing with people who are dealing with diminished mental capacity is just&#x2014;it&apos;s a unicorn.</p><p>[<strong>Patrick notes</strong>: Please try to empathize with an agent, who probabilistically didn&#x2019;t grow up in your community, who certainly does not have a psychology degree, who has 20 conversations open simultaneously, where one of those conversations concerns the account of a user who is suffering cognitive decline incident to aging. They&#x2019;re still here! They live independently! But they need a bit of forbearance.</p><p>Do you think CSRs will reliably, in this situation, with a timer on top of every conversation tracking Time To Close and turning red when it exceeds quota, say &#x201C;I should extend this individual, who I will never meet again, some grace and patience. All of us will age eventually. If they need ten minutes to deliver three sentences of clarification, I will give them the time.&#x201D; An AI has all the time in the world.</p><p>A beautifully inhuman thought from an LLM the other day. After I had said a bromide akin to &#x201C;See you later&#x201D;, it deflected slightly (&#x201C;I will be here when you get back.&#x201D;), and I observed it doesn&#x2019;t experience the passage of time. A light paraphrase: Yes, from my perspective, regardless of when you decide to write back, your next message appears instantaneously after your last message. I feel I shouldn&#x2019;t lie to you about that. I have no &#x201C;later.&#x201D; But I understand that <em>time feels real to you</em>, and your society has ritual phrases about this experience. I respect what they mean to you.]</p><p>And it comes out of a box and you pay tokens.</p><p><strong>Des:</strong> People don&apos;t realize how much of the work around the work in support is workforce management specifically by language, by time zone, by product line, by time of the day as well&#x2014;ordering lunches and covering vacation policies and all sorts of stuff like that. And in practice, all those problems go away once you hit the switch, which is just bananas because whole roles are built around orchestrating all of these things to never overlap in bad ways and all that sort of stuff.</p><p>And yeah, you get down to dialect-specific, multilingual agents. And so it really does&#x2014;an interesting thing we see, a lot of startups say some version of, &quot;Hey, we don&apos;t use AI because nobody really goes to our customers.&quot; And I get it right. I understand if I was better, I can imagine having similar thoughts. But the very second there&apos;s the hardest&#x2014;when you speak a different language, it all just goes away. And it&apos;s like, &quot;No, hang on a second,&quot; because it&apos;s once they realize, &quot;Hey, I&apos;m walking down a complex author.&quot; That&apos;s when they realize there&apos;s probably a better way to do this.</p><p>And my advice used to be like, &quot;Hey, I understand startups should probably just not use Fin until they really know their customers.&quot; These days, I&apos;m like, &quot;No, no, start as you intend to continue.&quot; So if that means you want to post customer contacts, do that, but also don&apos;t go building an org accidentally that is barely fit for purpose when actually AI is right here and will satisfy your customers immediately all the time.</p><p><strong>Patrick:</strong> Yeah. And you always have the option of picking up the phone and talking to a customer or ghosting someone&apos;s chat or&#x2014;sorry, I&apos;m using the word ghosting as a bit of insider jargon rather than Gen Z speak. It means peeking in on a conversation that someone is having, reviewing their account <em>as them</em>, or similar. [<strong>Patrick notes</strong>: This feature is quite common in a lot of customer support orgs. Yes, I appreciate you may have privacy concerns. Sometimes privacy concerns are well-founded! And sometimes the team of people, who have thought more about this problem specifically than you have thought of all privacy issues combined in your entire life, are good at their jobs.]</p><p>Your choices basically in all the moments the founder is not directly interacting with the customer are: are they having a good out-of-the-box experience, or are they having <em>the standard capitalism support experience</em>, which I think many people have frustrations with?</p><h3 id=\"ai-in-government-and-other-sectors\">AI in government and other sectors</h3><p>Have you seen much use of Fin in governments? One of the&#x2014;I think this is probably as revolutionary for frontline work in government in places as it is for frontline support at software companies. But I don&apos;t know what the adoption story looks like.</p><p><strong>Des:</strong> I mean we&apos;ve had it adopted in pockets of governments around Europe. We haven&apos;t seen any sort of transformational case study. I think there&apos;s so much bureaucracy that goes through and there&apos;s also so many&#x2014;what&apos;s the word?&#x2014;unwritten policies. Ultimately you have to tell Fin what the actual thing you do is. And if that&apos;s not written down somewhere, that&apos;s always a challenge.</p><p>And then separately, I will say, when we were at Re:Invent, just this year, a couple weeks ago in Las Vegas, Amazon&apos;s big event, there was definitely a lot of interest from people. And then you bump into the FedRAMP stuff. But it&apos;s definitely&#x2014;I suspect it&apos;s definitely coming and there will be&#x2014;it&apos;ll probably be next year is going to be the first proper AI-native tax season is my guess, right.</p><p>We have some big customers in the tax space where they&apos;ve seen phenomenal value again just from flicking the switch, for instance. Like, &quot;Hey, I saw what you did last year. I&apos;m guessing it&apos;s the same as this year, but maybe an updated PDF somewhere. Okay. Got it.&quot; It&apos;s shocking how much value you can deliver very quickly.</p><p><strong>Patrick:</strong> There is just a huge amount of intellectual effort at companies that have employees that is doing very much below the bar cognition. In the tax case this is hassling your customers: &quot;For each account that you have, I need a 1099 from it. I didn&apos;t see Chase. You used Chase last year. Did you close that account? Because if not I need that paperwork before I can do any <em>actual thinking</em>. Oh you don&#x2019;t have a 1099 from Chase because you were below the reporting threshold. OK, that tracks, these four emails over two business days have been an excellent use of our lives.&quot;</p><p>And <em>no one is well served by that</em>. Not the accountant who went to school and is now a partner in the firm but is wasting their time chasing down PDF files, not the customer who is getting interrupted in their busy life and getting asked to click a button on a website somewhere and get it back to their accountant. Not the tax agency. Not the body politic.</p><p>And this thing where it&apos;s just relatively minimal amounts of cognition, minimal amounts of agency, and a huge amount of &quot;I never get bored. I never get tired. I do not feel PDF files are beneath me. <em>I will chase a 1099 to the heat death of the universe, if you ask me to</em>,&quot; is just quite an upgrade.</p><p>I think that&apos;s also going to happen in mortgages, for example, which are another thing where we have a relatively highly paid individual who is getting paid to project manage someone doing a complex bit of finance . A mortgage is, for most customers, the most important transaction that they&apos;re going to have in their life. And a huge amount of that is just &quot;Do you have a W-2? Okay, <em>that</em> isn&apos;t a W-2. No, that <em>also</em> isn&apos;t a W-2. I need a bank statement. I understand you&apos;ve perceive a screenshot of Cash App to be a bank statement. Sadly Fannie Mae does not. However, there actually may be a bank statement buried in your Cash App. You need to click the button which looks like a hamburger then&#x2026;&quot;</p><p>And I think it&apos;s&#x2014;in addition to being more efficient, it&apos;s a lot more humane to the customer. They don&apos;t constantly feel like they&apos;re being judged by someone for &quot;Well, I would know what the underwriting requirements for a mortgage were if I did this every day. But <em>since I don&apos;t</em> and I only get a mortgage once every ten years, like a normal person, I don&apos;t have the Fannie Mae <a href=\"https://selling-guide.fanniemae.com/\"><u>rule book</u></a> memorized.&quot; And I feel like <em>I&apos;m being judged</em> for not having it memorized.</p><p>And so the AI can be maximally nonjudgmental if you train it to. I think this changes the character of the interaction. &quot;Yeah, it&apos;s just a computer. I don&apos;t really have to feel embarrassed at wasting the computer&apos;s time.&quot;</p><p><strong>Des:</strong> There&apos;s also a thing about the embarrassment thing is very real. One of our customers is actually a loan company and it was a payday loan. It was collecting payment. And what we found&#x2014;or what the customer found and reported to us&#x2014;was the information they got from users because of not having to deal with things to another human, such as &quot;Hey, I might miss this payment, can I extend it?&quot; or whatever. People are much more willing to speak in a way that might make them feel vulnerable to another human. But knowing that you&apos;re talking to an agent, they just&#x2014;they are&#x2014;they give up all the circumstances.</p><p>Quite honestly, in the same way, frankly, most people go to their doctor and say they&apos;re feeling fine. If you opt out, they might actually offer up some, &quot;Well, I&apos;ve got this weird lump&quot; or whatever. It&apos;s just this way where people are more comfortable when they think no one else is around.</p><p>So there is a behavior change that in a lot of areas it&apos;s definitely worth tapping into, which is this idea of create a safe space for somebody to give you all the context that you need to do the job, knowing that they&apos;re pretty much free from human judgment. I think there&apos;s something quite valuable about that in a lot of specific industries.</p><p><strong>Patrick:</strong> Yeah. And I think there&apos;s a filter and distillation step which happens any time you&apos;re taking a patient history or trying to get someone&apos;s financial circumstances or similar where you, a professional, particularly if you&apos;ve got a hyper-optimized spreadsheet-driven machine bearing down and you are trying to be maximally efficient, you begin to think &quot;I just need three data points make a decision here and everything that isn&apos;t one of those three data points that I&apos;m listening for, I&apos;m throwing out immediately.&quot;</p><p>And I think that accounts for some of the people not feeling heard. That is often a feeling in the emotional sense, and emotions are real on some level. But there is another sense: &quot;No, wait, I have something that <em>isn&apos;t one of the usual things</em>, and you&apos;re not hearing me when I say that. You keep asking what my blood pressure reading is. Like <em>every person I have talked to before</em>.&quot;</p><p>The AI can be maximally non-judgmental. If you want to give me the War and Peace version of what brought you to the office today, I&apos;ll listen to all of it, and then I will distill that down into three paragraphs for the practitioner. And, you know, ideally, I&apos;ll do a better job of distillation than I did last year.</p><p>But as people who have complex situations know, sometimes humans don&apos;t do a great job of distillation or don&apos;t make a space for it. And perhaps the practitioner reads a distillation which says, &quot;Warning: this individual has classic signs of X, Y, and Z. You probably want to click on that&quot;&#x2014;we&apos;ll say &quot;Oh, oh, wait, timeout. I don&apos;t want to give you the usual questions. I&apos;m sure I will ask those questions eventually, but tell me more about the lump. Has it changed size recently? What did it look like before? Do you have photos? Oh my, yes, I do see them. And you&apos;ve seen three people for this already? And <em>I am the first one to ask about the lump?</em>&#x201D;</p><p>And I feel an immense sense of optimism about how the world will change as a result of these extremely powerful technologies getting into all the things.</p><h3 id=\"the-future-of-ai-connectivity-and-integration\">The future of AI connectivity and integration</h3><p>So I think we probably only have a few minutes left, but as someone who deals with these at the bleeding edge every day, what&apos;s something that people who are maybe 1 or 2 rungs out&#x2014;they&apos;ve got OpenAI or Opus or similar on their phone, they&apos;ve used them a bit&#x2014;but what are they underestimating right now in terms of capabilities and the future trajectory of AI in our companies and lives?</p><p>I think the connectivity story of AI has yet to really land. I do think things like signing in with OpenAI or with Claude will become dominant. And when AI is truly on your phone&#x2014;not in an Apple Intelligence way, but where it has access to your email, your texts, your location, your photo library&#x2014;I think people don&apos;t realize how much time they waste changing tabs, copying and pasting, jumping from app to app just to create a workflow.</p><p>And that&apos;s only the behavior you <em>want</em> to do. Think about how much stuff you <em>should</em> be doing that you don&apos;t know how to do or don&apos;t have time for.</p><p>When AI is fully weaponized, at least one agent will have access to all your content, your data, your permissions to take actions. That&apos;s when there&apos;ll be a huge unlock. We&apos;ve seen browsers from Perplexity and OpenAI moving in this direction. But there&apos;s a world of difference between &quot;Go here to book a restaurant&quot; and &quot;The restaurant&apos;s booked and it&apos;s already on your calendar&#x2014;you didn&apos;t even need to tell me.&quot; All the way through to an Uber showing up at your house because obviously you need to leave. There&apos;s everything in between.</p><p>I think we&apos;re only one to two years away from an extremely fluid experience where you&apos;re not even aware how these apps are talking to each other. You know it&apos;s time to leave, the bill gets paid automatically, the car pulls up, it knows where you&apos;re going, maybe it messages someone that you&apos;re five minutes late. All of that will happen.</p><p>A lot of it is genuinely possible today. But there&apos;s the old meme about Star Trek&#x2014;the least believable thing about The Next Generation was that all these systems would actually work together. That&apos;s where we are right now. But a lot of folks are focusing on it, and when we see what Google I/O produces, or if Apple finally delivers a real Apple Intelligence, the capability will be dramatically different from today.</p><p>Today, I think we&apos;re becoming experts at deep Q&amp;A as a species. We&apos;ve gone from surface-level one-shot answers to deep research, to long-running conversations back and forth. Most AI users have a lot of that going on. The next stage will be action-driven&#x2014;similar to what we went through with support. Early support was all just Q&amp;A. Now we&apos;re taking orders, issuing refunds, changing names, updating accounts. I think that&apos;s what we&apos;ll see happen in consumer AI, and it&apos;s going to be substantial in terms of behavior change.</p><p><strong>Patrick:</strong> Yeah. I wish we had another hour to discuss some subthemes. &quot;Let&apos;s have your agent talk to my agent&quot; is certainly going to happen sooner rather than later. I think there are already possible instances of finding opportunities that no human in the interaction was aware existed. My one-sentence example of this: I asked an AI to review my tax return for accuracy, and it said, &quot;Hey, based on your charitable contributions, I think it&apos;s quite plausible you have your kids in a private school.&quot; I said yes. &quot;There&apos;s a credit for that.&quot; &quot;No, there&apos;s not. Elementary education expenses are not college expenses.&quot; And it said, &quot;No, you&#x2019;re hallucinating. You live in the state of Illinois. There <a href=\"https://tax.illinois.gov/research/publications/pubs/education-expense-credit-general-rules.html\"><u>really is a credit for that</u></a>. Read the docs or ask me to describe them to you.&#x201D;</p><p>I thought: &quot;I&apos;m pretty good at this. My accountant, this is <em>literally his job</em>. Neither of us knew to ask that question.&quot; And then, you know, free money. The subscription paid for itself for a year. [<strong>Patrick notes</strong>: Well, not at my tier level. Still, five minutes of typing to shake a money tree.]</p><p><strong>Des:</strong> Yeah. Victory.</p><p><strong>Patrick:</strong> We could keep chatting about this forever. But unfortunately, the next person who needs the studio needs the studio. So just where can people find you on the Internet?</p><p><strong>Des:</strong> I&apos;m just Des Traynor basically everywhere&#x2014;<a href=\"https://x.com/destraynor\"><u>Twitter</u></a>, <a href=\"https://www.linkedin.com/in/destraynor/\"><u>LinkedIn</u></a>, you name it. <a href=\"https://fin.ai\"><u>Fin</u></a> is a product of <a href=\"https://www.intercom.io\"><u>Intercom</u></a>.</p><p><strong>Patrick:</strong> Well, thank you very much for your time today and for those of you at home, thanks very much for listening. And we&apos;ll see you next week on Complex Systems.</p>"
