e of this contract. So we can all pretend that you&#x2019;re doing what you want as long as you do the same thing you&#x2019;ve been doing unsuccessfully for the last several decades.</p><p><strong>Luke:</strong> Yeah. One positive example that comes to mind is IRS Direct File, which the US Digital Service helped launch a couple years ago. Instead of building a tax filing tool for all 200 million American taxpayers all at once, they did a pilot. They developed for a narrow set of use cases that were straightforward and could demonstrate product-market fit. Users really liked the tool &#x2014; they got a net promoter score of 92%, which is a huge success by industry standards and an even bigger success by government technology standards.</p><p>They were able to build in a thoughtful, agile, pilot-driven way and grow the product over time. And they did that with an in-house government team &#x2014; they had contractors who were mostly functioning as staff augmentation, software engineers pitching in and project management teams. But they were able to do it iteratively in an industry-standard way, as opposed to writing a $100 million contract that blew up in everyone&#x2019;s face. As a result, users loved it, it worked really well.</p><p>It did get <a href=\"https://www.statecraft.pub/p/how-to-build-state-capacity\"><u>discontinued for political reasons</u></a>. But I&#x2019;m hopeful that one day it will come back, because that is a model for how you can actually do great human-centered design and product development that delivers for people. It can&#x2019;t be the big-bang, contractor-led, $100 million debacle. It has to be a thoughtful, iterative, pilot-driven, user-research-driven process.</p><p><strong>Patrick:</strong> I&#x2019;m glad you brought up Direct File, because the experience of IRS tax filings is often misunderstood in the technology industry as being entirely dictated by Intuit&#x2019;s lobbying budget &#x2014; which is something like $6 million a year, a rounding error in terms of the broader lobbying spending, or the total amount of energy spent by United States citizens on their tax filings every year.</p><p>Without getting into partisan commentary, this is a political dynamic we see frequently in many different scenarios. The Groups, the people who are closest to the issue &#x2014; the subject matter experts who are not directly in the agency &#x2014; will often say: &#x201C;I don&#x2019;t want a good 98% solution, because I feel that a good 98% solution is going to drain the political will to address the last 2%, and I keenly care&#x201D; &#x2014; partly for objective reasons, partly for ideological reasons &#x2014; &#x201C;about that last 2%.&#x201D;</p><p>In fact, they might care more about that last 2% than the 98%, because the reality is that people with complicated personal situations in X, Y, Z generally tend to have complicated situations all the way down. Some theories of justice will say: if agency A is doing the 98% solution, and agency B is doing the 98% solution, and agency C is doing the 98% solution, the people who fall through the cracks are going to be the same people every time. The government will work for most people, but not for the most vulnerable people in society, every time. [<strong>Patrick notes</strong>: The most common identifiable theory here is Rawls&#x2019; Theory of Justice but this moral intuition is quite diffused, to the point where it is almost a touchstone of the broader culture around service delivery.]&#xA0;</p><p>That argument is often advanced by broadly left-of-center people &#x2014; although I am not left of center and I&#x2019;m happy advancing it &#x2014; and IRS Direct File is a similar case. You can read where the opposition comes from: it&#x2019;s Americans for Tax Reform, a right-leaning group of policy entrepreneurs in the tax space, and Republican members of Congress basically take their marching orders from them because if Grover Norquist says you wavered on tax issues, your career as a Republican is done.</p><p>And what they say is: if we make taxes easy and people assume taxes are easy now, then the tax burden faced by small business members &#x2014; voting members of our political coalition &#x2014; is going to grow in an unbounded fashion. Their actual dollars-and-cents burden is going to grow in an unbounded fashion. Therefore, no half-measures, and certainly no experiments that aren&#x2019;t specifically authorized by legislation that we had a hand in crafting.</p><p>So people of goodwill can say, in basically as many words, &#x201C;I&#x2019;m okay with the perfect being the enemy of the good.&#x201D; And I think achieving political consensus that no, we should not let the perfect be the enemy of the good, is one of the large issues &#x2014; not just with that specific program, but with other programs too: just shipping a simplified user experience as a first step. Not addressing every possible thing in the 60,000 pages of implementing regulations, but saying: &#x201C;Okay, until you hear differently from us, just answer these questions. And that is probably everything we need to know.&#x201D;</p><p>That&#x2019;s the thing that happens in program after program after program. But it is difficult in the current configuration of the polity to allow program managers to take advantage of that.</p><p><strong>Luke:</strong> Totally. I think there&#x2019;s a political economy question implicit in what you&#x2019;re sharing, but there&#x2019;s also just the implementer&#x2019;s perspective.</p><p>From the implementer&#x2019;s perspective, I think there are actually a lot of use cases where fixing the 90% experience has enormous benefit for the 10% experience as well. In the case of Medicaid, my team drove around the country &#x2014; red states and blue states &#x2014; and was fixing the eligibility and enrollment software that helps automatically renew people for benefits if nothing has changed on their case. If Luke&#x2019;s income is the same, my family composition is the same, my address is the same &#x2014; I shouldn&#x2019;t have to start from scratch and refill out a whole packet. The state should be able to check data sources to verify that fact, and then have my application automatically renewed for 12 more months.</p><p>What that does is remove an enormous burden off the beneficiary and remove a huge amount of casework off caseworkers&#x2019; desks, who can then spend &#x2014; instead of five minutes per beneficiary &#x2014; an hour working with a family that has more complex medical needs, or a mixed immigration household, or whatever the more complex situation is. It can remove the easy cases off the desk to the enormous benefit of people who have more complex cases. Even though you&#x2019;re not able to automatically renew that more complex person, they still see huge benefit from the system being more efficient overall, because now they can get through the call center in five minutes as opposed to eight hours.</p><p>And so I think there are really nice downstream effects of improving the efficiency of some of these programs. In the case of Direct File: there might be enormous benefits for small business owners if the IRS is less focused on troubleshooting personal tax filings for individuals and can better serve businesses.</p><p>There&#x2019;s a political economy question about whether if you make programs better, people like programs more &#x2014; and I think that&#x2019;s a good thing, right? I don&#x2019;t think it should be pain and suffering to get your health insurance through Medicaid. I don&#x2019;t think tax filing should be really, really painful and horrific because we&#x2019;re all legally required to do it. The downstream consequence of those arguments feels like people backing into making services worse because they might not like other parts of the program &#x2014; and I&#x2019;m less sympathetic to that.</p><p><strong>Patrick:</strong> You might be better acquainted with the literature than I am, but I think there&#x2019;s an academic argument advanced about rationing via friction. The numbers matter. We have a few levers available. One is eligibility criteria &#x2014; you can choose those criteria to express some of society&#x2019;s complex preferences about what level of subsidization for what people, what level of political economy is embedded in the process with the &#x201C;deserving poor&#x201D; rationale, et cetera.</p><p>Another lever is: in every program, not everyone who is eligible takes advantage of it. The conversion rate from eligibility to actually submitting an application is a huge driver of program cost. The acceptance rate and continued application for benefits is another driver.</p><p>So maybe without people explicitly deciding this &#x2014; but if everyone could successfully, say, one-click apply for benefits, the amount of benefits we could afford without getting political blowback is relatively low per beneficiary. If it&#x2019;s higher-friction, then some people will select out due to the friction, and then people in the know or connected to the right people will be able to get more dollars allocated to them, or will go through the blessed pathways that NGOs have built to navigate people through this process &#x2014; which also creates jobs for members of political coalitions, and so on.</p><p>There are some difficult trade-offs here. But I said before the call, and I think it holds: people from a huge part of the political spectrum can broadly agree that government services should be generally pro-dignity and should generally work. If they don&#x2019;t work, what are we doing?</p><p><strong>Luke:</strong> Yeah, I agree.</p><p><strong>Patrick:</strong> So. You wrote a paper recently about the <a href=\"https://lpeproject.org/blog/the-means-testing-industrial-complex/\"><u>Means-testing Industrial Complex</u></a>. I&#x2019;d love to talk about the object level of that &#x2014; partly for you to tell people about something that comes up again and again, and partly so that we can have a discussion of why this keeps happening.</p><p><strong>Luke:</strong> Totally. Just to start where you started: administrative burdens &#x2014; and there&#x2019;s great literature by Pam Herd and Don Moynihan on this topic &#x2014; are a knob that policymakers turn to either increase or decrease access to a program without necessarily saying, &#x201C;Oh, we don&#x2019;t think pregnant mothers should get Medicaid, but we&#x2019;re going to make the paperwork really hard, so maybe they&#x2019;ll be less likely to get through.&#x201D; It&#x2019;s a kind of alternative policymaking that happens below the surface. It&#x2019;s complex and under-discussed, but a really important reason why benefits are either easy to access or not, and why government services are great or they&#x2019;re bad.</p><p>[<strong>Patrick notes</strong>: Pamela Herd and Donald Moynihan,<a href=\"https://www.russellsage.org/publications/book/administrative-burden\"> <em><u>Administrative Burden: Policymaking by Other Means</u></em></a> (Russell Sage Foundation, 2018). This is the standard reference in the field.]</p><p>I think the job of being in government is to reduce those burdens and to be more clear about what the program you&#x2019;re trying to design is and who it&#x2019;s for. In the means-testing industrial complex piece, I lay out how the complexity of these systems that has grown over time has become a surface for capture by vendors and by contractors. The more complex we make these rules, the more complicated the software needs to be, the more boxes that need to be checked, the more surface area for contractors to embed themselves and grow the complexity further. I&#x2019;ve seen some code bases that would blow your mind &#x2014; and I&#x2019;m sure you&#x2019;ve seen some yourself &#x2014; where you would never engineer this thing to look this way if you were looking for the most efficient path.</p><h3 id=\"the-moral-incoherence-of-asset-limits\">The moral incoherence of asset limits</h3><p><strong>Patrick:</strong> Just for the benefit of people who don&#x2019;t live in benefits world for most of their lives: &#x201C;means testing&#x201D; is a term of art. It refers to the broad perspective of the US polity that we want to give benefits to people who are in need of them, and both for cost-control reasons and for the value system of the United States of America, we don&#x2019;t want to give money to people who don&#x2019;t need money. So you need to be able to prove that you&#x2019;re not someone who doesn&#x2019;t need money.</p><p>Means testing will often have an income component to it, or a wealth component to it, where you need to prove to the government what your income is and document your wealth and sources of wealth, such that they can do a relatively deterministic calculation on whether you are above or below the line.</p><p>I say &#x201C;relatively deterministic&#x201D; because the actual implementation of some means testing gets into some genuine craziness. A great example that I think I&#x2019;m borrowing from Dave Guarino: everyone will need to make final arrangements at some point. Often that involves buying a burial plot. A burial plot is, technically speaking, real estate. And real estate has a cash value attached to it. So if you&#x2019;re older in years and are asked the question &#x201C;Do you have at least $2,000 worth of assets?&#x201D; &#x2014; if you&#x2019;re looking at a bank account that says $67 in checking, you might still have $2,000 of assets because if you&#x2019;ve planned ahead, you have a burial plot you&#x2019;ve paid for and ready to go.</p><p>You own $2,000 of real estate. And it&#x2019;s probably no one&#x2019;s moral intuition that because this person has made prudent choices in planning for their end of life, they should not be eligible for government services. But the combination of how we&#x2019;ve layered the regulations says: we made the decision that if they have $2,000 of assets, they should be selling those assets before accessing this program. We didn&#x2019;t explicitly say &#x201C;sell your burial plot.&#x201D; We just said &#x201C;assets.&#x201D; But the law considers that no different than if they had $2,000 worth of Google stock.</p><p>And thus we end up with a morally incoherent result that we ask of people. It also means you have to ask every potential beneficiary: &#x201C;Have you prepaid any burial expenses?&#x201D; That&#x2019;s in the book of things we need to ask about. So we&#x2019;re imposing marginal friction on everybody with respect to this one edge case that I think in their heart of hearts, no one who matters in the American political system would actually say means that prepaid burial expenses are obviously a sign that you&#x2019;re super rich and should be outside the scope of government services.</p><p>[<strong>Patrick notes</strong>: I misattributed this in the audio. The burial plot example is from Jennifer Pahlka&apos;s<a href=\"https://www.recodingamerica.us\"> <em><u>Recoding America</u></em></a> (2023), not from Dave Guarino. Dave was interviewed in the book in a separate capacity.]</p><p><strong>Luke:</strong> Yeah, exactly. And there are a ton of examples like this, where well-meaning policy proposals &#x2014; like &#x201C;there should be an asset limit for those who receive SNAP or non-MAGI Medicaid&#x201D; &#x2014; trickle down through the system of legal interpretation until suddenly, having a burial plot is disqualifying you from food benefits, even though you can&#x2019;t really trade a burial plot for groceries very easily.</p><p>These well-meaning intentions to design programs for specific populations can end up getting really complex and causing all sorts of problems for beneficiaries and access, and aren&#x2019;t the programs we wanted to design in the first place.</p><p>So one of the arguments I make in the piece is about universalizing programs more fully. One example from during the pandemic that&#x2019;s persisted is school meals for children. Many schools and states have moved to universal in-school meals for kids. Before, the status quo was that you had to be deemed income-eligible to receive free and reduced lunch. So you would have kids in a separate line who are getting their free or reduced lunch &#x2014; and if mom or dad forgets to fill out the form, now they&#x2019;re not eating at lunchtime. There are all sorts of bad consequences from theoretically wanting to target this program at low-income kids.</p><p>When you universalize the program, it actually doesn&#x2019;t end up being that much more expensive. You get all sorts of great second-order effects. You no longer need the clerk at the school monitoring every child&#x2019;s income to determine eligibility. You no longer need a separate line for kids who are paying a quarter for lunch versus getting free lunch. It removes this eligibility infrastructure that needs to exist, and it has all these nice second-order effects: parents are less stressed, parents who could afford to pay for their child&#x2019;s lunch no longer need to pack a lunch and do as much grocery shopping. It&#x2019;s a relief on their family&#x2019;s weekly budget, even though they might not have otherwise qualified for the program.</p><p><strong>Patrick:</strong> There&#x2019;s a dignity element to this that I think is really strong, which I&#x2019;ll illustrate with something minorly personally embarrassing &#x2014; though it really shouldn&#x2019;t be embarrassing.</p><p>I&#x2019;ve had money in life and not had money. A long time ago in a place far, far away, my family was in similar circumstances. There was a field trip that cost $10, and $10 was a lot of money for my family that week. But we still wanted to send me on the field trip. The school said, &#x201C;Good news &#x2014; it&#x2019;s $10 for everybody in school unless you qualify for low-price lunches. If you qualify for low-price lunches, it&#x2019;s free. Just fill out this form. You don&#x2019;t have to actually eat a low-price lunch.&#x201D;</p><p>That form got sent home, and there was a discussion between my parents. I won&#x2019;t throw either of them under the bus, but one was like: &#x201C;Patrick wants to go on the field trip. We can&#x2019;t spend $10 on it. Filling out this form gets him on the field trip.&#x201D; And the other parent was like: &#x201C;<strong>No</strong>. Filling out that form is an acknowledgement that we have failed as parents &#x2014; that our child can&#x2019;t even afford food.&#x201D; Which, to be clear, was not really the situation. We were not that close to the line. But we were close to a <em>different</em> line &#x2014; the socio-culturally fraught line of saying, &#x201C;I&#x2019;m the kind of person who needs help right now.&#x201D;</p><p>There are people who are unable to take advantage of something which is basically free to provide at the margin. I think people can have a reasonable discussion every four years, on whatever cadence, about where we set the taxes-versus-benefits slider. That&#x2019;s the point of politics, and I&#x2019;ll leave that to other people. But I think basically everybody on the spectrum agrees that people should not be crying about these decisions. We should, as a society, be pro-dignity with respect to people navigating these challenging circumstances. So where program design is causing us to compromise on dignity, I would hope we do something differently.</p><p><strong>Luke:</strong> I think that&#x2019;s exactly right. And I don&#x2019;t think that&#x2019;s a unique experience.</p><p><strong>Patrick:</strong> Oh, very clearly not unique. Many, many folks have ones that rhyme with it.</p><p><strong>Luke:</strong> Totally. Millions of Americans&#x2019; incomes fluctuate over time, and the system moves too slow to catch them. There are months and gaps where kids aren&#x2019;t eating, they&#x2019;re not getting healthcare, they&#x2019;re not able to go to the doctor or get their prescriptions.</p><p>When we were traveling around the country, we met a lot of those families. The idea that we would put burdens in front of them to access programs that we all pay for &#x2014; because we all might be on them at some point or another &#x2014; there&#x2019;s a reason we build these social insurance programs. They keep society strong. They care for the most vulnerable. And the most vulnerable could be me, it could be you, at any point. I think that is a core part of why we need to build dignity into the administration of these programs, because it&#x2019;s part of the social fabric that we&#x2019;ve built over so many years.</p><p>And the way we advance it is by simplifying that machinery, so that the industrial complex around eligibility determination and means testing is not just kicking people off the program, but also not giving them an undignified experience &#x2014; being in a separate line in the school cafeteria, or going to the doctor and finding out they lost their coverage. At the end of the day, it&#x2019;s about building an experience that is what we expect when we interact with any private-sector company. We would never tolerate an experience like that elsewhere, and we shouldn&#x2019;t tolerate it from our government.</p><p>The way we can improve these programs through reducing administrative burdens and universalizing them where possible and where it makes sense &#x2014; it&#x2019;s not just an inefficiency argument, though we can make that all day. It&#x2019;s also a dignity argument.</p><p><strong>Patrick:</strong> I think there&#x2019;s a kind of barbell with respect to the experience of income volatility. People at the lower ends of the socioeconomic spectrum have rather substantial income volatility. This is also true of people at the higher ends &#x2014; stock-based compensation, they run businesses, et cetera. But the great majority of the population conceives of income as something that happens every two weeks on a very predictable schedule and is recorded on your W-2. And therefore, how hard is it to demonstrate your income to a government process? It&#x2019;s actually distinctly non-trivial at either end of the barbell.</p><p>Folks at the higher end of the socioeconomic spectrum understand that keenly with respect to taxes &#x2014; they don&#x2019;t care about it so much with respect to low-price lunches, because that isn&#x2019;t relevant to their interests. But when we talk about income verification for people in more typical circumstances: the person is theoretically speaking employed at a franchise, let&#x2019;s say McDonald&#x2019;s. They have an inconsistent number of hours given to them by their management every two weeks, so income fluctuates on a biweekly basis. They&#x2019;re also what the government says is running a small business &#x2014; they&#x2019;d say, &#x201C;No, I&#x2019;m a driver for a rideshare. It pays me money occasionally.&#x201D; But from the government&#x2019;s point of view: &#x201C;No, you&#x2019;ve got a small business. That business has revenue and expenses, so you need to be able to calculate what your profit was. Because profit is income &#x2014; not the revenue, but the profit.&#x201D;</p><p>And people elsewhere in the socioeconomic spectrum who actually run small businesses might say: bookkeeping and accounting for a small business is intellectually non-trivial, and on a month-to-month basis I don&#x2019;t really know what the business is making until I do my taxes at the end of the year. Asking that of someone who is more sociologically similar to a rideshare driver than to, say, a software consultant &#x2014; that&#x2019;s a really rough ask. And yet we do it, and perhaps should consider either not doing it, or electing some sort of safe harbors.</p><p>Like: &#x201C;If you have a rigorous calculation about the profit of your ridesharing business, we&#x2019;re all ears. If not, click here to link your rideshare app. We will pull the gross number out of it and deem 70% of it as the profit, and you can pick whichever is better for you.&#x201D; I think more people would actually succeed in doing that, and it would stop us from wasting the time of very expensive people in government going back and forth with prospective beneficiaries over: &#x201C;Okay, bring your box of gas receipts. I&#x2019;ll be your overpaid bookkeeper while we spend hours together walking through whether you are above or below the $500-a-week line&#x201D; &#x2014; or whatever the threshold is for the particular program.</p><p><strong>Luke:</strong> Yeah, income verification is another thing I talk about in the piece, with respect to Equifax &#x2014; which is a provider and aggregator of income data about American workers. It&#x2019;s a great example of how our over-reliance on these verifications, which are very complex, has resulted in consolidation around one market leader who&#x2019;s now bleeding the government dry. And it&#x2019;s not only a painful experience for folks who need to bring in their receipts and pay stubs and figure out if they qualify this month versus last month, while their household budget is all out of whack. We&#x2019;re not providing an environment where they&#x2019;re even able to work capably, because they might need to go into the office and miss additional hours, or maybe they&#x2019;re sick and need healthcare they&#x2019;re not accessing, which actually harms their ability to work.</p><p><strong>Patrick:</strong> Can I say a few more words about this particular database? Because this system is geeking me out &#x2014; and who doesn&#x2019;t love mortgage underwriting?</p><p>I think it&#x2019;s instructive why the system exists. You have an HR department. The HR department has many responsibilities: Tim and Cindy are having a bit of an interpersonal conflict and you need to resolve that, you need to prevent the company from taking on liability, run the annual training. And then occasionally employees are going to say, &#x201C;Hey, I applied for a mortgage with Bank of Bigness, and Bank of Bigness is going to need to call and verify what my salary is.&#x201D; And the HR department would prefer to do anything other than answer that phone call, because they get hundreds of them a year for an employee base of hundreds of people.</p><p>It&#x2019;s a waste of their time. It&#x2019;s also a bit of a risk: if a jilted ex-lover calls up and says, &#x201C;Hey, this is the Bank of Business underwriting department, how much does Cindy make?&#x201D; and you give that information out &#x2014; now you&#x2019;re legally liable for having disclosed it.</p><p>So Equifax called up the employers and said, &#x201C;Trade proposal: in lieu of you ever having to answer that phone call again, you tell people to call us. We will do the &#x2018;is this person not an ax murderer&#x2019; screening for you, and then we will give out the number only to people who pass that screening. You never have to take the phone call anymore. And we won&#x2019;t charge you for the service.&#x201D;</p><p>So who do they charge? They charge the mortgage companies, the banks. And the federal government &#x2014; because when the federal government says, &#x201C;Hey Bob, to get access to these government services you need to verify what your income was for the month of March,&#x201D; in lieu of Bob going out and getting his W-2 and pro-rating for the number of hours, yada yada, all Bob has to do is point at Equifax. And Equifax says, through the magic of SQL, &#x201C;We have determined that their payroll department said that exact number was X.&#x201D;</p><p>So I&#x2019;ll express a bit of qualified disagreement with the piece, because the piece makes much of Equifax being a monopoly here and ripping the eyeballs out of the American taxpayer by charging $15 for SQL queries &#x2014; which is true, they do charge $15 for SQL queries. But this is part of the efficiency of automated government services. In lieu of pushing all the work onto Bob &#x2014; &#x201C;Bob, you need to go have a perhaps uncomfortable discussion with your HR department about why you need that number mid-cycle, and explain that your daughter&#x2019;s sick and you need X and Y and Z&#x201D; &#x2014; we have an entirely impersonal discussion orchestrated by computer systems at scale, and then the government pays a bill for that increased efficiency.</p><p>So that is the brief context for this thing. But as you develop in more detail in the piece, Equifax is basically the sole source for this income verification for a variety of federal and state programs. And among other implications of this, they can charge whatever those various programs will agree to for access to this number. It turns out the federal government pays, I think the number you cited is around $4 for this SQL query, and then different state governments pay $15 for the same SQL query on the same individual run at essentially the same time. There are reasons for that. But lay out the backstory for the issue you go into in the piece.</p><p><strong>Luke:</strong> I&#x2019;ll start by saying I&#x2019;m also very glad that electronic income verification exists in the world. It&#x2019;s just a way better experience for employers, and a way better experience for beneficiaries &#x2014; the government can just query a database and find out what your income is, as opposed to having you come in with your pay stubs for manual verification.</p><p>The challenge is who owns that database. We&#x2019;ve decided to pay a private company to acquire the exclusive right to income information for over a hundred million American workers, allow them to establish market dominance, and then basically pay whatever they say we need to pay for that query.</p><p>The good news is the federal government already has a relationship with businesses across the country through its tax authority. We already know what employers are paying their workers, and we know the wages workers are making on the other side of the house of government. The proposal here is not to stop doing electronic verification &#x2014; it&#x2019;s to do electronic verification inside of government, instead of paying upwards of almost a billion dollars every year to a third-party data broker. There are all sorts of interesting ways you could do that. It&#x2019;s complicated and a great problem to tackle. But I totally agree with your base case that electronic verification is the superior user experience. The question is who is providing that experience and for what price. And I think we can get a much better deal.</p><h3 id=\"insourcing-electronic-income-verification-databases\">Insourcing electronic income verification databases</h3><p><strong>Patrick:</strong> And you also mentioned the possibility that &#x2014; yes, this is a monopolistic provider, but we&#x2019;re a monopsonistic consumer. Not exactly monopsonistic, in that there are private-sector users of this database: mortgage brokers and similar. But given that we&#x2019;re buying hundreds of millions of API calls at once, we could get a better deal if we negotiate as a block, versus having the state of Kansas&#x2019;s department of something negotiate its contract, and Health and Human Services negotiate its contract at the federal level, and the state of Nebraska have an entirely different negotiation, yada yada, all ending up paying different prices.</p><p>I&#x2019;ll say in defense of the contractor &#x2014; having been a prospective contractor myself &#x2014; there is a reason for this. You gave me this book of 60,000 pages of regulations and said I have to be compliant with all of it. And it&#x2019;s a different book for the state of Nebraska versus the state of Kansas. One of the things you are paying me for is to understand the differences in those books. So even though it looks like exactly the same service at the SQL query level for the state of Kansas and the state of Nebraska, it&#x2019;s a very different service actually being offered. And different service means different prices. Or you can tell me you&#x2019;ve gotten rid of all the laws of the state of Nebraska and the state of Kansas in the last two years, and then I&#x2019;ll be able to give you the one-size-fits-all price.</p><p>But putting that argument in their mouth &#x2014; it is a pretty compelling one. And for some reform here, we need to choose to want different things. We should choose to want more efficiency, more dignity, and maybe choose to want a bit less of the regulatory state that we&#x2019;ve developed. If there ever is a reform effort, I just hope it doesn&#x2019;t become the 70th year of additional sedimentary layers, where in lieu of repealing anything, we&#x2019;re just going to build another set of patches on top. And now instead of 60,000 pages of regs, we&#x2019;ll have 75,000 pages, and those will be the last 15,000 pages that anyone needs to read.</p><p><strong>Luke:</strong> &#x201C;I promise it&#x2019;s just one more lane, bro.&#x201D;&#xA0;</p><p>[<strong>Patrick notes</strong>: This is a reference to an Internet meme popular among transit geeks, where the highway system deals with capacity problems by expanding <em>just this once</em>. Spoiler: the person making this prediction will not be negatively consequenced when it is falsified, much like every previous prediction in this genre.]&#xA0;</p><p>But on the adding-regulations-on-top point: I think quickly to the first part of what you shared &#x2014; these contractors need to spread costs into an API call as the thing that&#x2019;s being charged, right? Procurement costs, legal costs, compliance costs, and what they&#x2019;re charging for is an API.</p><p>So it might be higher than what you would expect as a private-sector procurer of those services &#x2014; totally agree. But I think it&#x2019;s the magnitude question. Them quadrupling their prices in a six-year period, I think, is pretty strong evidence that those compliance costs didn&#x2019;t radically change in that period. Their ability to extract profit did. So I think the magnitude is what&#x2019;s actually the issue. I appreciate that there&#x2019;s going to be a little premium to deal with the government, but the change over time is what points to something else.</p><p><strong>Patrick:</strong> That&#x2019;s pretty instructive and matches my experience from the contractor side, where when I was bidding $30,000 and thought I really couldn&#x2019;t go lower than that, one of the reasons to bid low and get in the door is: okay, in the second, third, fourth year, maybe you assume you&#x2019;ll be able to walk up the prices, and that no one is going to rip out the software over aggressively walking up the prices.</p><p><strong>Luke:</strong> Yeah, that&#x2019;s exactly right. There are lock-in effects that are kind of standard. And then there&#x2019;s what Equifax is doing, which is pretty spectacular price hikes across the board relative to their prices even just a few years ago &#x2014; and doing that across all those jurisdictions you mentioned, from local government all the way up to huge contracts with the federal government.</p><p>And then there&#x2019;s the redundancy across those contracts. If Luke loses his job and wants to apply for unemployment insurance, needs food benefits for his family this month, and needs Medicaid &#x2014; those three services might all be pinging the same person at the same time for the same bit of data, getting charged different prices, all to the same vendor. Which is a spectacular example of how the silos in the government technology stack also come back to bite us.</p><p>Greater transparency, government to government, would help a lot. There was a New York Times investigation into Equifax increasing prices on state governments, and it was the first time a lot of state governments I talked to had seen anyone else&#x2019;s price &#x2014; what other states were being charged by Equifax. And they were like, &#x201C;Oh my God, I&#x2019;m getting held over a barrel here.&#x201D; Just at the level of coordination across different entities, there&#x2019;s a huge amount of savings to be earned.</p><p>And this is kind of coming back to our IRS Direct File conversation &#x2014; we can insource and build a lot of this inside of government for a small upfront cost that ends up saving us a billion dollars a year in perpetuity on external pings. But it requires a little bit of investment and courage to do it the first time right. And I think it&#x2019;s not even the dollar amount that&#x2019;s scary. It&#x2019;s the kind of courage required to take on a hard new project.</p><h3 id=\"building-public-sector-competence-to-manage-modern-technical-risk\">Building public sector competence to manage modern technical risk</h3><p><strong>Patrick:</strong> The thing I hear over and over again from people in Washington, DC &#x2014; and I&#x2019;ll acknowledge that there have been efforts to change this by people like the US Digital Service and similar over the course of the last 15 years or so &#x2014; but the rollout of healthcare.gov, the Affordable Care Act website, back in 2013, was deeply scarring to the policy community in DC.</p><p>The received wisdom after the healthcare.gov rollout is that you can be a well-loved president and have your signature initiative and legacy tarred &#x2014; if those crazy geeks don&#x2019;t get their act together. And therefore: never be in the position as the government where you&#x2019;re bearing tech risk. Always have a contractor. And when things inevitably go wrong, throw the contractors under the bus, and you walk out with your reputation intact.</p><p>I don&#x2019;t think it&#x2019;s a very partisan point of view to say: we have to be good at doing what we do, as the government or as the private sector. And you can&#x2019;t be good at doing what you do without competence in software in the modern world. Therefore we should have that competence internally, and at least be able to identify it in external partners &#x2014; versus just saying, &#x201C;Well, we&#x2019;re all lawyers, we can&#x2019;t tell the C from the PHP, et cetera, et cetera. That&#x2019;s somebody else&#x2019;s problem. I&#x2019;m paying them a billion dollars a year so that they are made fun of in the New York Times and I&#x2019;m not, when this inevitably fails.&#x201D;</p><p>[<strong>Patrick notes</strong>: Previous <a href=\"https://www.complexsystemspodcast.com/episodes/fixing-government-technology-with-mikey-dickerson/\"><u>podcast guest</u></a> Mikey Dickerson was instrumental in the so-called &#x201C;tech surge&#x201D; to fix the rollout, and ended up being one of the early leaders at the US Digital Service. I continue to believe that story needs a better book-length treatment, and good news, Mikey and coauthors have a book coming out which addresses it in part later this year.]</p><p><strong>Luke:</strong> Yeah, no &#x2014; I think that&#x2019;s exactly right in defining the incentive structure around this. It takes real public sector leadership to do something here.</p><p>When I was at the White House, I had leaders who had my back when I was building something that was internal and higher risk than the normal &#x201C;cut a million-dollar contract for Deloitte to go do it.&#x201D; IRS Direct File, for example &#x2014; they needed real leadership buy-in, which wasn&#x2019;t easy to get, to go pilot something and build something new.</p><p>And I think it really requires public sector leaders &#x2014; whether it&#x2019;s governors or secretaries or mayors &#x2014; to really lean forward and say: &#x201C;We&#x2019;re going to demand public sector excellence here. We&#x2019;re going to demand that the IT stack is built in a modern way that provides dignity and efficiency for folks on the receiving end.&#x201D; There&#x2019;s kind of no way around just needing leadership who is willing to take that risk.</p><p>And it&#x2019;s one that we know the stakes of the status quo: it&#x2019;s millions of people not getting their healthcare, families not being able to go to the doctor who should otherwise be able to. It&#x2019;s sending billions of dollars out the door to bad contracts. That&#x2019;s a status quo we&#x2019;ve become comfortable with. And I think it&#x2019;s on public sector leaders to say that&#x2019;s actually a worse trade-off than trying something new.</p><p><strong>Patrick:</strong> Increasing competence and the Will to Have Nice Things in the American government will always be relevant to my interests.</p><p>I feel like we could continue discussing this for another several hours, but unfortunately don&#x2019;t have that time available on the schedule. So Luke, where can people follow you on the Internet?</p><p><strong>Luke:</strong> Sure. I&#x2019;m <a href=\"https://bsky.app/profile/lukef.bsky.social\" rel=\"noreferrer\"><u>LukeF on Bluesky</u></a>. On Substack, I&#x2019;m <a href=\"https://substack.com/@itslukefarrell\"><u>Luke Farrell</u></a>. I&#x2019;ve really enjoyed talking about this &#x2014; I could nerd out about government contracting all day.&#xA0;</p><p><strong>Patrick:</strong> Likewise. Well, thanks very much, Luke. And for the rest of you, thanks very much, and we&#x2019;ll see you next week on Complex Systems.</p>"
