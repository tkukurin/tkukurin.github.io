tions against Delve (19:53) Sponsors: Mercury | Meter (22:41) The allegations against Delve (cont&apos;d) (24:31) The response and evidence (29:38) Implausible patterns (38:22) Heuristics for truth (40:10) Sponsors: Granola | Framer (42:52) Heuristics for truth (cont&apos;d) (44:28) Naughtiness vs. fraud (51:16) A voice in the startup community (52:04) Advice for the exposed (55:36) Wrap",
    "transcript": "<p>Hideho, everybody. My name is Patrick McKenzie, better known as patio11 on the internet. I come to you today as that lowest of all creatures, a pundit on breaking news. Earlier this week, there was a startup, Delve, which was accused of fabricating hundreds of audit reports for SOC 2 compliance, a topic we will return to in a moment. This is theoretically a story about one company, but it also shines a broader light on the industry motion that is compliance, both with respect to this particular regime and a larger set of regimes which are intentionally viral.</p><p>[<strong>Patrick notes</strong>: The &#x201C;DeepDelver&#x201D; artifact is dated March 18th; podcasts are frequently recorded before being aired and so the relative timeline may be slightly different when you read this.]</p><p>I want to talk about why they are designed to be intentionally viral, what good that was supposed to accomplish for industry and society, and where there is actually the possibility of good compliance versus simply Potemkin village compliance. We&apos;ll address a little bit why I find the claims that are made in the independent journalism credible, and some of Delve&apos;s responses to the claims.</p><p>I&apos;d also like to talk a little bit broadly about startup culture and the disputed link between cowboy behavior and a sense of acceptance of naughtiness and fraud. And finally, we&apos;re going to wrap up with some opinions as to where this leaves people who might be exposed here.</p><p>So I have some mandatory disclaimers, appropriate in an episode about compliance. One, I&apos;ve been a HIPAA compliance officer in a past life. I sold the company that required me to be that; I was the person signing for personal liability under federal legislation at one point. Throughout my career, I&apos;ve been subject to many different compliance regimes in at least two nations.</p><p>All comments today are in my personal capacity and not as a representative of any other entity. This podcast, Complex Systems, has previously run ads for Vanta. Vanta is a compliance startup and might, theoretically speaking, be a Delve competitor.</p><p>As we&apos;ve discussed previously in an <a href=\"https://www.complexsystemspodcast.com/episodes/editorial-standards-and-independence/\"><u>episode about editorial independence</u></a>, advertisers do not choose what we discuss on this podcast or any of my other surfaces, and they also do not get to choose our editorial line.</p><h3 id=\"the-taxonomy-of-compliance\">The taxonomy of compliance</h3><p>So let&apos;s talk about compliance certification services. But before we talk about compliance certification services, I want to discuss briefly the taxonomy of compliance regimes. Broadly, you can split them in two. In one set of regimes is auditor-certified, where you, as the regulated or not-regulated entity, do a risk analysis informed by guidelines which are promulgated by somebody. You come up with a list of controls which are responsive to the risks in your risk analysis. And then you pass that list of controls, saying &quot;we&apos;ve done all these things,&quot; to your auditor.</p><p>And your auditor is supposed to do two things. One, they will look over that list of controls and say, &quot;Yes, it sounds like it is reasonable and sufficient for the risks that you&apos;ve identified, in our professional opinion.&quot; Two, &quot;We&apos;re going to actually test that you are <em>actually doing</em> these things that you have attested that you are doing.&quot; In the case of SOC compliance, this is over an observation period, but there are different mechanisms under different regimes. SOC 2 is an auditor-certified compliance regime. PCI-DSS is for larger entities that don&apos;t do self-certification.</p><p>[<strong>Patrick notes</strong>: PCI-DSS is the payments industry standard meant to discourage businesses from e.g. keeping around large quantities of credit card numbers in a fashion which could be stolen. A mostly forgotten part of the history of my previous employer is that it was once very novel and very difficult to charge a credit card without coming to know what the credit card number was. Stripe dot JS made tokenization the default way to interact with credit card numbers, to the relief of auditors in many places. It certainly was a breath of fresh air to me, as I was a customer/business owner at the time, rather than someone who actually loved payments industry compliance management.]</p><p>That is the other kind of regime, which is self-certification. In HIPAA, the <a href=\"https://www.cdc.gov/phlp/php/resources/health-insurance-portability-and-accountability-act-of-1996-hipaa.html\"><u>Health Insurance Portability and Accountability Act</u></a>, there is federal legislation which creates these standards under the <a href=\"https://www.hhs.gov/hipaa/for-professionals/privacy/index.html\"><u>Privacy</u></a> and <a href=\"https://www.hhs.gov/hipaa/for-professionals/security/index.html\"><u>Security</u></a> rules. But those aren&apos;t actually reviewed by anyone in the ordinary course of things. You do not have to get an auditor to sign off on the fact of your HIPAA compliance as a covered entity or a business associate of a covered entity. What you have to do is write down a list of mandatory and addressable controls and then write down how you have achieved or decided not to implement those mandatory and/or addressable controls. And then provide that to other people in the chain who might be relying on you.</p><h3 id=\"why-compliance-is-viral\">Why compliance is viral</h3><p>This providing of documents to people in the chain is very important for both of these regimes because they are designed to be viral. In the case of HIPAA, by the text of it, it covers so-called &quot;Covered Entities,&quot; which are essentially medical institutions that have the primary set of information about patients, PHI (patient health information). But medical institutions will routinely, in the course of business, do business with people who are not medical institutions. And they need to give the data to those people some of the time. This could be anything from as simple as, well, we use telephones here, and so information travels from us onto the telephone network to a customer, and we don&apos;t want that information going missing in the middle.</p><p>[<strong>Patrick notes</strong>: The verbal discussion of telephone networks elided the <a href=\"https://www.hipaajournal.com/hipaa-conduit-exception-rule/\"><u>conduit exception</u></a>, which is that a mere conduit for PHI doesn&#x2019;t require a full BAA unless they constructively possess the PHI, which is the sort of minutiae that you can only really love if you&#x2019;ve ever had to write a memo for a future bureaucrat defending your decision on whether Twilio is a conduit or not.]</p><p>There could be core parts of patient care which involve non-explicitly medical entities, or ancillary services which aren&apos;t explicitly patient care, but which will inevitably include protected health information.&#xA0;</p><p>[<strong>Patrick notes</strong>: As an example of core patient care which involves non-explicitly medical entities, you could reasonably arrange with a non-ambulance company for transportation of patients from their place of residence to the place care is provided at. That is essential to care, but the drivers are unlikely to be credentialed medical professionals, and their employer is very likely not a medical institution. They will, however, inevitably learn things about patients &#x2014; where they live, when they have appointments, and potentially their conditions &#x2014; that constitute PHI. Those facts will be written down. Every device that sees them is now in Privacy and Security rule scope. The driver&#x2019;s handwritten checklist that has Ms. Smith&#x2019;s name on it and the time he dropped her off at the cancer clinic is in scope.]&#xA0;</p><p>For example, in the process of billing, you might have any number of companies involved in totaling up the bills and doing collections, sending a physical piece of paper to a large number of people in parallel. And you need to be able to attest that those companies, which know important things on a physical piece of paper, like a cancer diagnosis, don&apos;t leak that information in ways that the American polity would find unsettling.</p><p>So in the HIPAA case, you go out to your vendors and you say, &quot;I need a business associates agreement, a BAA, from you, as a condition of doing business with us.&quot; If you won&apos;t sign a BAA, I can&apos;t work with you. If you do sign a BAA, congratulations, you&apos;re not a doctor, you&apos;ve never sworn the Hippocratic oath, but you are going to be subject to the restrictions under HIPAA, just like I am subject to those restrictions. And I am responsible for making sure you do not screw up. And you are responsible for all of your subcontractors. You need a BAA from all of them. You are now responsible for them not screwing up, et cetera, et cetera. And this chain develops.</p><p>[<strong>Patrick notes</strong>: The <a href=\"https://www.hhs.gov/sites/default/files/model-business-associate-agreement.pdf\"><u>model language of the BAA</u></a> is very similar to every one I&#x2019;ve ever personally reviewed, though in principle two contracting entities can use custom language as long at it is a superset of the obligations under the regime. The BAA will, in a very efficient number of column inches, bind you to almost the entirety of the HIPAA apparatus. Consider this paragraph:</p><p><em>Business Associate will use appropriate safeguards to prevent the use or disclosure of PHI other than as provided by the Agreement or this BAA and Business Associate agrees to implement administrative, physical, and technical safeguards that reasonably and appropriately protect the confidentiality, integrity and availability of the Electronic PHI that it creates, receives, maintains or transmits on behalf of Covered Entity. Business Associate agrees to take reasonable steps, including providing adequate training to its employees to ensure compliance with this BAA and to ensure that the actions or omissions of its employees or agents do not cause Business Associate to breach the terms of this BAA.</em></p><p>That paragraph was a few hundred hours of work for me, of which the most hilarious was locking myself in a room and &#x201C;training&#x201D; myself on HIPAA responsibilities, then signing an acknowledgement I had done so. I am extremely aware that sounds like theatre. The computer code to exempt HIPAA-flagged clients of the system from having their Rails form submissions get stored verbatim in production.log was <em>not</em> theatre. Nor was the full-disk encryption for the server with the MySQL database on it, getting a dedicated server in preference to a VPS to avoid a neighbor being in a position to snoop on activity within the machine, writing the procedure document for a server reboot requiring the operator to provide the password without which the full-disk encryption would turn the database into an extremely expensive paperweight, etc.]</p><p>In SOC 2, the chain starts with, well, there is some enterprise, and the enterprise wants to attest to SOC 2 compliance for its own reasons. And one of the things that they will say as a control is that all of our subcontractors, all of our vendors, are SOC 2 compliant. How do we know that? Because we have asked them, and we&apos;ve gotten a certification from their auditor that they are compliant.</p><p>This is viral within an industry once it happens. Even if there is a small seed set of customers that really care about SOC compliance, they ask everyone who does business with them. Intentionally, it&apos;s everyone. One is not generally in the mood to identify the most crucial five vendors and ask them for SOC compliance attestations first. One wants to demonstrate the totality of compliance here, in the same fashion that one want to demonstrate that <em>all</em> of my employees went to the training on this, <em>all</em> of my employees surrendered their laptops at the time of offboarding. And each exception to that is <em>meticulously documented</em>.</p><p>So: one goes to all vendors and asks for certification about compliance. In the midst of prehistory, this required there to be a person whose full-time job it was to email questionnaires to people asking for architecture diagrams and similar, and a copy of the report from their auditors, et cetera, et cetera. And no one loved doing that. But we in the tech industry like automating low-value-added work. Compliance is value-added, but receiving documents about compliance is not that value-added. And so what we&apos;ve done in a lot of places, in say, SaaS applications which are used by procurement, is to automate requesting an attestation of SOC compliance from the vendor.</p><p>[<strong>Patrick notes</strong>: I was most recently asked for Kalzumeus Software, LLC&#x2019;s SOC 2 compliance documentation several weeks ago. We have no such documentation. One is welcome to one&#x2019;s guess as to whether any human involved in the work I was hired to do was consciously aware that I would be asked for SOC 2 compliance documentation prior to me asking for an exemption.]</p><p>After you grease the wheels in that fashion, after the leading procurement SaaS and accounts payable SaaS, et cetera, et cetera, have an easy check-this-button to get SOC compliance attestations from your vendors as a condition of them receiving money from you, it sort of supercharges the coefficient of virality for this within the ecosystem. And so this is why SOC went from basically a thing in the Fortune 500, but not really seen by many people, to startups being asked for this routinely the time they do their first enterprise deal, where their enterprise deal might not be a true enterprise deal with the likes of Ford or similar, but it might be a $15,000 pilot with another startup.</p><p>And then the team gets asked, &quot;By the way, are you SOC 2 compliant? We need everybody to be SOC 2 compliant.&quot; The IT security team is going to review your questionnaire. The startup founder says, &quot;Yeah, SOC 2 compliance. I totally understand what that is.&quot; And they Google it and find a firm that says that we will be able to deliver SOC 2 compliance quickly and for cheap. And that creates the market need for a firm like, for example, Delve.</p><h3 id=\"defense-in-depth\">Defense in depth</h3><p>But before we get into that, what are controls anyway? And why do we care about them? There&apos;s a saying in the engineering community that &#x201C;every regulation is written in blood.&#x201D;</p><p>[<strong>Patrick notes</strong>: I am most familiar with this saying in the context of aviation safety but it has metastasized like any good bon mot, and it was the subject of a lecture on engineering ethics given to computer science students when I got my degree two decades ago.&#xA0;</p><p>The professor made an enduring impression in observing that many people do not understand that computer code can kill people. He then discussed the Patriot missile system timekeeping bug (subdecimal precision in floating point numbers gets more fuzzy as the numbers get larger and so Patriot missiles would get less accurate the longer they went between reboots). Then we went into the real meat of the lesson, which was probably my single most useful sixty minutes of my education: &#x201C;Write a memo designed to kill a project before it kills a person.&#x201D;</p><p>I <em>bristle</em> when I am told that computer engineers don&#x2019;t get a well-rounded liberal arts education with courses on ethics like paragons like lawyers, politicians, and health insurance MBAs do.]</p><p>And the less evocative version of that saying is that we don&apos;t make up controls entirely randomly. We look at failures that have happened in the past and in the postmortem identify what would have prevented that failure. And for failures which are sufficiently widespread, we say, you know, everybody needs to anticipate the postmortem in the future about this cause of failure, and adopt sensible practices upfront.</p><p>SOC 2 is the <a href=\"https://www.aicpa-cima.com/resources/landing/system-and-organization-controls-soc-suite-of-services\"><u>System and Organization Controls</u></a>. That&apos;s what the acronym stands for. And it is intentionally not designed to be a thoroughly personalized, bespoke, boutique analysis of what the particular security considerations are in your firm. A cryptocurrency firm, which is worried about someone grabbing the private keys, versus a SaaS company which has the ability to upload and download arbitrary documents and is worried about people hosting horrific images on their servers, versus a credit card processing company which is worried about people stealing the money, all have very different considerations under the hood.</p><p>And SOC 2 says, &quot;Yeah, <em>we know</em>. But there is some level of routine competence in managerial capitalism that has computers involved in the Current Year. And we want everyone to say that they are at least as good as that <em>very low bar</em> for routine competence.&quot;&#xA0;</p><p>One example of a thing that we&apos;ve seen in many, many postmortems over the years suffices. There was private information and it ended up on a hard drive which was sold on eBay to somebody. How did this happen? Well, the proximate cause of it happening is that we issue people a laptop for them to do their jobs. And that laptop will, in the ordinary course, get private information saved to it. And then someone left our employment and kept the laptop and sold it. And so the information ended up on eBay.</p><p>[<strong>Patrick notes</strong>: For a real-world example of this exact failure mode at scale, see Morgan Stanley&apos;s <a href=\"https://www.sec.gov/news/press-release/2022-168\"><u>data center decommissioning breach</u></a>, which cost the firm over $160 million in aggregate fines and settlements after a vendor sold unwiped hard drives containing PII for 15 million customers at online auction.]</p><p>There is a concept of layered controls here. One, when someone leaves your employment, you should probably get the laptop back. But <em>even if</em> you do not successfully get the laptop back, there should be an automated linkage between your HR processes and your IT processes, such that HR deciding to offboard someone should result in IT deterministically, within a matter of hours, decredentialing them on all systems that they can touch. But that might not be enough. There might still be information saved on that laptop that has left your control. And so we&apos;ll have <em>another</em> layer here. We want all of your laptops to have full disk encryption, so that if it is sold on eBay, someone not knowing the password of the previous at-one-time-legitimate user of the laptop will not be able to access anything that&apos;s on the disk.</p><p>Even though the disk is no longer in your physical control, there is no reasonable expectation of disclosure as a result of that. But <em>that is still not enough</em>. We&apos;re going to add another layer under that. We&apos;re going to say, even if we have full disk encryption on, and even if we have successfully recovered most of our laptops, and even if we know we&apos;ve disabled most of them after leaving our service, there might be some information that escaped all these things. Well, we want to bound what that information was. So we are going to have extensive logging within our internal systems to determine when someone downloads a CSV file from our internal systems onto a laptop, so that we can say, even if Bob&apos;s laptop is in the wind somewhere and controlled by a hostile entity, I know that the worst that could have happened is there are 637 rows that were generated in February 2025 on that laptop. I know by construction there are no rows generated in 2026, because if those rows existed we would have logs.</p><p>This defense in depth is critical to the notion of controls. What is an auditor doing for you, really? One thing they&apos;re doing is they are listening to that defense in depth. And they&apos;re saying, &quot;OK, all of that sounds very plausible. Now, let&apos;s check your work. So you&apos;ve represented to me that you have total visibility of people who are leaving the firm. How many people left the firm during this engagement window?&quot; OK, 117. &quot;All right, I&apos;m going to select rows 24, 37, 65, and 73 to 78 inclusive from whatever spreadsheet you&apos;re looking at. Now tell me: how many of those laptops did you recover? And what was the time between the person leaving the firm and the time that you recovered the laptop, for each of them?&quot;</p><p>And we are going to search laptop by laptop in my self-identified sample for what happened. And in fact, at this point in the engagement, there is often a brief silence and then some terrified Slack messaging. And that is one of the value propositions of having independent CPAs evaluate these things. Because we don&apos;t simply want someone to check the box on the fact of, &quot;Yes, I get people&apos;s laptops back when they&apos;ve quit my firm, obviously.&quot; We want someone to actually check, because it actually matters whether private information is available for sale on eBay or not.</p><h3 id=\"accountability-and-liability\">Accountability and liability</h3><p>So what are some design features of these regimes? One of them is that they are trying to avoid a corporation being used as, to use Dan Davies&apos; term, an <a href=\"https://www.amazon.com/Unaccountability-Machine-Dan-Davies/dp/1788169549\"><u>accountability sink</u></a>. [<strong>Patrick notes</strong>: Dan Davies has <a href=\"https://www.complexsystemspodcast.com/episodes/dan-davies-organizations-fraud/\"><u>previously discussed</u></a> this on Complex Systems.]</p><p>So they will intentionally try to get named humans to sign up for liability for what are, morally speaking, the actions of their employer. So when I say I was a HIPAA compliance officer, that doesn&apos;t just mean that part of my job was writing up a risk analysis and implementing firewall rules to get to our servers, although that was part of the job. (I wore a lot of hats at that company. All of them, really.) What it really means is I, Patrick McKenzie, swear to everybody relevant, including the hospitals we are working with, and including, ultimately, the federal government, that yes, <em>the buck stops with me here</em>.</p><p>There is, as far as I know, no SOC 2 compliance officer that has to get identified. But one requirement of SOC 2 is that the board has to be involved. And during your board meetings, you are going to have the board adopt certain policies as policies of the company. And that is not simply a tick-box requirement.</p><p>[<strong>Patrick notes</strong>: See CC1.2 of the <a href=\"https://www.aicpa-cima.com/resources/download/2017-trust-services-criteria-with-revised-points-of-focus-2022\"><u>AICPA&#x2019;s standards</u></a>.]</p><p>It&apos;s designed to say that, if hypothetically there was a cowboy controls environment, and hypothetically, people were saying things in a fraudulent fashion, and saying, &quot;We have this policy,&quot; where that policy wasn&apos;t in fact actually descriptive of how the company worked, and if everybody was looking the other way, we look at you, board members. And we see you are more durably connected to this company than line-level employees. You are wealthy and sophisticated, and you knew or should have known the truth or falsity of the representations that you made in a board meeting, and you are signing up for liability if any of those representations are obviously false.</p><h3 id=\"the-allegations-against-delve\">The allegations against Delve</h3><p>So let&apos;s turn to Delve specifically. Delve was in Y Combinator in the <a href=\"https://claude.ai/chat/1f7d70ae-a99d-4f62-863b-b7819d9776f5#:~:text=https%3A//www.ycombinator.com/companies/delve\"><u>winter 2024 batch</u></a>. It was founded by <a href=\"https://techcrunch.com/2025/07/22/21-year-old-mit-dropouts-raise-32m-at-300m-valuation-led-by-insight/\"><u>two MIT dropouts</u></a>. They raised a <a href=\"https://www.webwire.com/ViewPressRel.asp?aId=333210\"><u>$3.3 million seed</u></a> and then a $32 million Series A at a $300 million valuation, led by Insight Partners, in July of 2025. [<strong>Patrick notes</strong>: Same TechCrunch article cited for the MIT dropout claim.]&#xA0;</p><p>It has been advanced that the founders are Forbes 30 Under 30 alumni, but I did not verify that as I do not consider Forbes 30 Under 30 a positive signal.</p><p>Anyway, the pitch is that AI agents are going to compress months of compliance work into two days. And they say in many places in their marketing copy that you&apos;ll be able to achieve compliance in only 10 hours of work by the team.</p><p>[<strong>Patrick notes</strong>: As of this writing the Delve home page cites, quote, &#x201C;days not months.&#x201D; The following is taken from a <a href=\"https://web.archive.org/web/20250610093406/https://delve.co/\"><u>Wayback Machine snapshot of June 2025</u></a>. I believe the above gloss is substantially representative of their marketing.</p><figure class=\"kg-card kg-image-card\"><img src=\"https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/2026/03/data-src-image-5595018c-2597-4c0c-82ef-b9bfefe5adba.png\" class=\"kg-image\" alt=\"Delve into compliance theatre\" loading=\"lazy\" width=\"1148\" height=\"1080\" srcset=\"https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/size/w600/2026/03/data-src-image-5595018c-2597-4c0c-82ef-b9bfefe5adba.png 600w, https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/size/w1000/2026/03/data-src-image-5595018c-2597-4c0c-82ef-b9bfefe5adba.png 1000w, https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/2026/03/data-src-image-5595018c-2597-4c0c-82ef-b9bfefe5adba.png 1148w\" sizes=\"(min-width: 720px) 720px\"></figure><p>]</p><p>All right, so I want to say something nuanced right now. We&apos;re going to discuss fraud allegations in a few moments, but assume the fraud allegations haven&apos;t happened. Assume that you are a responsible professional who has been in the room through real security review processes in the past. As you hear the words, &quot;We are going to achieve compliance in 10 hours,&quot; you know what you&apos;re buying if you buy that pitch. And what you&apos;re buying is not a robust process with a lot of professional time involved. However, do I believe that all customers knew what they were buying? No, I don&apos;t, and the mechanism is fairly simple.</p><p>Everyone has to learn everything under the sun. I happen to have the benefit of being in the tech industry for more than 20 years and have a particular interest in things like compliance controls. And I am not automatically representative of every YC founder who is trying to do their first enterprise deal ever, where that enterprise deal might be $15,000 and they just received an email saying, &quot;Do you have a SOC 2 compliance story? We really need that to move forward here.&quot; And that person might not realize that there is any intellectual effort involved at all here. They might think, &quot;Oh, yeah, simple tick-box requirement, right?&quot; And they might be told by someone, &quot;Yeah, simple tick-box requirement. Check here, do 10 hours of work. Most of it&apos;s kind of boring. And it&apos;ll cost you a bit under ten grand.&quot;</p><p>They&apos;d say, &quot;OK, that sounds reasonable. There are all sorts of things in life that are just these little annoying tick-box toll gates in doing business. My registered agent, I understand my registered agent does basically nothing for me and charges $150 to $300 a year for that. And it&apos;s just this little tick-box requirement I need because I want to stay doing business in California or Illinois or whatever state you happen to be doing business in.&quot; That is a <em>correct read</em> on registered agents. It&apos;s just this little tick-box requirement, one of these grifts under capitalism. You pay the check and you move on.&#xA0;</p><p>[<strong>Patrick notes</strong>: A registered agent is a state requirement that you have a named person (or corporate person) at a stable address who can predictably receive official notices and service of process for your business during business hours. One is required to have one to do business in most states. I pay a few hundred dollars a year, in two states, for my LLC&#x2019;s. Every year they do the same thing for me: confirm that &#x201C;Yep, nobody sued you this year, so we didn&#x2019;t speak to any process servers on your behalf. Wonderful, everyone got what they wanted out of this. Here&#x2019;s the invoice for the coming year, and remember, you legally <em>must</em> buy this service.&#x201D;]</p><p>And so you might think that about compliance services. And they&apos;re a bit of a horse of a different color. They don&apos;t verify everything under the sun. They are not the one-stop shop for your entire security posture. But they are supposed to document important things that other people will rely on. It&apos;s kind of the designed nature of this mechanism.</p><p>So, there were recently <a href=\"https://deepdelver.substack.com/p/delve-fake-compliance-as-a-service\"><u>allegations made about Delve</u></a>. I&apos;m going to describe those allegations as being an unsigned work of investigative journalism. I say investigative journalism because investigative journalism is an act and not a priesthood. You don&apos;t have to be anointed by the guardians of the tradition at the New York Times to do it. You just have to go out into the world and develop representations of facts, and then ideally ask companies for comments.</p><p>The independent journalism has been alleged to be from someone who is competitively involved with Delve. Having read the four corners of the document, and some of the social media chatter about it, them being in some way aligned with a competitor would not surprise me at all. And I don&apos;t care. The claims are the claims. And the claims are either true or they&apos;re false.</p><p>And Delve has <a href=\"https://delve.co/blog/response-to-misleading-claims\"><u>released a statement</u></a> about the claims. So what are the claims?</p><p>The claims essentially allege that Delve was doing Potemkin compliance. That it sold customers a vision of: &quot;We&apos;re going to be your AI-native one-stop shop for compliance under the SOC 2 framework, or whichever framework you care about. And we will ask you all the relevant questions in a way which minimizes the amount of time your team needs to spend on them. And then we will kick this off to a US-based auditor who is going to do the full audit process. And you will get through very quickly with minimal execution risk. And then you will get the document which you need to pass to your counterparties to get those enterprise deals.&quot;</p><p>And the journalism alleges that Delve pre-populated substantially verbatim-identical reports for various companies, that the auditors were in fact not US-based, that they were Indian certification mills, that the auditors were in fact not doing independent audits, but were doing substantially templated, substantially identical audits, that the Delve software would suggest so-called &quot;remediation&quot; and controls to people, and then after one click of a button, immediately upgrade those controls to the assertion on a Delve-hosted compliance page that this control is actually in place. So, for example, full disk encryption: click &quot;yes&quot; that you&apos;re doing full disk encryption, and we say you&apos;re doing full disk encryption, even if the full disk encryption is not actually happening.</p><p>The auditors were not actually doing any analysis. They were not asking, &quot;OK, tell me how many employees you offboarded during the observation window, and I&apos;m going to select my own rows from that spreadsheet, and you&apos;re going to do a deep dive into each of them for me.&quot; They were accepting verbatim the pre-proposed audit report from Delve and just adding their signature to it.</p><h3 id=\"the-response-and-evidence\">The response and evidence</h3><p>These are some pretty serious claims, and there are many more in the document. Delve issued what those of us in the PR industry might call a non-denial denial, where they say this is scurrilous stuff made up by some anonymous person who might be motivated by competitive interests.&#xA0;</p><p>[<strong>Patrick notes</strong>: Out of scrupulosity, I will note that Delve characterizes the post as misleading and that it contains claims which are inaccurate. I stand by my characterization of their statement that they do not materially dispute the factual accuracy of the claims. I am aware this characterization is <em>extremely robust</em>.]&#xA0;</p><p>But they don&apos;t actually dispute some of the load-bearing claims there. The independent journalism alleges that the reports are substantially identical, including cases where Delve knew or should have known that the facts underlying are not substantially identical. And Delve doesn&apos;t say the reports were not, in fact, substantially identical. They say the reports weren&apos;t verbatim identical, which, man, that&apos;s a low bar for independent auditor reports, right?</p><p>[<strong>Patrick notes</strong>: Out of scrupulosity I will quote Delve&#x2019;s response verbatim here and let readers draw their own conclusions:</p><p><em>The Substack inaccurately said Delve uses templates across the majority of reports. This is misleading. Most modern compliance platforms allow clients to adopt a fixed control set based on widely accepted standards set forth by the AICPA, ISO, and more. As a result, the overlap in structure and language across reports is expected. Moreover, Delve uses templates provided by auditors, but we do not prescribe final reports.</em>]</p><p>They don&apos;t dispute that the report was written before any collection of facts. And what they instead say is, &quot;This is routine in compliance. These are templates and they are pre-filled, and nobody writes a bespoke report anymore.&quot; So that&apos;s true-ish. If you run a security consultancy, you make heavy use of templates. If you run as a certified public accountant, you make heavy use of templates. Boilerplate is boilerplate for a reason. However, what you don&apos;t do is write the entire thing before looking at any of the actual facts of the matter. That&apos;s an alarming statement.</p><p>And if they&apos;re innocent here, there should be replete evidence in the world that the claims are false. And identification of that evidence should be relatively easy, such as: &quot;OK, they are misinterpreting the business process here. No one actually sees the draft report until the full evidence-gathering process is completed. Then the evidence alone goes to the auditor, and the auditor does some sort of tick-boxing exercise: &apos;Yes, this satisfies my concerns with the gaps in X, Y, and Z. And we know these are legitimate because, one, these firms are legitimate, here&apos;s a sampling of them. And two, the average timeline for the auditor to go through this involves 37 auditor hours, which we have access to via the magic of SQL.&apos;&quot; Yeah, they didn&apos;t say that.</p><p>They did not address the location of the auditors at all, which matters. When you say things which are untrue to induce someone to do business with you, <em>that&apos;s fraud</em>. And I believe the representation that Delve routinely said that their audit firms were US-based. I do not believe that their audit firms were US-based. I think that it is risible to claim some of the things that they are reported to have claimed and also claim that your firms are US-based. And that&apos;s no particular knock on India. I&apos;ve done a lot of work with firms based in India over the course of my professional career. But you can&apos;t lie about things like this.</p><p>And so one thing which is a signal flare visible from space for yours truly: Delve, in the context of a commercial negotiation, was reported to have said [<strong>Patrick notes</strong>: the following is a paraphrase] &quot;OK, our price is some single-digit thousands of dollars. But if you want a discount, we can find you a discount. And if you want a sweetener on top of the existing independent audit and the software services and everything that we&apos;re delivering to you, and the handholding from our customer success reps, we will also throw in 200 hours of pen testing,&quot; at a single-digit-thousand-dollar price point.</p><p>200 hours of pen testing, if you&apos;re securing it from a US-based professional at anything like professional rates, is already a mid-five-figure engagement. It can&#x2019;t be done at single-digit thousands. It certainly cannot be done as a commercial inducement included in a deal at no extra cost, like a box of donuts. [<strong>Patrick notes</strong>: My knowledge of routine pentesting rate cards across a spectrum of firms comes discussions with Thomas Ptacek over the years, and if it is dated, it is because those rates have risen.]</p><p>The journalism alleges that the pen testing was not actually conducted, which sounds <em>quite credible</em> to me. And Delve makes no mention of this in their response. So acceptable responses would have been: one, &quot;As a business process, no, we never do offer people hundreds of hours of pen testing from a US-based professional as an inducement to do a five-figure contract.&quot; Two, &quot;We have occasionally offered that as an inducement, but it would only be on our larger enterprise contracts, and it&apos;s billed out at reasonable professional rates for the services.&quot; Or three, frequently in company PR: &quot;Obviously, that could not happen in a way which was above board. We are undertaking an investigation to see whether any of our sales representatives have said something to that effect, and we&apos;ll make appropriate changes in our business practices based on what we learned in that investigation.&quot;</p><p>What they say is, like, we didn&apos;t do any of that. But they don&apos;t deny with specificity the various claims that are made. And they essentially make no representation that they will go forward to improve their business in the future, other than continuing to respond to what they describe as guerrilla attacks.</p><h3 id=\"implausible-patterns\">Implausible patterns</h3><p>So some of the things in that 10,000-word investigation, which you should probably read, that jump out at me. They say that out of 494 examined reports, which were examined because they were leaked last December and ended up in a linked spreadsheet, they&apos;re 99.8% identical boilerplate. The auditor conclusions and test procedures are pre-populated even before the firm uploads their network diagrams or descriptions of the company or other information that you would need to inform your audit approach with regards to the things. And so you can&apos;t sensibly describe, like, &quot;OK, the company is using cloud services, and AWS is different than Google, which is different than Microsoft Azure, which is different than some of the new cool-kid startups.&quot; And so I will have different procedures for AWS versus all these things, or a different set of scripts that I use to profile what a customer&apos;s actual usage of AWS is, because it&apos;s a ridiculously complicated set of products. You really need to know whether they&apos;re using AWS or Azure before you write the procedures which are designed to test those things.</p><p>And they said, no, procedures first, and then tell us what you&apos;ve actually got, which sounds insane. The journalist says, over 259 Type II reports, that the auditors consistently find zero security incidents over every client over the period, and that this is pre-filled. There&apos;s never a personnel change, there&apos;s never a customer termination, and there&apos;s never an insurance claim. And that just strikes the journalist as odd.&#xA0;</p><p>This strikes me as odd, too. Procedurally saying, like, &quot;No one left your service in the course of a three-month observation window,&quot; writing that before the three-month observation window actually happens, that&apos;s an alarming set of facts, right?</p><p>But just on base rates, people leave startups all the time. Even at the best-operated firms in the industry, there&apos;s roughly an 8% regretted attrition rate, higher than that in early-stage startups, which you would assume their customer base skews to. And so, if you assume things like, all right, probably 10 to 20 people on the average team, 250-plus companies looked at, and we see no departures over a three-month period. But on base rates, we would have said, &quot;OK, like 5,000 people in the employed set, and then, all right, times 8% would be very generous to them.&quot; That already gets you to: we assume that there are 400 departures a year over this universe. And so in a three-month period, we expect to observe plus or minus 100 departures. And you&apos;re saying you observed zero? Really? CPAs are swearing to this? That is facially not credible.</p><p>[<strong>Patrick notes</strong>: Regretted attrition is an unfortunate HR term-of-art for &#x201C;Someone quit, but we&#x2019;d happily have them in that chair right now.&#x201D; Non-regretted attrition is the bloodless counterpart to describe firings, managed departures subsequent to the performance improvement plan, buyouts, and the American versions of <a href=\"https://japanintercultural.com/free-resources/articles/oidashibeya-japanese-purgatory/\"><u>oidashibeya</u></a>, where you invite someone to take that next step in their career journey at the earliest convenient moment.]</p><p>Another thing the report alleges is that Delve would let people sort of mix and match on which compliance regimes they want, which is a little weird to this former HIPAA compliance officer. They&apos;re not the same regime. Some parts of the controls that they have rhyme with each other, but they have very different intellectual underpinnings. SOC comes from a voluntary industry standard. HIPAA, the requirements are literally written into law and then modified by regulatory decisions and similar later. And so even though you think, &quot;OK, HIPAA is self-certification, SOC requires an auditor for it, so maybe HIPAA is like a strict subset of SOC,&quot; that&apos;s just not true. And so it is very alarming that this business process would get developed. The independent journalist mentioned something to the effect of they don&apos;t think this team is actually domain experts with respect to compliance, and I don&apos;t know if I&apos;m a domain expert with respect to compliance, but, having been on the hook for it before, yeah, this doesn&apos;t look like something that would be developed by someone who is a domain expert on compliance.</p><p>Also, fundamentally, for SOC 2 the deliverable is you want a PDF that says this CPA signs off on me being SOC 2 compliant, and that PDF is doing some load-bearing work, looking like the kind of PDF that someone expects to get. But it&apos;s supposed to have some actual information in there, with claims about it. For HIPAA compliance, there is no specific form of the PDF. The only document that has a specific specified form is the business associates agreement, the BAA. But the specific controls that you identify in the course of becoming HIPAA-compliant are actually important. The covered institution, hospital or similar, which is giving you information, needs to know: &quot;OK, with regards to diagnosis, where does that go? Where does it live? Who handles it other than you?&quot; And your response to them should responsibly say those things. Simply saying, like, &quot;Yes, HIPAA-compliant: Checkbox Achieved&quot; doesn&apos;t give them the information they need to do their jobs and make the appropriate certifications to the federal government, so that they do not get sent to prison for willful noncompliance.</p><p>And we&apos;ll talk a bit about the observation period. The observation period is: OK, you identify in advance what your risks are, what your controls are, and then for the period of that observation period, we&apos;re going to be watching you closely as your trusted, independent, non-biased evaluators. And we&apos;re going to see whether these controls actually perform the function. So in Delve&apos;s marketing communications, they identified that typically they would want a three-month prospective window for an observation period, which sounds a little bit aggressive, usually in the industry it&apos;s six to 12 months, but OK, we&apos;ll roll with it, a three-month observation period. The piece seems to allege that they were doing retrospective observation periods where, OK, &quot;You signed on the dotted line with us, and we will forward you to the auditor, and then the auditor will ask questions about what happened in the past three months.&quot;</p><p>That&apos;s a crazy design. This is a trust-but-verify exercise, and the verification is important. The fundamental conceit of an observation period is we know that there are some actors in the world that are capable of saying the right things but either choose not to do the right things, or more likely simply have competence issues. And part of the purpose of the auditor is to catch competence issues and be able to give an opinion very confidently on whether this firm is sufficiently competent to do a very simple thing, get the laptop back every time, or be able to explain why it couldn&apos;t happen, and actually check that they got the laptop back. If you simply say, &quot;In the last three months, yeah, I got all the laptops back,&quot; then there&apos;s no meaningful check there.</p><p>The firm that is being audited already knows all of the facts that they&apos;ll be audited from. The logs aren&apos;t trustworthy because they might be backdated or created with the specific design of passing the audit, et cetera, et cetera. The important part about the examination window is we mutually agree that there is a set of procedures that will be done in the future, and then you are going to be adversarially tested on that. And this, by the way, is one of the many pieces of disconfirmatory evidence that would be abundantly available in the universe where these were real audits. There&apos;s a back-and-forth between the auditor and the auditee. Things go wrong in the real world, and there&apos;s a paper trail of things going wrong.</p><p>The journalism says that Delve made verbal promises that no one ever fails an audit. Oh boy, that is an alarming statement if you&apos;ve ever been audited for anything. Even if it&apos;s true, even if the selection effect here is like, &quot;Only the best of the best, most compliance-oriented people choose to buy their compliance reports for $6,000 from us,&quot; you would never say out loud, or you would strongly discourage people from saying out loud, &quot;Nobody ever fails,&quot; because the possibility of failure is really important and load-bearing.</p><p>And if this business were operating as described, you&apos;d be able to point back to paper trails here where, &quot;No, these are real audits. The average audit generates 32 back-and-forth emails between the auditor and the auditee with regards to laptops that went missing. This person passed away suddenly. We couldn&apos;t figure out where their laptop was. But we assess minimal risk here because X and Y and Z compensating controls.&quot; And the auditor documents that fact in the write-up. It says, you know, &quot;Of the 117 laptops we expected to be recovered, there were two that were not recovered. We&apos;ve received information from the firm with respect to those two laptops and do not believe there&apos;s a material risk of compromise with respect to them, given the totality of the controls environment.&quot; That would be the kind of thing you would expect to see in a real audit report. And you&apos;d have voluminous real audit reports where you could say, &quot;This sort of back-and-forth actually happened.&quot;</p><p>[<strong>Patrick notes</strong>: I once accidentally gave a Goldman Sachs alum cause to write, in a deliverable to his client, that the $24.95 misstatement of revenue in my business records was not material (and presumptively not a reason to back away from the commitment to purchase my business). This was on a business sold for the price of a nice car.]&#xA0;</p><h3 id=\"heuristics-for-truth\">Heuristics for truth</h3><p>Why do I find these claims credible? I&apos;ll say I haven&apos;t independently evaluated them, but the claims are the claims. And there are certain heuristics that one uses as someone who reads a lot on the internet, this is likely to be true versus this is likely to be nonsense. So one heuristic that a lot of people use is: was an AI involved in writing this? And it appears to me that there are several tells within the document that an AI was definitely used in assisting in writing the document. I find AI to be a wonderful tool. If you had simply given an AI the task &quot;write a takedown of one of my competitors,&quot; it can&apos;t produce all the evidence that is in the document, which is externally coherent. And it can&apos;t easily produce, at least not in the current state of the art, the level of coherence between the domain expertise brought by the author and the ways in which something would be noncompliant if it were being run in a ridiculously noncompliant fashion.</p><p>They allege the existence of actual reports that are in a spreadsheet, and they allege material facts about those, their level of similarity, that they&apos;re completely templated, that there are typos, et cetera, et cetera. If these aren&apos;t true, it&apos;s relatively easy to say that they are not true. In a court of law you need a positive showing of evidence to establish this. In the court of the Internet, if you allege facts that are either true or they&apos;re not true, and the other side resorts to character assassination rather than explicitly saying that the things they are claiming are facts are not actually facts, my heuristic is that those claims are likely to be the honest-to-God truth.</p><p>A sufficient number of those claims being honest-to-God truth is dispositive here. And there&apos;s always a bit of a &quot;what&apos;s in it for you&quot; question: are your financial incentives dictating the truth or falsity of the statements you&apos;re making, which is brought up as one method of character assassination. I find it incredibly plausible that a competitor might somehow be involved in either the production of this journalism, or the dissemination of it on social media or on the Hacker News thread or similar. And I don&apos;t care. The claims are the claims.&#xA0;</p><p>In the maximally formal New York Times investigative journalism, yeah, sources always have an agenda. That&apos;s how they come to be sources. They&apos;re leaking against the interest of someone, in the other political party, or in their department, so that they can get a promotion, so that they can clear their conscience, whatever. They&apos;ve got an agenda, sure. But the journalism is ultimately responsible for making claims about the universe we live in, and those claims are true or they are false.</p><p>There are many claims that are advanced in this bit of journalism and they have the ring of truth to me. And a sufficient number of those claims being actually true, I think, is dispositive with regards to questions like: is Delve committing scaled acts of fraud? And on the evidence before us, I actually do believe that Delve is committing scaled acts of fraud, although the responsible professional in me would say, again, everyone is entitled to a trial by their peers, et cetera, et cetera, before being convicted of an offense. Unfortunately, somebody might actually find themselves in front of a jury of their peers.</p><h3 id=\"naughtiness-vs-fraud\">Naughtiness vs. fraud</h3><p>I want to talk a little bit about startup culture because it sometimes gets invoked in discussions like this, and often by critics of startup culture who think that we&apos;re all &quot;moving fast and breaking things.&quot; So there is a real celebration in some circles, YC, through PG&apos;s writings, et cetera, of naughtiness.&#xA0;</p><p>And naughtiness is something of a <a href=\"https://paulgraham.com/founders.html\"><u>term of art</u></a>. You know it when you see it. And basically, the notion is that there are, like, two kinds of rules in the world. There&apos;s the rule that is an actual moral law that establishes some sort of minimum threshold for behavior, that it is really important that we all follow. And then there&apos;s the other kind of rule.</p><p>And naughtiness is, with respect to the other kind of rule, you know, do what you can to get around it, maybe like doing the pantomime of complying with it, maybe complying in the least-brain-sweat-required fashion, maybe saying something which is literally true but maybe skirts around the intent of the rule, et cetera, et cetera. And you don&apos;t do those for, quote-unquote, the &quot;real rules.&quot; You don&apos;t defraud your investors. You don&apos;t harass your employees. You don&apos;t make a product which is unsafe to use in a fashion where the lack of safety would actually be load-bearing.</p><p>And so people in startups will say, &quot;When we say &apos;move fast and break things&apos;, which is something that even Facebook doesn&apos;t say anymore, we&apos;re talking about, like, sharing cat photos rather than airplanes.&quot; That kind of work operates under a very different set of expectations, and everyone knows this. And we can be contextually aware of these things, and understand there are gray areas. And I think I&apos;m a person with a reasonable level of contextual awareness, and I understand there are gray areas, and I understand that there are some areas of compliance which are theater. And I think everyone involved in compliance understands that it&apos;s theater in some fashion.</p><p>And sometimes that theater is designed to require a performance from the people who are engaged in it. So you can think that it is theater. You can whisper that among yourselves. You can joke about it. But you have to perform ingratiating compliance. It&apos;s a performance of class, and certainly you need to make the written record align with the ingratiating performance. But you also have to make any observable truth about the unwritten record sufficiently ingratiating. So if you&apos;re in the financial industry, and you&apos;re in your mandatory compliance thing that everyone gets told they must attend, regardless of whether they&apos;re the CFO or a teller, and you read a very scary list of precedents of large fines and criminal sanctions and similar from your compliance officers, and someone cracks a joke, the trainer needs to stop and say something very serious like, &quot;This is not a joke. This firm takes compliance very seriously. We always take compliance very seriously here. And if you treat it as a joke, you could be sanctioned individually. We could be sanctioned institutionally. The most likely outcome is very large fines, but they could do anything to us, up to and including closing this firm.&quot; And indeed, that sometimes happens.</p><p>And indeed, the performance of ingratiation in compliance does get invoked in actual enforcement actions. For example, take a look at Binance, where Binance&apos;s chief compliance officer made any number of very outlandish statements in writing, in what he probably considered water cooler talk. &quot;If you&apos;re trying to launder money, come to Binance. We&apos;ve got cake for you.&quot; That isn&apos;t an exact quote, but it is an extremely close paraphrase. And yeah, if we&apos;ve got cake for you, <a href=\"https://www.justice.gov/criminal/media/1327931/dl?inline\"><u>DOJ has an indictment </u></a>for you later. Although subsequently <a href=\"https://www.bbc.com/news/articles/cly1qrl9l1qo\"><u>forgiven</u></a>, don&apos;t ask me why.</p><p>[<strong>Patrick notes</strong>: The exact quote, from<a href=\"https://www.justice.gov/opa/pr/binance-and-ceo-plead-guilty-federal-charges-4b-resolution\"> <u>DOJ court documents</u></a>, is: &quot;We need a banner &apos;is washing drug money too hard these days - come to binance we got cake for you.&apos;&quot; This was written by a compliance employee, not the Chief Compliance Officer as I said in the recording; though the CCO, Samuel Lim, separately paid a $1.5M fine in the same resolution. Samuel Lim&#x2019;s immortality in future Compliance training sessions was secured by, quote, we are operating as a fking unlicensed securities exchange in the USA bro, endquote.]</p><p>So as someone who is a reasonably calibrated professional in tech, yeah, I understand seeing some cowboy behavior in early-stage startups. And your MVP has some rough edges on it. You will not have the same level of internal expertise or gating with respect to security procedures in week six as you will in year six. Sure, understand all of that. But you can&apos;t lie to people in ways that induce them to transact with you. That&apos;s fraud. That is the definition of fraud. That is the moral center of why fraud is bad. And this particular kind spends people&apos;s lives, reputations, and honor without their consent.</p><p>We talked a little bit about how the compliance officer is putting themselves intentionally on the hook for decisions which might be diffused within their organization. This is a designed part of these compliance regimes. Like, I want an actual human whose neck to wring if this goes off the rails. The detail about board resolutions and faking board minutes is somewhat alarming to me because the board are offering up their necks to wring as part of these compliance regimes. The buck stops with them. And we as a society have decided it should be the board members here, because, again, the board members are relatively socially established. They know what they&apos;re signing up for. They have, hopefully, some level of incentive alignment with the company. If the company does well, they do well. And if the company doesn&apos;t do well, they&apos;ve probably lost money on their investment, or at the very least, lost a kind of cushy gig as a board member where you show up to one meeting every quarter and get paid $250,000 a year.</p><p>They&apos;re designed to have a level of probity and acumen, and a second set of eyes that is independent from management in some fashion, sometimes observed in the breach. [<strong>Patrick notes</strong>: It is the routine practice in the tech industry to have many some board members who are either also senior management or known to be so socially close to senior management as to not be materially independent checks on them. This is the sort of thing that gives corporate governance professors conniption fits. Myself, eh, I largely think that if a unicorn is rotten the board will learn about that fact from the indictment, no matter how many of the nation&#x2019;s leading lights you stack it with. Kissinger didn&#x2019;t kill Theranos; Carreyrou did.]</p><p>So if you&apos;re signing your board members up for minutes of meetings that did not happen, you&apos;re potentially signing them up for legal liability, among other things, and <em>certainly</em> social liability. Board members are repeated players in the game that is being a board member. Almost nobody is a board member of only one thing for their entire career. Certainly you&apos;re impacting their ability to be a board member in the future, because future boards are going to look at them and say, &quot;When this person says that they have done the reading, frequently that they have not actually seen the documents that are signed with their name.&#x201D; That&apos;s disqualifying for this social class for this job.</p><p>So it is a bad thing to invoke your board members&apos; attestation in policies which don&apos;t actually exist, which do not describe the actual reality of your company. You would be very shaken to learn that that had happened, either as a responsible individual inside a company who wants your board members to sign up for things, or, God forbid, as the board member who learns on Tuesday that you have signed minutes for a meeting that never happened.</p><h3 id=\"a-voice-in-the-startup-community\">A voice in the startup community</h3><p>So, obviously I&apos;m not speaking for YC here, but I have an immense regard for that organization. I have had a long relationship with them, even though I&apos;m no longer the number two user on Hacker News. I hope to have a long and fulfilling relationship with them in the future. I have an immense regard for YC as a community, as a leading light within the startup ecosystem, and as a community of founders. And most of those founders are very ethical, upright, moral business people. And it is alarming when someone would sort of misspend the treasury of merit of that community by doing fraudulent acts under the cover of their organization.</p><p>Both because it tends to infect the other members of the community. Startups sell to startups, film at 11. But also because the&#x2026; treasury of merit is actually a bit of a religious term, apologies for that one.</p><p>[<strong>Patrick notes</strong>: Treasury of merit is a relatively obscure Catholic doctrine that the ontological and works-based goodness of Christ, the saints, and similar creates an asset on Heaven&#x2019;s balance sheet which is so enormous as to be capable of redeeming all sins of all past, present, and future humans, even as steeped in iniquity as we are.</p><p>This was not precisely what I was aiming for when searching for the concept of a communal reputational resource, but one goes into the recording booth with the brain one has.]&#xA0;</p><p>But the reputation of a community is something like the shared property of all members of it and the shared responsibility of everyone for it. And for people who are elders in a community, and you can identify the elders in many communities of choice, I don&apos;t know if I&apos;m a senior decision maker in startups, but I have a voice. Here&apos;s my voice saying things.</p><p>It&apos;s important to take corrective actions on behalf of the community, to say, like, &quot;There are lines here. There are some values at play. When those values are contravened, we identify the contravention of values as being something which is against our interests and against our moral principles, even if it was conducted by people who have broken bread with us, who we liked, et cetera, et cetera. &apos;No, not like that in the future. Never like that.&apos;&quot;</p><p>And so to the limited extent I have a voice on the internet, I am pointing here and saying, &quot;Nope. Never like this.&quot;</p><h3 id=\"advice-for-the-exposed\">Advice for the exposed</h3><p>So, there are some people out here in the wide internet who are reading with a bit of bated breath what has happened here, because they are directly exposed. And so you might reasonably want some advice. I think you should get some advice. And you should get some advice not from someone who works for the internet, but someone who works for you. Call your lawyer. You might have exposure. You want to listen very carefully to what your lawyer says.</p><p>But I think I can say something useful.</p><p>&#x201D;I am not a lawyer. I&apos;m not capable of giving professional advice&#x201D; is often used as a bit of a dodge by people, particularly in public. And so I&apos;ll say: I&apos;m not a lawyer, but I <em>have</em> been a HIPAA compliance officer. And I have some amount of expertise as to what one should do in a circumstance which rhymes with this one. And so if, hypothetically, as a compliance officer, as a responsible professional, I had become aware that I had given counterparties a document where that document included fraudulent representations, here are a couple of things I would do.</p><p>One, I would stop using that document immediately. Two, I would attempt to assemble a list of all external counterparties who had been given that document and might have made their own choices on the basis of representations that I now believe to be fraudulent. I would kick off an immediate investigation internally of who made the decisions here. What did they know? When did they know it? And at what point did we discover that these were fraudulent? And I would prepare for a difficult but necessary conversation with counterparties.&#xA0;</p><p>I always think that we owe the first obligation to the team, even in preference to owing obligations to customers, to shareholders, and similar. There are some members of the team that might have personal exposure here. I&apos;m thinking, in particular, if you are making representations that the board members had a meeting and voted on something, and the board members did not have that meeting and vote on something, those board members should get a call immediately.</p><p>But anybody else who is in the document, who is described as doing something that they didn&apos;t actually do, yep, that person needs to be told. You cannot spend the honor of your employees. That is just a fundamental star in the firmament of my moral reality. And so if it is in great ways, if it is in small ways, if you said someone has gone through training and they have not actually gone through training, you need to come clean to them and try to make amends for that.</p><p>I think very obviously at some point in the future, you will need a different vendor and/or a different process for getting your act in order with regards to any particular compliance regime that you might find yourself subject to. That timeline might not align with the timeline for disclosure to customers and other affected parties. And I have an immense amount of empathy for that, for people who find themselves in an emergency where they might be themselves innocent of causing the emergency.&#xA0;</p><p>But this is one of the responsibilities of capitalism. We earn the big bucks because we are responsible for things like this. And so you might not have chosen to be in the emergency. But you did make some choices in life, and you owe the world the consequences of those choices. And so you should start performing your responsibilities with dispatch right now. And again, get some professional advice, have the war room running, and treat this as the kind of emergency it is, and not like, &quot;Well, there is a bit of a checkbox issue, but everyone is Potemkin village in this space. We can simply move forward.&quot;</p><p>And so I think that concludes my thoughts on the Delve controversy. Well, I will note that one of their VCs, not one of their VCs, the lead of their Series A, <a href=\"https://techcrunch.com/2026/03/23/insight-partners-scrubs-investment-post-amid-fake-compliance-allegations/\"><u>disappeared</u></a> the mention of Delve from their website for a while, and then brought it back after TechCrunch took notice of the fact of them disappearing that. That is a bad fact pattern.</p><p>I assume we will learn much more about this as time goes on. And so follow around on the Internet and the obvious places for the updates to it. I do not think that I will likely be one of those obvious places because I mostly don&apos;t break news. But I felt this was sufficiently central to the beat, and sufficiently central to the moral realities of capitalism, that I thought I should probably opine on it, or not opining on it would itself be a choice.</p><p>And with that, thank you very much for listening. I&apos;ll see you next week on Complex Systems.</p>"
