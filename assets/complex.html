    "transcript": "<strong>Transcript:</strong></h2><p>Hideho everybody. My name is Patrick McKenzie, better known as patio11 on the internet. I had a conversation the other day with an academic who is very interested in alternative financial services. This is a broad industry term-of-art for things which are alternative to the standard services that well-off members of society receive, most typically from banks.</p><p>I think alternative financial services are heavily understudied, although that has been getting better in the academic fields over the course of the last ~25 years.</p><p>They&apos;re still not very well understood by people who are engaged in policy around financial services, or regulating financial services. This is a scary statement, but a true one. They are also routinely misunderstood by those of us who build financial services for a living. If everyone who you&apos;ve personally had dinner with in a year pays with the Chase Sapphire Reserve card, you know, a card for people who have enviable financial circumstances, you&apos;ll fail to predict many things that are salient in the life of people who are elsewhere on the socioeconomic spectrum. You might not build the best products for them.</p><p>And so I want to read an essay that I wrote a few years ago about check cashing businesses in specific. That essay covers a few topics: why those businesses exist, why you won&apos;t exactly get a correct picture of their operations from advocates. Many of the things that advocates hate about check cashing are compromises with socioeconomic reality.</p><p>And it&apos;s a socioeconomic reality that those of us who spend our time living the life of the mind don&apos;t really feel comfortable with addressing square on. And so I thought reading it might be useful for at least a few people in the audience.&#xA0;</p><p>As always, for this sort of episode, I&apos;m going to give a bit of live commentary, which is sort of the author&apos;s track on things that weren&apos;t in the original essay. And with that, The Business of Check Cashing, <a href=\"https://www.bitsaboutmoney.com/archive/the-business-of-check-cashing/\"><u>originally published</u></a> in Bits about Money on January 30th, 2024.</p><h3 id=\"check-cashing\">Check cashing</h3><p>One of the reasons I covered <a href=\"https://www.bitsaboutmoney.com/archive/the-long-shadow-of-checks/\"><u>checks as a payment method</u></a> recently was to lay the groundwork for talking about some of the fascinating alternative financial world around them. In the main, this helps people at the socioeconomic margins turn <a href=\"https://www.bitsaboutmoney.com/archive/payroll-providers-power-respect/\"><u>payroll</u></a> and other checks into cash (or otherwise immediately spendable value) in return for a fee. This is not how you, reader, probably deal with checks, and the existence of this industry/product have been controversial for many years. Hopefully you&apos;ll soon understand why, and why it persists in existing and its customers persist in using it.</p><p>A note at the top: check cashing is distinct from payday loans, despite overlapping customer bases, overlapping retail presences, and the centrality of checks to both enterprises.</p><h3 id=\"an-oversimplified-explanation-of-check-presentment\">An oversimplified explanation of check presentment</h3><p>In an ideal world I would have one essay already covering the nitty-gritty of check presentment but I don&apos;t and so we will here do the handwavy version.</p><p>Pretend you are a banked individual, which in the U.S. context means that you have a checking account in your own name trivially available to you. You are handed a physical check. You would prefer to have money. What do you do?</p><p>You deposit it with your bank, naturally. This could be at the teller window, through the ATM, or (most likely if you&apos;re <strong><em>listening to a podcast about financial infrastructure</em></strong>) through the &quot;remote deposit capture&quot; feature of your bank&apos;s mobile app. You might not know it by that specialized name, and instead think &quot;I use my iPhone to take a picture of the check then money shows up.&quot;</p><p>Regardless of how you send the check to the bank, the next process is the same: the bank will make an electronic copy of the check, which is exactly the same legally as the check. This was made possible about twenty years ago by the Check 21 Act. Your bank will then electronically communicate that copy to the bank the check is drawn on (i.e. the bank whose routing number is printed on the bottom of the check).</p><p><strong><em>As an aside, if I had that essay on check presentment, we would go through the history of how banks originally sent checks to each other on sort of a point-to-point basis where, without loss of generality, Chase would send the, without loss of generality, Bank of America checks directly to Bank of America.</em></strong></p><p><strong><em>This creates what technologists would call an order N squared issue in the number of couriers that you have to maintain in New York City and places.</em></strong></p><p><strong><em>An industrial development on top of it, called &#x201C;clearing houses&#x201D;, where instead of having all the banks talk to all the banks, you have all the banks put the checks in bags and take them to the clearing house. Then clerks at the clearing house would route the checks to the banks that they were drawn on.</em></strong></p><p><strong><em>And that is the purpose originally for the routing number. It makes life easier for the clerks. We&apos;ve maintained that industrial organization and that little bit of technological substrate up until the present day, even though our current clearing houses are largely automated. Badum bum. ACH. Automated Clearing House. Now you know what it stands for.</em></strong></p><p><strong><em>Back to the essay.</em></strong></p><p>That bank will, generally speaking, pay your bank money on the next business day. I will be intentionally handwavy here as to how, since the miracle that is net settlement is not the focus of this essay. Just assume that money magically arrives tomorrow.</p><p>Now, if you&apos;ve paid attention when cashing checks over your lifetime, you may notice some confusion here. It is highly likely that you&apos;ve waited for longer than one business day to receive funds from a check before. It is also likely that many of you recall at times not waiting at all; you received either full or partial credit for the check the same day you deposited it. What is up with this discrepancy?</p><p>A full discussion of Regulation CC, the Expedited Funds Availability Act, and banks&apos; sliding scale of willingness to be accommodating will have to wait for another BAM. Instead, let&apos;s focus on the most fundamental issue.</p><h3 id=\"depositing-a-check-requires-an-extension-of-credit\">Depositing a check requires an extension of credit</h3><p>As we&apos;ve previously discussed, all a payment ever has been is a message about the status of a debt with some level of certainty associated with it. A check is a specially formatted message. The &quot;movement&quot; of money tomorrow is another message. But neither of those messages encode absolute certainty that the payer is certainly discharging their debt to the payee.</p><p><strong><em>As an aside about specially formatted messages, there&apos;s a famous court case in the US which says that a check can be literally printed on the hide of a cow and be legal for use in interstate commerce. This was used by a rancher once back in the day. [Patrick notes, subsequently: Don&#x2019;t trust everything you&#x2019;ve heard about the finer points of UCC Chapter 3, </em></strong><a href=\"https://www.snopes.com/fact-check/check-on-side-of-cow/\"><strong><em><u>apparently</u></em></strong></a><strong><em>. This is folklore with an inciting publication that was not substantially based in fact, though it accurately describes a legal principle in an evocative fashion.]</em></strong></p><p>If something goes wrong in this process&#x2014;the overwhelmingly most likely one is that the payer doesn&apos;t have the funds to cover the check (NSF, or &quot;insufficient funds&quot;), but the check being fraudulent or unauthorized is also possible&#x2014;that wrongness may not be discovered before money &quot;moves&quot; to your bank. And so that payment can be recalled from your bank to the bank the check is drawn on. This will likely result in the bank attempting to recall the money from your account.</p><p>And so by presenting your check, which you think is substantially terminating a transaction, you are actually creating a new credit extension with your bank. They are extremely aware that you just asked them to advance you money, even if you are not aware that you did that. They already partially underwrote this extension of credit; that is why you were not shooed out of the building when you originally asked for a checking account.</p><p>And note that this credit relationship has two sources of risk. One is with the check writer: is that check going to &quot;bounce&quot; (be returned as NSF) after presentment? One is with the check payee: if the bank attempts to recover a bounced check from their customer, will that customer make the bank whole?</p><p>If you are banked in the United States, that means that a profit-maximizing institution looked at you and said &quot;In expectation, almost all checks this person presents will be good, drawn legitimately on the accounts of individuals or firms who do not make a habit of bouncing checks. Of the tiny, tiny number of checks that this person deposits that will bounce, and honestly it will probably be zero over the lifetime of their account, we have high confidence that they will make us whole. They have credit here.&quot;</p><p>There exist a variety of ways to be unbanked in the United States. One, which is socially awkward for advocates to take explicit notice of, is that a bank could look at a seeker of credit and say &quot;Actually, in expectation, checks you present to us have a much-higher-than-baseline risk of bouncing. When they bounce, and our best estimate is you&apos;ll bounce multiple times per year, our desired outcome is you make us whole and pay a modest penalty under our agreement. We assess that you present a material risk of not doing this. You might have gotten an A for 92% in school but if your checks are 92% likely to be good money that&apos;s a hard no from us. We decline to extend you credit under this product. We may extend you credit in other fashions, if you ask. You&apos;ll find that in those products credit costs a lot more than the cheap credit embedded in checking accounts, reflecting the elevated risk of doing business with you.&quot;</p><p>Advocates at this point often call the banks racist, classist, and stupid.</p><p>Let&apos;s pretend you asked decisionmakers in deposit franchises for their point of view here. They&apos;d be happy to tell you. It would rhyme with this:</p><p>&quot;You know, we have been in this game for decades, and like to think we are pretty good at it. We did not make up that estimate of creditworthiness. We most definitely did not engage in illegal discriminatory practices, like inferring creditworthiness from zip code. We know that would be extremely probative data if we were allowed to use it, because we&apos;re in the data and math business and good at our jobs, but egads. Can you imagine the fines we&apos;d pay? The headlines? Compliance keeps a file to scare young analysts with.</p><p>No, we paid a few dollars to get a report from ChexSystems, which said that the literal same person who wants us to extend credit ripped off the bank down the street for $450 a few months ago. If you were in consumer banking, and you&apos;re not because we are having this discussion, you would recognize that as multiple years of the contribution margin of a checking account relationship. Do you want to extend them credit? Then bonne chance. We decline.&quot;</p><p>That is certainly not the only pathway to being non-banked, but it is an extremely common one. Often, consumers self-select out because they try banking for a while and then repeatedly get assessed high fees which they do not feel are legitimate, such as fees for overdrafting their accounts. To bang a very old drum, the decision to move from everyone-pays-a-Netflix-subscription-for-banking to banking-is-free-except-we-assess-high-fees-if-you-screw-up created winners and losers. We called that one &quot;<a href=\"https://www.bitsaboutmoney.com/archive/financial-innovation-is-happening/\"><u>free checking</u></a>.&quot; Descriptively it subsidizes the middle class by using fees assessed stochastically to people in persistent economic precarity. In particular, young members of the middle class (college students and recent graduates in their least-well-off years) benefitted a lot.</p><p>So let&apos;s look at something that recent college grads very rarely encounter.</p><h3 id=\"how-cashing-a-check-works-if-you%E2%80%99re-not-banked\">How cashing a check works if you&#x2019;re not banked</h3><p>You begin with a physical check. You generally physically walk it into a local business, which in Chicago are most commonly &quot;currency exchanges&quot; but which can in principle be done in many businesses known by many names (much like e.g. Western Union transfers). You ask to cash it. You speak to a clerk with a high school education, who likely remembers you from previous interactions. The clerk asks you to endorse the check, a ritual we&apos;ll return to in a moment. She swiftly pays you cash from a drawer and retains the physical check. She offers you a receipt, and you do with it exactly what you do with a receipt from McDonalds.</p><p>The cash does not match the value printed on the check. The fee you were charged is prominently disclosed on the receipt, on the wall, and in printed material you are passively offered but do not take, for the same reason that you&apos;ve never walked home with a McDonalds menu.</p><p>That pricing grid looks something like this:</p><figure class=\"kg-card kg-image-card\"><img src=\"https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/2026/02/data-src-image-f4293f4b-0a8a-499f-8bee-80d105299050.png\" class=\"kg-image\" alt=\"Why check cashing businesses exist\" loading=\"lazy\" width=\"1330\" height=\"496\" srcset=\"https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/size/w600/2026/02/data-src-image-f4293f4b-0a8a-499f-8bee-80d105299050.png 600w, https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/size/w1000/2026/02/data-src-image-f4293f4b-0a8a-499f-8bee-80d105299050.png 1000w, https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/2026/02/data-src-image-f4293f4b-0a8a-499f-8bee-80d105299050.png 1330w\" sizes=\"(min-width: 720px) 720px\"></figure><p><strong><em>*EITC stands for Earned Income Tax Credit.</em></strong></p><h3 id=\"a-brief-aside-about-endorsement\">A brief aside about endorsement</h3><p>Apologies to non-Americans who are wondering whether they&apos;ve wandered into Westeros, with clearly medieval payment methods plus a likelihood of being beset by monsters, but let me explain a traditional ritual of our people.</p><p>The reverse of a check contains a small area where you can &quot;endorse&quot; the check. This means signing it and optionally leaving the bank an instruction as to what to do with the check. This is established by a combination of law and ancient practice.</p><p>One common endorsement historically is that you can endorse a check to another person, i.e. instruct the bank to make payment to the person you nominate, not to you. This enabled many use cases back in the day. A family might have two people earning wages but only one with title to a bank account; the second could endorse their wages to the first. A business could endorse a payment made by a customer to the business&apos; owner or to an employee or to a supplier. A common endorsement was simply &quot;pay to cash.&quot; (Banks hate that one and mostly don&apos;t offer it any more. You can probably predict why.)</p><p>The practice of endorsing is why check cashing can exist as a business, because you can endorse your check to the check casher. As of that moment, by the magic that is the U.S. legal system, your payer no longer owes you money; they now owe the check casher money. The now-endorsed check instructs the check casher&apos;s bank and the payer&apos;s bank to cooperate to make this side agreement happen.</p><p>As long as we are on this tangent, have you ever written &quot;For mobile deposit only at Your Bank Goes Here&quot;? Wondered why?</p><p>This is to prevent an annoying fraud vector where someone takes a legitimate check and then deposits it roughly simultaneously at multiple banks. Each bank will come to the conclusion it is a legitimate check (because it is) paid to someone with an account with them (true as it goes). Then they will begin the process of crediting their customer. Only at some later point will it be discovered that the check was presented multiple times. If the actor is good at being bad, they can use this to extract money from the victim banks.</p><p>Asking you to endorse the check in the above fashion spoils it for future fraudulent use at other banks. And there, now you know why you are subjected to a minor annoyance.</p><p>This is also why the app/bank can&apos;t do this for you. They need you to physically spoil the specimen that only you have and prove you did so (with a photo of the endorsement).</p><h3 id=\"many-people-hate-check-cashing-and-everything-about-it\">Many people hate check cashing and everything about it</h3><p>If you are reading this, you probably are relatively wealthy, are almost certainly of high socioeconomic status, and quite plausibly have never paid one red cent for check cashing in your entire life.</p><p>But that check cashing business exists, basically entirely, to siphon a small amount of dollars off of thousands of relatively poor people. It can&apos;t make the math work any other way. Every time you see a currency exchange when driving around town, you can be safe in the knowledge that there were thousands of poor people paying the vig last month and the owner expects most of them to pay the vig this month, too.</p><p>Most of the customers of that check business are not in a position where they can afford to be indifferent to $9. And yet the check cashing business will rake the first $9 out of their monthly public benefits payments. Or it will take their wages for the first hour of every pay period at McDonalds. Or it will insist that, when the homeowner whose lawn was mowed by an immigrant offers a $100 Christmas bonus, that Scrooge must get his $3 first.</p><p>Advocates hate this business model with a passion unmatched by ten thousand burning suns. They like to quote statistics like &quot;[t]he average unbanked worker in Illinois spends $574 a year to cash their payroll checks.&quot; (I am not relaying this quote for its truth value.)</p><p>There exists a deep academic literature about the unbanked and underbanked, much of it written by scholars who are self-consciously advocates. They have the same degree of neutrality on the merits that historians of the Civil Rights movement have on Jim Crow. That is to say, their disdain oozes from the page.</p><p>Personally, I would not attempt to dissuade anyone from their aesthetic feelings with respect to this business model. That would not be a good use of anyone&apos;s time.</p><p>Do I hate this business and everything about it? Eh, I hate poverty, certainly. Almost everything poverty touches will have terrible elements about it, because the definition of poverty is terribleness caused by scarcity. If you can&apos;t find the terrible, you&apos;ve either left poverty behind or you&apos;re not looking very hard.</p><p>And, not to put too fine a point on it, it&apos;s really hard to expressively, passionately hate this business and not hate the young lady working in it, the decisions and life challenges of its customers, and similar. And if you hate one particular building in a poor neighborhood, and then start rigorously thinking about the liquor store, or the police station, or the supermarket, or the church, or the public school, or the home in the poor neighborhood, I think your mind will start going to some pretty dark places.</p><p>So maybe let&apos;s move past the aesthetic revulsion, which you&apos;re entirely welcome to, and just look at what is going on here.</p><h3 id=\"the-internal-logic-behind-that-pricing-grid\">The internal logic behind that pricing grid</h3><p>There exist two sources of credit risk in cashing a check, as we covered earlier. The pricing grid directly prices credit risk for the payer of the check, via bucketing them. It is not the most discerning risk analysis ever conducted in the financial industry, because you need to be able to explain it to extremely unsophisticated customers and only barely more sophisticated staff.</p><p>The world&apos;s financial system is predicated on the U.S. government being definitionally zero credit risk when denominated in dollars. Every other kind of debt in the world is defined in reference to a Treasury.</p><p>A portion of the price of every cell in that pricing grid is credit risk. Just like the spread between a bond and a Treasury of the same duration is a reflection of marginal riskiness, the spread between personal checks and government checks is a reflection of &quot;the credit risk of the types of people who most commonly write checks to poor people.&quot;</p><p>As you can see, by simple subtraction, this spread is non-zero but low.</p><p>Now what causes the price to be so <s>hard</s> high for the reference risk? Well, Treasuries certainly pay out to someone, but not everyone in the world who says they own $1 million in Treasuries actually does. Government checks don&apos;t have credit risk directly, they have operational risk which becomes a credit risk. In the case where either the person cashing them isn&apos;t the person named on the check, or where the government later comes to the conclusion that it didn&apos;t really want to pay them, that money could (at some risk) be clawed back from the bank, and therefore from the check casher.</p><p>It is also useful to understand that the consumer of this service is not solely paying for credit risk. A consumer of hamburgers at McDonalds is not solely paying for <a href=\"https://youtu.be/aFSPhy2sFMM?si=53uARSA014qtYeOr&amp;t=130\"><u>processed meat product</u></a>. The physical storefront the transaction is conducted in pays commercial rent (in, given that this is a check cashing business, highly likely a low-rent area). The high school graduate who remembers you from last month, and who has many challenges of her own, wants a day&apos;s wages for spending a day talking to poor people about money. Somewhere in the enterprise there exists a much more expensive professional who spent weeks of work writing up compliance procedures for a money services business, likely secured a license for the same, and then convinced a bank that it should accept the custom of one of the highest-risk legal businesses.</p><p>That bank does not cash the daily envelope of checks for free, either. It had a consequential commercial negotiation which took notice of the business&apos; risk profile, high operational costs associated with their custom, and the near certainty that they would be very annoying to work with. The bank ultimately quoted a price per check and, very likely, a minimum amount which would be assessed monthly.</p><p>How much? Eh, prices are prices. How much does a pound of potatoes cost? I don&apos;t know. It depends on what kind of potato. It depends on where you live. It depends who you are buying the potato from. It depends an awful lot on whether you buy your potatoes by the pound or by the truckload or by the megaton. (Not an exaggeration if you are McDonald&apos;s logistics system, right? Some check cashing businesses are owned by multi-state chains.)</p><p>But, as someone who has more professional experience with checks than with potatoes, if you twisted my arm I&apos;d say &quot;Indicatively, the bank charges 5 to 25 cents per check.&quot;</p><h3 id=\"persistent-identities-as-a-kyc-possibility\">Persistent identities as a KYC possibility</h3><p>So we mentioned that there are two types of credit risk here, and how the payer credit risk is explicitly priced. How is the payee credit risk priced?</p><p>It isn&apos;t. The check casher assumes that, as a first approximation, if a check bounces, they are going to lose money. Any other result is a windfall. Absorbing these credit losses is about 20% of the total costs of their check cashing operation.</p><p>That probably strikes you as pretty surprising, but if you earn $6 gross on a $200 transaction, and one out of every 250 checks bounces, well there you go. 40 bps default rate on 230 bps of revenue of which ~200 bps goes right back out the door.</p><p>The main procedural control for this that check cashers have is persistent identities. Your bank relies on a version of this, too, except in banking it is spelled <a href=\"https://www.bitsaboutmoney.com/archive/kyc-and-aml-beyond-the-acronyms/\"><u>KYC</u></a> and is by regulation and practice excruciatingly formally documented. Many check cashing places will allow you to cash a check without having a government-issued ID, because many customers are from socioeconomic strata which routinely do not have a government-issued ID. Many check-cashing places will allow you to cash a check with a name which you are known by to the community but perhaps not what your teacher called out at roll call.</p><p>Some might take a picture of you the first time you do business with them. Some might simply rely on the social network and recollection of the young lady manning the cash register. Some will ask for and retain a copy of a government-issued ID or substitute paperwork, much like the DMV will. That could be a lease or utility bill or similar.</p><p>Regardless, the purpose is the same: if you bounce a check, and you don&apos;t pay it back, staff will be instructed that they don&apos;t do business with this #(#%#($#)*$ anymore.</p><p>There are a spectrum of words that the staff and management could call you there, and none of them are phrased &quot;defaulting customer&quot; or appropriate for inclusion in this essay. All of them are, in fact, used at at least some establishments. As we&apos;ve established, this is not a building in the part of town where people are ruthlessly socialized to not say really bad words about poor people. Compassion gets burned out of the owner and burned out of the clerk in basically the same ways that it gets burned out of everyone else in the neighborhood.</p><h3 id=\"a-brief-discussion-about-class-distinctions-in-america\">A brief discussion about class distinctions in America</h3><p>One very real reason this type of business exists in the world is to be a firewall between social classes and the businesses that serve them. Check cashing establishments insulate banks, which are indispensable for cashing checks, from needing to talk to certain people.</p><p>A check cashing business is &quot;alternative finance.&quot; It is alternative to the banking world of smartly dressed middle class employees, free coffee, and firm handshakes.</p><p>A check cashing clerk and a bank teller look to many to be similar jobs done by similar people and crucially they are not. Bank tellers <a href=\"https://www.bls.gov/ooh/office-and-administrative-support/tellers.htm\"><u>do not make much money</u></a> but know they must present as middle class. They work in a built environment where surveillance is absolutely ubiquitous and where deviant behavior (like using certain prescribed words) will have one referred to an alternative court system for swift and certain punishment.</p><p>That is to say: bank tellers work for an American corporation with an HR department. And bank tellers, in their hearts and in their actions, internalize the class that they must, must, must present as. There are classes of people that the bank does not want to do business with. (Banks are, as we have frequently covered, not allowed to say this in as many words.) The tellers do not want to speak to them, either, and this disdain radiates from them as palpable waves.</p><p>The clerk at a check cashing business is not a bank teller. She does not disdain talking to poor people; being able to do that in such a way that most poor people end up liking her is her job. Don&apos;t take my word for it; take the customers&apos;. We have studied this industry extensively. We ran surveys. The customers keep saying things like &quot;I like my local check cashing place because the girl behind the counter is kind and doesn&apos;t judge me like those ~~#%*(#%(~~ at the bank.&quot; You can present as being kind to almost all of your customers and be obviously unemployable as a bank teller.</p><p>You will deal with thousands of customers. If you use &quot;kind girl behind the counter&quot; language about the 0.01% most aggravating customer once, you will not be a bank teller tomorrow. So bank tellers basically never use those words, and instead can inflect &quot;Can I help you, sir?&quot; in a way which leaves absolutely no doubt as to how welcome the new arrival to the branch is.</p><p>Then the economists running the survey typically scratch their heads and try to squeeze that feedback into homo economicus&apos; model of the world.</p><p>Readers might be thinking I am unnecessarily besmirching the good name of the field of economics here, and so I will recount a representative sentence from a very good journal article verbatim:</p><p>&quot;To more effectively bring these unbanked individuals into the financial mainstream, it is essential for policymakers to recognize that these consumers have made these interdependent decisions in accordance with their marginal-cost-marginal-benefits calculations.&quot;</p><p>That is a lens of looking at reality, sure, and if you share that lens, you are welcome at my poker table any time. My marginal-cost-marginal-benefits calculations suggest your confidence in inferring ground truth from partial data is misplaced.</p><p>(Now you shouldn&apos;t expect from me the level of academic rigor associated with scholars at e.g. Harvard; on the Internet, we cite our sources. That quote was originally published by the Chicago Fed and then the Review of Economics and Statistics. Full cite <a href=\"http://www.jstor.org/stable/40042965\"><u>relegated</u></a> to JSTOR for those interested. And again, as the literature in this field goes, that is a really strong entry. A particularly interesting finding is the relationship between being married and using check cashing businesses, which surprised me.)</p><p>Classes aren&apos;t monoliths, of course. Many people assume you&apos;d clearly never visit a currency exchange if you have a checking account. In time, the literature actually learned to ask that question and found that, decisively, no, some banked people do happily pay to cash checks. This observation caused some confusion. I am confused why this fact is confusing; some people who are capable of cooking have also been known to go to McDonalds, even though McDonalds isn&apos;t free and doesn&apos;t taste like a burger at home. That is, of course, one of the points of going to McDonalds.</p><p>Anyhow, if you want to dive deeper into that topic, look how various groups/papers/etc delineate between unbanked and underbanked. It will frequently come down to &quot;Underbanked means you&apos;re not unbanked but you still <s>eat at McDonalds</s> consume alternative financial services.&quot; (See this <a href=\"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10623889/\"><u>representative example.</u></a>)</p><h3 id=\"check-cashing-on-phones\">Check cashing on phones</h3><p>So if we&apos;ve identified the costs associated with retail establishments as one reason why check cashing costs money, and that many unbanked or underbanked customers do not have happy human interactions with financial service providers, you might wonder if technology can successfully cash checks while being cheaper and less judgemental about one&apos;s presentation of class.</p><p>Yes, it can.</p><p>As always, I&apos;m not endorsing any particular provider here, but let me point you towards a couple of models.</p><p>In one, a pure-play company like Ingo Money has both a direct-to-consumer offering and some ability to whitelabel it. (A whitelabel arrangement means that some other firm does the work of attracting the customers and then uses Ingo&apos;s technology stack, financial rails, licenses, or any subset of the above to provide the check cashing service. To the customer, this feels a lot like they&apos;re &quot;just&quot; using the partner the whole time.) Ingo lets you essentially do remote deposit capture but instead of the deposit being to a bank account and there being a hold period, deposit is to an alternative financial product (like e.g. a prepaid card) and the funds are released basically instantly.</p><p>Take a look at Ingo&apos;s <a href=\"https://app.ingomoney.com/benefits-fees/\"><u>fees</u></a> and compare them to the representative fees for brick-and-mortar cash checking. For a $500 paycheck, it&apos;s $5 versus $11.65 in favor of the app. This is the fintech dream; the delta is basically entirely &quot;your costs are our margin.&quot;</p><p>Because the fintech nightmare is &quot;our costs of customer acquisition explain why people still pay rent for commercial locations in high-traffic areas&quot;, there is a loyalty program which gives steep discounts for repeated use.</p><p>And then there&apos;s one decision which I just love aesthetically: if you&apos;re willing to wait ten days, Ingo will discount your fee straight to zero. Why ten days? It is past the window where fraud discovery will result in the funds being clawed back plus (ahem) a bit of annoyance tacked on as a product decision.</p><p>I expect very few of their customers take them up on that. Most McDonalds burgers are not consumed by people who can cook a burger at home. They lack that capability; understanding this is an important part of understanding their life and the role of McDonalds in it. But free check cashing being available now where it wasn&apos;t before is a straight-up win for the customers and the world.</p><p>Another model is embedding the check cashing into a larger suite of services. Cash App is a notable standout here (and, IMHO, probably the most interesting financial product the tech industry has created for the un-/underbanked.) On the backend, Cash App has simply convinced a bank to have a wider risk envelope as part of the price for working with a client who represents a very large portfolio of customers. The most useful thing Cash App can convince those users to do, which it spends substantial effort on doing, is signing up for direct deposit to their Cash App. (Really, it is to the partner bank, but from the user&apos;s perspective eh it shows up in Cash App and all their friends use Cash App and you could turn it into actual paper money so does it really matter what some bank in Nebraska thinks? Nobody there will ever talk to you or talk down to you, so no.)</p><p>This is not, by itself, a full solution to the headaches implicit in banking people who are above average risk. You can read <a href=\"https://www.theinformation.com/articles/tiny-banks-that-powered-cash-app-grew-like-crazy-then-the-feds-came-calling\"><u>elsewhere</u></a> about some of the implications.</p><p><strong><em>I point in the essay to an investigation that was done on Cash App and its partner bank for some alleged compliance violations.</em></strong></p><p>There exist other models here, too, and other factors which are reducing need for this form of financial service. The <a href=\"https://www.bitsaboutmoney.com/archive/payroll-providers-power-respect/\"><u>continued march</u></a> of direct deposit and earned wage access products keeps more of the wage pie in the pockets of workers, even those in diminished circumstances.</p><p>One useful thing the advocates (and others) accomplished over the last twenty years was convincing public benefits distributors to not solely use checks to distribute benefits. For example, &quot;electronic benefit transfer&quot; (EBT) replace the monthly check with a specialized variant of a pre-paid card which can be refilled. This sometimes results in the cost of distribution falling less on beneficiaries. Sometimes.</p><p><strong><em>As an aside, if you haven&apos;t heard of an earned wage access product, the general way these work are&#x2014;you can see my essay on </em></strong><a href=\"https://www.bitsaboutmoney.com/archive/payroll-providers-power-respect/\"><strong><em><u>payroll providers</u></em></strong></a><strong><em> for some more details&#x2014;but people tend to earn wages rateably over time in say, the two-week period of the paycheck cycle.</em></strong></p><p><strong><em>And so you worked Monday. You have legal and moral right to being paid for your work on Monday. You&apos;ll not actually </em>be paid<em> on Monday because we don&apos;t run payroll daily. You&apos;ll be paid typically on a Friday on an every two week cycle in the United States. The idea of an earned wage access product is the payroll provider has certain knowledge of the fact of your employment last week and can probabilistically model whether you are still employed </em>today<em>. We could advance you money in the same way that businesses have advanced people part of their paycheck for many, many decades.</em></strong></p><p><strong><em>A thing that they often use to avoid needing to make the service explicitly priced is they&apos;ll say, okay, if you sign up for a prepaid debit card of our choosing, we will let you load that prepaid debit card with your earned wages on request. We will not charge you directly for that, however, because this debit card is </em></strong><a href=\"https://www.bitsaboutmoney.com/archive/community-banking-and-fintech/\"><strong><em><u>Durbin-exempt</u></em></strong></a><strong><em>. Every time you use this debit card to purchase goods or services, we will earn a fee from the bank as the bank earns a fee from interchange for facilitating that transaction. They might also earn a fee on if you, for example, attempt to get cash money out of an ATM.&#xA0;</em></strong></p><p><strong><em>So that&apos;s earned wage access in a nutshell.</em></strong></p><p><strong><em>Again, I do not take the position that it is ipso facto evil to ask people to pay for financial services. But you&apos;ll notice that the shifting of the cost of access to one&apos;s own wages from one&apos;s own pocket to, you know, the Best Buy or McDonalds in one&#x2019;s neighborhood, and not asking you to pay a check cashing fee, is there is a subtle distributional effect.</em></strong></p><p><a href=\"https://www.complexsystemspodcast.com/episodes/credit-card-rewards-interchange/\"><strong><em><u>Everyone who does business with McDonald&apos;s pays for McDonald&apos;s payment costs</u></em></strong></a><strong><em> rather than them being assessed to any individual user. Broadly speaking, since people who are better off consume more of the consumption pie in the United States than people who are worse off, and the payments fees ratably attributed to them associated with that consumption less the rebates from rewards means the total cost of payments falls disproportionately on the better off, not on the worse off. This moves the cost of accessing money from people who are in very poor financial circumstances, to people who have enjoyed more success in the economy that is the United States.</em></strong></p><p><strong><em>So broadly, I think that is justice-enhancing, and that is something that I wish people would understand rather than&#x2014;the New York Times, Vox, or the Atlantic comprehensively failed to understand how interchange works as a business model, but that&apos;s neither here nor there.</em></strong></p><p><strong><em>So that&apos;s most of what I have to say about check cashing.</em></strong></p><p><strong><em>If you&apos;d like to hear about other forms of alternative financial service, how class interacts with the construction of financial products and financial services in the United States and elsewhere, or adjacent topics, please drop me a line. I&apos;m always looking for more interesting things to write about in Bits about Money and talk about on Complex Systems.</em></strong></p><p><strong><em>Similarly, if there&apos;s a particular guest that you would like me to have on, please drop me a line. And with that, thanks very much for listening and see you next week on Complex Systems.</em></strong></p>"
