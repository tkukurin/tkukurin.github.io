    "transcript": "<p><strong>Patrick:</strong> Hideho, everybody. My name is Patrick McKenzie, better known as patio11 on the internet, and I&#x2019;m here with my buddy Philip Kiley, who&#x2019;s the author of <a href=\"https://www.baseten.com/inference-engineering/\"><em><u>Inference Engineering</u></em></a> and an early employee at <a href=\"https://www.baseten.co/\"><u>Baseten</u></a>, an inference platform.&#xA0;</p><p><strong>Philip:</strong> Hey, Patrick, great to be here today.</p><p><strong>Patrick:</strong> Great to have you as well. There&#x2019;s quite a bit of discourse about how AI and LLMs are going to impact the real economy and society at large. Often that discourse properly involves people in many places in civil society, including many that don&#x2019;t write code on a day-to-day basis.</p><p>I think actually writing code against these platforms on a day-to-day basis does inform one on how they actually work in the real world. So I thought we&#x2019;ll have a more-technical-than-usual discussion for the benefit of people who would be well served from hearing a very technical discussion about explicitly how they are going to work within large companies. How is this going to be deployed into the real economy?</p><h3 id=\"the-ai-deployment-pipeline\"><strong>The AI deployment pipeline</strong></h3><p><strong>Patrick:</strong> To start us off, let&#x2019;s talk about the pipeline that gets us from a couple of engineers or researchers sitting in one of the AI labs. They&#x2019;ve got a blank whiteboard and they&#x2019;re thinking, &quot;Okay, we&#x2019;ve got a new model name to put on top of the blank whiteboard, and it&#x2019;s gonna do some stuff... insert Underpants gnomes here... profit.&quot; And then it has an impact on the real economy.</p><p>My sketch&#x2014;as someone whose CS degree is increasingly out of date and whose undergrad concentration in AI is 20-plus years out of date&#x2014;is that this looks something like a training step, which is this multi-month pipeline that typically involves some novel advances in basic science.</p><p>[<strong>Patrick notes</strong>: In principle you can train models without needing to do any novel science. In practice, the leading labs are the leading labs because they&#x2019;re pushing the frontier every week. Some of that work is classically science, and some is cruftier engineering, and some is engineering that is not called science basically because the institutions which society expects to conduct science are incapable of it and therefore define it out of the field.]&#xA0;</p><p>We then maybe have a post-training fine-tuning step, which might be conducted at the lab, at a customer, or at a platform in between the lab and the customer. And then we have where the rubber hits the road: some prompt writing, some harness writing, and some other engineering work that goes into making this model consumable at an actual business operating in the real economy. That is inference, which is similar to the runtime versus compile-time distinction from previous generations of computer use, but different enough that it deserves its own nomenclature and discussion.</p><p>[<strong>Patrick notes</strong>: On reflection, it&#x2019;s <em>closer</em> to the deployment cycle for software prior to the Internet rehoming much software to servers under control of the writers of it. In that cycle, there was typically a year or so of work, that work got reduced to a single artifact shipped to customers, and then customers would use the artifact with relatively minimal interaction with the software company until the next purchase cycle. Although people were most familiar with e.g. Microsoft Word on this model, much software purchased in this fashion was used at companies, including by companies which had substantial engineering teams in charge of operating the software but not writing it specifically.]</p><p>Does that taxonomy sound broadly right to you?</p><p><strong>Philip:</strong> Yeah, that&#x2019;s broadly correct. It&#x2019;s interesting for me to hear it compared to compile-time versus runtime. I am joyously unburdened of knowledge of how the world worked before, but I feel that my computer science degree, while much more recent, is also increasingly out of date in the modern world of what we&#x2019;re building here.</p><h3 id=\"evolution-of-abstraction-layers-in-engineering\"><strong>Evolution of abstraction layers in engineering</strong></h3><p><strong>Patrick:</strong> I think all of us are out of date because all of our educations and professional lives up until 12 months ago assumed that being able to do extremely precise edits on a representation of code was a core part of the value proposition for engineering. The world entirely changed in the last 12 months. Modern coding tools are very good at doing precise edits on complicated representations of code.</p><p>[<strong>Patrick notes</strong>: I <em>cannot stress this point enough</em>: engineering is a highly paid occupation where a very core skill was high-speed high-accuracy symbolic manipulation where some choices <em>are simply wrong</em>. Every engineer up until 12 months ago had a huge portion of the job be banging their heads against a computer interface navigating the minefield of wrong answers while trying to claw something valuable out of the ether. Most of us have had the experience of an entire day wasted over a single misplaced semicolon.</p><p>It was thrilling, it was a puzzle, it was a craft, and <em>it is now obviously obsolete</em>. Not engineering! Engineers are fine! But the thing they spent much of their day doing, particularly early in their careers, is now <em>fundamentally transformed</em>. There are over three million professional software developers in the U.S. and their job is now either <em>almost unrecognizable </em>or on a very short trajectory to getting there.</p><p>Many policymakers and columnists think that AI is overhyped and that economic impact will, if it arrives, be comfortably in the future. <strong>This belief is wrong and people who cling to it, against increasingly mounting evidence, will make costly errors in the next few years</strong>.]</p><p>The craft of engineering is increasingly turning to how you direct modern tools to edit the code on your behalf, which is not exactly unprecedented. It&#x2019;s sort of like how &quot;compiler&quot; used to be a job description and not a tool. These days, essentially no one writes assembly by hand. Even the &quot;high-level&quot; languages like C that we wrote on top of compilers and assemblers are things that almost no engineer under the age of 40 would say is a high-level language. We are increasingly moving up abstraction layers. Now we have this kind of meta-abstraction layer that abstracts us away from, potentially, code as a concept.</p><p>But digression aside, what&#x2019;s the day-to-day of doing inference engineering look like?</p><p><strong>Philip:</strong> It reminds me of when I was assigned a cryptography assignment in college. My professor suggested that we all might like to write our assignment in C. I turned in a Python script along with a brief note explaining that I felt the concepts of the class did not require me to recall how to exactly allocate memory. I didn&#x2019;t receive a particularly good grade on that assignment, but I&#x2019;ve always been a believer in working at the highest level of abstraction that still gives me the tools to get the job done in a precise way.</p><p>[<strong>Patrick notes</strong>: Speaking of institutions and their discontents, in industry, attempting to write cryptographic code in C would be considered nearly suicidally risky. This is because industry had many people try it for many decades and paid, well, billions of dollars for the mistakes they made along the way. Many of those mistakes can be rounded to &#x201C;highly paid people with engineering degrees are surprisingly bad at counting to small numbers.&#x201D;]</p><h3 id=\"defining-inference-and-model-weights\"><strong>Defining inference and model weights</strong></h3><p><strong>Philip:</strong> A lot of the interest in the AI space in the last couple years has been on those first two steps you were talking about: the training side in particular. How do you get the data? How do you architect the model? But at the end of the day, a model released from a lab is just a file&#x2014;or a bunch of files because it&apos;s too big to be one file. It&apos;s a bunch of safe tensors files. It&apos;s basically an enormous matrix or set of matrices of numbers.</p><p><strong>Patrick:</strong> This is what is colloquially called the &#x201C;weights,&#x201D; right? We&#x2019;ve distilled some of human knowledge into an enormously large matrix. To a first approximation, the way attention works is you give a string of characters, perform some heavy matrix multiplication using your GPU of choice, and then it tells you what the next character looks like. That&#x2019;s hand-waving away an enormous amount of complexity.</p><p>[<strong>Patrick notes</strong>: The seminal paper which kicked off the modern LLM boom is <a href=\"https://arxiv.org/abs/1706.03762\"><u>Attention is All You Need</u></a>. There is a rich secondary literature at this point if you want explanations of how transformers work, across a wide spectrum of technical detail. Or, of course, you could just ask an LLM to explain it to you.</p><p>I&#x2019;ll note, for technical accuracy, that LLMs operate on tokens not characters. A token is typically a few characters in length; generally part of a word.]&#xA0;</p><p><strong>Philip:</strong> We have to do a lot of hand-waving to get anywhere in a discussion. But once you&apos;re done with the training, you just have a gigantic file sitting there. Perhaps you have a trillion-parameter model. If you&apos;re running it in a four-bit floating-point format, each parameter is half a byte. So you have 500 gigabytes of model weights sitting on a hard drive, and you want to turn that into the API that runs the economy. How do you do that? That&#x2019;s inference, and that&#x2019;s what I get to work on every day.</p><p><strong>Patrick:</strong> The trillion-parameter model being 500 gigabytes is one data point. The most surprising data point I got&#x2014;now &quot;ancient&quot; in AI terms&#x2014;was when Stable Diffusion came out. Unlike closed-source models, you could <em>just download it</em>, and you&#x2019;d <em>know how much you had downloaded</em>.</p><p>It was for generating images. The model was two gigabytes. We were able to compress the entire visual history of humanity into two gigabytes. It&#x2019;s mind-blowing. It&#x2019;s lossy compression, but the thing knows what a panther looks like, and what a panther looks like if you draw it in charcoal.</p><h3 id=\"architecture-of-language-and-diffusion-models\"><strong>Architecture of language and diffusion models</strong></h3><p><strong>Philip:</strong> I&#x2019;m a huge believer in open-weight models, partially because they enable the business I work at, but also because it is amazing to be able to download this stuff onto your computer. Modern image models are less lossy and about 10 times that size. They also have a different architecture: a diffusion model. This is part of the taxonomy of inference. You have auto-regressive transformer-style models&#x2014;those are your language models, but also things like voice generation. Speech-to-text and text-to-speech models are actually very small, generally one to three billion parameters, which is why you can run them on your phone. Then you have diffusion-based models, although those are increasingly looking more like auto-regressive transformers. Regardless of the model, you want to be able to serve it as an API and integrate that into a product&#x2014;whether it&#x2019;s a coding assistant, a legal assistant, or music generation.</p><h3 id=\"ai-adoption-in-the-broader-economy\"><strong>AI adoption in the broader economy</strong></h3><p><strong>Patrick:</strong> A lot of those sound like products in the standard Silicon Valley sense. A company consumes the output of the labs via API and exposes it to users. Like <a href=\"https://suno.com/home\"><u>Suno</u></a>&#x2014;it&#x2019;s an experience that couldn&apos;t have existed prior to LLMs being able to generate music on command. I think one of the major touchpoints in the economy is less going to be new products and more about larger companies adopting these primitives in the same way they adopt &quot;if&quot; statements and &quot;for&quot; loops.</p><p>In 2026, if there&#x2019;s something we&#x2019;re doing that doesn&apos;t have an &quot;if&quot; statement or &quot;for&quot; loop in it, something has gone catastrophically wrong. That is going to be the story of AI adoption in the next five to ten years.</p><h3 id=\"the-shift-toward-agentic-workflows-and-rl\"><strong>The shift toward agentic workflows and RL</strong></h3><p><strong>Philip:</strong> Anything that was a spreadsheet is now SaaS, a database and system of record.</p><p>[<strong>Patrick notes</strong>: Please accept this as an exaggeration for effect. Spreadsheets still run the world in a lot of places.]&#xA0;</p><p>Now anything that was a workflow is becoming an agent. This transforms the way you think about inference. In a historical chatbot system, you send one request and get one response. In these more complicated systems, one user request can spawn 50 or 100 calls. Or if it&#x2019;s an RL (reinforcement learning) job to fine-tune a model for a specific task, you might do a million inference requests from a single user action.</p><p>RL is, as<strong> </strong>opposed to just showing the model more data, letting the model do things and then telling it what happened and using that to adjust its behavior.</p><p><strong>Patrick:</strong> It&#x2019;s not broadly understood outside of AI circles, but current inference budgets per person are relatively low. Most people interact with an app and have a countable number of interactions. What is actually going to happen is that automated systems will increasingly work on behalf of every person in a company without requiring user interaction. The number of inference calls will be more like the number of database accesses made about you. Over the last 50 years, that might have been one query per quarter per person in 1970; now you&#x2019;ve probably got five figures&apos; worth of queries happening before you wake up in the morning.</p><p><strong>Philip:</strong> I&#x2019;m also relatively poor at estimating my personal AI consumption because I&#x2019;m in a privileged position where my consumption is a drop in the bucket compared to the amount of inputs the company I work for is responsible for.</p><p><strong>Patrick:</strong> The revenue numbers publicly reported about companies suggest that <em>somebody</em> is spending tens of billions of dollars on inference. Industry is starting to materially adopt these.</p><p>[<strong>Patrick notes</strong>: Anthropic <a href=\"https://www.anthropic.com/news/anthropic-raises-30-billion-series-g-funding-380-billion-post-money-valuation\"><u>publicly claims a $14 billion run rate</u></a> as of about a month ago. OpenAI <a href=\"https://openai.com/index/a-business-that-scales-with-the-value-of-intelligence/\"><u>publicly claims over $20 billion</u></a> in revenue for 2025. I believe both these numbers. Stripe does not endorse what I say in my personal spaces, but has made its own claims about observed AI revenue numbers in its annual letters the past <a href=\"https://stripe.com/annual-updates/2024\"><u>two</u></a> <a href=\"https://stripe.com/annual-updates/2025\"><u>years</u></a>, characterizing the revenue growth of AI companies as extraordinary, unprecedented, and lapping the best SaaS companies of a few years ago, which Stripe also typically had a close working relationship with.</p><p>Booms tend to bring out some innovation in gaming revenue numbers, but most forms of gaming are very difficult to pull off against one&#x2019;s payment processor, and I think most observers who assume boomtime revenue numbers are <em>per se</em> suspect are underestimating the quality of this revenue.]</p><p>What are the sorts of things a large enterprise uses inference on that isn&apos;t just an internal chatbot?</p><h3 id=\"function-calling-and-real-world-actions\"><strong>Function calling and real-world actions</strong></h3><p><strong>Philip:</strong> We are seeing a new class of AI-native companies emerge. These companies are quickly selling into the enterprise or even becoming the enterprise. You have the ability to completely change a business process. I wouldn&apos;t say the marginal cost approaches zero because inference is actually very expensive. Every time we make inference cheaper, we are rewarded with substantially more inference. But if the unit cost falls by 100 or 10,000 times, how does that change your domain? AI is truly the &quot;you can build whatever you want&quot; technology.</p><p><strong>Patrick:</strong> What we often see in early adoption is taking generation <em>n-1</em> and just doing that in the new substrate. Early websites took forms and made them HTML forms. That was magical at the time, but you can&#x2019;t approximate DoorDash by saying it&#x2019;s just a paper form lifted into a mobile phone. We&#x2019;re seeing business processes that already existed getting a minimal lift into the AI era, but they are still being managed by the same technologies and metrics. To your point about AI-native firms, things will look very different soon. It won&apos;t just be a customer service rep with an AI layer.</p><p>[<strong>Patrick notes</strong>: See the past <a href=\"https://www.complexsystemspodcast.com/episodes/des-traynor/\"><u>episode with Des Traynor</u></a> on how leading organizations are reorienting now that AI is available in customer support. It&#x2019;s not just &#x201C;smarter autoresponses.&#x201D;]&#xA0;</p><p><strong>Philip:</strong> DoorDash is a great example because it&#x2019;s something happening in the real world. Similarly, AI systems are moving from an &quot;ask and tell&quot; mode to an agentic mode. Something is agentic if it takes an action on your behalf in the real world. Technically, this is just function calling. It&#x2019;s providing a language model with a list of actions it&#x2019;s capable of taking and the input specs required. The model picks from that list and provides a structured output guaranteed to fulfill the input specs of the tool you&apos;re trying to trigger. That&#x2019;s where the amount of input starts to explode &#x200A;because now you are probably making multiple decisions for every action you take. But it&apos;s also where you get to start building genuinely like new and novel things, rather than just providing additional context to whatever existing operations are happening.</p><h3 id=\"technologies-for-agentic-tools-mcp-and-skills\"><strong>Technologies for agentic tools: MCP and skills</strong></h3><p><strong>Patrick:</strong> For the people who don&apos;t work in this every day, it would benefit them to hear about the technologies that enable these tool calls. One is called MCP, which is essentially API rebranded for agents to use. The notion is that there is a computer system you want LLMs to interface with. You&apos;re building an affordance that you expect no humans to ever look at&#x2014;it&apos;s only for LLMs to drive the operation of that system. Another refinement is called &quot;skills,&quot; where the skill is just a description in plain text: &quot;You would be better at filing taxes if you knew the following.&quot; You have the model read the plain text and respond with text or structured data that your harness can interpret.</p><p><strong>Philip:</strong> Exactly. A common misconception is that the model itself is actually capable of doing anything. It is only capable of asking the harness to do things on its behalf. For now, the native language of LLMs is plain text&#x2014;often English or Chinese. The difference between an HTTP API and an MCP or a skill is solely the structure of that text. This benefits us as humans because it makes the actions of the system more interpretable. You can review the logs and see, &quot;Oh, it said to take this function and use these parameters: cheese, burger, and fries.&quot;</p><h3 id=\"the-craft-of-writing-a-harness\"><strong>The craft of writing a harness</strong></h3><p><strong>Patrick:</strong> Reading the execution of computer code that no human actually wrote is wild.&#xA0;</p><p>To define a term: a harness is the engineered system. The model lives in the cloud, but the harness is the subsystem that repeatedly calls the model, asks it to make decisions, and operates other computer systems on the model&apos;s behalf. Writing a harness doesn&apos;t require Space Shuttle levels of engineering difficulty. A minimum viable harness is a couple hundred lines of code&#x2014;maybe a day of work, or even five minutes with modern coding tools.</p><p>Six months ago, I made a video game art project.</p><p>[<strong>Patrick notes</strong>: Still up at <a href=\"http://isekaigame.com\"><u>IsekaiGame.com</u></a> and <a href=\"https://www.complexsystemspodcast.com/episodes/narrative-mastery-character-bleed-in-games-with-ricki-heicklen/\"><u>discussed in some detail previously</u></a>.]&#xA0;</p><p>I thought it would be useful for debugging if the LLM helping me write the game could actually play the game and find bugs. I wrote a command-line harness that allowed it to &quot;click buttons&quot; via the CLI. The CLI tells the model what happens, and the model tells the CLI what to do next. It was a huge productivity increase.</p><p><strong>Philip:</strong> What you actually created there, Patrick, was an RL environment. You created a mechanism for a model to observe its behavior in a virtual world and adjust its behavior on top of that.</p><p><strong>Patrick:</strong> I was cognizant when doing the work that I was a few days away from science fiction. &quot;Play this video game and tell me if you&apos;re not having fun; if you&apos;re not, change the game.&quot;</p><p>[<strong>Patrick notes</strong>: I would like to encourage people who are skeptical that an LLM could usefully do this to <em>actually try it</em>.]</p><p>I mostly used it for basic things. You can be much less precise with an LLM-driven system. Instead of giving a sequence of 125 actions with checkpoints, I just say, &quot;Play through chapter one and tell me if you are surprised in a negative fashion.&quot; The objective is a repeatable system for identifying negative surprises.</p><p>Why not have the computer play through the entire game every time we change a line of code? Its time is almost free.</p><p>[<strong>Patrick notes</strong>: It is utterly routine in industry to have 40 computers work for an hour to test one minute of human work. The human&#x2019;s time <em>is valuable </em>and the consequences of a typo in e.g. a financial system can be quite severe. Also routine in industry is having a team in charge of building systems which make this automatic and reliable, which does not describe the level of rigor I bring to infrastructure supporting art projects.]</p><h3 id=\"using-ai-for-automated-proofreading-and-tool-creation\"><strong>Using AI for automated proofreading and tool creation</strong></h3><p><strong>Philip:</strong> It doesn&apos;t have to be that complex. Every time I write a book, I write custom software to make editing easier. Now I don&#x2019;t even have to write that software myself. For proofreading, you could throw the entire text of a book in a ChatGPT window and ask for errors. Theoretically, these models have a large enough context window to absorb that. But if you write a simple harness that chunks the text into 500-word pieces and passes each to a separate LLM call&#x2014;and maybe even throws it at every frontier model simultaneously to collate results&#x2014;you&#x2019;re going to find a lot more errors. &#x200A;Theoretically that&apos;s a harness in that it&apos;s like taking a model and adapting its behavior to do better at a task by giving it a set of sort of deterministic loops behind it. That&#x2019;s&#xA0; five minutes of work that just about anyone can understand conceptually how it&apos;s functioning.</p><p>I will also say that this system was not a great proofreader and that my human proofreader caught about four times as many errors. So either I&apos;m very bad at writing harnesses or proofreading is still something that LLMs are surprisingly bad at.&#xA0;</p><p><strong>Patrick:</strong> In my experience, LLMs are getting much better at proofreading. I use them extensively these days, which should shock no one who has been paying attention. However, we aren&apos;t entirely &apos;out of the loop&apos; on proofreading yet. I will say that they are extremely good at operating existing computer tools and improvising when creating new ones. You can ask them to write software that would have been economically irrational to write before&#x2014;cases where the expected lifetime of that software is anywhere from a day down to a single execution.For example, a common error in writing is incorrect capitalization. Existing spellcheck engines are pretty good at identifying capitalization errors in some circumstances, but they often over-identify errors. They might flag the word &apos;McKenzie&apos; everywhere, despite it being correctly capitalized.To fix this, you can tell an LLM: &apos;Write a sed script&apos;&#x2014;sed is a Unix utility, and LLMs are very good at operating them&#x2014;&apos;that extracts every capitalized word in this document.&apos; Even if it&#x2019;s a very large document, you can include one sentence of context before and after each word. You then pass that through a pipeline that knocks out any word capitalized in the usual fashion (like at the beginning of a sentence) to find only the possible mistakes. Deduplicate that list and pass it to an LLM for evaluation.Given those instructions, the LLM will look at the word &apos;McKenzie&apos; and say, &apos;Probably correctly capitalized; many Irish orthographies use this style.&apos; It moves on to the next one, and you can have an infinitely patient computer system happily review 800 false positives to find you 30 honest typos.</p><h3 id=\"balancing-llms-with-deterministic-code\"><strong>Balancing LLMs with deterministic code</strong></h3><p><strong>Philip:</strong> It is important to have both parts: the LLM-based piece and the code-based piece. Recently I had to alphabetize an appendix. LLMs are not great alphabetizers, but they are great writers of Python scripts that can alphabetize. That&#x2019;s a script I used exactly once and then never again.</p><p><strong>Patrick:</strong> I think this is increasingly going to be a way that they drive a lot of computer tools, like: &quot;Write a script to do this once.&quot; I have an ongoing back and forth with the product Claude Cowork, which is sort of like Claude Code, but for laptop jobs that are not specifically writing software code. But Cowork is actually writing a lot of code in the background. And if you are a perceptive user, you can perceive the fact that it&apos;s writing code and even review some of the code it&#x2019;s written; but it&apos;s designed for a non-technical professional to use, and so you don&apos;t actually have to review the Python code.&#xA0;</p><p>So, I&apos;m constructing a balance sheet and I have PDFs grabbed from all the banks and brokerages and similar that I want each of them to represent a line in the balance sheet. And the way Claude is interfacing with Microsoft Excel is not, &quot;I drive a mouse that clicks here to open the file and then clicks here to hit cell A1 and then types the following into a virtual keyboard.&quot; It&apos;s actually writing a Python script, which uses the fact that .xlsx is a relatively open format and that Python has existing libraries which do spreadsheet manipulation, to write the code which does the appropriate spreadsheet manipulation, execute that code, and then confirm that the execution came back correctly.</p><p><strong>Philip:</strong> Open file formats are essential. docx is a somewhat less open format, which is why I converted my entire book into Markdown to give it to the language models and then converted it back for the human editors.</p><p><strong>Patrick:</strong> Yep. It is very interesting to me how Markdown has kind of become the lingua franca of LLM tool invocation under the hood, despite being designed for an entirely different purpose.Markdown was originally written by the gentleman behind <a href=\"https://daringfireball.net/\"><u>Daring Fireball</u></a>, which is a blog, to make the toolchain&#x2014;from typing text into a text editor to a beautifully designed post appearing on the internet&#x2014;easier than it was; it was widely adopted by various blogging services for that.</p><p>Outside of blogging services and people who write API documentation for a living, there were relatively few serious uses of Markdown in the world. Then the LLMs got really good at generating it and reading it. It happens to be very token-efficient versus HTML.</p><p>That combination of attributes made the humans supervising the LLMs increasingly say, &apos;No, I&#x2019;d prefer your output in Markdown; if we need it to be styled, we will have a deterministically written styling step at the end of the pipeline&apos;. <strong>Philip: </strong>Yeah, I mean, there is also probably some amount of overlap between those of us for whom blogging and documentation are two of our formal and current professions , and that being fairly common among my peers in the AI space as well.</p><h3 id=\"observability-and-chain-of-thought-reasoning\"><strong>Observability and chain of thought reasoning</strong></h3><p><strong>Patrick:</strong> I think there&#x2019;s an interesting sociological-slash-historical observation to make: the network is intensely connected at some points&#x2014;both the human network and, increasingly, this vague, multidimensional &apos;idea space&apos; network. And so, they write Python not because Python is necessarily the best programming language ever, but because of some combination of factors: there is a lot of open-source Python available that&apos;s plus plus.</p><p>The people writing the LLMs at the labs and similar organizations write Python natively, whereas they don&#x2019;t write C as their first choice. It is easiest to review the outputs in Python. So, you tell iteration one of the LLM, &apos;Prefer Python over something else because I can read Python most easily,&apos; and then they get good at what you keep telling them to get good at.</p><p>They&#x2019;ve gotten very good at Python and very good at Ruby, but maybe less good at writing, for example, Rust. But the broader sociological observation is this: the set of interests and activities that are central to the early adopters of LLMs are probably going to be the ones that see the greatest change in the economy first, versus things where the early adopters are less indexed on that.</p><p>I think that&#x2019;s one reason why, to date, the most interesting economic implication of LLMs is clearly the modern coding tools, by several orders of magnitude. They will hit everywhere eventually&#x2014;or at least everywhere that has been impacted by an &apos;if&apos; statement or &apos;for&apos; loop before. But it will take them longer to get into, say, sculpture, just because there are fewer sculptors in the pool of people working in and around LLMs every day.</p><p><strong>Philip: </strong>And that&apos;s where some of the work on the RL (reinforcement learning) fine-tuning side comes in, as well as on the inference-time side. Language models are good general learners, and so that&apos;s why the paradigm of reasoning models&#x2014;you could call it &apos;test-time compute&apos; or &apos;scaling inference&apos;&#x2014;is growing.</p><p>There&#x2019;s a bunch of names for it, but in general, giving the model the ability to generate a number of tokens before it generates the final result helps a lot in generalizing its capabilities into new domains. You can give them enough context and time to sort of iterate ideas, add in a harness, and then all of a sudden the trial and error becomes less speculative and more concrete.</p><p>In this case, to build a robust system in a domain unfamiliar to those who pre-trained the foundation models, you no longer need to be a foundation model lab with billions of dollars in GPUs. You can instead use hundreds of thousands or millions of dollars of compute&#x2014;still a lot, but materially less. Combine that with industry expertise and domain knowledge to get a system working extremely well at a fraction of the investment.</p><p><strong>Patrick: </strong>State-of-the-art has changed over the last couple of years. To what extent will we see a family of models in every company, versus everyone paying API costs to one of three firms? <strong>Philip:</strong> I have strong feelings about that one. Caveated by my economic interest, I do have a strong belief that we are not headed for a future where everyone is renting intelligence a token at a time from a handful of firms. Because of open models, the proliferation of tooling around RL and SFT (supervised fine-tuning), and the rise of AI engineering, you have a world where every engineer has the opportunity to &apos;own their intelligence&apos;. And to build genuinely differentiated AI products, rather than just wrapping a handful of models. There will always be a huge role for foundation models in this field. I use closed-source foundation models in my daily work.At times, I use open models in my daily work; at other times, I use custom models created by specialized companies. All of these models are going to be well-optimized for different tasks. They&apos;re going to have different cost characteristics, and the world of AI engineering is going to be much more heterogeneous than I think you might have expected looking at the state of the industry a couple of years ago.And that&apos;s a very good thing. It gives us more exciting stuff to work on, and it means that there&apos;s more opportunity for everyone in the industry today&#x2014;and everyone who&apos;s not in the industry today but wants to be&#x2014;to do interesting and useful work instead of just relying on a few companies.</p><p><strong>Patrick: </strong>As we increasingly move from a world where there is one logical user interaction and one API call made for it, to there being hundreds or even more API calls made per user interaction, it makes a lot of sense to have a local, cheap source of intelligence.&#xA0;</p><p>This allows you to do things like routing a request to the best provider or asking a &apos;smart&apos; LLM to construct a plan of what we&apos;re going to do. I&apos;m then going to farm out parts of the plan which don&apos;t require much more intelligence than an &apos;if&apos; statement to places that are cheap and fast. We can then annotate which parts require a great deal of sensitivity and use one of the state-of-the-art models for that&#x2014;perhaps routing to a model we know is particularly good on that specific topic. There are some firms, like Stripe&#x2014;<a href=\"https://www.complexsystemspodcast.com/episodes/the-past-present-and-future-of-ai-with-stripe/\"><u>Emily Sands has discussed this on the podcast</u></a>&#x2014;that train their own models. Specifically, while the leading industry lab LLMs can answer a question on anything connected to the human experience, some answers will be better and some will be worse. There is even a different model that cannot speak Japanese but &apos;speaks credit cards&apos; more than any human who has ever lived.</p><p><strong>Philip: </strong>Well, it&apos;s still Transformer-based, according to the <a href=\"https://stripe.com/blog/using-ai-optimize-payments-performance-payments-intelligence-suite\"><u>blog post</u></a>. So, you can run with &#x201C;LLM.&#x201D; It&apos;s close enough.</p><p><strong>Patrick: </strong>Yeah. So, there will not be as many models trained as there are programs in the current status quo that the cost-benefit curve isn&apos;t there for most uses. But there will certainly be a lot more models trained in the next 10 years than there were in the past 10, as the stack for training models and the know-how get better.</p><p><strong>Philip:</strong> If you look at<a href=\"https://huggingface.co/\"><u> HuggingFace</u></a>, five or six years ago there were a few tens of thousands of models on there. Now we are well past 2 million, possibly 3 million. Many of those are just fine-tuned versions or redos of existing foundation models. But directionally, the number of open-source models has been rising at 5x a year without any signs of slowing down.</p><p><strong>Patrick: </strong>HuggingFace, for those who aren&apos;t familiar, is a community site where people upload and share models. Similar to GitHub, you provide an explanation and use a &apos;star&apos; fashion to surface the best models. This moves the state of the industry forward because people can fine-tune against existing models and run automated benchmarks.</p><p><strong>Philip:</strong> And similar to GitHub, it&apos;s leveraged this community uptake to become the de facto standard for companies publishing closed and fine-tuned models to share with one another, similar to private code repositories.</p><p><strong>Patrick:</strong> This is a thing which felt really important to me as I was doing my LLM-assisted coding six months ago&#x2014;though I&apos;ve been told that&#x2019;s been entirely obsoleted since December. The observability of these tools is both better and worse than expected. It&#x2019;s better in terms of interpretability in a &apos;Chain of Thought&apos; world, where you ask the LLM to think to itself in a &apos;scratchpad&apos; before giving a final answer.</p><p>It&apos;s an ongoing research question whether that interpretability is actually true, or just an incredibly complex pantomime. Regardless, you can read an LLM&apos;s internal reasoning, and as an engineer, you kind of have to. If you tried to hit the DoorDash API to order a burger from Culver&apos;s, and it ordered from New Jersey while you&apos;re in Chicago, you need to know why it picked New Jersey. The tooling for this is less mature than standard server log review. So, how do people doing inference engineering think about building out these new toolchains?</p><h3 id=\"speculative-decoding-and-hidden-states\"><strong>Speculative decoding and hidden states</strong></h3><p><strong>Philip:</strong> The world&#x2019;s getting less observable. Text is not actually that good of a medium for inference. The world of agent observability and all that stuff&#x2014;that&#x2019;s very much in the AI engineering space. There are a number of really excellent companies working on it. Within the inference space in particular, there&#x2019;s actually a trend toward knowing a little bit less about what&#x2019;s going on. Let me give you a concrete example: there is a method of accelerating LLM inference called speculative decoding.</p><p>The basic premise behind this is that you have a large model that creates an output. That output is probably pretty similar to what a small model&#x2014;a model of the same material dimensions, shape, and training process&#x2014;would create most of the time. So, what you do is you let the small model kind of &apos;front-run&apos; the large model. It generates a few tokens at a time, which you then check against the large model to see if they are correct. The checking process is much cheaper than the generation process; if the tokens are correct, you get to skip those steps through the large model, and everything just becomes that much faster.</p><p><strong>Patrick:</strong> So, you might have a state-of-the-art model, like, say, Opus 4.6 (or whatever it&apos;s up to), and you have a document that you&apos;re asking it to write, which might be 60,000 characters&#x2014;60,000 tokens&#x2014;in length. You would tell Opus, &apos;Just write me the first 4,000 characters.&apos;</p><p>Now, I&apos;m going to give those 4,000 characters to a cheap, fast, local, open-source model and ask it to generate the next 2,000 characters. I compare them against each other, and if I achieve sufficient alignment with the cheap model, in lieu of paying the token costs for the next 54,000 characters, I just have the cheap model do it all.<strong>Philip:</strong> It&apos;s a lot more granular than that because it happens not with you and the client; you&apos;re not the one making this decision. This is just happening for you under the hood on the server, and it&apos;s happening on the order of five to 10 tokens rather than thousands.</p><p>This is an example of the sort of optimization that might make sense for you to build and think about in your harness, or it might just be swallowed by the inference layer. This is happening in basically any system that you use; it is part of what makes them so fast.</p><p>It&#x2019;s just automatically happening under the hood where, for example, in the past, you might have had the Llama 405B model and then the Llama 3B model front-running it and trying its best. This is actually a very inefficient way to do this because the models are generating text, and text is the user-facing output.</p><p>The way we do it today is by training a speculator model through a process called Eagle. We train a speculator model on something called the hidden states of the main model. The hidden states in a neural network are the intermediary outputs at each layer.</p><p>We take those as the input and output data and train a small, approximately 1-billion-parameter model&#x2014;not to create text, but to guess what the hidden state of a larger model will be when it gets queries from a specific domain like coding.</p><p>Where in the past we would be able to manually look at the output of a speculator model and say, &apos;Oh, this speculator model is getting this type of information wrong,&apos; or, &apos;For this particular token, it&#x2019;s struggling to generate it,&apos; now it&#x2019;s these completely imperceptible hidden states.</p><p>This is not to say that observability is not possible in the AI world or that it is getting worse&#x2014;in fact, it&apos;s getting better. This is more of me saying that, especially within these sophisticated patterns happening hundreds of times per second as we generate tokens, we&apos;re moving away from our natural advantage of observability: the native language of these LLMs being text&#x2014;generally English or Chinese. Instead, these systems are using a much more native representation of semantic meaning, and we need to build new tools to interpret that in ways we can review with our brains.</p><h3 id=\"the-value-of-smaller-task-specific-models\"><strong>The value of smaller, task-specific models</strong></h3><p><strong>Patrick:</strong> It is an interesting observation around this great, unbounded field of research that it isn&apos;t simply a matter of, &apos;We need to make the state-of-the-art models smarter.&apos; We need them to be smarter; we need them to be smarter.</p><p>But after we have an arbitrarily smart model, that doesn&apos;t mean that the value of having less smart models available goes to zero. Indeed, having a smarter model gives you the opportunity to say, &apos;Okay, look at the artifact that is the smarter model,&apos; and then create a model based on that&#x2014;or an intellectual descendant of it&#x2014;which has different characteristics.</p><p>It might be smaller, more restricted in domain, execute faster, or execute cheaper. You can then either use that in tandem with the larger parent model or entirely disconnected from it.</p><p><strong>Philip:</strong> Exactly. And the reason this matters is&#x2014;let&apos;s say that six months ago, you built an AI application with the smartest model available. You just kind of lived with the fact that it cost $10, $20, or $50 every million tokens; you lived with the fact that it took five or ten seconds to perform an action; and you lived with the fact that you were getting, like, &apos;two or three nines&apos; of uptime.</p><p>As the frontier models have gotten faster, you might just continue using them because you&apos;ve always used the &apos;best&apos; model&#x2014;back when you started building, that was the only thing that could do your task. But after a few months, there will generally exist smaller, cheaper models that are equally capable of doing that task.</p><p>Benchmark saturation is actually a very good thing. It means that a task is sufficiently solved such that you can take the smallest model that saturates the benchmark and just use that; that gives you a natural advantage in inference. It&apos;s much easier to build a fast, efficient, reliable system on a 10-billion-parameter model than a 100-billion-parameter model&#x2014;and it&apos;s faster on 100 billion than a trillion, and faster on a trillion than on two or three trillion.</p><p>We&apos;re kind of bounded there by the amount of VRAM in an 8x B200 NVIDIA system. As Rubin comes out, models will get bigger, but the general premise is that as you get smaller and smaller models, everything else gets easier. So, as long as your task-specific intelligence is fully saturated, you stop incrementing on intelligence and start incrementing everywhere else.</p><p><strong>Patrick: </strong>This implies some meta-system that is capable of evaluating these models against each other. There are many different engineering pathways&#x2014;and people will have to read the book for some of them&#x2014;but broadly speaking, we should probably record prior invocations of the task and what the model came up with, and then ask future candidate models: &apos;What would you have done on this prior invocation of the task?&apos;</p><p>You then test that against either the ground truth of what a prior, more intelligent model came up with, or maybe some sort of evaluation heuristics. These things frequently have the characteristic where it is harder to answer the task than it is to evaluate the correctness of the task.</p><p>So you can say, &apos;Okay, well, I have 10,000 or a hundred million data points from the real world about how this actually shows up in our business. Produce 10,000 candidate outputs, and then I will have a very intelligent model score each of those outputs against a rubric.&apos;</p><p>If you scored a 3.7, and that is better than the previous leaderboard of 3.5, I&#x2019;m going to speculatively give you execution for the next two weeks. If nobody gets paged and Twitter doesn&apos;t light up about how our customer support is broken, then you&#x2019;ll likely continue being the platform for the future until you get beaten by someone who scores a 3.9.</p><p><strong>Philip:</strong> Yeah, that&#x2019;s the sort of continuous learning model, which I think in many cases&#x2014;the sort of real version of that&#x2014;is a little bit less automated than many people would hope for.</p><p><strong>Patrick:</strong> Yeah, certainly at my shop.</p><h3 id=\"internal-competencies-versus-buying-solutions\"><strong>Internal competencies versus buying solutions</strong></h3><p><strong>Philip:</strong> That&#x2019;s kind of the goal: that we are able to, you know, continuously refine the models. Similarly, in my world of inference, you want to continuously refine the systems, as the nature of the traffic that you&apos;re receiving changes the effectiveness of the inference optimizations that you make. And so, you want to be able to sort of adjust the optimizations you&apos;re making on traffic.</p><p>In a fully refined system, yes, all of this stuff would kind of update automatically. Today&#x2014;perhaps fortunately, if you&apos;re in the business of updating it and find doing so interesting and intellectually rewarding&#x2014;it does not. We still have to do that piece ourselves.</p><p><strong>Patrick:</strong> I think it&apos;ll take a few human engineer cycles in terms of diffusion of mindshare&#x2014;conferences that share these learnings, books being published, et cetera. It will be some time before mainline companies have this level of infrastructure built around most of their offerings. This will also likely imply the existence of infrastructure companies in the middle, such as your own.</p><p><strong>Philip:</strong> Yes. As you were describing this, I was thinking, &apos;Wow, that sounds like a lot of inference&apos;</p><p><strong>Patrick:</strong> It&#x2019;s interesting that this gets us back to something analogous to a world we used to live in, where performance is an important characteristic of computer programs. For about a 30-year period in my professional career, the performance of all your computer programs got better every 24 months because you would upgrade the computer you were running them on, and the new computer was faster.</p><p>And then Moore&#x2019;s Law broke down a little bit, and the subjective experience of computer programs getting faster has not been a mainline experience for engineers over the course of the last, call it, 10 or 15 years. In that previous fashion, you didn&#x2019;t have to do ongoing investment in your line-of-business application to take advantage of the fact that the new Pentiums were faster than the old Pentiums; that just happened, and you benefited from it.</p><p>What we&#x2019;re hoping for is that&#x2014;without there needing to be staffed engineering teams against every application written in capitalism&#x2014;a lot of the applications are just going to passively get better. This is because the infrastructure layer reads Twitter&#x2014;well, OK, while that is a fun mental image, probably not technically accurate&#x2014;finds there&#x2019;s a new model in the candidate set for this week, tests the new model, and says, &apos;Oh, it turns out that the &quot;new hotness&quot; model, which is 60% cheaper than the state-of-the-art model, actually performs at parity or slightly better on benchmarks&apos;.</p><p>Therefore, I&#x2019;m going to give it a candidate set of traffic over the course of the next two weeks; therefore, we&#x2019;re going to adopt it for this purpose. And then some human gets an email updating them: &apos;Changes in Q2: we&#x2019;ve changed the model from &quot;blah&quot; to &quot;blah&quot; under the hood. Projected cost savings for this year: $12 million. Have a nice day.&#x2019;</p><p><strong>Philip:</strong> Pretty much. And then you don&apos;t only have to do that at the model level; you can also do that at the hardware level. You can do that in terms of which inference engine you&apos;re running, training a new speculative decoding model, improving your KV cache reuse rates, or figuring out how to effectively quantize the model without reducing your precision.</p><p>There are a bunch of smaller ways beyond the model itself where&#x2014;yes&#x2014;the quarterly generation upgrade of the model is an important step function, but there&apos;s also continuous improvement in the interim. As these systems continue to scale, a 1% or even a few basis points increase in efficiency actually has a very material impact.</p><p><strong>Patrick:</strong> So, the level of sophistication of the engineering organization that you implied in saying that there are these various levers you can pull strikes me as being quite high. For an uninvolved person, where would you expect an enterprise to have an internal competency in inference engineering versus where they just buy that capability?</p><p><strong>Philip:</strong> I think that you are always going to need the capability internally, even if you are buying it, because you are going to need to know what to ask for. For the majority of companies, the investment in owning an AI stack end-to-end probably does not make sense. The parts that are really hard are fairly undifferentiated, like distributed systems and applied research problems.</p><p><strong>Patrick:</strong> They also seem to have a very poor shelf life over the course of the last 24 to 36 months.</p><p><strong>Philip:</strong> They do. It&apos;s ironic that I wrote a physical book in this space knowing that within 12 to 18 months, I would have to come out with a second edition or be consigned to irrelevance. But it&#x2019;s still very important to understand the efficient frontier of trade-offs possible between latency, throughput, cost, and quality. It seems to follow the pattern of cloud service providers: you have a platform that produces the tooling and a large class of professional engineers whose job it is to operate that platform.</p><p><strong>Patrick:</strong> Playing back what I just heard, I think there will be a large, differentiated inference engineering practice in companies that have thousands of engineers available. Companies with smaller teams will likely have a handful of internal experts but will largely consume APIs and solutions brought to market by leading labs or cloud providers or maybe point solutions as well.</p><p><strong>Philip:</strong> I would perhaps index less on the size of the engineering team. I&apos;ve found that in many cases, the most sophisticated teams I work with are actually relatively small. Right now, engineering talent to do this is so scarce&#x2014;there are maybe a few tens of thousands of engineers in the world who really understand this stuff well enough to build it. And however many tens of millions of engineers there are in total, maybe that&#x2019;ll change as this knowledge becomes more disseminated. But I&#x2019;ve found that, in many cases, it&#x2019;s the larger teams who sort of have very diffuse knowledge of this and thus require a lot of expertise to bring these systems into production.</p><p>And then there are the smaller teams who maybe actually could do it themselves, but simply choose not to because they have more pressing things to work on. And even with, you know, 10x to 100x acceleration from AI coding tools, they still have very limited bandwidth.</p><p><strong>Patrick:</strong> I think there&apos;s precedent for this in technology adoption curves. There were few people capable of shipping iOS apps in 2008; by 2018, most large banks had at least a functional app; and by 2026, it&apos;s table stakes.&#xA0;</p><p>Indeed, one of the things that some of the largest, most successful banks did was they said, &apos;Well, we have a hundred thousand technologists at this organization, and apparently none of them are either capable of doing iOS apps&#x2014;or, I think more likely, the industrial organization that was the IT department could not successfully anoint a team of five people to ship an iOS app that was decent.&apos;</p><p>And so, they went to Silicon Valley and basically bought teams wholesale and said, &apos;You know, 200 million Americans use our app; it better not be crap. That&#x2019;s your job now.&apos;&#xA0;</p><h3 id=\"self-publishing-a-technical-book-in-record-time\"><strong>Self-publishing a technical book in record time</strong></h3><p><strong>Patrick:</strong> Switching gears, you&#x2019;ve self-published a meaningful technical book, <em>Inference Engineering</em>. Can you talk about that process?</p><p><strong>Philip:</strong> I wrote a book called <em>Inference Engineering</em>. I published it a couple of weeks ago to a surprisingly massive reception.</p><p>If you are familiar with the criteria to be on the <em>New York Times</em> bestseller list for nonfiction, it&apos;s generally 5,000 to 10,000 copies in your first week. I, of course, don&apos;t qualify because of the &apos;sell&apos; part of &apos;bestseller list&apos;&#x2014;I made this book free for reasons I&apos;ll get to in a second. But I did 14,000 copies in my first week. Most were digital; I have a massive waitlist because I&apos;m completely sold out of print books.</p><p>I wrote this book on behalf of my employer. Or, I should say, I leveraged having three to four years of internal track record to have them let me bet a big chunk of my time over the last few months on bringing this project to fruition. Because of that, I was able to just completely give this away for free, which was very exciting because I think everyone should have an opportunity to learn this stuff.</p><p>And yeah, it was really interesting because I&#x2019;ve never done a print book before. That was quite a lot of work and involved a number of unexpected headaches. I&apos;ve also never done a sort of category-defining book before. I think it&#x2019;s very presumptive to say that the book is category-defining two weeks into its lifetime, but that is certainly the goal: to define this job of inference engineering as well as lay out the tools.</p><p><strong>Patrick:</strong> Did you substantially invent that term?</p><p><strong>Philip:</strong> No. Kind of; it&apos;s definitely a term that I checked to ensure no one else had published about before. But I was already seeing, you know, here and there, there were job postings on LinkedIn saying &apos;Member of Technical Staff, Inference,&apos; or maybe even &apos;Software Engineer, Inference&apos;. Or, maybe they even take out the comma and just say, &apos;Inference Engineer&apos;.</p><p>But it was definitely a&#x2014;you know, I&apos;ve never titled one of my own books; someone else always comes up with a title much better than I can. <em>Writing for Software Developers</em>&#x2014;the book referenced earlier&#x2014;was called <em>The Technical Content Development Handbook</em> for the first several months of its life, until my mom renamed it.</p><p><strong>Patrick:</strong> Your mother has excellent marketing instincts. <strong>Philip: </strong>She sure does. She&apos;s also actually the editor of Inference Engineering, as well as everything else I&apos;ve written. The title sort of came out of various conversations about what the correct label for this collection of technologies and engineering practices is.</p><p>I thought about calling it, you know, &quot;LLM performance optimization&quot; or something, but that was insufficiently broad in scope. I also thought about calling it just Inference, but that was perhaps a little bit too artistic. So, I took the path of many technical book authors before me and just stuck &quot;Engineering&quot; after the thing that I wanted to talk about.</p><p><strong>Patrick: </strong>I think this is underrated, why books continue to be an important Schelling point, even in a world where much of the technical documentation exists as either explicit documentation or less formal writing, such as blogs, podcasts, Twitter, and similar.</p><p>The book, by the way, is physically beautiful. This is an audio-only podcast, so people can&apos;t see it, but I worked at Stripe, including adjacent to Stripe Press, which has something of a deserved reputation for producing beautiful artifacts. And this is a beautiful artifact.<strong>Philip:</strong> I certainly owe quite a bit to Stripe Press. We used the same printer that does their books, which allowed me to skip quite a bit of R&amp;D. I definitely took a lot of inspiration from them; if this weren&apos;t an audio podcast, you could see every single Stripe Press book behind me chronologically. I have always aspired to that quality, so I took a shortcut and went straight to the guys who print them.</p><p><strong>Patrick:</strong> Well, I&#x2019;ll make my obligatory disclaimer that they do not necessarily endorse things I say in my own spaces, but I&#x2019;m happy that more people are taking shots on goal. I think a book is kind of like planting a flag in the world and in &apos;thought space&apos;&#x2014;signaling that this particular orientation of looking at the world matters.</p><p>That has occasionally mattered in the technology industry. The Google SRE book, for example, catalyzed the shift from sysadmins being the underpaid &apos;redheaded stepchild&apos; of engineering into being engineers in their own right, and it substantially accelerated the DevOps movement. I think there is at least one other book out there waiting to be written about operations professionals and how they should likewise realize a step-change in importance and career trajectories as a result of AI and other improvements in the economy.</p><p><strong>Patrick:</strong> I wonder who could possibly write that?</p><p><strong>Philip:</strong> I will buy a copy, but I might not be the person to write it. But, uh, we shall see. There are many talented people in the world who should take a stab at writing more things, even in a world where writing appears to be easier than it was previously.</p><p>I&#x2019;ll say that I tried my best to get language models to do as much of this for me as they could, and they could do basically none of it. I had to write this book myself with my own fingers on the keyboard; the language models were useful for research and fact-checking&#x2014;well, kind of useful for research. Actually, I hope that the next generation of LLMs includes this book in their training corpus because there was quite a bit of information missing from their knowledge of inference engineering topics.</p><p>But yeah, that was part of the thesis behind this project: I wanted to create a beautiful object. I wanted to create something that was the antithesis of &apos;slop,&apos; where it was very clear that I had spent many days and nights turning the last four years of my life into 250 pages because I believe in books. I love writing books, and also because I believe in inference. I believe that there is a lot of really interesting work left to do in this space and that it&apos;s very early.</p><p>If people can just take a long weekend to read this book, they&apos;ll have the background they need to figure out how to join this space, find their niche within it, and start making real contributions to the frontier within weeks or months&#x2014;rather than the years or decades it takes to become an expert in many other fields.</p><p><strong>Patrick:</strong> I think part of the social purpose of being an author is&#x2014;being an author is so legendarily terrible relative to other things that authors could be doing&#x2014;that I was nonetheless possessed to spend two years of my life... well, it wasn&apos;t actually two years for you, but in the typical course of a nonfiction author&apos;s life, it&apos;s two years on a topic. You should see that sacrifice of effort and assume that somewhere in &apos;idea space&apos; adjacent to this, there is something worth thinking about.</p><p><strong>Philip:</strong> That&#x2019;s the other thesis: it&#x2019;s sort of asymmetrically high-status to write a book. I&#x2019;ve found that perhaps my novel or unique skill set is writing nonfiction books quickly. I just have to gather enough expertise in a specific topic so that I have enough content to write a book, and then writing it is the thing I want to do.</p><p><strong>Patrick:</strong> I would love for you to tell people what the timeline looked like, because I read it on your blog and&#x2014;hats off&#x2014;most people can&apos;t do that.</p><p><strong>Philip:</strong> I actually received advice that I should stop talking about how quickly I wrote it because of how it might make people perceive the final product. I will say that, if not for four years of working in this space, there is absolutely no way I could have picked up a keyboard and written a book on any timeline.</p><p>But the main outlining process, followed by the writing process, was about six weeks for the initial draft. That was followed by two months of revisions and two months of formatting, designing, printing, and publishing. The reason I was possessed to do this on such an advanced timeline is the same reason I ended up self-publishing. I talked to a number of the best publishers in the world, and the general timeline was that after you provide a finished manuscript, you&#x2019;ll be in print in 12 to 18 months. I basically said that is just an unacceptable timeline for this industry. I simply had to do every single step myself to make it as fast as possible.</p><p>The thing is, this book was essentially finished and finalized&#x2014;though I was making small factual updates through January 2026. I definitely wrote it to be more about the theory and the &apos;large pillars&apos; of this field rather than specific implementation details. Even still, I imagine it having a shelf life of 12 to 18 months before I have to come out with a second edition.</p><p>So, to the questions of: &apos;Why did you write a book so fast?&apos; &apos;Why did you self-publish it?&apos; &apos;Why did you do your own cover in-house with Baseten&#x2019;s designers?&apos; &apos;Why did you do the printing and coordinate the editing yourself?&apos; It was entirely because the tradeoff between latency and throughput exists in the world beyond just the input space. I was trading off working with &apos;high-throughput&apos; book producers to become a &apos;low-latency&apos; book producer, while still hopefully keeping the same level of quality.</p><p><strong>Patrick:</strong> I haven&apos;t finished the book yet, but I hope people understand&#x2014;holding it in your hands, that is a wonderful document. I hadn&apos;t realized it was &apos;free as in beer.&apos; Why did you make that decision?</p><p><strong>Philip:</strong> I have the fortune to be an early employee of Baseten. Baseten is a very well-capitalized AI startup, and I was able to take this passion project and work it into a marketing budget. Obviously, I like to say this book is 98% vendor-neutral, though I&#x2019;ll say there is a nice one-page advertisement at the back for Baseten services. We also have a logo on the spine and on the cover.</p><p>I genuinely believe that the sort of inference-first view of the world is the right way to look at the space; otherwise, I would work at a different company. If everyone else believes the same things we do, that&#x2019;s generally good for us as a company and makes people more interested in our products and services.</p><p>It was a pretty easy sell internally that this project would be beneficial to Baseten and worthwhile to spend my time and the company&#x2019;s resources on in terms of launching, marketing, and distributing it. In the face of that, the idea of selling a PDF for a few dollars each was not particularly appealing.</p><p>As soon as Amazon quits clowning around and decides that I am, in fact, a legitimate author at a legitimate business, there will be the ability to purchase the book more or less at the cost of us printing and shipping it&#x2014;just because I don&#x2019;t want to do all of the fulfillment myself. I&#x2019;ve made very close personal friends with every single member of my fabulous FedEx store right next to me, but I would like to stop visiting them every day.</p><p>I was free of the profit motive this time around in writing, and I am happy that I was still able to create a great artifact and take advantage of the heavy subsidy to make something beautiful that I otherwise wouldn&#x2019;t have been able to create by myself.</p><p><strong>Patrick:</strong> Well, thanks very much for talking briefly about the craft of becoming a self-published author and for the wonderful discussion on inference engineering more broadly. And Philip, where can people find you on the internet?</p><p><strong>Philip:</strong> Yes, so in college, I defeated a pediatrician in Vermont to take over &apos;Philip Kiely&apos; as, you know, the number one search space for my own name. So, you can find me at <a href=\"https://philipkiely.com/\"><u>https://philipkiely.com/</u></a>&#xA0;</p><p>You can find me on Twitter at @philipkiely. You can find me on LinkedIn at <a href=\"https://www.linkedin.com/in/philipkiely/\"><u>https://www.linkedin.com/in/philipkiely/</u></a>. I&apos;m also &apos;Philip Kiely&apos; on various gaming platforms because I&apos;m perhaps a little bit too consistent in my online branding.&#xA0;</p><p>Anyway, the best place to download the book is <a href=\"https://www.baseten.com/inference-engineering/\"><u>https://www.baseten.com/inference-engineering/</u></a>.&#xA0;</p><p>Again, the PDF is free. I have a waitlist set up right now for paper copies, and we&apos;ll be fulfilling those as soon as I have the logistical capability to do so.</p><p><strong>Patrick:</strong> Awesome. Well, thank you very much for coming on the program today, and thank you, listeners, for listening to this week&apos;s episode of <em>Complex Systems</em>. We&apos;ll see you next week.</p>"
