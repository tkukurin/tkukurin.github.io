    "description": "Today Patrick McKenzie (patio11) walks through a coding session with Claude Code to demonstrate what the fuss is about. The business problem: recovering failed subscription payments that required coordinating APIs across Stripe, Ghost, and email providers, and the surprising experience of watching Claude read documentation, resolve dependency conflicts, and make sensible security choices. The episode offers a pedantic level of detail on why the sharpest technologists use words like &#x201C;fundamentally transformed&#x201D; to describe the impact of LLMs on coding. Thanks to our sponsor:&#xA0; Framer Building and maintaining marketing websites shouldn&#x2019;t slow down your engineers. Framer gives design and marketing teams an all-in-one platform to ship landing pages, microsites, or full site redesigns instantly&#x2014;without engineering bottlenecks. Get 30% off Framer Pro at framer.com/complexsystems . Timestamps: (00:00) Intro (02:21) All engineering work happens in a business context (03:47) Payment failures briefly taxonomized (08:25) Now follows a conversation with Claude Code (20:37) Sponsor: Framer (21:53) Conversation with Claude Code (continued) (39:07) My final thoughts on this (41:15) Wrap",
    "transcript": "<strong>Transcript:</strong></h2><p>Hideho everyone. This is Patrick McKenzie, better known as patio11 on the Internet.</p><p>Today&#x2019;s a bit of an experimental episode. I have spent quite a bit of time recently doing AI-assisted coding.</p><p>[<strong>Patrick notes</strong>: The bulk of it, as previously discussed on Complex Systems, was in building a game/art project for a conference. You can still play it: <a href=\"https://www.isekaigame.com\"><u>IsekaiGame</u></a>. The experience of spending a month of my year on that project, which was my first de novo development in years and my first experience with modern coding tools, substantially informed my willingness to use them for the subject of today&#x2019;s episode, which <em>directly touches money</em> in the business I use to pay the mortgage.]</p><p>The experience of doing this has, in the view of many technologists I trust, gotten discontinuously better in December, as a result of <a href=\"https://code.claude.com/docs/en/overview\"><u>Claude Code</u></a> upgrading to <a href=\"https://www.anthropic.com/news/claude-opus-4-5\"><u>Opus 4.5</u></a> as the underlying model. [<strong>Patrick notes</strong>: I&#x2019;m not a particular partisan for Claude Code over Cursor and OpenAI Codex; it happens to be the tool I reached for this week. I have moderately extensive experience with Cursor and, while I am a frequent user of ChatGPT and OpenAI APIs, have not yet taken Codex for a spin.]</p><p>The sharpest technologists I know use words like &#x201C;fundamentally transformed&#x201D; to describe the impact of LLMs on coding. Thomas Ptacek, my erstwhile cofounder and an engineer&#x2019;s engineer, <a href=\"https://fly.io/blog/youre-all-nuts/\"><u>wrote</u></a>: &#x201C;All progress on LLMs could halt today, and LLMs would remain the 2nd most important thing to happen over the course of my career.&#x201D; Andrej Karpathy, one of the founding members of OpenAI, <a href=\"https://x.com/karpathy/status/2015883857489522876\"><u>wrote</u></a> &#x201C;This is easily the biggest change to my basic coding workflow in ~2 decades of programming and it happened over the course of a few weeks.&#x201D; (He is referring to the switch from writing code and asking the AI questions to asking the AI to write code and occasionally tweaking it, and not to any particular product.)</p><p>If you code every day and have not used modern coding tools like Claude Code, <a href=\"https://cursor.com/\"><u>Cursor</u></a>, or OpenAI&#x2019;s <a href=\"https://openai.com/codex/\"><u>Codex</u></a> yet, strongly consider hitting pause now and playing with them for a week or so. It is by far the most important thing you can do for your career and employer this week.</p><p>If you don&#x2019;t code every day and don&#x2019;t understand what the fuss is about, the rest of this episode is for you. I want to walk through a coding session with Claude Code in a pedantic level of detail. In it, Claude solves a real business problem, involving complex interaction of four computer systems, in a way which multi-billion dollar businesses routinely fail to solve, in 30 minutes.</p><p>My contribution to the work was being half-attentive to a chat window after dinner, and while it is <em>definitely engineering work</em>, it exercises relatively few of the muscles that my degree or decades of experience coding developed.&#xA0;</p><p>[<strong>Patrick notes</strong>: We&#x2019;ve previously had an episode about <a href=\"https://www.complexsystemspodcast.com/episodes/how-ai-reshapes-software-engineering/\"><u>vibe coding</u></a> but, to be clear, I consider this simply &#x201C;the modern practice of software engineering.&#x201D; As you&#x2019;ll see in a few minutes, I make many management decisions informed by experience. I just produce <em>very little</em> syntax, terminal commands, and similar relative to the traditional practice of software engineering.]&#xA0;&#xA0;</p><p>[<strong>Patrick notes</strong>: If you already basically know the process story I&#x2019;m going to tell, and just want to read some code for a feel of the coding style and correctness of modern tools circa late January 2026, see <a href=\"https://gist.github.com/patio11/f4efb6a71d587d35355c2cefcf89add5\"><u>this sample</u></a>, which covers about 60% of the LOC written for this project and is broadly representative of it. If you grok that Ruby code, nothing else the Rails app does will surprise you with regards to these features.]&#xA0;</p><p>If you&#x2019;d prefer not getting deep into a particular example and just want a survey, <a href=\"https://open.spotify.com/episode/2fd3hvYmplEnQzxYZaxPg3?si=ylFxFe3HQ4uivH29uqC_rA\"><u>Bloomberg&#x2019;s Odd Lots podcast had an excellent episode</u></a> with Noah Brier on this topic. It&#x2019;s the best single artifact for a non-specialist audience about why modern coding tools are a discontinuous advance.</p><h3 id=\"all-engineering-work-happens-in-a-business-context\">All engineering work happens in a business context</h3><p>As I often tell people, engineers are not employed to write code. Engineers are employed to increase revenue or reduce costs of businesses. Those are the only two goals.</p><p>I run a small business which publishes to the Internet about infrastructure and receives money for doing so. (Definitely not what I think I&#x2019;ll be doing for the entirety of my remaining career, but it is what pays the bills today.) This podcast is one product of that business. The other main one is Bits about Money, which I describe as a professional journal on the intersection of finance and technology. Other people might describe it as &#x201C;a paid newsletter.&#x201D;</p><p>BAM memberships are similar in character to supporting one&#x2019;s local public radio station: there is no paywall, and so the pitch for members is &#x201C;Pay so this public good continues existing&#x201D; and not &#x201C;Pay so you specifically can continue accessing this publication.&#x201D;</p><p>For historical reasons, most BAM members purchase annual memberships, and most of those memberships renew in January. Every year in January, we have a spike of revenue&#x2014;yay!&#x2014;and a spike of failed transactions.</p><p>I promise we&#x2019;re returning to AI-assisted coding in a minute, but you have to know a bit about financial infrastructure to understand why the newsletter about financial infrastructure suffers failed transactions.</p><p>Briefly, almost all BAM memberships are paid for on personal or company credit cards. Credit cards as an ecosystem tolerate a much higher rate of, industry term of art here, &#x201C;spurious declines&#x201D; than you&#x2019;d expect. We <a href=\"https://www.complexsystemspodcast.com/episodes/the-past-present-and-future-of-ai-with-stripe/\"><u>previously</u></a> had Emily Sands from Stripe on to discuss machine learning approaches to manage this.</p><h3 id=\"payment-failures-briefly-taxonomized\">Payment failures briefly taxonomized</h3><p>You can broadly bucket payment failures into three very different scenarios. <strong>Scenario 1</strong> is the least common: the customer <em>genuinely does not intend to pay</em>, and has either instructed their bank to block attempts to charge, or is using ghosting you as a way of soft-cancelling their commercial relationship.</p><p><strong>Scenario 2</strong>, the transient payment failure, is when there is a temporary infrastructure hiccup. A credit card transaction needs to coordinate many more than five computer systems at five firms within a window of a few hundred milliseconds. If any of them blinks during that window, the transaction fails. This happens <em>much more frequently than you would expect </em>for infrastructure that trillions of dollars ride on.</p><p>The solution to a transient payment failure, which a business will not generally <em>know</em> is transient, is to simply retry the payment again. I previously worked at Stripe, am presently an advisor there, and they do not necessarily endorse what I say in my own spaces&#x2026; but I was a user of Stripe long-before and long-after my employment.</p><p>And so I know that Stripe will, if you have a setting on your account, transparently try to <a href=\"https://stripe.com/resources/more/payment-retries-101-how-businesses-can-make-the-most-of-this-important-detail\"><u>retry the payment on a configurable schedule</u></a>. If one of those retries works, then no human has to even know the payment failed temporarily.</p><p>Today&#x2019;s work is about <strong>Scenario 3</strong>, payment failures which need human interaction to recover from. This could be e.g. a credit card being maxed out, though that is extremely unlikely for my customer base.</p><p>[<strong>Patrick notes</strong>: Bits about Money is read by people from very many walks of life, including a surprising and intimidating-to-me number of policymakers (and their staff). <a href=\"https://www.complexsystemspodcast.com/episodes/talking-to-the-bank-of-england/\"><u>Central banks</u></a> are not where the money is, though. To the limit of my ability to discern, the typical <a href=\"https://www.bitsaboutmoney.com/memberships/\"><u>supporting member</u></a> is a professional employed in tech or finance, as suggested by either their professional domain name or their emails to me.</p><p>Which I say to justify a business calculation: this is not a business which has to care overmuch about debit cards being denied for NSF (insufficient funds). Apologies for explicitly mentioning a material consequence of social class, as I understand that violates a mild taboo among the social class which reads pieces like this, but it is impossible to think rigorously about financial technology while being blind to material consequences of social class.]&#xA0;</p><p>They could be a card was reissued after expiry or loss, and the issuer doesn&#x2019;t participate in automated systems to allow businesses to seamlessly charge the new card. They could be the user switching banks or employers (and thus purchasing card) in the course of the year. Or they could be a bank, for reasons of its own, heuristically detecting this year&#x2019;s charge as perhaps fraudulent and blocking it, and they&#x2019;ll continue blocking all attempts until the user tells them to knock it off.</p><p><strong>[Patrick notes</strong>: I&#x2019;ve said this a million times but I&#x2019;ll say it once more. Many people who believe themselves to be well-informed about how credit cards work use canceling a card as a way to cancel e.g. gym memberships. <em>Do not rely on this working for you</em>. While some subscription businesses, including many SaaS companies, are quite lenient with respect to soft cancels, gyms <em>in particular</em> are notorious for enforcing their contractual rights by sending unpaid fees to collection agencies and/or selling that bad debt. And many businesses will happily avail themselves of the technology which lets them charge a card without specifically knowing this number, which the financial industry is <em>very happy to sell them</em>. The pitch is it avoids consequential commercial relationships from getting interrupted due to silly reasons like e.g. a card needing to be reissued. This pitch is <em>a true one</em>, and the bug that people are relying upon to use a card reissue as a way to cancel subscriptions <em>is not a bug the financial industry cares about maintaining backwards compatibility for</em>.]</p><p>Scenario 3 interdicts billions of dollars of commerce every year. The typical way businesses deal with it is sending an automated email, telling you a payment failed and asking you to re-enter your payment credentials. In an ideal world, that email lets you one-click no-login to a screen which immediately asks for the new card number and you&#x2019;re done in 30 seconds. Very, very few businesses, even the largest businesses in the world, successfully execute on this ideal scenario.</p><p>This is because their Revenue Operations or Payments teams have ~0 engineering cycles available to them, because this isn&#x2019;t hugely salient at an executive level. Even if they&#x2019;re leaving literally tens of millions on the table for want of a few days of engineering work, that fact is not necessarily OBVIOUS to the business.</p><p>[<strong>Patrick notes</strong>: I&#x2019;ve run my businesses out of Stripe accounts for a decade, used to work at Stripe, and am something of an enthusiast with respect to bookkeeping. I charged off $10,000 of uncollected invoices dating back on average about 2 years this week because no screen in my business specifically showed me an aging graph for small-dollar invoices (subscription revenue) and I hadn&#x2019;t realized a decade-old legacy setting was causing the final invoice to &#x201C;leak&#x201D; into aged-but-presumed-collectible status in my bookkeeping as opposed to deemed-uncollectible. My bookkeeper is going to love me when I say &#x201C;By the way I need you to papertrail a $10k non-cash one-off loss which arises from revenue that doesn&#x2019;t actually exist <em>despite me having paid taxes on it last year</em>.&#x201D;]&#xA0;</p><p>If I hadn&#x2019;t worked in payments, it wouldn&#x2019;t have been obvious to me, either. The symptom is you expect, for example, 100 users to renew their subscriptions on a particular day. 92 do and the others don&#x2019;t. If you aren&#x2019;t intimately familiar with what is going on, you might think &#x201C;Ahh, those eight people didn&#x2019;t feel like the last year was valuable for them&#x201D;, or &#x201C;they are trying to save money in the coming year&#x201D;, or whatever folk theory of behavior prevails in your organization.</p><p>Now knowing that spurious declines were costing me money every January, did I actually do anything about this? <em>No</em>. Because it required some actual engineering work to deal with. I ballparked it as 1-3 full days for me, and each year in January, I was more concerned with either writing BAM or doing a subscription drive than reversing failed payments. &#x201C;Maybe next year&#x201D;, I said, multiple times.</p><p>Why is the engineering work here hard? Sending an email about the payment failure is relatively easy. Sending a customized email with a link that gets you directly in to update the payment is more difficult. There are four computer systems in play: my own system, Ghost Pro (the platform BAM is published through), Stripe, which handles all the payment processing and is the system of record for e.g. failed payment attempts, and then Postmark, an email provider.</p><p>These each have slightly different views on the elephant. Stripe, for example, knows about payment failures, but not about emails already sent through Postmark. Postmark has no idea who subscribes to BAM; that&#x2019;s Ghost&#x2019;s job.&#xA0;</p><p>[<strong>Patrick notes</strong>: The actual published issues of BAM are send by Ghost, not by Postmark. Several different systems are doing functionally equivalent things that physically cannot be consolidated. Ahh, I feel like an enterprise already.]</p><p>My system has to reconcile these against each other to determine what to do.</p><p>The engineer doing this work needs to use APIs&#x2014;ways for computer systems to talk to each other programmatically&#x2014;to coalesce those views into a list of who hasn&#x2019;t paid successfully, remove users where that is expected (explicitly requested to cancel, etc), construct special URLs to let people in without a login to update information, and then send the emails. And then, money rolls in.</p><h3 id=\"now-follows-a-conversation-with-claude-code\">Now follows a conversation with Claude Code</h3><p>I&#x2019;m going to try to be clear what I am telling Claude, substantially verbatim, and what Claude is doing or telling me. I will fudge a tiny bit in the interests of comprehensibility or omitting sensitive information.</p><p>For example, in the actual development of this and every similar system, an engineer will have to at some point look at so-called production data: real names attached to real email addresses. I will obviously not read those on air. (Thankfully, an engineer does not have to look at real credit card numbers, and indeed <em>cannot</em> in a well-designed system.)</p><p>Different scales of enterprises would use different levels of care in having testing environments. <em>This</em> small business does not have a testing environment for BAM: the real users are the only ones we have. And some of the work with Claude in a previous session was being careful because of that lack: we, for example, built a dry-run feature to identify who would get emails before actually sending emails, so that I could eyeball the list for correctness.</p><p>Some important context before we get started. Claude can&#x2019;t &#x201C;see&#x201D; a project the same way an engineer sees a project. It relies on an orientation file, Claude.md, that it reads at the start of every session. It can then, in the course of conversation with the user, use what it calls &#x201C;<a href=\"https://code.claude.com/docs/en/overview\"><u>tools</u></a>&#x201D;, like searching for relevant code, reading it, operating the command line (which lets it e.g. restart servers or make test API request or run automated testing tools), and similar. I&#x2019;ll provide some color commentary about its tool use.</p><p>And while Claude does not explicitly remember this fact, because it is a fresh session, it&#x2019;s important that a few weeks ago I had Claude build a feature for Bits about Money which used the APIs to list upcoming renewals on a dashboard and send emails reminders about upcoming renewals. This is a different business problem than recovering from payment failures, but involves much of the same technical infrastructure, and I explicitly don&#x2019;t want Claude to reinvent the wheel. So the first thing I do is jog its memory:</p><p><strong>Me to Claude</strong>:&#xA0;&#xA0;</p><p><em>We&apos;re doing the annual Bits about Money subscription renewal month and it seems many subscriptions failed to renew. I think this is likely to be mostly transient payment failures; cards which weren&apos;t updated, etc.</em></p><p><em>I&apos;d like you to enhance the BamSubscriptions class with logic to detect recent (last 30 days, but make it configurable) payment failures which haven&apos;t recovered (Stripe might try auto-retry, etc), similar in character to inspecting upcoming BAM renewals. Exclude any where the subscription is in an intentionally canceled state, either originating from the user or from me. After you enhance BamSubscriptions with this, I would appreciate a) a new dashboard page to show these users and b) a rake task to send them an email (similar to the existing subscription reminder email).&#xA0;</em></p><p><em>You can take a stab at writing the skeleton of that email; I will refine it to be in my voice and make the updates as easy as possible.</em></p><p><strong>Commentary</strong>: This &#x201C;specification&#x201D; is verbatim, and note how little technical detail it includes. Every bit of software ever written until 12 months ago has to be extremely pedantic about what data sources it is touching, in what bits of code, with what functions, etc. I have given Claude precisely one identifier, the name of a class, BamSubscriptions. I expect Claude to be able, with no other information, to be able to successfully find BamSubscriptions on disk, read it, find the part of it which is about upcoming BAM renewals, and generalize from that previously completed, known-to-work code.</p><p>Claude then fires several tool calls. The first one searches on disk for a file named BamSubscriptions. This fails to find the class, which is a CS101 level error. This error is totally inconsequential, because Claude just immediately proceeds to running a wider search, locating bam_subscriptions.rb in the lib subdirectory, right where it put it last time. Claude then reads the file and ponders a bit.</p><p>Claude then begins writing new code. It, in a single shot, writes 809 lines of code across seven files. Although I had provided the suggestion that it stagger this development, first doing the bookkeeping work of finding failed payments and then building a dashboard to show those failed payments, a task to send an email to each person, and a skeleton of what that email would say&#x2026; it just does this all in one go. This is in less than 5 minutes of elapsed wall-clock time.</p><figure class=\"kg-card kg-image-card kg-card-hascaption\"><img src=\"https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/2026/01/bam-revenue-recovery-dashboard.png\" class=\"kg-image\" alt=\"Claude Code makes several thousand dollars in 30 minutes, with Patrick McKenzie\" loading=\"lazy\" width=\"1262\" height=\"1404\" srcset=\"https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/size/w600/2026/01/bam-revenue-recovery-dashboard.png 600w, https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/size/w1000/2026/01/bam-revenue-recovery-dashboard.png 1000w, https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/2026/01/bam-revenue-recovery-dashboard.png 1262w\" sizes=\"(min-width: 720px) 720px\"><figcaption><span style=\"white-space: pre-wrap;\">The dashboard looked good out of the box. Since creating it was ~free, it was a good way to eyeball that Claude had correctly identified customers in a failed payments state prior to letting it send automated emails. (This screenshot uses fudged data.)</span></figcaption></figure><p><strong>Claude to me</strong>:</p><p><em>I&apos;ve implemented the payment failure detection and notification system. Here&apos;s a summary of the changes:</em></p><p><em>&#xA0;&#xA0;Changes Made</em></p><p><em>&#xA0;&#xA0;1. Enhanced lib/bam_subscriptions.rb</em></p><p><em>&#xA0;&#xA0;Added new methods for payment failure detection:</em></p><p><em>&#xA0;&#xA0;- subscribers_with_payment_failures(days:) - Finds BAM subscriptions in past_due or unpaid status with failed invoices in the lookback period</em></p><p><em>&#xA0;&#xA0;- fetch_recent_invoices(subscription_id) - Gets detailed invoice data including failure reasons</em></p><p><em>&#xA0;&#xA0;- extract_payment_error(invoice) - Translates Stripe error codes into human-readable messages (e.g., &quot;Card</em></p><p><em>&#xA0;&#xA0;declined: insufficient funds&quot;)</em></p><p><em>&#xA0;&#xA0;- payment_failures_with_details(days:) - Enriched data for dashboard display including invoice URLs and next retry times</em></p><p><em>&#xA0;&#xA0;- Duplicate prevention via local file tracking and Postmark API checks (similar pattern to renewal reminders)</em></p><p><em>&#xA0;&#xA0;2. New Dashboard: /private/admin/bam_payment_failures</em></p><p><em>&#xA0;&#xA0;- Lists all subscriptions with unrecovered payment failures</em></p><p><em>&#xA0;&#xA0;- Shows: email, name, status (past_due/unpaid), error reason, failed date, next retry, amount</em></p><p><em>&#xA0;&#xA0;- Configurable lookback period (7/14/30/60/90 days)</em></p><p><em>&#xA0;&#xA0;- Preview email before sending</em></p><p><em>&#xA0;&#xA0;- Send individual or bulk emails</em></p><p><em>&#xA0;&#xA0;- Link to Stripe&apos;s hosted invoice page for each failure</em></p><p><em>&#xA0;&#xA0;- &quot;Revenue at risk&quot; summary</em></p><p><em>&#xA0;&#xA0;3. New Email Template: app/views/bam_mailer/payment_failure.text.erb</em></p><p><em>&#xA0;&#xA0;Skeleton email that:</em></p><p><em>&#xA0;&#xA0;- Explains the payment issue with the specific error when available</em></p><p><em>&#xA0;&#xA0;- Provides link to member portal to update payment method</em></p><p><em>&#xA0;&#xA0;- Includes direct invoice payment link if available</em></p><p><em>&#xA0;&#xA0;- Shows next automatic retry date if scheduled</em></p><p><em>&#xA0;&#xA0;- Friendly tone, offers to help</em></p><p><em>&#xA0;&#xA0;4. New Rake Tasks</em></p><p><em>&#xA0;&#xA0;# Preview who would receive emails (dry run)</em></p><p><em>&#xA0;&#xA0;rake bam:preview_payment_failures[30]</em></p><p><em>&#xA0;&#xA0;# Actually send emails</em></p><p><em>&#xA0;&#xA0;rake bam:send_payment_failure_emails[30,send]</em></p><p><em>&#xA0;&#xA0;# Show sent email statistics</em></p><p><em>&#xA0;&#xA0;rake bam:payment_failure_stats</em></p><p><em>&#xA0;&#xA0;Key Behavior</em></p><p><em>&#xA0;&#xA0;- Detects subscriptions in past_due (Stripe still retrying) or unpaid (retries exhausted)</em></p><p><em>&#xA0;&#xA0;- Excludes subscriptions where cancel_at_period_end is true (user chose to leave)</em></p><p><em>&#xA0;&#xA0;- 14-day Postmark duplicate check by default for payment failure emails</em></p><p><em>&#xA0;&#xA0;- Days parameter is configurable (default 30)</em></p><p><em>&#xA0;&#xA0;Would you like me to push this to the devbox so you can test it?</em></p><p><strong>Commentary</strong></p><p>You might not be familiar with the word &#x201C;devbox.&#x201D; Briefly, I do software development on my Macbook Pro, the latest in a long line of laptops I have used in the 14 years this software system has existed. If I were to actually run the code I was writing on the MBP, which I did for many years, I&#x2019;d tear my hair out as e.g. old versions of libraries conflicted with new versions of MacOS. So instead I use a pattern quite common in the professional software industry: I have a so-called devbox sitting in the cloud.</p><p>[<strong>Patrick notes</strong>: A virtual private server, which I rent from DigitalOcean (in Singapore of all places&#x2026; don&#x2019;t ask me why, I don&#x2019;t remember the rationale), which is used for development on this system <em>and only</em> this system. It will never have anything installed to it which isn&#x2019;t needed to develop this system, and so will have fewer dependency issues than doing development locally on the Macbook. More modern developers might use Docker for a similar reason, but this software is older than Docker.]</p><p>While I <em>write</em> the software locally on this MBP, I sync the code to the devbox, and the code actually <em>executes</em> in the devbox (while developing).</p><p>Claude, FWIW, is open on my MBP and not open on the devbox. It lives on <em>neither</em>; the actual brains are somewhere in the cloud, on a computer operated by Anthropic. Be that as it may: Claude can access my devbox because a) it can run linux commands, including SSH, which allows it to open a terminal on any computer in the world it has credentials to and b) I have arranged to have credentials to the devbox on this computer, and permitted Claude to use them.</p><p>Claude&#x2019;s permission model for linux commands is a bit complicated. Some linux commands are essentially zero risk. Echo, for example, just displays what you type to it back to you. Some are high risk, like deleting your entire filesystem. And some are&#x2026; tough to tell? What&#x2019;s the worse thing that can happen if a computer connects to another computer and asks it to something in that computer&#x2019;s power? Well that could be either a) nothing or b) millions of dollars of damages.</p><p>And so one option is you review every command as Claude types it and approve/deny them individually. This is really annoying for the operator and virtually nobody does it for longer than a few minutes; Claude really wants to be firing off one command after another while cranking through things.</p><p>The second option, which I mostly use, is to whitelist commands individually which are low-impact and then manually inspect ones not on the whitelist. SSH is, in the general case, potentially a very high impact command. The control that I have in here is not internal to Claude; it is internal to the rest of my business. I know what the devbox can do, and that is intentionally less than what my business can do, and so therefore allowing Claude to operate the devbox is <em>relatively</em> safe.</p><p>And I want to say explicitly: <em>relatively</em> safe. If North Korean hackers had that level of access to my devbox, that would be an instantaneous emergency for me. But I trust Claude more than I trust North Korea. And its worth saying that I really do trust Claude, on basis of using it for a few months; it&#x2019;s a very productive junior engineer, which has occasionally made mistakes which cost me, but which does not act <em>maliciously</em>.</p><p>Different engineering orgs will have sharply different opinions about how much they trust modern coding tools, based on org culture, relative strength of the security team versus feature developers, resourcing, and the domain the business operates in. But suffice it to say I have a much more security-focused posture than almost any business with similar revenue and far less security-focused posture than e.g. a bank.</p><p>Which is why I don&#x2019;t use the other method: <em>dangerously skip permissions</em>, where you just let Claude do whatever it wants to on the command line. I&#x2019;ve heard that described as &#x201C;<a href=\"https://www.urbandictionary.com/define.php?term=YOLO\"><u>YOLO</u></a> mode&#x201D;, and for a business which actually touches computers which touch money, YOLO mode is a painful experience waiting to happen.</p><p>Back to the chat!</p><p><strong>Me to Claude</strong></p><p><em>Is there a way by which we can eliminate any login step or other auth for the emails? I see we&apos;re looking for payment links; are those scoped per user here do you think?</em></p><p><strong>Commentary</strong></p><p>&#x201C;Payment Links&#x201D; are a particular product from Stripe, which lets users e.g. update their payment information on a Stripe-hosted web page. Some users of Payment Links cannot write code, and so their Payment Links are one-link-for-all-users; the user is forced to login afterwards. I want the other kind of payment link, which is scoped to a particular user. This has, essentially, a secret in the link, which lets someone immediately in to update a payment method without logging in, expecting that the engineer has guaranteed security in some other fashion. Here the guarantee is &#x201C;I already know you control the email address corresponding to this account, because you are seeing this payment link in, precisely, an email delivered to that email address.&#x201D;</p><p>(I will elide a long discussion of the security of emails here. Suffice it to say that businesses get to make a security versus money tradeoff, and here businesses choose money while tolerating a tiny risk of interception of email. And the Payments Link product is made to be robust; even if a hacker were to gain access to someone else&#x2019;s Payment Link, about the worst they could do is cancel their subscription. Or, I suppose, offer to pay for it. They can&#x2019;t extract a full credit card number from the Payment Link.)</p><p><strong>Claude to me:</strong></p><p><em>Yes, the invoice_url (Stripe&apos;s hosted_invoice_url) is already a direct payment link scoped to that specific invoice - no login required. The customer clicks it and pays immediately on Stripe&apos;s hosted page.</em></p><p><em>The friction point is the member portal link (bitsaboutmoney.com/memberships/#/portal) which requires the Ghost magic link login.</em></p><p><em>&#xA0;&#xA0;For a more frictionless &quot;update payment method&quot; experience, we could generate a Stripe Billing Portal session URL instead. These are:</em></p><p><em>&#xA0;&#xA0;- Pre-authenticated (no login needed)</em></p><p><em>&#xA0;&#xA0;- Time-limited (expires after ~24 hours)</em></p><p><em>&#xA0;&#xA0;- Scoped to that specific customer</em></p><p><em>&#xA0;&#xA0;- Let users update payment method, view invoices, cancel, etc.</em></p><p><em>&#xA0;&#xA0;Would you like me to add billing portal session URL generation? The code would be something like:</em>&#xA0;&#xA0;</p><figure class=\"kg-card kg-image-card\"><img src=\"https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/2026/01/data-src-image-875229f2-2b8a-43b5-a9b0-326c12f67817.png\" class=\"kg-image\" alt=\"Claude Code makes several thousand dollars in 30 minutes, with Patrick McKenzie\" loading=\"lazy\" width=\"1244\" height=\"708\" srcset=\"https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/size/w600/2026/01/data-src-image-875229f2-2b8a-43b5-a9b0-326c12f67817.png 600w, https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/size/w1000/2026/01/data-src-image-875229f2-2b8a-43b5-a9b0-326c12f67817.png 1000w, https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/2026/01/data-src-image-875229f2-2b8a-43b5-a9b0-326c12f67817.png 1244w\" sizes=\"(min-width: 720px) 720px\"></figure><p><strong>Commentary</strong></p><p>We&#x2019;ve now entered the major hard part of the work, from my perspective. ~80% of the actual writing of code is actually done; it was boilerplate to support the identification of payment failures, dashboard for the operator, and sending of emails. THE OTHER 80% of the work is why this hadn&#x2019;t been done despite years of costing me money: it requires fiddly work at the intersection of multiple systems, including what I currently assume to be deep dives into documentation and chasing down edge cases within edge cases.</p><p>And I&#x2019;m letting Claude do that for me, and only gesturing in the direction of what I really want. Claude picks up what I&#x2019;m putting down immediately, and starts brainstorming through engineering approaches.</p><p><strong>My next message to Claude:</strong></p><p><em>Is there a Ghost specific way to send people to a logged-in Ghost instance? (Probably not, but have to ask. Read some docs for me please.)</em></p><p><strong>Commentary</strong></p><p>Here we are working on the part of the email where I want to send people to a Bits about Money page (which is on Ghost) rather than a Stripe page. Partly that lets users see &#x201C;Yep, definitely actually BAM requesting these payment credentials.&#x201D;&#xA0;</p><p>Partly it covers for cases where Stripe doesn&#x2019;t have a Payments Link available for a particular user. What are those cases? <em>Don&#x2019;t know</em>; I&#x2019;m operating <em>defensively</em> here, which is common engineering practice. [<strong>Patrick notes</strong>: Defensive engineering can include preemptively controlling for states which should be impossible in your system because impossibilities happen so distressingly frequently.]&#xA0;</p><p>Note that I explicitly tell Claude that I am uncertain about whether what I want is even technically possible, and ask it to read &#x201C;the docs.&#x201D; I do not point it at the docs; I know it can run web searches.</p><p>It does, and chases down some rabbit holes, including to years-ago forum posts on the Ghost developer forums, issues opened up on Github, and the actual source code of the Ghost system.</p><p><strong>Claude to me:</strong></p><p><em>Good news - there is a way now.</em></p><p><em>&#xA0;&#xA0;Ghost has a /ghost/api/admin/members/:id/signin_urls/ endpoint that generates a one-time login URL. As of</em></p><p><em>&#xA0;&#xA0;October 2024 (https://github.com/TryGhost/Ghost/pull/21284), this endpoint accepts Admin API tokens -</em></p><p><em>&#xA0;&#xA0;previously it required cookie-based admin session auth.</em></p><p><em>&#xA0;&#xA0;So you could:</em></p><p><em>&#xA0;&#xA0;1. Look up the member by email via Ghost Admin API</em></p><p><em>&#xA0;&#xA0;2. Call GET /ghost/api/admin/members/:id/signin_urls/ with your admin API JWT</em></p><p><em>&#xA0;&#xA0;3. Get back a one-time signin URL</em></p><p><em>&#xA0;&#xA0;4. Include that URL in the payment failure email</em></p><p><em>&#xA0;&#xA0;This would let users click straight through to the member portal without the magic link email step.</em></p><p><em>&#xA0;&#xA0;Want me to add Ghost signin URL generation to the payment failure email flow? I&apos;d need the Ghost Admin API</em></p><p><em>&#xA0;&#xA0;key (or I can look for it in the config if it&apos;s already there).</em></p><p><em>&#xA0;&#xA0;Sources:</em></p><p><em>&#xA0;&#xA0;- </em><a href=\"https://github.com/TryGhost/Ghost/issues/16748\"><em><u>https://github.com/TryGhost/Ghost/issues/16748</u></em></a><em> - Documents the fix</em></p><p><em>&#xA0;&#xA0;- </em><a href=\"https://forum.ghost.org/t/admin-api-member-endpoints/40825\"><em><u>https://forum.ghost.org/t/admin-api-member-endpoints/40825</u></em></a></p><p><em>&#xA0;&#xA0;- </em><a href=\"https://ghost.org/help/impersonate-members/\"><em><u>https://ghost.org/help/impersonate-members/</u></em></a><em> - Manual process this replicates</em></p><p><strong>Commentary</strong></p><p>I was surprised and encouraged by this. Claude ground out the research process in 5 minutes of wall-clock time while I was alt-tabbed to Twitter. This is <em>easily</em> an hour of Googling and reading if you do it at human speeds. Engineers have the frequent experience of getting the critical nugget of information in a 3 year old post on a random forum; they generally won&#x2019;t tell you that they needed to ready twenty posts to surface that nugget. Claude did, too, but it&#x2019;s time is cheap.</p><p><strong>Me to Claude</strong>:</p><p><em>Yes, would like you to make this as transparent as possible to the user. Please externalize any interaction with Ghost API into its own lib class. You can stub out a configuration file for the API key; I will create one with appropriate permissions.</em></p><p><strong>Commentary</strong></p><p>A core skill for working with these tools is they do require frequent small amounts of wall clock time. I expected it might take Claude 1-4 minutes to write that code, largely driven by repeated references to documents it would need to read, since this codebase had no prior art on accessing Ghost. I was going to simultaneously use that same time to go to my Ghost instance and provision an API key for the system. My request is drafted to avoid blocking either of us: Claude does its thing, I do my thing, we are working towards the same goal, but neither of us needs to talk to the other until both are done.</p><p><strong>What Claude did next, summarized</strong></p><p>&#xA0;&#xA0;&#xA0;1. Created lib/ghost_api.rb - A new class for Ghost Admin API interactions with:</p><p>&#xA0;&#xA0;&#xA0;&#xA0;- JWT token generation (Ghost&apos;s required auth format)</p><p>&#xA0;&#xA0;&#xA0;&#xA0;- find_member_by_email(email) - Look up member</p><p>&#xA0;&#xA0;&#xA0;&#xA0;- generate_signin_url(member_id) - Get one-time signin URL</p><p>&#xA0;&#xA0;&#xA0;&#xA0;- signin_url_for_email(email) - Convenience method combining both</p><p>&#xA0;&#xA0;&#xA0;&#xA0;- account_settings_url_for_email(email) - Signin URL that redirects to account settings</p><p>&#xA0;&#xA0;2. Created config/ghost.yml.example - Template for API credentials</p><p>&#xA0;&#xA0;3. Added config/ghost.yml to .gitignore</p><p>&#xA0;&#xA0;4. Updated BamSubscriptions to optionally fetch Ghost signin URLs when building payment failure details</p><p>&#xA0;&#xA0;5. Updated the email template to use the Ghost signin URL when available</p><p>Then when testing on devbox, the jwt gem wasn&apos;t installed. Claude added it to the Gemfile as gem &quot;jwt&quot;, &quot;~&gt; 2.5&quot; but it failed because jwt 2.5+ requires Ruby 2.5+, and the devbox runs Ruby 2.3.3. Claude updated to gem &quot;jwt&quot;, &quot;~&gt; 2.2.3&quot; for Ruby 2.3 compatibility, which worked.</p><p>At no point did I have to intervene and tell Claude either a) use Java Web Tokens (JWT) because the Ghost API requires you to do that, b) pick this specific Ruby library for jwt (it can search the Internet and guess what the usual option is), and c) resolve the version conflict. It entirely self-propelled through that. This is the easiest possible versioning issue and would have cost an engineer 5 minutes; more complex versioning issues routinely eat a day.&#xA0;</p><p>It cost me <em>zero seconds</em>, because it was already resolved when I came back with the creds.</p><p><strong>What I told Claude</strong></p><p><em>I have overwritten the sample credential file with real (prod!) Ghost credentials. Rename the file as appropriate and then test against [</em><a href=\"https://www.kalzumeus.com/about/\"><em><u>my email address</u></em></a><em>] , generating a Ghost magic login link. Display that to me but do not attempt to access it; I will verify it works in an Incognito window.</em></p><p><strong>Claude then does so.</strong></p><p>As I watch it work I see it makes a sensible choice that I would not have made. 14 years ago, when this system was originally built, the overwhelming practice of Rails developers was to put their credentials in a configuration file, then check that in with the rest of the codebase. This is no longer considered good practice, because someone compromising a copy of the code could get the production credentials, which potentially have a large blast radius. And so Claude, rather than checking the credentials in, explicitly blacklist the credentials from being checked in, and copied them to the devbox via a different mechanism.</p><p><strong>What I told Claude</strong></p><ol><li>I confirmed in an Incognito window that the link did work and logged me in, but displayed a list of essays rather than the expected payment information, and I wanted to shorten that loop.</li><li>I told Claude I understood its reticence to check in code, but as this is an old legacy system, we don&#x2019;t have a pre-made secure credential store pattern in use yet, and developing one was not a priority for tonight. Instead, just check the credentials in, like old-school.</li></ol><p><strong>Commentary</strong></p><p>Note that Claude will not generally debate you when you give it an explicit instruction like that, even when the explicit instruction reduces one&#x2019;s security posture. This is <em>important</em>. If you want to maximize for security, keep the computer entirely powered off. However, that does not maximize for people successfully paying you money, and so you have to find some balancing point. Here, when an engineer says they have a reason for choosing a particular balancing point, Claude immediately does whatever they say they want.</p><p>You can potentially use Claude in a more exploratory fashion, like I did earlier with regards to APIs that I didn&#x2019;t know existed. Many engineers might not be able to reason through e.g. what is the blast radius of a Ghost credential? Could it cost me money if it leaked? Could it harm other people if it leaked, and if so, how? What is the relative risk of source code being exposed? Is that exposure likely to come from e.g. a hack of Github or e.g. me having my laptop stolen? What are other non-code compensating controls I could put on my laptop to minimize that risk?&#xA0;</p><p>And Claude will happily walk you through these issues like an infinitely patient mid-seniority engineer would. Its answers are, I predict, more consistently right than a lot of people who earn six figures, and wrong often enough that security teams probably don&#x2019;t have to worry about job security in the next few months.</p><p>[<strong>Patrick notes</strong>: This was for pun value, not an insinuation that they have to worry over a 12-18 month timeframe.&#xA0;</p><p>My broad feeling is engineering as a field will grow rather than contract over all reasonably long timescales in the future that I can foresee, rather than engineers generally or in a material subfield being replaced with technology. The reasoning is congruent with the argument referred to as <a href=\"https://en.wikipedia.org/wiki/Jevons_paradox\"><u>Jevon&#x2019;s Paradox</u></a>. Basically, any technology which makes engineers vastly more powerful makes them vastly more valuable to businesses, and rather than decreasing employment of them they will simply find more ways to turn engineers into increased revenue and reduced costs.</p><p>A pithier way to phrase this, that I&#x2019;m fond of: the first AI which comprehensively crushed human engineers at the practice of programming and was supposed to lead to devastation of the field was called a &#x201C;compiler.&#x201D;]</p><p><strong>What happens next</strong></p><p>For the next 15 minutes, Claude and I are mutually driving an exploratory process as I try to coerce Ghost to do what I want to do by manipulating URL parameters. Claude makes frequent reference to Ghost source code; I am mostly copy/pasting to an Incognito window in chrome, trying to access my own account with the magic links that Claude keeps generating using its new API access. We eventually find a pattern which does exactly what I want to do: open to the closest page that will allow someone to update their payment credentials.</p><p><strong>Claude&#x2019;s first response, summarized</strong>:</p><p>Claude searched Ghost Portal source code and found routes including accountHome, accountProfile, etc. It generated a test URL with the query parameter &amp;r=%2F%23%2Fportal%2Faccount (URL-encoded /#/portal/account).</p><p><strong>My response</strong></p><p><em>&#xA0;&#xA0;Didn&apos;t successfully auto-open the portal. I notice that the Ghost-side URL for the portal is</em></p><p><em>&#xA0;&#xA0;https://www.bitsaboutmoney.com/?action=%2Fportal&amp;success=true ... perhaps that will work. Let me try</em></p><p><em>&#xA0;&#xA0;manually fudging the tokenized URL and see if that works.</em></p><p><strong>After a bit more testing and back-and-forth</strong></p><p>Hideous but works:</p><p>&#xA0;&#xA0;https://www.bitsaboutmoney.com/members/?token=[redacted]&amp;action=%2Fportal#/portal</p><p><strong>Claude successfully extracts some changes to its code based on this. However, instead of using /portal, it infers /portal/account is the correct URL.</strong></p><p>I tell Claude:</p><p><em>Not sure where the /account is coming from as I don&apos;t see it in the Ghost UI in my clicking through. But will attempt using that and if it works it works; if not take off the /account part please.</em></p><p>I report that it doesn&#x2019;t work. Claude adjusts URL as appropriate. It now works as well as it will work.</p><p>We then pivot to a new issue, as I&#x2019;m getting pretty close to considering this work ready to go.</p><p><strong>I ask Claude:</strong></p><p><em>Question for you: BAM started charging in January of 2023. If these subs are stale since 2024, then I think the email is a bit out-of-bounds even if user hasn&apos;t formally killed their subscription yet, given my desired relationship with them. I _suspect_ that Stripe Subscriptions (which Ghost uses under the hood) would kill a sub automatically but don&apos;t know that to be the case. Can you investigate from docs what designed behavior is here typically to save me from having to look up [number redacted] people in Dashboard to verify.</em></p><p>Claude then does a web search (&#x201C;Stripe subscription automatic cancellation after failed payment retry attempts behavior&#x201D;), reads the documentation about <a href=\"https://docs.stripe.com/billing/revenue-recovery/smart-retries\"><u>Smart Retries</u></a>, and briefly tries reading Ghost docs about subscription cancellation behavior before finding there is nothing useful there. [<strong>Patrick notes</strong>: Nothing uniquely done by Ghost, I mean.]</p><p><strong>Claude replies:</strong></p><p><em>&#x23FA; Based on the docs:</em></p><p><em>&#xA0;&#xA0;Stripe&apos;s default behavior (configurable in Dashboard &#x2192; Billing &#x2192; Revenue recovery):</em></p><p><em>&#xA0;&#xA0;- Smart Retries: Default is 8 attempts over 2 weeks</em></p><p><em>&#xA0;&#xA0;- After exhaustion: Subscription either cancels or marks as unpaid (your choice in settings)</em></p><p><em>&#xA0;&#xA0;Ghost&apos;s behavior: When Stripe cancels a subscription, Ghost converts the paid member to a free member.</em></p><p><em>&#xA0;&#xA0;The key question: If your Stripe is set to &quot;cancel after retries exhausted&quot; (the typical default), then any subscription showing past_due or unpaid status should be recent failures still in the retry window - not year-old zombies.</em></p><p><em>However, if Stripe is set to &quot;mark as unpaid&quot; instead of &quot;cancel&quot;, subscriptions can linger indefinitely in unpaid status without ever auto-canceling.</em></p><p><em>Quick check: You can verify your settings at:</em></p><p><em>&#xA0;&#xA0;Stripe Dashboard &#x2192; Settings &#x2192; Billing &#x2192; Subscriptions and emails &#x2192; Manage failed payments</em></p><p><em>Or I can query the actual last_invoice_date for these [number redacted] to see if they&apos;re recent or stale:</em></p><p>&#xA0;&#xA0;ssh dev.kalzumeus.com &quot;... rails runner [of the following code]&#x201D;</p><figure class=\"kg-card kg-image-card\"><img src=\"https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/2026/01/data-src-image-bfa2b936-e3e0-4f6a-9f02-cd0bce6c8377.png\" class=\"kg-image\" alt=\"Claude Code makes several thousand dollars in 30 minutes, with Patrick McKenzie\" loading=\"lazy\" width=\"1600\" height=\"406\" srcset=\"https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/size/w600/2026/01/data-src-image-bfa2b936-e3e0-4f6a-9f02-cd0bce6c8377.png 600w, https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/size/w1000/2026/01/data-src-image-bfa2b936-e3e0-4f6a-9f02-cd0bce6c8377.png 1000w, https://storage.ghost.io/c/b3/b2/b3b26a57-5e5d-4e73-b391-44b83d9ec569/content/images/2026/01/data-src-image-bfa2b936-e3e0-4f6a-9f02-cd0bce6c8377.png 1600w\" sizes=\"(min-width: 720px) 720px\"></figure><p>&#xA0;<em>&#xA0;Want me to run that?</em></p><p><em>&#xA0;&#xA0;Sources:</em></p><p><em>&#xA0;&#xA0;- </em><a href=\"https://docs.stripe.com/billing/revenue-recovery/smart-retries\"><em><u>https://docs.stripe.com/billing/revenue-recovery/smart-retries</u></em></a></p><p><em>&#xA0;&#xA0;- </em><a href=\"https://ghost.org/help/what-happens-when-a-member-payment-fail/\"><em><u>https://ghost.org/help/what-happens-when-a-member-payment-fail/</u></em></a></p><p><strong>Commentary</strong></p><p>Here Claude needs to make inferences about the state of my Stripe account. It cannot see it directly, partly for technical reasons and partly because I have made the considered choice to not give it credentials that would allow it to move money. So I copy information between systems to paper over its lack of visibility. Importantly, it has mispredicted what the actual settings were, for a reason even most Stripe engineers would mispredict: this account is one of the oldest accounts on Stripe, and so has legacy behavior baked into settings from more than a decade ago, not the default that more modern-vintage accounts get.</p><p><strong>Me to Claude:</strong></p><p><em>Current setting in Stripe is *I drop in a screenshot of the settings page.*&#xA0;</em></p><p><strong>Claude summarizes it accurately:</strong></p><p>With &quot;cancel the subscription&quot; set, any subscription that exhausts retries gets canceled automatically. So the [number redacted] showing as past_due/unpaid in your dashboard should be recent failures still in the retry window - not year-old zombies.</p><p>That means emailing them is appropriate - they&apos;re actively failing, not long-abandoned.</p><p>&#xA0;&#xA0;If you want to double-check, I can run that query to show the actual last invoice dates for the [number redacted]. But based on your settings, they should all be within the last ~2 weeks (Smart Retries default window).</p><p><strong>Me to Claude</strong>:</p><p>&#x276F; I was not on Smart Retries (old as hills Stripe account; have adjusted that to using Stripe&apos;s &quot;new&quot; behavior rather than the migrated default setting they had from 2010 vintage accounts, which was 3 tries on a fixed schedule). But for hygiene&apos;s sake please do run that query for me.</p><p>Claude then runs &#x201C;disposable&#x201D; code to generate a table of the recently failed payments.</p><p>&#x23FA; All [number redacted] are from the last 15 days - no zombies:</p><p><em>It then shows me a table of each day for the last 15 days, with the subscriber(s) who had a payment failure first that day, showing their current subscription status.</em></p><p><strong>Claude continues:</strong></p><p>All recent, all past_due (still in retry), all appropriate to email.</p><p><strong>I tell Claude:</strong></p><p><em>Spiffy; appreciate the sanity check. Am going to fire these reminder emails ~tomorrow after a) I have a newer BAM to point to and b) Stripe&apos;s automated retry logic, now turned on, has a chance to recover some percentage of them without contact. Refresh my memory on our deploy procedure?</em></p><p><strong>Claude says:</strong></p><p><em>&#x23FA; From CLAUDE.md, the deploy procedure (run from devbox, interactive - requires sudo password):</em></p><p><em>&#xA0;&#xA0;ssh dev.kalzumeus.com</em></p><p><em>&#xA0;&#xA0;cd ~/code/kalzumeus &amp;&amp; git pull</em></p><p><em>&#xA0;&#xA0;# Create and push a new release tag</em></p><p><em>&#xA0;&#xA0;TAG=production_release_$(($(git tag | grep production_release | sed &apos;s/production_release_//&apos; | sort -n |</em></p><p><em>&#xA0;&#xA0;tail -1) + 1))</em></p><p><em>&#xA0;&#xA0;git tag $TAG &amp;&amp; git push origin $TAG</em></p><p><em>&#xA0;&#xA0;# Deploy</em></p><p><em>&#xA0;&#xA0;bundle exec cap -S environment=production deploy</em></p><p><em>&#xA0;&#xA0;# Optional: if Caddy config changed</em></p><p><em>&#xA0;&#xA0;cap -S environment=production caddy:reload</em></p><p><em>&#xA0;&#xA0;Also post-deploy, sync the sent email tracking from devbox to prod:</em></p><p><em>&#xA0;&#xA0;rsync -av dev.kalzumeus.com:~/code/kalzumeus/tmp/bam_sent_emails/</em></p><p><em>&#xA0;&#xA0;/var/www/apps/kalzumeus/current/tmp/bam_sent_emails/</em></p><p><em>&#xA0;&#xA0;(And now also bam_payment_failure_emails/ for the new feature)</em></p><p><strong>Commentary</strong></p><p>This was a low-cost lookup of local docs which I absolutely could have done, but my muscle memory for these questions is increasingly &#x201C;Eh, just ask Claude.&#x201D; rather than reading <em>documents I wrote for myself</em>.&#xA0;</p><p><strong>My closing remarks to Claude, after deploying (which required squashing one tiny bug in the deploy procedure whose solution was so immediately obvious I did it myself without announcing it):</strong></p><p><em>Thanks. Good work tonight; might do some finishing touches in a later session prior to actually sending, but this is looking pretty solid. Appreciate the help as always.</em></p><p><strong>Claude&#x2019;s final remarks:</strong></p><p><em>Thanks! To recap what we built tonight:</em></p><p><em>&#xA0;&#xA0;- Payment failure detection in BamSubscriptions - finds past_due/unpaid subscriptions with recent failed</em></p><p><em>&#xA0;&#xA0;invoices</em></p><p><em>&#xA0;&#xA0;- Dashboard at /private/admin/bam_payment_failures - preview, send individual/bulk emails</em></p><p><em>&#xA0;&#xA0;- Ghost API integration - frictionless signin URLs that open the account portal directly</em></p><p><em>&#xA0;&#xA0;- Rake tasks - bam:send_payment_failure_emails[30] and bam:preview_payment_failures[30]</em></p><p><em>&#xA0;&#xA0;- Email template with your copy, Stripe invoice links, and Ghost magic links</em></p><p><em>&#xA0;&#xA0;Good luck with the sends tomorrow. The [number redacted] are all recent and legitimate targets.</em></p><h3 id=\"my-final-thoughts-on-this\">My final thoughts on this</h3><p>So our conversation recounting this engineering work has probably lasted longer than the actual engineering work took, because my speaking speed is much slower than my reading speed, and because I&#x2019;ve narrated the commentary to you.</p><p>But let me underline: this was an absolutely real problem, which had persisted for years, and where &#x201C;for want of a nail, the war was lost&#x201D; despite the only person working at this company having an engineering degree and easily sufficient skill to <em>eventually</em> arrive at this solution.</p><p>Did it work? Ask my mortgage servicer; the amount recovered here should pay for February.</p><p>[<strong>Patrick notes</strong>: I pushed go on the send before getting in the Lyft to the studio, and by the time I was done with this podcast recording, it had recovered ~$500. &#x201C;Covers the mortgage&#x201D; is not guaranteed at this point but still seems very plausible.</p><p>And yes, pedantically, I know revenue is not profit and the mortgage is paid with post-tax profit, but rescuing earned revenue for a newsletter is about the closest thing to 100% margins that I can imagine. The only cost to reasonably deduct from it is the payment processing fee. Income taxes, well, like many people, I pay my mortgage twice: once to Uncle Sam (and Illinois and <a href=\"https://www.statecraft.pub/p/should-the-feds-bail-out-chicago\"><u>Chicago pension contributions</u></a>) and once to the bank.]&#xA0;</p><p>And ideally neither Claude nor I will ever have to think about this seriously again. After seeing user behavior regarding these emails, I&#x2019;ll write one line of code (called a cron job) to fire them automatically in the future, and payments will simply be semi-automatically rescued in the case where they can&#x2019;t be fully automatically rescued.</p><p>[<strong>Patrick notes</strong>: This took 15 minutes spread across two days because&#x2026; you probably don&#x2019;t care why. Pro-tip: <a href=\"https://www.honeybadger.io/\"><u>Honeybadger</u></a>, my exception monitoring platform of choice, has a built-in deadman&#x2019;s snitch (they call it a <a href=\"https://docs.honeybadger.io/guides/check-ins/\"><u>Check-in</u></a>) to catch issues like, to pick one randomly, a cron job not knowing the correct path to a rbenv-managed executable.</p><p>A deadman&#x2019;s snitch, named after a beautiful point solution to the problem which I am not sure still exists, is an automated notification that fires to you periodically unless another system successfully checks in to disable it. Monitoring cron jobs is a common use case: squelch the snitch if the cron job completes successfully, and have the snitch alert you if it isn&#x2019;t squelched every e.g. day. The name is a play on &#x201C;dead man&#x2019;s switch&#x201D;, which is a safely interlock that disables a machine if the human operator becomes disabled.</p><p>It was also, <a href=\"https://www.military.com/history/russias-dead-hand-soviet-built-nuclear-doomsday-device.html\"><u>famously</u></a> and unfortunately, used in nuclear deterrence, to <em>enable</em> a machine if the human operator becomes disabled, with the goal of disabling human operators of other machines.]</p><p>Today&#x2019;s code solved a relatively small problem in a relatively small business, but there are <em>very many</em> problems shaped like this in the world. The analogous issue bites Fortune 500 companies every day of the year, sized in billions of dollars per year, and most have not fixed it yet for want of a few days of engineering time and meetings between teams and similar.</p><p>Will modern coding tools completely solve their organizational bandwidth problems? I don&#x2019;t think I will make that bet for 100% coverage, but it will certainly be greater than 0% coverage.</p><p>And there are many places in the world where a lot of human welfare is unlocked by a relatively small amount of cognition going from scarce to unscarce. The world does not appreciate how seismic an advance this is.</p><p>Will this be the last seismic advance in coding? If AI capabilities never advanced another inch, that would mean we had somehow hit the smallest imaginable bullseye. Will this replicate across other knowledge work domains? Almost certainly. Perhaps not all, perhaps not instantly, but the world does not yet understand what is coming.</p><p>I&#x2019;m quite optimistic about the future, but will acknowledge, out of a sense of completeness, that many of the people who most understand the shape of reality here are quite worried. And that is a discussion for another day.</p><p>Hope this was useful, and see you next week on Complex Systems.</p>"
