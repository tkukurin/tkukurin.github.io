    "description": "Patrick reads his latest essay about &quot;industrial-scale&quot; fraud and why it should be treated as a professional business process rather than a series of isolated accidents. He explains how fraudsters leverage specialized supply chains&#x2014;shared CPAs, incorporation agents, and &quot;least attentive&quot; banks&#x2014;to loot public funds. Patrick argues that the government&#x2019;s &quot;pay-and-chase&quot; model is fundamentally broken and suggests that simple &quot;proof of work&quot; functions, like a 30-second cell phone video of a workspace, could provide the visceral signal that paperwork lacks, and examines the state&#x2019;s lack of &quot;object permanence&quot; regarding serial fraudsters and how scaled data provides the defense-side advantage needed to catch modern frauds. Complex Systems Presenting Sponsor: Mercury Complex Systems is presented by Mercury&#x2014;radically better banking for founders. Mercury offers the best wire experience anywhere: fast, reliable, and free for domestic U.S. wires, so you can stay focused on growing your business. Apply online in minutes at mercury.com . Mercury is a fintech company, not an FDIC-insured bank. Banking services provided through Choice Financial Group and Column N.A., Members FDIC. Timestamps: (00:00) Intro (05:23) In which we briefly return to Minnesota (09:26) Common signals, methods, and epiphenomena of fraud (09:30) Fraudsters are playing an iterated game (11:29) The fraud supply chain is detectable (14:27) Investigators should expect to find ethnically clustered fraud (20:11) Sponsor: Mercury (21:47) High growth rate opportunities attract frauds (26:04) Fraudsters find the weakest links in the financial system (32:35) Frauds openly suborn identities (35:57) Asymmetry in attacker and defender burdens of proof (40:13) Fraudsters under-paperwork their epiphenomena (44:22) Machine learning can adaptively identify fraud (48:14) Frauds have a lifecycle (50:34) Should we care about fraud investigation, anyway",
    "transcript": "<strong>Transcript:</strong></h2><p><strong><em>Hideho everybody, my name is Patrick McKenzie, better known as patio11 on the internet, and I have a confession: I love fraud. This won&apos;t be any surprise to you if you&#x2019;ve read Bits About Money for a while. Not that I like committing fraud&#x2014;it&#x2019;s an evil act&#x2014;but I just think it&apos;s so intellectually interesting.</em></strong></p><p><strong><em>Partly for the same &quot;viewing NASCAR crashes&quot; reason that people like true crime generally, and partly because fraud is, in its own way, a reflection of how real systems operate. I think there was a bon mot once that </em></strong><a href=\"https://craphound.com/complexecosystems.txt\"><strong><em><u>all sufficiently evolved organisms have parasites</u></em></strong></a><strong><em>. This is true both of organisms in the living sense and any sufficiently evolved complex system. If that system continues to exist, it has evolved sufficient defenses against those parasites.</em></strong></p><p><strong><em>Also, fraud itself is infrastructure. To the extent that we like studying infrastructure because it teaches lessons about other systems, studying &quot;the APIs of evil&quot; allows you to cross-apply learnings to the more important infrastructure in our lives.</em></strong></p><p><strong><em>So, in that general sense of the mission, I&#x2019;d like to read an essay I wrote recently, published on February 6th, 2026. I&apos;ll flag for those of you who don&#x2019;t know: this is a largely nonpartisan podcast and I write in nonpartisan professional spaces, but this does come up against a few socio-political cleavages in the United States. I warn you about that in advance.</em></strong></p><p>There was recently an attempt by an independent journalist to expose fraud in a Minnesota social program. It was deeply frustrating; the journalist had notably poor epistemic standards, which secondary media <a href=\"https://www.npr.org/2025/12/31/nx-s1-5662600/nick-shirley-minnesota-daycare-fraud\"><u>seized upon</u></a> to dismiss their result.</p><p>The class-based sniffing almost invariably noted that prestige media had already <a href=\"https://www.nytimes.com/2025/11/29/us/fraud-minnesota-somali.html\"><u>reported</u></a> stories which rhymed with the core allegation, while sometimes implying that makes the allegations less likely to be true, through a logical pathway which is a bit mysterious to me.</p><p>The journalism went quite viral anyway, in part because of sensationalized framing, in part because of signal boosting by an aligned media ecosystem and aligned politicians, and in part because the journalism develops one bit of evidence that has a viscerality that paperwork dives often lack: these purported childcare operations routinely <em>have no children in them.</em></p><p>Fraud has become quite politicized in the United States the last few years. We had a poorly-calibrated federal initiative led by a charismatic tech entrepreneur which believed it would unearth trillions of dollars of fraud that focused substantial effort on large programs which are comparatively fraud-resistant. <strong><em>I think that was a frequent problem.</em></strong> Across the aisle, we have reflexive dismissal that fraud happens in social programs, which functions as air cover for <a href=\"https://www.startribune.com/federal-prosecutors-charge-six-more-people-in-staggering-social-services-fraud-scandal/601548801\"><u>scaled criminal operations</u></a> which loot many <a href=\"https://medium.com/@marginaliant/a-third-of-my-online-college-students-are-ai-powered-spambots-now-what-91c6e34b5d11\"><u>varied social programs</u></a> and are sometimes <a href=\"https://www.sba.gov/document/report-22-17-covid-19-economic-injury-disaster-loan-applications-submitted-foreign-ip-addresses\"><u>run out of geopolitical adversaries</u></a> of the U.S., including by <a href=\"https://www.cbsnews.com/news/fraud-us-government-theft-60-minutes/\"><u>ambiguously-retired members of their clandestine services</u></a>.</p><p><strong><em>I have a footnote here annotating a report of a surprising number of students using AI to get through their coursework in a California community college. In a thing you will see frequently in fraud investigations, early detection of anomalies does not necessarily imply successful identification of the underlying fraudulent enterprise. A teacher was scandalized that a third of their students are using AI to write papers. These &quot;</em></strong><a href=\"https://abc30.com/post/ghost-students-digital-network-thieves-posing-major-threat-ca-community-colleges/18496090/\"><strong><em><u>students</u></em></strong></a><strong><em>&quot; are actually identities puppeted by a criminal organization to siphon federal funding out of community colleges towards accounts controlled by the criminals. I award myself one cookie for </em></strong><a href=\"https://x.com/patio11/status/1802036665503899781\"><strong><em><u>correctly predicting this</u></em></strong></a><strong><em> on Twitter when the AI paper came out..</em></strong></p><p>I worked in the financial industry for a few years. We do not have the luxury of pretending that fraud is something invented by our rivals to besmirch our good name. It hits the P&amp;L every quarter and will eat you alive if you&apos;re not at least minimally competent in dealing with it. Conversely, it is well-understood in industry that the <a href=\"https://www.bitsaboutmoney.com/archive/optimal-amount-of-fraud/\"><u>optimal amount of fraud is not zero</u></a>.&#xA0;</p><p><strong><em>I get some credit for popularizing that phrase, but Dan Davies originally invented it (or a close snowclone of it) in his book, Lying for Money.</em></strong></p><p>The financial industry has paid at least tens of billions of dollars in tuition here. Overwhelmingly, one learns about fraud in it through an apprenticeship model, with different firms having different internal levels of understanding on the shape of the elephant. The industrial organization presumes small numbers of people architecting anti-fraud systems and relatively larger numbers of investigators and analysts operating those systems on a day-to-day basis.</p><p>There does exist some informal knowledge sharing between firms. If you work in payments, try getting invited to the Chatham House Rule sessions held by... oh yeah, can&apos;t say. Despite that social technology being originally developed for the benefit of government and press actors, it is my general impression that U.S. benefits programs don&apos;t yet see themselves as sufficiently yoked by adversarial attention to benefit from their own Chatham House series. Perhaps that should change.</p><p>And so, for the benefit of fraud investigators with badges, press cards, or GoPros, some observations from a community of practice with an extensive (and mostly nonpublic) body of work. But first a tiny bit of throat clearing.</p><h3 id=\"in-which-we-briefly-return-to-minnesota\">In which we briefly return to Minnesota</h3><p>Minnesota has suffered a decade-long campaign of industrial-scale fraud against several social programs. This is beyond intellectually serious dispute. The <a href=\"https://www.auditor.leg.state.mn.us/sreview/ccap.pdf\"><u>2019 report from the Office of the Legislative Auditor</u></a> (a non-partisan government body) makes for gripping reading. The scale of fraud documented and separately alleged in it staggers the imagination: the state&apos;s own investigators believed that, over the past several years, <em>greater than fifty percent of all reimbursements to daycare centers</em> were fraudulent. (Separate officials took the&#x2026; novel position that they were only required to recognize fraud had happened after securing a criminal conviction for it. Since they had only secured a few criminal convictions, there was <em>no way</em> that fraud was that high. Asked to put a number on it, repeatedly, they declined.)</p><p>The investigators allege repeatedly visiting daycare centers which did not, factually, have children physically present at the facility despite reimbursement paperwork identifying specific children being present at that specific time. The investigators demonstrated these lies on timestamped video, and perhaps in another life would have been YouTube stars.</p><p>Our social class is intensely averse to straightforwardly recounting these facts, partly due to political valence and partly due to this particular fraud being dominantly conducted within a community which codes as disadvantaged in the U.S. sociopolitical context.</p><p>Fraudsters are liars and will cheerfully mouth any words they believe will absolve them of their crimes. If an accusation of racism gets one a free pass to steal hundreds of millions of dollars, they will<a href=\"https://media.kalzumeus.com/bam/fraud-investigator/pacer-feeding-our-future.pdf\"><u> speciously sue you alleging racial discrimination</u></a>. That empirically worked in Minnesota. The OLA takes explicit notice of this multiple times, a coordinator for the fraud operation is <a href=\"https://www.cbsnews.com/news/aimee-bock-minnesota-fraud-feeding-our-future-interview/\"><u>on record explicitly explaining the strategic logic of accusations of racism</u></a>, and a judge was even moved to make <a href=\"https://mncourts.gov/about-the-courts/newsandannouncements/feeding-our-future-v-minnesota-department-of-education-correcting-media-reports-and-statements-by-governor-tim-walz-concerning-orders-issued-by-the-court\"><u>an extraordinary statement</u></a> to clarify that the bad-faith lawsuit alleging racism did not achieve success <em>through the formal judicial process</em> but rather through the voluntary compliance of governmental actors shamed by its allegations.</p><p>(As a side note: One has to be able to hold two thoughts simultaneously about fraudulent operations. They can be sophisticated with respect to exploiting sociopolitical cleavages in their targets while also being comically inept at faking evidence elsewhere, such as having a single person write dozens of adjacent rows in a sign-in sheet. This routinely surprises observers and <em>it should not surprise them</em>.The financial industry <em>also</em> has a division of labor in it. The person architecting the fraud department&apos;s standard processes is well-paid, well-educated, and routinely brings cross-disciplinary expertise to bear. A Fraud Analyst I, on the other hand, bears a lot of similarity to a call center employee in terms of compensation, education, and permitted amounts of agency.)</p><p>In the immediate wake of the independent journalist&apos;s report, the great and the good rallied around the organizations he accused. Of course it was natural that journalists wouldn&apos;t get immediate access to children if they asked. Of course there was a certain amount of informality in the sector. Of course, as the New York Times <a href=\"https://www.nytimes.com/2026/02/03/us/nick-shirley-san-diego.html\"><u>very carefully wordsmithed recently</u></a>:</p><p><em>Minnesota officials said in early January that the state conducted compliance checks at nine child-care centers after Mr. Shirley posted his video and found them &quot;operating as expected,&quot; although it had &quot;ongoing investigations&quot; at four of them. One of the centers, which Mr. Shirley singled out because it misspelled the word &quot;Learning&quot; on its sign, has since voluntarily closed.</em></p><p>An inattentive reader might conclude from this paragraph that the Times disputes Shirley&apos;s reporting.&#xA0;</p><p>To the extent that Bits About Money has an editorial line on that controversy, it is this: if you fish in a pond known to have 50% blue fish, and pull out nine fish, you will appear to be a savant-like catcher of blue fish, and people claiming that it is unlikely you have identified a blue fish will swiftly be made to look like fools. But the interesting bit of the observation is, almost entirely, the base rate of the pond. And I think journalism and civil society should do some genuine soul-searching on how we knew&#x2014;<em>knew</em>&#x2014;the state of that pond, but didn&apos;t consider it particularly <em>important</em> or <em>newsworthy</em> until someone started fishing on camera.</p><p>But this is not a publication about particular ponds. It is a publication about getting better at fishing.</p><h3 id=\"common-signals-methods-and-epiphenomena-of-fraud\">Common signals, methods, and epiphenomena of fraud</h3><h4 id=\"fraudsters-are-playing-an-iterated-game\"><strong>Fraudsters are playing an iterated game</strong></h4><p>The best non-fiction work on fraud is Dan Davies&apos; <a href=\"https://www.amazon.com/Lying-Money-Legendary-Frauds-Working/dp/1982114932\"><u>Lying for Money</u></a>. In it, you&apos;ll find replete examples of something well-known to fraud investigators: the dominant next adventure for a former fraudster is... opening up a new fraud. And therefore, if you want to identify a ridiculously-high-hit-rate list of frauds in round N+1 of a game, a so-easy-its-practically-cheating way to do so is to look at what known fraudsters from round N are doing today.</p><p>There is a genuine difference in the culture and epistemology of the financial industry versus the government of the United States here. In the financial industry, we keep <a href=\"https://developer.mastercard.com/product/match/\"><u>blacklists</u></a> and getting a second chance after obvious misbehavior is intentionally non-trivial. This runs against deeply felt values of civil servants. An accusation is not a conviction, and absent clear authority to impose consequences in a new program, an actor <em>convicted at enormous societal cost</em> emerges to a new program officer as <em>tabula rasa</em>, equal in moral worth to any randomly chosen citizen.</p><p>I will not argue that Mastercard&#x2014;<strong><em>which maintains the MATCH blacklist</em></strong>&#x2014;has better moral intuitions than the Founding Fathers. I would, however, happily suggest that the government not assume that the Constitution contains emanating penumbras obligating it to be repeatedly taken advantage of by the same people in the same fashion.We are not forbidden object permanence.</p><p>Minnesota raided the Sunshine Child Care Center in 2022 on suspicion of overbilling. <a href=\"https://www.kare11.com/article/news/investigations/fraud/past-failed-day-care-fraud-investigations-investigators-say-dhs-refused-to-fully-help/89-6f828871-cbd6-49cd-aa3e-1f373639d9dd\"><u>No charges were brought</u></a>, in what investigators imply was less an exoneration and more an inter-departmental fumble. That operation was owned by one Fowsiya Hassan. A separate childcare center owned by Fowsiya Hassan was featured on YouTube recently. This follows on <a href=\"http://startribune.com/day-care-fraud-minnesota-video/601554760\"><u>$1.5 million of funds received through Feeding Our Future</u></a>, a <a href=\"https://www.justice.gov/usao-mn/pr/federal-jury-finds-feeding-our-future-mastermind-and-co-defendant-guilty-250-million\"><u>scaled fraud operation</u></a> which has generated over <a href=\"https://en.wikipedia.org/wiki/Feeding_Our_Future\"><u>70 indictments, 5 criminal convictions, and 50 guilty pleas</u></a>. What a set of coincidences. Perhaps Hassan has, as she has alleged in a lawsuit, been a frequent target of racially-motivated government investigations into a successful serial entrepreneur in the childcare field.</p><h4 id=\"the-fraud-supply-chain-is-detectable\"><strong>The fraud supply chain is detectable</strong></h4><p>Much of the intellectual energy in policy circles about fraud is aimed at retail-level fraud by individual beneficiaries. Most fraud, like most scaled property crime, is actually the result of a business process.</p><p>This is an elementary fact of capitalism. It is deeply disconcerting to find every benefits program independently rediscovers it a decade too late to do anything about it. Most bread is not baked by amateurs in their kitchens. It comes from a <em>bakery</em> which <em>exists to bake bread </em>and hires <em>specialists</em> in <em>baking bread</em> and then supports them with <em>capital-intensive built infrastructure</em>.</p><p>Fraud develops <a href=\"https://www.bitsaboutmoney.com/archive/the-fraud-supply-chain/\"><u>a supply chain</u></a>. Some elements in the supply chain are dual-use; the bad guys use Excel for the same reason every business uses Excel. Some elements in the supply chain, though, are specialized infrastructure with no or de minimis legitimate purpose. <em>Those elements can be profiled.</em>I worked at Stripe for several years and am currently an advisor there. Stripe does not endorse what I write in my personal spaces. In its own spaces, Stripe has discussed being able to follow fraudulent operations in sufficient detail to determine <a href=\"https://stripe.com/annual-updates/2024\"><u>when the operators went to lunch</u></a>.</p><p>Fraudsters share specialists quite frequently. They use the same incorporation agents, the same mail services, the same CPAs, the same lawyers, etc.&#xA0;</p><p>You can make the same observation about many communities of practice. It is a non-coincidence that many tech startups are at 548 Market Street in San Francisco. 548 Market Street is not the world&apos;s hippest coworking space. It is the address for <a href=\"https://www.earthclassmail.com/\"><u>EarthClassMail</u></a> in SF. There are many P.O. box providers in the world; many geeks with taste reach for ECM. (Bits About Money is <a href=\"https://www.fcc.gov/general/can-spam\"><u>legally required</u></a> to maintain a postal address and, if you were ever to send it a physical letter, that would also end up in the hands of an Earth Class Mail employee.) .</p><p>Elsewhere in the world, there exist P.O. box providers whose customers statistically include fewer AI labs and more frauds. One imagines the specialist-in-fraud at the storefront, picking up the day&apos;s take from fifteen separate boxes.</p><p>Elementary work graphing supporting infrastructure, even on something as unsophisticated as <a href=\"https://x.com/patio11/status/1886922461918248987?s=20\"><u>butcher paper</u></a>, frequently unravels fraud networks. Data science has any number of more sophisticated approaches. Jetson Leder-Luis, an academic who now routinely works with the government, has <a href=\"https://www.complexsystemspodcast.com/episodes/defrauding-government-jetson-leder-luis/\"><u>previously discussed</u></a> some approaches which work based on widely commercially available data sources.</p><p>There is an emerging defender&apos;s advantage here in the age of LLMs, since exploratory work in visualizing and walking network graphs is getting much cheaper. You no longer need to buy Palantir and engage a &quot;forward-deployed engineer&quot; to cluster IP addresses. A non-technical fraud investigator could get an LLM to do that while eating at Chipotle, and the lunch would cost more.</p><p>This democratization of capabilities is relevant to journalists, formal and otherwise, and also to governments. RFPs and software contracting once de facto mandated a multi-year lead time to do an automated network analysis if an analyst thought perhaps their program might need one. Now that is an afternoon&apos;s work, if we allow ourselves to do it. We should.</p><p><strong><em>I&apos;ll share a quick story from a long time ago. I worked at a public-private partnership in Japan. We would send Japanese PhDs to the US for postdoc work. Like everyone else, &quot;Dr. Taro&quot; needed a bank account as soon as he landed, but he had no US history.</em></strong></p><p><strong><em>We found a workaround: a firm that was a discount brokerage but also offered checking accounts. In the regulatory environment at the time, discount brokerages had less KYC rigmarole than banks. I would call up as his &quot;secretary&quot; and open a brokerage account for him from Japan. A few days later, I&#x2019;d call back and say, &quot;I see you offer checking accounts. Dr. Taro is a customer in good standing; can he have one of those too?&quot; It worked perfectly. Years later, I read a regulatory report about that same firm being hit for enabling a large amount of fraud through &#x2026; a relatively similar pathway. I thought, &quot;Well, that tracks.&quot;</em></strong></p><p><strong>[Patrick notes: &#x201C;Was that above board?&#x201D; I considered explaining Hello This is The American Twenty-Something Gopher Attached To The Research Group Which Employs Doctor Taro Who Has Been Dutifully Authorized To Arrange His Affairs During His Secondment Abroad but &#x201C;secretary&#x201D; seemed a lot more respectful of everyone&#x2019;s time.]</strong></p><h4 id=\"investigators-should-expect-to-find-ethnically-clustered-fraud\"><strong>Investigators should expect to find ethnically-clustered fraud</strong></h4><p>As mentioned, there is enormous visceral distaste for the conclusion that a particular fraud ring operates within a particular community. This is quite common. You should expect to find circumstances which rhyme with it when conducting effective fraud investigations. You should not abandon fraud investigation when you chance upon this.</p><p>People assume a level of ethical fraughtness here which is not warranted. You would, if doing ethnographic work on perfectly legitimate businesses across industries, routinely discover ethnic concentration rather than population-level representation everywhere you looked. The <a href=\"https://www.amazon.com/Life-Behind-Lobby-Indian-American/dp/0804778833\"><u>Patels run the motels</u></a>. One doesn&apos;t need to adopt grand theories about how certain groups are predisposed to becoming pharmacists or startup employees or line cooks; simple microeconomic reasoning explains reality easily. Firms hire the people they already know, like, and trust. That will routinely include friends and family, who are going to be much more like the founding team than they are like randomly drawn members of the population. This is <em>the default outcome</em>.</p><p>Fraudsters do have one structural factor here. Everyone wants to trust their coworkers. Fraudsters need to trust their coworkers will be loyal <em>even upon threat of prison time</em>. That necessarily selects for tighter bonds than the typical workplace. Madoff was a family affair, SBF was in an on-again off-again romantic relationship with a chief lieutenant, and neither of those facts is accidental or incidental.</p><p>That&apos;s the other ethical dimension of being other-than-blind to concentration: so-called <a href=\"https://www.sec.gov/about/reports-publications/investorpubsaffinity\"><u>affinity frauds</u></a> do not merely recruit fraudsters from affinity groups; they recruit <em>victims</em> from affinity groups. Madoff mobilized the social infrastructure of the Jewish community in New York and Palm Beach to find his marks. Community members certainly did not <em>intend</em> their charitable foundations to be looted by a fraudster; it was an emergent consequence of trust networks.</p><p>This also happens to &quot;chosen&quot; communities. FTX was, in material part, an affinity fraud against effective altruists, who are not a religion or ethnic group as traditionally construed.&#xA0;</p><p>And so when the great and the good turn a blind eye towards abuses because the perpetrators share an uncomfortable common factor, they are often simultaneously turning a blind eye towards abuses <em>of a community whose interests they purport to champion</em>.</p><p><strong><em>&#x200A;As an aside&#x200A;, this happens in the financial industry as well, and it&apos;s something that you catch formal and informal advice on how to talk about. So for example, the government of North Korea engages in routine attempts at looting the financial industry. Including banks and most recently cryptocurrency exchange. And the crypto ecosystem.</em></strong></p><p><strong><em>You can say, &quot;We&apos;re being targeted by the North Koreans in Pyongyang,&quot; &#x200A;and that&apos;s legal because you&#x2019;re referring to a government and not people and not people whose ethnicities happen to be North Korean. Now, a thing you should not say is, &quot;We&apos;re being targeted by the Armenians in Glendale, CA&quot; even if you are being targeted by an organized criminal group that is overwhelmingly Armenian.</em></strong></p><p><strong><em>&#x200A;Citibank was actually targeted by this organized criminal group, and I think with very high probability that it actually exists in the world. And some Citibank employees said and did some unwise things internally with regards to their countermeasures, that being victimized by this group that was routinely having people&apos;s identities, possibly without the collusion of the people whose&#xA0; identities were used, open up large lines of credit with Citibank and then abscond with all the money.</em></strong></p><p><strong><em>&#x200A;So Citibank did unwise things in describing this internally, and they did some illegal things such as&#xA0; heuristically identifying Armenians by their last names and refusing them credit. That is radioactively illegal in the US. The &#x200A;Consumer Financial Protection Bureau </em></strong><a href=\"https://www.consumerfinance.gov/about-us/newsroom/cfpb-orders-citi-to-pay-25-9-million-for-intentional-illegal-discrimination-against-armenian-americans/\"><strong><em><u>fined them $25 million for it</u></em></strong></a><strong><em> &#x200A;and put them under a consent degree.</em></strong></p><p><strong><em>So you have to hold two thoughts: there really are bad guys, but there are certain ways of describing them that are true to the facts yet will get you in massive trouble if you use it in so many words.</em></strong></p><p><strong><em>&#x200A;One of the things that CFPB points out in the citation for the $25 million fine was that investigators had said, &#x201C;Don&apos;t write down what I&apos;m about to tell you about the bad guys, or what we&apos;re gonna do with them.&#x201D; Now, &#x201C;Don&apos;t write down the crime I&apos;m asking to commit&#x201D; is bad. &#x201C;&#x200A;Don&apos;t write down the following thing which is socially radioactive in the system that we operate in&#x201D;, I think is maybe a little bit less bad. You do have to be able to discuss the bad guys and some commonalities among them.</em></strong></p><p><strong><em>&#x200A;And as mentioned earlier, like it&apos;s an open secret in the financial industry that people who are ambiguously affiliated with the Russian government. And when I say ambiguously affiliated here, I don&apos;t mean like &#x201C;They live in Russia, maybe they meet the government for drinks sometimes.&#x201D; No, they previously had badges at the clandestine services in the Russian government, and they maintain professional connections with people who still have badges to get you into the most secure facilities in that country. And they commit crimes at the best for the Russian government. So, you really have to be able to talk about the Russian state-sponsored activities against financial services organizations to work in defending against, well Russian state-sponsored activities against financial services organizations. But you have to be careful about how you describe that, right?</em></strong></p><p><strong><em>Because you can&apos;t say, &#x201C;The Russians took another whack at us,&quot; because it&apos;s not all of the Russians, clearly. And there are many Russians who are wonderful people and are great consumers of financial services. I don&apos;t think those are two very difficult ideas to keep in one&#x2019;s head at one time. But people sometimes pretend it&apos;s more difficult than it is.</em></strong></p><h4 id=\"high-growth-rate-opportunities-attract-frauds\"><strong>High growth rate opportunities attract frauds</strong></h4><p>As covered extensively in Lying for Money, the necessary fundamental conceit of a fraud is growth in a business that doesn&apos;t happen in the real world. &quot;Every lie told incurs a debt to the truth, and one day, that debt will be paid&quot;, to quote the excellent drama mini-series Chernobyl. Fraudsters forestall that day of reckoning by telling a bigger lie, increasing the debt, which (mostly as a side effect) alleges that they&apos;re growing much faster than most of your legitimate portfolio. Happily, many businesses have figured out how to keep track of fast-growing customers. Tracking rocketships doesn&apos;t require rocket science.&#xA0;</p><p>Sort-by-growth-rate-descending on new accounts will turn up a lot of interesting observations about the world. One is that Fortune 500 companies sometimes open new accounts, and you probably don&apos;t need to open a fraud investigation file in that case. Another is that some people claim to be feeding millions of meals to a community of tens of thousands of people, beginning from a standing start, and growing local social services at a rate which an Uber Eats city manager would not expect to achieve in the wildest dreams of their go-to-market plan.</p><p>Feeding Our Future had a CAGR of 578% sustained for 2 years. Uber, during their meteoric growth period in core rideshare services, had an average CAGR of 226%. Their <em>best year</em> was 369%. But, if you asked in Minneapolis in 2021, you&apos;d quickly find someone who had been in an Uber, but fail to find anyone who ate courtesy of Feeding Our Future. So curious, given that they were drubbing one of the fastest growing companies in history on growth rate.</p><p>Investigators in Minnesota were ringing the alarm bells for years about implausibly fast growth in Feeding Our Future&apos;s reimbursement requests, including at new facilities. Feeding Our Future felt it was maxed out on the fraud it could conduct at existing sites, and expanded voraciously, including (most prominently) enrolling numerous restaurants as &quot;feeding sites.&quot; They then copy/pasted the usual playbook and requested reimbursement for implausible volumes at those sites, paying kickbacks to many participants. This then required growing the fraud, which... you get the general idea. We could have gotten off the bus at many points, and I suppose that is at some level a question of political will.</p><p>The highest growth rates in the economy generally are newer fields (you basically can&apos;t sustain the alternative). This doesn&apos;t imply that those fields are fraudulent, but they will tend to <em>disproportionately attract frauds</em>. The defenders in those fields have not yet paid their tuition to the School of Hard Knocks, and so attackers target the weaker systems.</p><p>The higher growth rates of legitimate businesses function as protective cover for high stated growth rates of illegitimate businesses; a CAGR of 1,000% looks implausible for a restaurant but barely-meets-expectations for an AI software shop.</p><p>And, not to put too fine a point on it, many people are invested, literally and metaphorically, in whatever today&apos;s new hotness is. People who could not secure an allocation in the more legitimate ends of it will sometimes find themselves adversarially selected by less salubrious actors. This will read to those people as a <em>justly earned success</em>. They might even have their marketing department <a href=\"https://web.archive.org/web/20221109025610/https:/www.sequoiacap.com/article/sam-bankman-fried-spotlight/\"><u>write up their victimization</u></a> as an <a href=\"https://www.sba.gov/article/2020/jul/06/sba-treasury-announce-release-paycheck-protection-program-loan-data\"><u>indisputable success</u></a>.</p><p><strong><em>In the essay, I link to Sequoia&#x2019;s profile on Sam Bankman-Fried, this &quot;brilliant young entrepreneur&quot; who played League of Legends in meetings with them. The phrase &quot;indisputable success&quot; is a direct quote from the SBA regarding its pandemic-era programs. That success is not entirely indisputable..</em></strong></p><p>And so, if you&apos;re a defender who has many different lines of business and has limited resources (or political will), where should you deploy those resources? Should you place your bets on e.g. Social Security, a multi-trillion dollar program whose primary source of growth is fun to conjure but then requires 70 years of seasoning? Or should you place them on the <a href=\"https://www.gao.gov/products/gao-23-105331\"><u>Paycheck Protection Program</u></a>, or <a href=\"https://www.gao.gov/products/gao-23-106696\"><u>pandemic-era unemployment insurance</u></a>, or <a href=\"https://oig.hhs.gov/newsroom/media-materials/media-materials-nationwide-genetic-testing-fraud/\"><u>genetic testing</u></a>, or <a href=\"https://www.gao.gov/assets/gao-22-105447.pdf\"><u>non-emergency medical transportation</u></a>? Despite those being smaller line items, they probably have more juice worth squeezing, and the fraud is more easily detectable. Just <em>look</em>.</p><h4 id=\"fraudsters-find-the-weakest-links-in-the-financial-system\"><strong>Fraudsters find the weakest links in the financial system</strong></h4><p>Bits About Money has extensively covered <a href=\"https://www.bitsaboutmoney.com/archive/money-laundering-and-aml-compliance/\"><u>anti-money laundering</u></a> and <a href=\"https://www.bitsaboutmoney.com/archive/kyc-and-aml-beyond-the-acronyms/\"><u>Know Your Customer regulations</u></a> and I won&apos;t rehash those regimes here. A bit of tacit knowledge in the financial industry: some actors in the set &quot;broadly considered trustworthy&quot; are more worthy of trust than others... and some are less. We are generally discreet about writing this down in as many words. But, as an analogy, cross-national regulatory bodies require that financial institutions maintain a list of high-risk jurisdictions to do business in. You are generally required to do enhanced due diligence on customers/activities/etc touching the high-risk list.</p><p>If you are particularly competent&#x2014;and there are plusses and minuses to being competent in detecting fraud (you will <em>not</em> be the most popular person in the firm at bonus time; that goes to the folks who sold the high-growth accounts), you might have the analogous list of U.S. financial institutions which are n<em>ot entirely fronts for the bad guys</em>.</p><p>&#x200A;<strong><em>You might wonder why it is not invariably to your professional credit to be good in detecting fraud. Uh, well, you will not be the most popular person in the firm at the bonus time. That generally goes to the firm suit. The folks who sold the high growth counts again. High-growth accounts look like success until you are presented with unambiguous evidence you were being defrauded. People who owe their bonuses to those accounts will deny the fraud to the last extremity. &quot;Have you met Sam Bankman-Fried? He&apos;s a wonderful guy.&quot; &#x200A;Obviously we weren&apos;t defrauded here. Then, a couple of weeks later, reality sets in..</em></strong></p><p>If one hypothetically has that list, that&apos;s one more signal you can use in evaluating any particular account, and a one-stop shop for developing a list of accounts to look into. It would be uncouth of me to name an extant bank that has poor controls, but for a general example of the flavor, see my (scathing) <a href=\"https://www.bitsaboutmoney.com/archive/debanking-and-debunking/#so-called-choke-point-20\"><u>commentary on Silvergate&apos;s AML and KYC program</u></a>. Without using any proprietary information, I predict confidently that Silvergate banked many more multi-billion dollar frauds as a percentage of its customer base than almost any of the U.S.&apos;s 4,500 banks. (Trivial substantiation: divide FTXs-banked by total-count-of-customers.) .</p><p>One might, if one has never seen the list, wonder whether it is simply proxying for something the financial industry is <em>definitely not allowed to proxy for</em>. One of the first things you learn as a data analyst is zip codes are extremely probative and you are <em>absolutely not allowed to use them</em>. The American system remembers the experience of redlining and has forbidden the financial industry from ever doing it again; the industry mostly respects that. But good news: institutions with weak controls environments are not, in fact, simply a proxy for &quot;Who banks socially disadvantaged people?&quot; There are many financial institutions that have that as an explicit business model. Some of them are good at their jobs. Some, less so, <em>and the fraudsters know it</em>.</p><p>This sometimes happens with the knowing connivance of the financial institution and/or their staff. For much more on that, see <a href=\"https://www.amazon.com/Best-Way-Rob-Bank-Own/dp/0292754183\"><u>histories</u></a> of the savings and loan crisis, or the Lying for Money chapter on control frauds. But more commonly it is simply a community of practice developing organic knowledge about who is just <em>very easy to get an account with</em>. You need accounts, as a business. As a fraudulent business, which intends to cycle through accounts and identities at a much higher rate than baseline, you would prefer to do business with a bank which will not detect that malfeasance.&#xA0;</p><p>And so you will disproportionately end up banked, with many of your buddies, at the least attentive place still capable of getting a license.And so an agency, trying to find a fraudulent network, might want to look at fraud-cases-by-routing-number and then start making some judgment calls.</p><p>One of the reasons the government has deputized the financial industry is it is good at keeping spreadsheets and quickly responds to requests for them. Perhaps the government should call up a few of their deputies and say, &quot;So, not alleging anything here, but we think you might have a list, carefully maintained by your fraud department for your own purposes. We want to see the list. It would be pro-social of you to give us a copy of it.&quot;</p><h4 id=\"frauds-openly-suborn-identities\"><strong>Frauds openly suborn identities</strong></h4><p>There is a thriving market in identities to be used in fraud. This is because bad actors prefer not putting their own names on paper trails certain to become evidence, because they frequently &quot;burn&quot; themselves early in their careers, and because institutions have cottoned onto the wisdom of collecting lists of ultimate beneficiaries.</p><p>Sometimes this is a social process, conducted at e.g. the dinner table. Sometimes the market is explicitly a market. <a href=\"https://www.complexsystemspodcast.com/episodes/defrauding-government-jetson-leder-luis/\"><u>Jetson recounted</u></a> that, having exhausted the supply of patients needing dialysis who could plausibly need ambulance services, frauds began bribing potential patients, first with donuts and then with cash. This is <em>extremely</em> common. In Minnesota, parents were recruited to childcare providers with the promise of cash kickbacks or (a detail we&apos;ll return to in a moment) fictitious paperworked no-show jobs, sometimes at substantially fictitious companies.</p><p><strong><em>Sometimes fraudsters buy corporate identities, too, and it isn&#x2019;t necessarily obvious to involved individuals that something untoward is happening. My wife used to work for a bank and went to the same compliance trainings as everyone else. Years ago, when I was closing down a small business, she said, &quot;Why don&apos;t you just sell it? I saw a flyer that someone will buy a closed business for $2,000 just for the paperwork and bank account.&quot; I had to tell her: &quot;Honey, the people who want to buy that are not good people. We do not want to meet them or take their money, because when the scheme inevitably falls apart, it will be my name on the paperwork.&quot;</em></strong></p><p>Fraudsters <em>sometimes</em> exercise some level of operational discipline in their communications. The bad guys have also seen <em>The Wire</em>; they know Stringer Bell&apos;s dictum on the wisdom of keeping notes on a criminal conspiracy. However, the population of people willing to be named in a federal indictment over $200 necessarily selects preferentially for individuals who are not experts at operational security. They will sometimes organize recruitment very openly, using the same channels you use for recruiting at any other time: open Facebook groups, Reddit threads, and similar. They will film TikTok videos flashing their ill-gotten gains, and explaining steps in order for how you, too, can get paid.&#xA0;</p><p>As a fraud investigator, you are allowed and encouraged to read Facebook at work.</p><p>Now, knowing that there exists the frequent epiphenomenon where fraudsters recruit strawmen to use their identities to qualify for payments: suppose that you have an entirely new enterprise whose first customers are individuals A, B, C, and D. You know, from past records, that A, B, C, and D have all been customers of an organization which you now know, positively, was a fraudulent actor. You might infer from this that A, B, C, and D <em>might</em> have sold their identities once, but you probably don&apos;t have sufficient information to convict them in a court of law of that. (It is of course possible that they are simply unsophisticated, or that bad actors obtained their information without their knowledge, for example by misappropriating a client list from a previous corporate entity they happened to own/work for/etc.)But do you have enough information to take a more-detailed-than-usual look at this totally new enterprise? <em>I think you do.</em></p><h4 id=\"asymmetry-in-attacker-and-defender-burdens-of-proof\"><strong>Asymmetry in attacker and defender burdens of proof</strong></h4><p>We have choices, as the defender, in what levels of evidence we require to enter the circle of trust, what our epistemological standards are, and how much evidence we require to forcibly exit someone from the circle of trust.A detail from the Minnesota cases is that these burdens are asymmetric, in a way which disadvantages the defender (all of us). That decision is a <em>choice</em> and we should make better choices.</p><p>For example, the primary evidence of a child attending a day-care was a handwritten sign-in sheet of minimal probative value. Prosecutors referred to them as &quot;almost comical&quot; and &quot;useless.&quot; They were routinely fraudulently filled out by a 17 year old &quot;signing&quot; for dozens of parents sequentially in the same handwriting, excepting cases where they were <em>simply empty.</em></p><p>To refute this &quot;evidence&quot;, the state forced itself to do weeks of stakeouts, producing hundreds of hours of video recording, after which it laboriously reconstructed exact counts of children seen entering/exiting a facility, compared it with the billing records, and then invoiced the centers <em>only for proven overbilling</em>.</p><p>On general industry knowledge, if you are selected for examination in e.g. your credit card processing account, and your submission of evidence is &quot;Oh yeah, those transactions are ones we customarily paperwork with a 17 year old committing obvious fraud&quot;, your account will be <em>swiftly closed</em>. The financial institution doesn&apos;t have to reach a conclusion about every dollar which has ever flowed through your account. What actual purpose would there be in shutting the barn door after the horse has left? The only interesting question is what you&apos;ll be doing tomorrow, and clearly what you intend to do tomorrow <em>is fraud</em>.</p><p>We can architect the asymmetry in the other fashion: legitimate businesses will customarily, as a fact of their operations, put enormous effort into creating visible effects in the world which are trivial to check. In technologist circles this is sometimes called a &quot;proof of work&quot; function.</p><p>Once upon a time, a team of fraud analysts asked how they could possibly determine frauds from non-frauds without having extensive industry knowledge about every possible commercializable human activity. I suggested that a good first pass was &quot;Just ask the correspondent for a quick video, shot on their cell phone, of their workspace.&quot;</p><p>That is minimally invasive for the business owner, generates a huge amount of signal (including that which can be correlated across accounts), and can be usefully adjudicated by non-specialists in a minute. No multi-month stakeout of their storefront is required. Of course you can convincingly fake a video of working in, say, a machine shop, but fraudsters maintaining spreadsheet row 87 about the machine shop will find that difficult to juggle with all the other required lies in their backlog. Actual machine shops, meanwhile, include people, which means they include functional cell phone cameras at no additional cost to anyone.</p><p>You can also get some signal from who can trivially produce a video and who needs a week of advance notice to find a cell phone to record those machines that were absolutely milling aluminum last week.</p><p>Fundamentally, we have a choice about where we put our investments in defanging fraud, and we should stop choosing to lose.</p><p>So-called &quot;pay-and-chase&quot;, where we put the burden on the government to disallow payments for violations retrospectively, has been enormously expensive and ineffective. Civil liability bounces off of exists-only-to-defraud LLC. Criminal prosecutions, among the most expensive kinds of intervention the government is capable of doing short of kinetic war, result in only a ~20% reduction in fraudulent behavior. Rearchitecting the process to require prior authorization resulted in an &quot;immediate and permanent&quot; 68% reduction. (I commend to you <a href=\"https://marriner-wpmedia.s3.us-west-2.amazonaws.com/wp-content/uploads/2024/08/Dialysis_Ambulance_Fraud.pdf\"><u>this research</u></a> on Medicare fraud regarding dialysis transport. And yes, the team did some interesting work to distinguish fraudulent from legitimate usage of the program. Non-emergency transport for dialysis specifically had exploded in reimbursements&#x2014;see Figure 1&#x2014;not because American kidneys suddenly got worse but because fraudsters adversarially targeted an identified weakness in Medicare.)&#xA0;</p><p>Attackers carefully respond to signals they think they are being sent from defenders. A lawyer for some of the Minnesota defendants, Ryan Pacyga, was <a href=\"https://www.nytimes.com/2025/11/29/us/fraud-minnesota-somali.html\"><u>quoted</u></a> by the <em>New York Times</em> as saying that his clients understood Minnesota to tacitly allow their actions.</p><p><em>No one was doing anything about the red flags.... It was like someone was stealing money from the cookie jar and they kept refilling it..</em></p><p>Don&apos;t be the defender who sends that message. It will not work out well for you or your program.</p><h4 id=\"fraudsters-under-paperwork-their-epiphenomena\"><strong>Fraudsters under-paperwork their epiphenomena</strong></h4><p>Most frauds have rich external lives, with a soaring narrative of how deserving people are getting valuable services (and/or getting rich for being right and early regarding e.g. crypto asset cross-margining). They tend to be distinctly underpaperworked internally, partly because a synonym for &quot;paperwork&quot; is &quot;evidence&quot; and partly because... most frauds aren&apos;t really that sophisticated, when it comes down to it. There is a true number; lie about it; <em>done</em>.</p><p>Like many time-pressed entrepreneurs busy talking to potential customers, fraudsters put the minimal amount of time necessary into bookkeeping and even less than that into paperworking epiphenomena of their frauds. One example of epiphenomena is sometimes the beneficiaries need <em>their own</em> paperwork. A legitimate mortgage company employs sales reps and a backoffice to help unsophisticated customers successfully get <a href=\"https://www.bitsaboutmoney.com/archive/mortgages-are-a-manufactured-product/\"><u>several hundred pages of paperwork together to sell a mortgage</u></a>. Frauds... mostly don&apos;t do that.</p><p><strong><em>As an aside for connoisseurs of the 2008 financial crisis: during a bubble, the detected rate of fraud explodes and gets increasingly brazen. Why do the work of getting 700 pages for a mortgage when you could get a &quot;NINJA&quot; loan (No Income, No Job, No Assets)?</em></strong></p><p><strong><em>Non-specialists misunderstand what a &quot;NINJA&quot; loan is. It doesn&apos;t mean the person has no income; it means they have no income they are able to substantiate in paperwork&#x2014;or they haven&apos;t done the work to substantiate what&apos;s claimed. One of the post-2008 controls was: &quot;No, really, these requirements to paperwork mortgages are actually requirements,&quot; and we no longer turn a blind eye to that.</em></strong></p><p>And so, if you have e.g. a statutory requirement that a beneficiary be employed to access services, a fraudster might say &quot;Don&apos;t worry about it!&quot; They&apos;ll just assert that you are an employee at a cleaning company. Perhaps they might even go as far as <em>payrolling</em> you as an employee of a cleaning company. This kills two birds with one stone, paying you your kickback while also generating the paystub they need you to have to qualify for the government reimbursement. (This happened, per the OLA&apos;s reports summarizing the results of many investigations, in Minnesota.)</p><p>But fraudsters <em>don&apos;t actually operate cleaning companies</em> even in those cases where they <em>do operate daycares</em>.&#xA0;</p><p>Cleaning companies are legitimate businesses, in the main, and working for one is an honest occupation. And so a fraud investigator should feel no chagrin at calling a cleaning company in the phone book and asking for a quote. A cleaning company which expresses complete befuddlement that someone could ask for a quote is providing, ahem, evidence in a direction.</p><p>(I have to note, as someone who pays to send children to a private school, that there is replete evidence that the school is accepting new children, knocking on the door and asking will quickly result in being given a brochure, and there are scheduled open houses and similar. I can imagine a gratuitously mismanaged educational establishment which does none of these things, and I can imagine an educational establishment which makes a lot of money, but I have trouble holding both thoughts in my head at the same time).</p><p>The core frauds are sometimes hardened, to an attenuated degree. The peripheral frauds collapse under even a glance. Architect processes to require more signals regarding the periphery, then architect a system which takes at least a cursory look at the periphery. You will trivially catch frauds.</p><p>If you&apos;re worried about exposing the exact signal that you are using, costing utility of it in the future, you can use this as a &quot;parallel construction&quot; engine. Develop leads for investigation using the non-public signal, pull the core records as a matter of routine, find the discrepancies that all frauds leave in their core records, and then put those in the indictment. Ask your friendly neighborhood lawyer if that passes muster or if you need to add a sentence rhyming with &quot;was selected for a routine audit on the basis of information available to the department.&quot;</p><h4 id=\"machine-learning-can-adaptively-identify-fraud\"><strong>Machine learning can adaptively identify fraud</strong></h4><p>We have discussed some heuristics [1] for identifying fraud. The financial industry still makes material use of heuristics, but a heuristic is a compression of the real world. It will sometimes lose fidelity to the world. It will frequently, <em>by design</em>, be legible to the adversary.</p><p>The defender has one advantage the attacker cannot ever replicate: data at scale. It knows what legitimate use looks like because it has all the messy, contradictory, varying quality, typos-and-all data<a href=\"https://www.bitsaboutmoney.com/archive/mortgages-are-a-manufactured-product/\"><u> which legitimate businesses in the real world constantly throw off</u></a>. You cannot duplicate all of the shadows on the wall of Plato&apos;s cave without first duplicating the entire world. Fraudsters, even quite talented ones, can&apos;t do that.</p><p>There are any number of techniques for machine learning in anti-fraud; <a href=\"https://www.complexsystemspodcast.com/episodes/the-past-present-and-future-of-ai-with-stripe/\"><u>Emily Sands has previously discussed some with me</u></a>. An important subset of the field can adapt in real-time or close to it to changes in adversary (or legitimate!) behavior. For example, COVID surprised the fraudsters at the same time as it surprised every supermarket in the country, but the ex-post actions of the fraudsters and the supermarkets were <em>very different</em>. Revenue went up for both, but only one group <em>actually runs a supermarket</em>. And so by ingesting and constantly analyzing data from all users, including retrospective annotation of which users you&apos;ve identified to be frauds, you get better<em> and earlier</em> signals on which users are likely fraudulent and which are likely not.</p><p>This can inform outright interdiction or the investigate-then-punish loop that we ordinarily expect from government. It can also inform less consequential, easier-to-reverse interventions. For example, rather than putting all users immediately through the highest-possible-ceremony process for application, you can let most users do a lower-burden process, saving the higher levels of scrutiny for those which signal greater likelihood of being fraudulent. Or you can default to approving more applicants and reserve more of your investigatory budget for post-approval review, with this being equivalently costly by using better tasking of those reviews versus random allocation. Pay-and-chase becomes more palatable if it is not pay-and-pay-and-pay-and-pay-and-chase and more pay-until-we-decide-to-chase-but-stop-payments-at-that-decision-not-after-the-catching.</p><p>Machine learning isn&apos;t simply useful from a perspective of decreasing fraud. The history of regulation of benefits programs is the history of too-late, too-harsh overcorrection to notorious abuses. Much of what advocates find most maddening and Kafkaesque about eligibility criteria and application processes was voted on by a legislature but bears the signature of a fraudster with a novel idea.</p><p>With a good machine learning practice, you can increase data ingested but decrease the burdensome formal application/etc requirements. This is in no small part because those data points are less probative (they are under the direct control of the attacker and <em>announce</em> that they will be scrutinized). But it bears a dividend: if you better control fraud, and can successfully demonstrate that to the public and legislators, you can <em>decrease application burden</em> and perhaps even <em>widen eligibility criteria</em>. Those are both in the direct interests of potential marginal beneficiaries.</p><p><strong><em>As a callback, this is why affinity frauds victimize their own group. If you care for people who need government-sponsored daycare in Minnesota, you should care intensely that fraudsters are stealing half those dollars and causing the government to interdict the other half for legitimate providers.</em></strong></p><p>A political commentator might focus more on the optics here than on the substance, because that is so frequently where the point of actual leverage is in politics. But the substantive reality of fraud losses <em>matters</em>. It is much easier to tell the story of fraud in benefits programs being rare, opposed by all right-thinking people, and swiftly sanctioned when that story is not <em>an obvious lie</em>.</p><h4 id=\"frauds-have-a-lifecycle\"><strong>Frauds have a lifecycle</strong></h4><p>You can read Lying for Money or other histories of frauds for more detail on the texture, but in the main, a dedicated fraudulent enterprise is created, is seasoned for a while before crossing the Rubicon, has a period of increasing brazenness, is detected, is closed, and then is resurrected when the fraudster gets the band back together for round N+1.</p><p>We can intervene against the lifecycle model if we understand it. This begins with not defaulting to the understanding of investigators that frauds are isolated incidents by disparate individual actors. Those have been known to happen, but frauds are, by total damage, dominated by repeatable business models perpetrated by professional specialized bad actors. We should study them like we study other successful entrepreneurs, and then <em>not</em> invest in them.</p><p>One actionable insight from the lifecycle model: because the fraudster intends to be in business multiple times in their life, we should track the person-to-business mapping much more closely than we have historically. As Lying for Money says, if you&apos;re an accountant and willing to go to prison, and you do not get rich via fraud... well, you are very bad at your job. That&apos;s on you. When we give you <em>repeated chances to do it</em>, that&apos;s on us.</p><p>One might think that the simplest imaginable reform is passing some sort of beneficial ownership regulation to unroll complex corporate structures designed to obscure who is actually puppeting Totally Not A Fraud, LLC. But the simplest imaginable reform is probably just <em>actually reading</em> corporate filings that already exist and are public. Again, most fraudsters are not the hypersophisticated Moriarties of the popular imagination. The Minnesota fraudsters frequently do not even bother with fig leaves. While they did find some nominee directors in some cases, many of the convicted operated their companies in their own names, with no complicated structuring at all. Sometimes multiple times, consecutively, after the previous entities had worn out their welcome with Minnesota.</p><p>The Fed should not be <a href=\"https://www.federalreserve.gov/newsevents/pressreleases/files/enf20230817a1.pdf\"><u>surprised when the bad guys buy a bank</u></a> when buying a bank requires an extended permission-seeking process and the bad guy&apos;s corporate records, dutifully recorded by <a href=\"https://egov.maryland.gov/BusinessExpress/EntitySearch/Business\"><u>Maryland</u></a> (entity D20033544), are signed by a notorious bagman. In the Fed&apos;s defense, the bagman lied to them about his intentions, which was outside of their world model. (Pip pip to the <em>New York Times</em> for <a href=\"https://www.nytimes.com/2022/11/23/business/ftx-cryptocurrency-bank.html\"><u>figuring that out</u></a> before the Fed did. That is, sadly, not the usual way it works in financial journalism.)</p><h3 id=\"should-we-care-about-fraud-investigation-anyway\"><strong>Should we care about fraud investigation, anyway?</strong></h3><p>Responsible actors in civil society have a mandate to aggressively detect and interdict fraud. If they do not, they cede the field to irresponsible demagogues. They will not be careful in their conclusions. They will not be gentle in their proposals. They will not carefully weigh consequences upon the innocent.</p><p>But they will be telling a truth that the great and the good are not. The public will believe them, because the public believes its lying eyes.</p><p>And that&apos;s all we have for today. See you next week on Complex Systems.</p><hr><p>[1] A heuristic, in industry parlance, is a hard-coded rule or set of rules as opposed to a system which automatically adapts to changes in the underlying data. Compare the difference between &quot;You are less likely to default on loans if you own versus renting,&quot; which is absolutely demonstrable in aggregate data, versus &quot;You are less likely to default on loans at 780 FICO versus 540 FICO.&quot;&#xA0; For a variety of reasons, the culture that is legislators sees the problem with having one heuristic, which will obviously not come to the correct conclusion all of the time. It corrects for this issue by having several hundred pages of heuristics. Just one more heuristic, man, and we&apos;ll have completely anticipated all the complexity of the world. Heuristics are wonderful things! They&apos;re cheap to adjudicate, easy to explain, and can be understood by lawyers, even the kind who have ascended from the practice of law to the writing of it. Happily, machine learning systems can have all of these properties if you make them priorities.</p>"
