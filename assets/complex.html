    "transcript": "<p>Welcome to Complex Systems, where we discuss the technical, organizational, and human factors underpinning why the world works the way it does.</p><p>Hideho, everybody. My name is Patrick McKenzie, better known as patio11 on the internet. One of my eclectic interests is that I used to keep a folder of public sector payroll project implosions dating to the early 2000s, because they happened frequently enough to come up on my message boards that I wanted to not need to AltaVista the postmortems every time I discussed them.</p><p>We&#x2019;ve recently seen some news stories from Rhode Island, where there is a <a href=\"https://www.elevatiq.com/post/state-gov-erp-payroll-failure-rhode-island/\"><u>nearly $100 million failed deployment</u></a>; Nashville, which is <a href=\"https://www.wsmv.com/2026/03/27/metro-council-hold-special-joint-committee-hearing-address-oracle-payroll-system-failure/\"><u>holding a hearing</u></a> on the date of this recording; and of course Phoenix in Canada, one of the most famous such implosions, which is nearing its ten-year anniversary and is still nowhere close to green.</p><p>So I thought I&#x2019;d briefly discuss one geek&#x2019;s take on why public payroll modernization is even more doomed to failure than the broader class of government IT procurement projects. And then I&#x2019;ll read an essay from Bits About Money on what payroll is anyway, and why the political economy of your nation guarantees a specialist class of firms is necessary to administer what many people assume are simple spreadsheets.</p><h3 id=\"why-government-payroll-projects-keep-failing\">Why government payroll projects keep failing</h3><p>One of the bookmarks in my folder links to the San Francisco Chronicle: &#x201C;<a href=\"https://www.sfchronicle.com/opinion/openforum/article/sfusd-teacher-payroll-san-francisco-bureaucracy-18000777.php\"><u>San Francisco Can&#x2019;t Pay Its Teachers.</u></a>&#x201D; They found 64 bugs. They made a $15.8 million mistake, et cetera, et cetera, et cetera. There are dozens of stories like this.</p><p>What are the commonalities? Well, partly you can refer back to the <a href=\"https://www.complexsystemspodcast.com/episodes/fixing-government-technology-with-mikey-dickerson/\"><u>Mikey Dickerson episode</u></a>, and our other episodes with respect to government procurement of software projects. They have all the usual issues that those usually have.</p><p>The government picks a vendor, or several vendors. The project is almost ludicrously underscoped. The project fails on delivery. There is vastly too much waterfall delivery versus any plan to iterate after the initial receipt of the software. And then everyone goes into hair-on-fire mode after the project becomes unusable. Ten years later you&#x2019;re still manually cutting checks to people while dealing with lawsuits from affected stakeholders and trying to figure out: who can we pay billions of dollars to correctly administer payroll?</p><p>[<strong>Patrick notes</strong>: This is in no way an exaggeration. Phoenix, the Canadian federal government&apos;s payroll system, has cost $4.34 billion over the last decade, with an additional $521 million budgeted for 2026-27. As of early 2026, 233,000 pay transactions remain in the backlog, 1,800 full-time workers are dedicated to clearing it, and the replacement system (Dayforce) isn&apos;t expected to be fully operational until 2030. IBM, which designed and deployed Phoenix, has received over $851 million. See the CBC&apos;s<a href=\"https://www.cbc.ca/news/canada/ottawa/federal-phoenix-pay-system-10-year-anniversary-9.7093933\"> <u>reporting on the ten-year anniversary</u></a> for a full accounting.]&#xA0;</p><h3 id=\"the-root-cause-rules-nobody-can-write-down\">The root cause: rules nobody can write down</h3><p>What&#x2019;s the root cause? Why do these projects fail so frequently, and why do they fail in the same direction? Because of all the bookmarks I have, of all the postmortems I&#x2019;ve ever read, I never seem to find the case where the problem is that we consistently <em>overpaid</em> government employees relative to expectations.</p><p>It&#x2019;s always the complaint that we&#x2019;re getting underpaid relative to expectations. Why?</p><p>Well, what the government will usually tell its vendor of choice is: &#x201C;You need to implement all the rules we have for payroll.&#x201D; And the vendor will say, &#x201C;Great, give us all the rules.&#x201D; And the government will say a true thing, which is: &#x201C;We don&#x2019;t have a single document which lists all the rules.&#x201D;</p><p>We have a complex collective bargaining environment here. Often there are multiple different unions involved, and we have decades upon decades of contracts, which together with the side letters, the law, and perhaps the constitution of the state, plus a large body of undocumented <em>actual practice</em>, make up the <em>true</em> payroll rules.</p><p>And your job is to find out what those true rules are. The contractor says, &#x201C;Oh wow, great. That sounds like a whole lot of billable hours. So I&#x2019;m going to get into a room with your existing payroll experts. I&#x2019;m going to ask them questions. I&#x2019;ll write down the answers, and I&#x2019;ll come up with a list of payroll rules.&#x201D;</p><p>This sounds great.</p><p>This is impossible to do, and why is it impossible? Well, as a political decision, we do not allow the government to understand how generous the government is to government employees. As a revealed preference in the United States and many other nations, the number one priority of government subdivisions is to pay their employees. And then, as number two, to the extent it doesn&#x2019;t conflict with number one, delivering services to the citizenry is mostly welcome.</p><p>As a result, there are things which local experts are extremely, extremely aware of, which will not be surfaced in your fact-finding mission. But you are certain to get complaints when paychecks are shorted because they do not include the 1972 Side Letter 2, for employees who are doing service on Good Friday in the city of Chicago, which is barely an exaggeration from the specificity there. The actual rules are as specific as: is a meter maid made eligible for 1.5x hours worked, or 1.75x hours worked, on the following holidays, of which Good Friday is one.</p><p>Your payroll system <em>needs an answer</em> to that question.</p><p>You&#x2019;ll have to do a lot of archival archaeology to find a very specific answer to that very specific question. And sometimes the archival archaeology will find a document which lists the answer. Which, how to say this gently: that rule may not be the rule. The actual rule is the way we do things in this department. And the way that we do things in this department is, well, we&#x2019;ve always done it <em>this</em> way.</p><p>And if you walk that back, you&#x2019;ll have some extremely enraged stakeholders, some of whom are quite senior. And so your job as a project manager for the government payroll modernization sometimes includes writing down a list of frauds against the public, which you are not allowed to title &#x201C;list of frauds against the public.&#x201D;</p><h3 id=\"fraud-in-plain-sight-pension-spiking\">Fraud in plain sight: pension spiking</h3><p>And it seems like I&#x2019;m making a somewhat robust claim there. I am actually making that claim. I think there is a routine amount of fraud against the public in the administration of public payrolls.</p><p>And to just slightly contextualize the claim, let me point to an example in the private sector where there is something that happens which is fraud-adjacent, but which is just so allowed in our social class that no one would describe it as fraud-adjacent.</p><p>If you are a member of the professional managerial class, you probably routinely travel for work. The company has a travel policy, et cetera, et cetera. You have discretion on arranging the timing of the travel and the vendors you use for it. Usually, unless your department has a team of people working internally that handles your travel, which some large corporations do, a lot of corporations will say, &#x201C;Just buy your ticket and expense it.&#x201D;</p><p>It is the routine practice of many people in the American professional managerial class to pick a travel vendor, an airline or a hotel, where they have a personal account for loyalty points. They will spend corporate resources to simultaneously accomplish the corporate need of getting their brain into the meeting room in whatever city they&#x2019;re having the meeting in next week, while also getting private benefit from that expenditure of corporate resources: the points which they will later use on a vacation.</p><p>If you get a vendor kickback from someone you are purchasing servers from and your employer detects that, you are going to get fired out of a cannon, and you&#x2019;ll be lucky if you ever get a job again. It wouldn&#x2019;t even be surprising if you were prosecuted for that. On the other hand, if you get United Airlines miles, everyone gets United Airlines miles. That&#x2019;s just the way the world operates.</p><p>In the public sector, there are a variety of &#x201C;this is just the way the world operates&#x201D; behaviors which are fraud-adjacent. The one which I feel most strongly about is pension spiking.</p><p>So if you are not a long-serving California public servant, here&#x2019;s how pension spiking works. You have a contractual right with your employer to a pension at the conclusion of your long and distinguished career in government. How much money is that pension?</p><p>Well, at the start of your career in government, it&#x2019;s difficult to tell you. We&#x2019;ll tell you the formula in advance, but we don&#x2019;t know where it&#x2019;s going to end up because we don&#x2019;t know what you&#x2019;ll do in the course of the next 20, 30, or 40 years with this department. So we&#x2019;ll say the formula is: we&#x2019;re going to take your final three years of income, we will average them, and then we will index your pension to some percentage of that average based on your job classification.</p><p>And so pension spiking is being aware that your pension is determined based on your income in the last three years of your service to the government, and knowing in advance what those last three years are.</p><p>You will, in the course of those final years, aggressively arrange to work as much overtime as possible. And you might do things like arranging your work assignments such that you are working at a higher grade temporarily, temporarily serving as the chief of the department, which you were not actually the chief of the department for the last couple years of your career.</p><p>[<strong>Patrick notes</strong>: A bug which has been reported in some payroll deployments is incorrectly calculating &apos;acting pay&apos;, where one is &apos;acting as&apos; a rank that one does not actually occupy. Many scoping documents have not successfully identified the senior executives who are subject matter experts on <em>exactly</em> how much compensation an employee in their agency is entitled to for acting pay.</p><p>Phoenix in Canada is a canonical example: the Auditor General<a href=\"https://www.oag-bvg.gc.ca/internet/English/parl_oag_201711_01_e_42666.html\"> </a>found that one in four outstanding pay requests related to acting pay, and that even after the system nominally supported it, 40% of acting pay requests still required manual processing. While acting pay might seem like a bit of an edge case, <a href=\"https://policyoptions.irpp.org/2024/09/acting-pay-phoenix/\"><u>public commentary</u></a> mentions there are more acting pay requests annually than the total count of employees.</p><p>See generally the Auditor General of Canada&apos;s Fall 2017 Report 1, &apos;Phoenix Pay Problems&apos; (summarized <a href=\"https://www.canada.ca/en/treasury-board-secretariat/corporate/reports/tbs-response-oag-report-phoenix-pay-problems.html\"><u>here</u></a>; we wish the Auditor General&apos;s technical staff the best of luck and skill with respect to the present outage).]&#xA0;</p><p>And perhaps you will have the social cooperation of people next to you in the department who also understand how pension spiking works and also understand that everyone in this department aggressively maximizes for the last three years of compensation. And so, since they know you&#x2019;re leaving in three years, now would be an excellent time to temporarily jump you up in rank.</p><p>And then you will have a briefly higher spike of compensation in the last three years, say, an average of $100,000 more than the typical compensation earned in the last ten years of your career. And then that will entitle you to something where the net present value of those payouts over the course of the rest of your life after you retire is seven figures of public funds.</p><p>And this is the widespread behavior of people, particularly at a certain level of sophistication in the executive class within departments.</p><p>Is it illegal? There have been attempts to restrain it in particular jurisdictions, but attempts to restrain it run against the issue where all the people who are doing the restraining, this fraud is a material portion of their total career compensation. And so you can&#x2019;t simply make the fraud illegal, and you can&#x2019;t simply prosecute people for the fraud they have committed, because the prosecutors are committing fraud. Literally. And the police chiefs and the executives in charge of your local government auditor and similar.</p><h3 id=\"the-information-theory-problem\">The information theory problem</h3><p>That is the biggest reason that government payroll modernization projects fail. It&#x2019;s operationally difficult to describe the totality of how government wants to compensate people without reproducing the entire government function itself. This is an information-theoretical problem. And one of the reasons, among many, that it is difficult to create that description is that the description wouldn&#x2019;t necessarily surface evidence of frauds against the public.</p><p>And so theoretically, if you&#x2019;re replacing public payroll with a much simpler system that more closely matched the compensation schemes of private employees in roughly similar job classifications, it would be, you know, a 12-engineer project for six weeks. But that would be a fundamental restructuring of how government works in the affected area.</p><p>And no one budgets for that. They budget for: &#x201C;Well, we just need a software project done, and we&#x2019;re going to get the software project done by the cheapest people capable of delivering the software project.&#x201D; And then they&#x2019;ll buy a bit of compliance-oriented labor in responding to RFPs, et cetera, on top of that. But that can&#x2019;t make it a hugely expensive project. Right?</p><p>And then your Rhode Island nearly $100 million payroll modernization just blew up on you. And you are the latest in a long, long line of project managers for payroll modernizations who did not read the postmortem of other payroll modernizations.</p><p>One of these days I want to write the meta-postmortem: &#x201C;Hey, if you are doing a government payroll modernization, here&#x2019;s the reason your project is going to fail. I&#x2019;ll just tell you before you start.&#x201D; But I haven&#x2019;t gotten around to writing that essay yet.</p><p>Alright, so sorry for being Debbie Downer about government payroll modernization projects. Government payroll is probably a double digit percentage of all payroll in the world, but is not the totality of the payroll industry.</p><p>Most people who are listening to this podcast who have received a paycheck have probably received that paycheck from a non-government entity, and that paycheck probably went through a payroll provider. Why?&#xA0;</p><p>Well, I&#x2019;m glad you asked. Here&#x2019;s the essay.</p><h3 id=\"essay-%E2%80%9Cpayroll-providers-power-respect%E2%80%9D\">Essay: &#x201C;Payroll providers, Power, Respect&#x201D;</h3><p>Originally published in <a href=\"https://www.bitsaboutmoney.com/archive/payroll-providers-power-respect/\"><u>Bits About Money</u></a>, December 20, 2023.</p><p>The title references a<a href=\"https://en.wikipedia.org/wiki/Money,_Power_%26_Respect\"> <u>famous rap song</u></a>: &#x201C;Money, power, and respect / First you get the money / Then you get the #$(#%in&#x2019;, power / After you get the #$#(%in&#x2019; power / Mutha*#(%#%s will respect you.&#x201D;</p><p>We recently covered the<a href=\"https://www.bitsaboutmoney.com/archive/the-long-shadow-of-checks/\"> <u>long shadow that checks cast</u></a> on modern financial practice. The most important genre of check historically was the paycheck, settling an employer&#x2019;s liability to their employee for services rendered. Most paychecks (and direct deposits, and earned wage access vehicles, and similar) are not sent directly by employers, but instead go through a payroll provider. Payroll providers are the original financial technology company, and were some of the first scaled adopters of computers generally.</p><p>You have almost certainly depended on payroll at some point in your life and probably never thought much of it. And it is fascinating! Let&#x2019;s discuss a bit of history, a bit of politics, a bit of financial technology, and a heavy, heavy dash of extremely boring schlep in service of larger societal goals.</p><p>A bit of a disclaimer off the top: I&#x2019;m indebted to a discussion with Ian Zapolsky at Check about some of the history and current practice of payroll processing companies. Check received an investment from Stripe, where I am an advisor (and past employee). Neither Check nor Stripe necessarily endorses what I write in my own spaces. Any errors in fact are, as always, my own. Credit for taste in financially-oriented rap music goes to ChatGPT.</p><p><strong><em>And I&#x2019;ll add one additional non-contemporaneous disclaimer: sometime after the original publication of this essay, CheckHQ did sponsor this podcast for a while. But as always, sponsorship decisions do not drive what I cover or the editorial line. See the episode where I once covered </em></strong><a href=\"https://www.complexsystemspodcast.com/episodes/editorial-standards-and-independence/\"><strong><em><u>editorial standards and independence</u></em></strong></a><strong><em>.</em></strong>&#xA0;</p><h3 id=\"why-does-payroll-exist-anyway\">Why does payroll exist, anyway?</h3><p>Payroll, as an institution, exists to support the deputization of (mostly private) employers as tax collectors by the state.</p><p>In the United States, prior to the Civil War, almost all federal spending was funded by tariffs on alcohol or tobacco. The war was extremely intense and expensive, and the winners mostly chose to fund it by instituting a temporary income tax, at a flat rate of 3% of income above a relatively generous threshold. This might or might not have been legal, strictly speaking, much like the contemporaneous suspension of habeas corpus, but needs must when the future of the nation is on the line. (A note to non-American readers: you can Google this if you want to get into fascinating minutiae of U.S. history, but take note that a disturbing percentage of authors who are extremely invested in Abraham Lincoln&#x2019;s supposedly tyrannical behavior on taxation are using that to distract the reader from the institution of slavery.)</p><p>The actual collection of this tax was from taxpayers directly. The combination of the tax being new, tax incidence being a relatively small portion of the population, and taxpayers being mostly on their own recognizance lead to a fairly large &#x201C;tax gap&#x201D;, which is the wedge between taxes theoretically owed to the government (per the law) and those actually reported by taxpayers.</p><p>America re-instituted the income tax in the early 1900s (via a constitutional amendment, this time) as a result of that most cherished of American traditions: widespread populist revolt over tax rates. Specifically, tariffs on imported goods hit the pocketbook of the emerging middle class the worst. The middle class exercised (and exercises) substantial political heft in America, and directed its representatives to move more of the tax burden to the wealthy. The term of art for this in tax policy is &#x201C;progressive&#x201D; taxation (where one&#x2019;s effective tax rate goes up with income and/or wealth); any tax on consumption (including tariffs) will almost definitionally be regressive (the opposite), because the wealthy consume less of their income and/or wealth than other social classes.</p><p>The first implementation of it attempted to do lump sum collection, but taxpayers found this surprising and unpleasant. In particular, a large portion of the economy was still agrarian, and the farmer&#x2019;s harvesting calendar is impossible to reconcile with a single fixed national tax deadline. (As both farmers and people who play Stardew Valley know in their bones, not all crops arrive on the same schedule.)</p><h3 id=\"enter-tax-withholding\">Enter tax withholding</h3><p>Actors in government had a bright idea: instead of requiring a single lump sum payment of income tax annually, they could spread the payment over the course of the year. It would have been too operationally intensive for government to arrange this with every wage owner directly. Taxpayers would have revolted about the marginal paperwork burden, to say nothing of the constant reminder that they were paying taxes. So the state deputized their employer as a tax collector to accomplish it.</p><p>The mechanism would be withholding: the employer would, using a formula, estimate the taxes you would owe for your next payment, divide them ratably over the year, and withhold an estimated tax payment from each payment to you. They would &#x201C;relatively swiftly&#x201D; convey this payment, on your behalf, to the government over the course of the year. You would file a return once a tax year, reconciling your reported income and withholdings made by your employer, resulting in either you paying the difference to the government or, more commonly, receiving a refund from the government for tax overpayment.</p><p>This solves many operational issues for the government. It makes its own income much smoother and more predictable than under an annual payment regime. (This returned government to income schedules which more closely matched those of excise taxes. Although business owners might understandably feel otherwise, it is not in fact the case that all alcohol is consumed on tax day.)</p><p>Withholding also reduces fiscally consequential tax non-compliance. Most individuals who forget to file a return have already paid all taxes that are due, and may be forgoing a refund against their own interest.</p><p>It also has one side effect in the political economy, whose consequences we deal with a century later: withholding is quiet and sending in tax payments is loud. Most taxpayers, including relatively financially sophisticated taxpayers, do not carefully scrutinize their payroll withholding statements. Most do not understand how their payroll tax is calculated; it is simply a law of nature, handled by dutiful clerks somewhere. The only time they really think about tax withholding is once a year when the government pays them. In that blissful moment, their thought is not &#x201C;Wow, I am paying so much in taxes!&#x201D; Tax withholding is one of a very few ways in which you can licitly bribe someone with their own money.</p><h3 id=\"an-aside-about-tax-preparation-software\">An aside about tax preparation software</h3><p>It is widely believed in the tech industry that the reason the United States requires taxpayers to calculate their own tax returns, which is not required in many peer nations, is because Intuit (who make Turbotax, the most popular software for doing one&#x2019;s taxes) spends money lobbying policymakers to oppose the IRS creating a competing product.</p><p>People who believe this have a poorly calibrated understanding about the political economy of taxation in the American context.</p><p>I will have to take notice about uncontroversial but politically inflected facts about the world we live in to describe why you must use the software you use. If you&#x2019;d prefer to not get politics mixed in with your finances and software, mea maxima culpa. That said, a democratically accountable government which deputizes the private sector to achieve state aims is invariably subject to the political process, and this is on net a good thing. To the extent one has a complaint about the outcome, one&#x2019;s complaint is not with some unaccountable or corrupt actor in a smoky backroom somewhere. It is with one&#x2019;s countrymen.</p><p>In particular, the tech industry zeitgeist that blames Intuit for us needing tax preparation software fails to understand the preferences of Congressional representatives of the Republican Party. Any fairminded observer of U.S. politics understands the Republicans to be institutionally extremely interested in tax policy (and tax rates in particular), in the sense that doctors are interested in heart attacks. Their most recent platform includes the quote &#x201C;Republicans consider the establishment of a pro-growth tax code a moral imperative. More than any other public policy, the way the government raises revenue&#x2014;how much, at what rates, under what circumstances, from whom, and for whom&#x2014;has the greatest impact on our economy&#x2019;s performance.&#x201D; This is far from the only flag proudly planted by the elected representatives who enjoy the enthusiastic support of about half of Americans for their views on tax administration.</p><p>The specific policy implications of those shared values are frequently outsourced, in a fashion extremely common in Washington and critical to your understanding of U.S. politics. Washington has an unofficial ecosystem of organizations and public intellectuals who, by longstanding practice, have substantial influence on policy. When a Republican candidate promises to voters that they are anti-tax, as their voters (particularly in primaries) demand they must be, the thing they will offer in support of that is &#x201C;Grover Norquist gave me a passing grade.&#x201D;</p><p>Norquist runs Americans for Tax Reform, a non-profit political advocacy group which opposes all tax increases. ATR is institutionally skeptical of withholding, because they believe that withholding allows one to increase taxes by stealth. I don&#x2019;t think it is excessively partisan to say that, if one phrases that claim a bit more neutrally as &#x201C;withholding increases tax compliance by decoupling public sentiment and policy changes,&#x201D; the people who designed the withholding system would say &#x201C;I&#x2019;m glad the National Archives makes our design documents so accessible. We wrote them to be read!&#x201D;</p><p>And, relevant to the question of whether Intuit controls U.S. tax policy: it can&#x2019;t, because that would imply they have wrested control from Norquist. Norquist considers a public filing option a tax increase by stealth and opposes it automatically. (I offer in substantiation ATR&#x2019;s take on a specific policy, which was bolded for emphasis in the original: &#x201C;Americans for Tax Reform rejects the use of unauthorized taxpayer dollars being used to expand the IRS into the tax preparation business and urges states to reject participation in the program.&#x201D; You can find much more in the same vein.)</p><p><strong><em>I will note that subsequently to this, the IRS did try to have a direct file option, which </em></strong><a href=\"https://www.complexsystemspodcast.com/episodes/understanding-government-procurement-with-luke-farrell/\"><strong><em><u>Luke Farrell described on this podcast</u></em></strong></a><strong><em> as something of a user experience triumph. And it was killed in the current administration. Why? Because the people who decide what tax policy should look like on that side of the aisle viscerally hate this policy. </em></strong>[<strong>Patrick notes</strong>: See generally <a href=\"https://www.statecraft.pub/p/how-to-run-the-treasury-department\"><u>Statecraft</u></a> on this topic, though I think neither participant in that conversation grapples with the substantive objection from the other side. As mentioned in the essay, this is a recurring problem in discussing this issue. We seem to really want there to be a bad guy pulling the strings, and not a politically influential actor who has arrived at his policy preferences honestly and successfully convinced half of the country to back them.]&#xA0;</p><p>Anyhow, back on the topic of withholding taxes: they still have political consequences, including consequences directly relevant to how individual Americans interface with their government, more than a hundred years later.</p><h3 id=\"withholding-taxes-were-an-operational-disaster-in-early-implementations\">Withholding taxes were an operational disaster in early implementations</h3><p>Calculating, collecting, and remitting withholding taxes was extremely labor intensive in the early years. Businesses used to have entire departments of payroll clerks, who needed to do per-employee calculations manually or on primitive mechanical calculators.</p><p>Fun fact: this was one of private industry&#x2019;s first scaled uses of women in the workforce, and the job title was &#x201C;calculator.&#x201D; AI took our jobs and thank goodness it did. The typical workload of a (human) calculator persists in the present day only in Japanese megacorps which, and this is in no way an exaggeration, use it as a form of a psychological torture to coerce employees to quit &#x201C;voluntarily.&#x201D; OK, I guess that is less of a fun fact.</p><p>Withholding was designed without substantial input from the business community. It was so hated that it almost triggered a &#x201C;tax revolt&#x201D;; refusal to pay taxes as an act of protest. After World War One was over, the War Revenue Act (which had traded phasing out withholding in return for phasing in more onerous income reporting requirements) lapsed, and planners got a few years to debrief what had gone wrong. They had a better game plan ready for 1935&#x2019;s rollout of the Social Security Act, which assigned Americans unique(-ish) identification numbers for the first time. This time, user research included America&#x2019;s relatively nascent large national employers like e.g. Ford and GE, who exactly dictated what they&#x2019;d need from the government to make withholding happen on a scale of hundreds of thousands of employees. (Think how many rooms of clerks that implied! The imagination boggles!)</p><p>In addition to the clerks, Big Business demanded the government accommodate modern practices like using specialized hardware from the Computing-Tabulating-Recording Company. It had recently completed a corporate rebrand to reflect their cutting-edge technological supremacy: International Business Machines. To a very real degree, the spec for U.S. withholding taxes became &#x201C;What can be quickly calculated on a machine that IBM can deliver production units of this year? Write that law and we will send a check to Washington, every month, like clockwork. Or have it your way. Write another law. Then, you can come to Detroit and explain to the boys they need to give you what&#x2019;s coming to you.&#x201D;</p><h3 id=\"so-what-happens-in-payroll-anyway\">So what happens in payroll, anyway?</h3><p>In broad strokes payroll processing hasn&#x2019;t changed in a hundred years:</p><p>A business owner, or their payroll department, first calculate the amount of money they owe to employees in a pay period. The length of that pay period is established partly by custom (two weeks is most common in the United States, monthly is more common in Japan) and partly by operational complexity. Weekly was considered too exhausting for payroll clerks to contemplate decades ago and most businesses haven&#x2019;t moved to it due to the persistence of tradition. (They have made some changes to get workers their pay faster, which is a topic we&#x2019;ll return to.)</p><p>During the process of running a payroll, the payroll department or payroll provider will apply current laws to calculate deductions from payroll. Almost all of these will be taxes or tax-adjacent, like contributions to tax-advantaged employee retirement plans. There are some important exceptions which you absolutely must support, like e.g. garnishing the wages of parents who are delinquent on child support obligations (or, for that matter, certain delinquent debts owed to the nation).</p><p>In parallel with this calculation, money has to fan out. Is the service provided by payroll providers the calculation, the recordkeeping, or the money movement? Yes.</p><p>In U.S. practice, payday is almost inevitably on a Friday. The payroll provider will make an ACH debit against the employer&#x2019;s bank account within a few hours of them running payroll, ideally (from its perspective) on Monday. This moves the total cash outlay for payroll in a single transaction to a settlement account owned by the payroll provider. Then, on Thursday night or early Friday, it will schedule payment via ACH push or other mechanisms to each employee. Typically, that will have that money be spendable in their accounts at Friday. (ACH direct deposit has almost entirely replaced physical paychecks.)</p><p>These are not the only payments made by payroll providers, and one might argue they are not the payments made which actually justify the existence of payroll providers, but they are the ones most people think of when they think of payroll. We will return to the other payments in a moment.</p><p>Why did businesses largely choose to outsource payroll processing? Because jurisdictions with taxing authority saw the federal government succeed with withholding taxes and copied the effort. There are many thousands of jurisdictions in the U.S. with this authority. Even at very small scales of business, decisions which seem very minor about who you employ suddenly pull in huge amounts of the collected tax code of jurisdictions which might feel Very Far Away to you. Keeping up with what laws and rulings you&#x2019;re subject to and the changes to them very quickly becomes a full-time job.</p><p>In addition to being basically the first fintech, payroll processing is the first regulatory compliance layer as a service. (You&#x2019;d predict from this, mostly accurately, that payroll processors are far less economically dominant in e.g. Japan, where taxing authority and collection is far more centralized than in the U.S.)</p><h3 id=\"%E2%80%9Cwhere-is-the-risk-transfer%E2%80%9D\">&#x201C;Where is the risk transfer?&#x201D;</h3><p>That was my first question for Ian, and we both laughed ruefully at it. Almost every movement of data and money in finance also includes an (often underanalyzed!) risk transfer as part of the price of the services.</p><p>The biggest risk in payroll is that the business&#x2019; bank account doesn&#x2019;t have money to cover the payroll debit in full, in which case the debit will be &#x201C;returned&#x201D; by the bank, resulting in the payroll provider not getting the money in their settlement account. Now, counting days on your fingers like all good financial technologists, you might think this is unlikely to be a problem. Monday plus two business days for an ACH return window is Wednesday. The money can&#x2019;t leave before Thursday. No overlap in timeline means no risk.</p><p>So here&#x2019;s the rub: that Friday deadline is, by law and custom, very hard. If you, as a business owner, fail to have money delivered to employees by Friday, you have &#x201C;missed payroll.&#x201D; This is one of the most legally consequential screwups a business owner can do. How developed is the law in this area? Missing payroll is listed in the Bible (James 5:4, etc) as a &#x201C;sin crying out to heaven for vengeance.&#x201D;</p><p>The Monday deadline, on the other hand? Eh, business owners sometimes get busy. I probably averaged Wednesday for payroll submission at the last company I ran. &#x201C;Thou shalt not submit thy CSV files on Wednesday&#x201D; is not written in the Bible.</p><p>And so here is the product decision confronting every payroll provider: do we strictly impose the Monday deadline, or do we let favored customers slip it until, say, Wednesday? OK, maybe gulp Thursday afternoon? Or do we cede the custom of many, many employers to a provider capable of playing ball here?</p><p>The payroll industry overwhelmingly allows businesses to transform &#x201C;late&#x201D; payrolls into &#x201C;on-time from the perspective of the employee&#x201D; payrolls by taking balance sheet risk. They pay the employees before they know they will collect from the employer in a durable fashion. This is a considerable risk.</p><p>In the event a business misses payroll, the likelihood that it is not simply an operational stumble but actually insolvency is, over the universe of all firms, very, very high. Individual runs of payroll are very large relative to the fees earned by payroll providers; at my last company, two weeks of salaries/etc for engineers/etc was ~$200,000 against a payroll service charge of a few hundred dollars a month. Clearly, taking credit losses even at a very low incidence rate does not pencil out well. (A payroll provider will typically reserve the right to recover against employees if there is a return on a payroll run. Nobody likes that resolution. One reason: employees of a defaulting employer will frequently not have the money a day later, either, not least because their employer might have told them &#x201C;Uh you probably don&#x2019;t want to keep your last paycheck in the bank over the weekend, call it a hunch.&#x201D;)</p><p>And so payroll providers, unlike most software companies in the we-run-a-complicated-spreadsheet business, will have to underwrite their customers as they onboard them. Most businesses in the economy are extremely thinly capitalized. Underwriting will often focus on reviewing books, demonstrable (past) cash flows versus anticipated payrolls, etc. Doing this well is make-or-break for payroll providers.</p><p>(Other risks payroll providers have to be cognizant of include account takeovers and fraud. &#x201C;Payroll is a money hose&#x201D;, as Ian mentioned, and by design will cause the payroll provider to spray money into accounts it has no history with and has minimal documentation on until the first transfer of four figures per account. A legitimate business which gets their payroll account taken over is in for a very bad day. A payroll provider which is convinced to run payroll on behalf of a business which either doesn&#x2019;t exist or only exists to enable a later crime via a &#x201C;long fraud&#x201D; will also have a very bad day. There exist many people in finance and tech companies who think of little other than &#x201C;How can we identify an account takeover before we or our client lose money in an irreversible fashion?&#x201D;)</p><h3 id=\"what-about-those-other-payments\">What about those other payments?</h3><p>A lot of people have read about Warren Buffett&#x2019;s investing genius over the years. One key to it was using the &#x201C;float&#x201D; earned by his insurance companies. Float is, in the insurance context, money which customers have paid you (premiums) which covers risks which you will (as an actuarial matter) owe them back someday. In the present day, you can invest it (subject to some constraints) and keep the returns for yourself.</p><p>Many people see float absolutely everywhere. &#x201C;I bet a payment processor just rakes it in from float!&#x201D; Well, not so much, because float being interesting requires a large amount of money multiplied by an extended timeframe multiplied by relatively high interest rates. Non-specialists tend to forget that &#x201C;timeframe&#x201D; bit and overestimate float by a factor of ten or more. (Payment processors are keenly aware that their customers want their money faster at virtually every margin and are keen on improvements to make this happen, even if they notionally cost a minor revenue opportunity.)</p><p>Which I mention to excuse the following: payroll firms actually do earn material amounts of float, in a fashion which is rare for financial technology businesses. Why? Precisely because payroll runs are large relative to fees for payroll services and holding times can be quite considerable.</p><p>We are not talking about the float between Wednesday and Friday primarily here. We&#x2019;re talking about the float earned on &#x201C;funds held for clients&#x201D;, which mostly constitute money that they&#x2019;ve withheld on behalf of particular employees but not yet remitted to the tax agency (or similar).</p><p>You can read the disclosures for your payroll firm of choice for the boring mechanics here. I recommend ADP&#x2019;s, since it is a giant in the industry (~17% share nationwide) and publicly traded. ADP keeps client funds at a trust account at a trust bank that they established. (Was that decision voluntary? One might speculate that if you happen to have plural percentage points of all wages earned in the nation on your books on any particular Tuesday, almost all of it owed directly to the government, some people in Washington would really prefer you had it in a maximally regulator-legible wrapper versus another structure. Anyhow, OCC charter secured, congrats all around.)</p><p>So in economic substance, when your Chicago pizzeria runs payroll on Wednesday for payday on Friday, ADP constructively receives the money Thursday-ish and pays out the majority of it Friday-ish.</p><p>But the withholding taxes that the pizzeria owes to the IRS and to the Illinois Department of Revenue? Those ADP custodies until the next day they are required to pay it out, which will (in expectation) be about two weeks later, not about one day later. (Various payout schedules prevail for various taxes and various taxpayers, etc, but this suffices to show the general pattern.)</p><p>The money is custodied on behalf of the pizzeria&#x2014;it is still their money&#x2014;but the interest earned on it goes to ADP. It is a lot of dough: ADP earned more than $800 million on client funds in fiscal year 2023, representing about 18% of EBIDA. Payroll providers aren&#x2019;t as dependent on interest income as discount brokerages but it is a very important part of the model. (The main revenue line, for ADP and other payroll providers, is the fee they charge businesses for services.)</p><p>An interesting detail here: payroll companies are a conveyor belt for money. That conveyor belt looks pretty short if you just count from the payroll being run to the final transfer of withholding tax. It starts to look much, much longer if you consider &#x201C;Well, if a software company hires an engineer in 2023, and has attrition of 10% annually, in expectation haven&#x2019;t they basically committed to paying something like 85-90% of current salary in 2025 once you count the impact of annual raises/etc?&#x201D;</p><p>When you multiply that intuition over a large and diversified book of business, and subtract out the negligible churn rates of payroll providers, you (as a payroll provider) could get comfortable conceiving of your conveyor belt as being much, much longer than it looks at first glance. So should money on your conveyor belt be earning demand deposit interest rates? Oh clearly not, short-term Treasury rates will of course be higher and have even less risk. How about mid-term Treasury rates?</p><p>And if mid-term Treasury or agency MBS rates are higher than your corporate short-term borrowing rates, you could borrow short and lend long. How do you know you&#x2019;ll have the cash flow to support the borrowing? Dude. Look at the conveyor belt of money which charges you nothing for borrowing from it.</p><p>Welcome to the wonderful world that is being a corporate treasurer at one of the fairly few companies where one&#x2019;s fiscal asset allocation strategy is both really interesting and also really matters to results.</p><p>A detail of a detail here: the flipside of this being an excellent reason to be in the payroll business is, indirectly, one reason why payroll providers are so terrible. To do this licitly, you need to get a money transmitter license everywhere your customers want to pay as many as one employee, which (very quickly) means all 50 states and then some.</p><p>This is not hard relative to creating a fusion reactor, but is hard relative to creating a functioning Rails app. This means that the minimum cycle time to create a new functioning payroll provider is &#x201C;a few years&#x201D; unless you&#x2019;re using an underlying provider via some sort of white label arrangement. Most ways to do that just end up replicating their infelicities, so really innovating requires all the licenses first, which implies years of boring scutwork prior to doing the valuable, fun, and lucrative bits of innovating on payroll software.</p><h3 id=\"where-is-the-frontier-in-payroll\">Where is the frontier in payroll?</h3><p>It was a revelation a few years ago when one startup payroll provider (Gusto, about which I will say &#x201C;I have used them as an employer and yet I have employer-side payroll stories that take longer to tell than &#x2018;I ran payroll successfully&#x2019;&#x201D;) debuted a web application for employees which wasn&#x2019;t terrible. Pedestrian applications of technology create enormous value in financial services, film at 11.</p><p>In terms of actually new capabilities, the hot new thing in payroll recently is called &#x201C;earned wage access.&#x201D; This is mostly for employees at the lower end of the socioeconomic ladder. We covered that the payroll cycle in the U.S. is generally two weeks, for legacy reasons owing to the workload capacity of payroll clerks. In principle, computers could trivially do it daily, but business owners largely have not decided to do that.</p><p>Employees low on the socioeconomic ladder are therefore, economically, extending their employers a loan of (on average) one week&#x2019;s worth of wages at zero percent interest. They are themselves are often in debt, frequently paying high or unconscionable rates on that debt.</p><p>EWA attempts to make it incentive compatible to fix this. In it, the payroll provider convinces the employer to allow employees to opt-in to receiving their wages not as a paycheck or an ACH deposit into their bank account but as a deposit onto a prepaid card provisioned by the payroll provider. That deposit is made daily not biweekly.</p><p>Critically, these wages are being advanced by the payroll provider and not actually coming from the employer, which is probably surprising. (This is free to the employer; no cost aside from the wages/etc you&#x2019;ve agreed to pay.)</p><p>Why is this incentive compatible for the payroll provider, when it could be advancing wages to e.g. a pizzeria chef who might depart employment two days into that 14 day pay period? Because people who are relatively low on the socioeconomic ladder tend to spend most of their paycheck relatively soon after they receive it, and much of the spend will be by presenting that prepaid card to pay for e.g. groceries. Every business accepting the card will pay interchange to do so, in the neighborhood of 2-3%.</p><p>And so you can napkin math this out something like this: an employee earns 250 days of wages in the year. If they spend half of their wages via using the prepaid card (with the other half being tax withholding, rent, and similar things which will not result in the provider using interchange), the provider will earn something like 2.5 days of wages for doing financial engineering. They will also absorb, on average, 7 days on average of risk of separation from employment. And therefore, factoring in estimated annual risk of separation and anticipated recovery in event of separation, both of which can be measured empirically as you roll out the offering, there is some solution to the equation where the payroll provider earns a day&#x2019;s wages without working a day.</p><p>Then, it does that for tens of thousands of employees in parallel. This is lucrative relative to earning the interest alone on a small percentage of a few weeks&#x2019; wages, or on the rates businesses will tolerate to run payroll for one pizzeria employee at the margin.</p><p>Other fun innovations include giving people money in ways they find actually valuable. A major one for Check has been enabling instant EWA-style to employees&#x2019; Cash App accounts. (Cryptocurrency advocates will, inevitably, mention that this would all be so much simpler as less expensive if everyone just used stablecoins. Convincing U.S. workers to actually desire stablecoins as opposed to e.g. Bank of America dollars or Cash App dollars has been rather more evitable.)</p><h3 id=\"rideshare-apps-vs-payday-loans-byrne-hobarts-insight\">Rideshare apps vs . payday loans: Byrne Hobart&apos;s insight</h3><p>And so that&#x2019;s a little more than you probably wanted to know about payroll providers.</p><p>[<strong>Patrick notes</strong>: Byrne had a <a href=\"https://x.com/patio11/status/2026057513196523821?s=20\"><u>great tangential observation</u></a> recently which felt relevant, so I expanded on it prior to wrapping the episode.]&#xA0;</p><p>On the subject of earned wage access: Byrne Hobart had a really great line recently about how rideshare and other similar gig economy apps function for the socioeconomic class likely to take jobs at those companies.</p><p>(Well, their lawyers would say they aren&#x2019;t actually taking a job at this company, they&#x2019;re independent contractors. I don&#x2019;t really have a strong point of view on that one for the moment.)</p><p>Byrne said that essentially, for many people, rideshare apps are competing not with other jobs. They&#x2019;re competing with payday loans.</p><p>So if you find yourself $50 short on any given Friday, the consequences of being $50 short if you&#x2019;re in the lower socioeconomic strata in the United States can be extremely devastating. If you are $50 short on your electricity bill on the wrong day, you can get your electricity turned off. And obviously you would prefer having electricity. It&#x2019;s enormously embarrassing and socially consequential to have your electricity turned off, and the power company will often charge you more than $50, essentially a fine, to turn it back on again.</p><p>And so you might rationally decide: &#x201C;I will pay a very large percentage of $50 to the friendly local payday loan establishment to avoid having to pay the power company to turn my electricity back on.&#x201D;</p><p>What Byrne said, which is accurate, is that another thing people do is decide to turn on a rideshare app for a few hours, grind out as many rides as required to do $50 worth of work, get paid the $50 into their rideshare account instantaneously, and then pay whatever the financial intermediary&#x2019;s fee is for an instant disbursement to their bank account of choice. And then they use that to pay the power company and don&#x2019;t get their power turned off.</p><h3 id=\"fintechs-net-impact\">FinTech&apos;s net impact</h3><p>Like many times in discussing how finance is actually experienced by people lower on the socioeconomic ladder, I think that sounds like an unpleasant state of affairs. And believe me, for personal and family history reasons, I thoroughly understand that unpleasant state of affairs. And I want to say: it is unpleasant because poverty is unpleasant. It&#x2019;s not unpleasant because driving for a rideshare company or using innovative financial services is unpleasant.</p><p>I think that advocates frequently conflate those two things. And so I genuinely think that fintech has provided some real, actual, material advances to people who are in diminished socioeconomic circumstances. Bravo to fintech companies for that. Not to say that every fintech advancement has been pro-social in that fashion.</p><p>The gambling-adjacent things in particular, our nation&#x2019;s experiment with legalized sports gambling, quote-unquote, has been disastrous. And there are a number of things which are not gambling, quote-unquote, but which are very gambling-adjacent, which have similarly been disastrous. But net-net, I think the impact of the fintech industry is something we can all be very proud of.</p><p>Anyhow. We&#x2019;ll see you next week on Complex Systems. Thank you very much for listening.</p>"
