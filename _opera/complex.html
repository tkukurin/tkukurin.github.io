---
title: Complex Systems
description: Visual explorer for complexity science literature
permalink: /complex/
---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complex Systems - AI Bookshelf</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inconsolata:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/tufte.css">
    <style>
        /* === App-specific overrides === */
        :root {
            --sidebar-width: 280px;
            --assistant-width: 320px;
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        html, body {
            overflow: hidden;
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        button {
            background: none;
            border: none;
            color: inherit;
            font: inherit;
            cursor: pointer;
            text-align: left;
        }

        /* === 3-Pane Layout === */
        #pane-episodes {
            width: var(--sidebar-width);
            flex-shrink: 0;
            border-right: 0.5px solid var(--rule);
            display: flex;
            flex-direction: column;
            background: var(--paper);
            z-index: 10;
        }

        #pane-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #pane-assistant {
            width: var(--assistant-width);
            flex-shrink: 0;
            border-left: 0.5px solid var(--rule);
            display: flex;
            flex-direction: column;
            background: var(--paper);
            z-index: 10;
        }

        /* === Pane Headers === */
        .pane-header {
            height: 48px;
            padding: 0 1rem;
            border-bottom: 0.5px solid var(--rule);
            display: flex;
            align-items: center;
            font-weight: 500;
            font-size: 0.82rem;
            font-variant: small-caps;
            font-feature-settings: "smcp", "c2sc", "onum";
            letter-spacing: 0.12em;
            color: var(--ink-2);
            flex-shrink: 0;
            background: var(--paper);
        }

        /* === Episode List (left pane) === */
        .episode-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0.5rem 0;
        }

        .episode-btn {
            display: block;
            width: 100%;
            padding: 0.7rem 1rem;
            transition: background 120ms ease;
            font-size: 0.92rem;
            line-height: 1.35;
            border-bottom: 0.5px solid transparent;
        }

        .episode-btn:hover {
            background: var(--paper-2);
        }

        .episode-btn.active {
            background: var(--ink);
            color: var(--paper);
        }

        .ep-date {
            display: block;
            font-size: 0.72rem;
            font-variant: small-caps;
            font-feature-settings: "smcp", "c2sc", "onum";
            letter-spacing: 0.08em;
            color: var(--ink-3);
            margin-bottom: 0.2rem;
        }

        .episode-btn.active .ep-date {
            color: var(--paper-2);
        }

        /* === Content Pane (middle) === */
        .content-scroll {
            flex-grow: 1;
            overflow-y: auto;
            padding: 2.5rem 3rem;
            max-width: 720px;
            margin: 0 auto;
            width: 100%;
        }

        .ep-title {
            font-weight: 500;
            font-size: 2rem;
            line-height: 1.15;
            margin-bottom: 1rem;
            letter-spacing: -0.01em;
        }

        .ep-link {
            display: inline-block;
            margin-bottom: 2rem;
            font-size: 0.72rem;
            font-variant: small-caps;
            font-feature-settings: "smcp", "c2sc", "onum";
            letter-spacing: 0.1em;
            border: 0.5px solid var(--rule);
            padding: 0.3rem 0.8rem;
            color: var(--ink-2);
            transition: all 120ms ease;
        }

        .ep-link:hover {
            background: var(--ink);
            color: var(--paper);
            border-color: var(--ink);
            text-decoration: none;
        }

        .ep-desc {
            font-size: 0.95rem;
            color: var(--ink-2);
            margin-bottom: 2.5rem;
            font-style: italic;
            border-left: 0.5px solid var(--rubric);
            padding-left: 1.2rem;
            line-height: 1.55;
        }

        .ep-transcript {
            font-size: 1.05rem;
            line-height: 1.65;
            color: var(--ink);
        }

        .ep-transcript p {
            margin-bottom: 1.2rem;
        }

        .ep-transcript h2, .ep-transcript h3, .ep-transcript h4 {
            font-weight: 500;
            font-style: italic;
            color: var(--ink);
            margin-top: 2.4rem;
            margin-bottom: 0.5rem;
            position: relative;
        }

        .ep-transcript h2::before,
        .ep-transcript h3::before {
            content: "\00a7";
            color: var(--rubric);
            font-style: normal;
            position: absolute;
            left: -1.1em;
        }

        .ep-transcript h2 { font-size: 1.15rem; }
        .ep-transcript h3 { font-size: 1.05rem; }

        .ep-transcript a {
            color: var(--ink);
            border-bottom: 0.5px solid var(--rubric);
            padding-bottom: 1px;
            text-decoration: none;
        }

        .ep-transcript a:hover {
            color: var(--rubric);
        }

        /* === AI Assistant (right pane) === */
        .chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .chat-message {
            width: 100%;
            font-size: 0.88rem;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .msg-role {
            font-size: 0.68rem;
            font-variant: small-caps;
            font-feature-settings: "smcp", "c2sc", "onum";
            letter-spacing: 0.1em;
            color: var(--ink-3);
            font-weight: 500;
        }

        .msg-text {
            line-height: 1.5;
            color: var(--ink-2);
        }

        /* === Pinned Context Panel === */
        #pinned-panel {
            border-bottom: 0.5px solid var(--rule);
            padding: 1rem;
            font-size: 0.82rem;
            background: var(--paper);
            display: none;
            flex-direction: column;
            gap: 0.5rem;
        }

        .pinned-item {
            padding: 0.5rem 1.5rem 0.5rem 0.8rem;
            border-left: 2px solid var(--rubric);
            background: var(--paper-2);
            position: relative;
            font-style: italic;
            cursor: pointer;
            transition: background 120ms ease;
            color: var(--ink-2);
            line-height: 1.4;
        }

        .pinned-item:hover {
            background: var(--rule);
        }

        .pinned-item.active-highlight {
            background: var(--ink);
            color: var(--paper);
            border-left-color: var(--paper);
        }

        mark.transcript-pin {
            background: oklch(0.85 0.06 28 / 0.25);
            color: inherit;
            cursor: pointer;
            border-radius: 2px;
            border-bottom: 1px solid var(--rubric);
            transition: all 150ms ease;
        }

        mark.transcript-pin:hover {
            background: oklch(0.85 0.06 28 / 0.4);
        }

        mark.transcript-pin.active-highlight {
            background: var(--rubric);
            color: var(--paper);
        }

        .remove-pin {
            position: absolute;
            top: 0.25rem;
            right: 0.5rem;
            cursor: pointer;
            opacity: 0.4;
            font-weight: bold;
            color: var(--ink-3);
        }

        .remove-pin:hover { opacity: 1; color: var(--rubric); }

        /* === Floating Pin Button === */
        #floating-pin {
            position: fixed;
            background: var(--paper);
            color: var(--rubric);
            border: 0.5px solid var(--rule);
            padding: 4px;
            cursor: pointer;
            z-index: 100;
            display: none;
            transform: translate(-50%, -100%);
            margin-top: -12px;
            border-radius: 2px;
            box-shadow: 0 4px 12px oklch(0.22 0.012 60 / 0.1);
        }

        #floating-pin:hover {
            border-color: var(--rubric);
            background: var(--paper-2);
        }

        #floating-pin svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            display: block;
        }

        /* === Chat Input === */
        .chat-input-wrapper {
            padding: 0.8rem 1rem;
            border-top: 0.5px solid var(--rule);
            background: var(--paper);
            display: flex;
            align-items: flex-end;
            gap: 0.5rem;
        }

        #chat-input {
            flex-grow: 1;
            background: transparent;
            border: 0.5px solid var(--rule);
            padding: 0.5rem;
            font-family: var(--serif);
            font-size: 0.88rem;
            color: var(--ink);
            outline: none;
            min-height: 36px;
            max-height: 120px;
            resize: none;
            overflow-y: auto;
            transition: border-color 120ms ease;
        }

        #chat-input:focus { border-color: var(--rubric); }
        #chat-input:disabled { opacity: 0.4; cursor: not-allowed; }

        #chat-submit {
            background: transparent;
            color: var(--ink-2);
            border: none;
            padding: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 36px;
            transition: color 120ms ease;
        }

        #chat-submit:hover { color: var(--rubric); }
        #chat-submit:disabled { opacity: 0.4; cursor: not-allowed; }

        #chat-submit svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* === Assistant Header Controls === */
        .ai-header-controls {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-left: auto;
        }

        .ai-status {
            font-size: 0.65rem;
            letter-spacing: 0.05em;
            color: var(--ink-3);
        }

        .icon-btn {
            opacity: 0.5;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 120ms ease, color 120ms ease;
        }

        .icon-btn:hover { opacity: 1; color: var(--rubric); }

        .icon-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* === Scrollbar === */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }

        /* === Markdown in chat === */
        .msg-text p { margin-bottom: 0.5rem; }
        .msg-text p:last-child { margin-bottom: 0; }
        .msg-text ul, .msg-text ol { margin-left: 1rem; margin-bottom: 0.5rem; }
        .msg-text li { margin-bottom: 0.2rem; }

        /* === Responsive === */
        @media (max-width: 900px) {
            #pane-assistant { display: none; }
            .content-scroll { padding: 1.5rem; }
        }

        @media (max-width: 640px) {
            #pane-episodes { width: 100%; position: absolute; height: 100%; }
            #pane-content { display: none; }
            body.episode-active #pane-episodes { display: none; }
            body.episode-active #pane-content { display: flex; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <!-- Left Pane: Episode List -->
    <aside id="pane-episodes">
        <div class="pane-header">Complex Systems</div>
        <div class="episode-list" id="episode-list"></div>
    </aside>

    <!-- Middle Pane: Content -->
    <main id="pane-content">
        <div class="pane-header">Transcript</div>
        <div class="content-scroll" id="content-scroll">
            <div style="opacity: 0.4; margin-top: 6rem; text-align: center; font-style: italic;">Select an episode to view the transcript.</div>
        </div>
    </main>

    <!-- Floating Pin Button -->
    <button id="floating-pin" onclick="pinSelectedText()" title="Pin to Context">
        <svg viewBox="0 0 24 24"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5v6l1 1 1-1v-6h5v-2l-2-2z"/></svg>
    </button>

    <!-- Right Pane: AI Assistant -->
    <aside id="pane-assistant">
        <div class="pane-header">
            Assistant
            <div class="ai-header-controls">
                <span class="ai-status" id="context-tracker" style="margin-right: 0.5rem;"></span>
                <span class="ai-status" id="ai-status">Initializing...</span>
                <button class="icon-btn" onclick="startNewChat()" title="New Chat">
                    <svg viewBox="0 0 24 24"><path d="M12 4v16m-8-8h16" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                </button>
            </div>
        </div>
        <div id="pinned-panel">
            <div style="font-variant: small-caps; font-feature-settings: 'smcp','c2sc','onum'; letter-spacing: 0.1em; color: var(--ink-3); font-size: 0.72rem;">Pinned Context</div>
            <div id="pinned-list"></div>
        </div>
        <div class="chat-container" id="chat-container"></div>
        <div class="chat-input-wrapper">
            <textarea id="chat-input" placeholder="Ask about this episode..." rows="1" disabled></textarea>
            <button id="chat-submit" disabled title="Send">
                <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"></path></svg>
            </button>
        </div>
    </aside>

    <script>
        let episodes = [];
        let activeEpisode = null;

        // AI Session State
        let aiSession = null;
        let aiAvailable = false;
        let pinnedSnippets = [];
        let currentSelectionRange = null;

        const episodeList = document.getElementById('episode-list');
        const contentScroll = document.getElementById('content-scroll');
        const chatContainer = document.getElementById('chat-container');
        const chatInput = document.getElementById('chat-input');
        const chatSubmit = document.getElementById('chat-submit');
        const aiStatus = document.getElementById('ai-status');
        const contextTracker = document.getElementById('context-tracker');
        const pinnedPanel = document.getElementById('pinned-panel');
        const pinnedList = document.getElementById('pinned-list');
        const floatingPin = document.getElementById('floating-pin');

        let mouseX = 0;
        let mouseY = 0;

        async function init() {
            await initAI();

            try {
                const response = await fetch('/assets/data/complex.json');
                episodes = await response.json();

                renderEpisodeList();

                if (episodes.length > 0) {
                    await selectEpisode(0);
                }
            } catch (e) {
                console.error("Failed to load episodes", e);
                episodeList.innerHTML = '<div style="padding:1rem;opacity:0.4;font-style:italic;">Error loading data.</div>';
            }

            chatSubmit.addEventListener('click', handleChatSubmit);
            chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleChatSubmit();
                }
            });
            chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            document.addEventListener('mouseup', handleSelection);
            document.addEventListener('keyup', handleSelection);

            document.addEventListener('mousedown', (e) => {
                if (e.target.closest('#floating-pin') === null) {
                    setTimeout(() => { floatingPin.style.display = 'none'; }, 10);
                }
            });
        }

        function renderEpisodeList() {
            episodeList.innerHTML = episodes.map((ep, i) => {
                const dateObj = new Date(ep.date);
                const dateStr = !isNaN(dateObj) ? dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : '';
                return `
                    <button class="episode-btn" id="ep-btn-${i}" onclick="selectEpisode(${i})">
                        <span class="ep-date">${dateStr}</span>
                        ${ep.title}
                    </button>
                `;
            }).join('');
        }

        async function selectEpisode(index) {
            activeEpisode = episodes[index];

            document.querySelectorAll('.episode-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`ep-btn-${index}`);
            if (activeBtn) activeBtn.classList.add('active');

            contentScroll.innerHTML = `
                <h1 class="ep-title">${activeEpisode.title}</h1>
                <a href="${activeEpisode.link}" target="_blank" class="ep-link">Original Post &#x2197;</a>
                <div class="ep-desc">${activeEpisode.description}</div>
                <div class="ep-transcript">${activeEpisode.transcript || 'No transcript available.'}</div>
            `;
            contentScroll.scrollTop = 0;

            pinnedSnippets = [];
            renderPinnedPanel();
            chatContainer.innerHTML = '';

            appendChatMessage('ai', `I have loaded the transcript for \u201c${activeEpisode.title}\u201d. What would you like to know?`);

            if (aiAvailable) {
                await resetAiSession();
            }
        }

        // --- CHAT & AI LOGIC ---

        async function initAI() {
            const aiObj = window.ai;
            const globalLM = window.LanguageModel;

            if (!globalLM && (!aiObj || !aiObj.languageModel)) {
                aiStatus.textContent = 'API Unavailable';
                chatInput.placeholder = 'Chrome Local AI not detected.';
                appendChatMessage('ai', 'Your browser does not support the LanguageModel API. Requires Chrome 131+ with the appropriate flags enabled.');
                return;
            }

            try {
                let status = 'unavailable';

                if (globalLM && typeof globalLM.availability === 'function') {
                    status = await globalLM.availability();
                } else if (aiObj && aiObj.languageModel && typeof aiObj.languageModel.availability === 'function') {
                    status = await aiObj.languageModel.availability();
                } else if (aiObj && aiObj.languageModel && typeof aiObj.languageModel.capabilities === 'function') {
                    const cap = await aiObj.languageModel.capabilities();
                    status = cap.available === 'readily' ? 'available' : cap.available;
                }

                if (status === 'unavailable' || status === 'no') {
                    aiStatus.textContent = 'Model unavailable';
                    appendChatMessage('ai', 'The local model is not supported on this device or the flags are misconfigured.');
                    return;
                } else if (status === 'downloading' || status === 'downloadable' || status === 'after-download') {
                    aiStatus.textContent = 'Downloading...';
                    appendChatMessage('ai', 'The local Gemini Nano model is downloading. Check chrome://on-device-internals.');
                    return;
                }

                aiAvailable = true;
                aiStatus.textContent = 'Ready';
                chatInput.disabled = false;
                chatSubmit.disabled = false;

            } catch (e) {
                console.error(e);
                aiStatus.textContent = 'Error';
                appendChatMessage('ai', 'Failed to initialize AI: ' + e.message);
            }
        }

        function updateContextTracker() {
            if (aiSession && typeof aiSession.tokensSoFar !== 'undefined' && typeof aiSession.maxTokens !== 'undefined') {
                contextTracker.textContent = `${aiSession.tokensSoFar}/${aiSession.maxTokens}`;
            } else if (aiSession && typeof aiSession.tokensLeft !== 'undefined' && typeof aiSession.maxTokens !== 'undefined') {
                const used = aiSession.maxTokens - aiSession.tokensLeft;
                contextTracker.textContent = `${used}/${aiSession.maxTokens}`;
            } else {
                contextTracker.textContent = '';
            }
        }

        async function startNewChat() {
            chatContainer.innerHTML = '';
            await resetAiSession();
        }

        function handleSelection(e) {
            setTimeout(() => {
                const selection = window.getSelection();
                if (!selection || selection.isCollapsed || !activeEpisode) {
                    floatingPin.style.display = 'none';
                    return;
                }

                const range = selection.getRangeAt(0);
                if (!contentScroll.contains(range.commonAncestorContainer)) {
                    floatingPin.style.display = 'none';
                    currentSelectionRange = null;
                    return;
                }

                const rect = range.getBoundingClientRect();
                if (rect.width === 0 && rect.height === 0) return;

                currentSelectionRange = range;

                floatingPin.style.left = mouseX + 'px';
                floatingPin.style.top = (mouseY - 8) + 'px';
                floatingPin.style.display = 'block';
            }, 50);
        }

        async function pinSelectedText() {
            if (!currentSelectionRange) return;

            const selection = window.getSelection();
            const text = selection.toString().trim();
            if (text) {
                const pinId = 'pin-' + Date.now();
                pinnedSnippets.push({ id: pinId, text: text });

                try {
                    const mark = document.createElement('mark');
                    mark.className = 'transcript-pin';
                    mark.id = `loc-${pinId}`;
                    mark.onclick = function() { highlightSidebarPin(pinId); };

                    const content = currentSelectionRange.extractContents();
                    mark.appendChild(content);
                    currentSelectionRange.insertNode(mark);
                } catch (e) {
                    console.warn("Could not wrap HTML cleanly for highlighting.", e);
                }

                renderPinnedPanel();
                selection.removeAllRanges();
                floatingPin.style.display = 'none';
                currentSelectionRange = null;

                appendChatMessage('system', `Context Added: \u201c${text.length > 50 ? text.substring(0, 50) + '\u2026' : text}\u201d`);

                await resetAiSession();
            }
        }

        async function removePin(index) {
            const pin = pinnedSnippets[index];
            const loc = document.getElementById('loc-' + pin.id);

            if (loc) {
                const parent = loc.parentNode;
                while (loc.firstChild) {
                    parent.insertBefore(loc.firstChild, loc);
                }
                parent.removeChild(loc);
                parent.normalize();
            }

            const removedText = pin.text;
            pinnedSnippets.splice(index, 1);
            renderPinnedPanel();

            appendChatMessage('system', `Context Removed: \u201c${removedText.length > 50 ? removedText.substring(0, 50) + '\u2026' : removedText}\u201d`);

            await resetAiSession();
        }

        function renderPinnedPanel() {
            if (pinnedSnippets.length === 0) {
                pinnedPanel.style.display = 'none';
                return;
            }
            pinnedPanel.style.display = 'flex';
            pinnedList.innerHTML = pinnedSnippets.map((pin, i) => {
                const snippet = pin.text.length > 100 ? pin.text.substring(0, 100) + '\u2026' : pin.text;
                return `
                    <div class="pinned-item" id="sidebar-${pin.id}" onclick="scrollToTranscriptPin('${pin.id}')">
                        \u201c${snippet}\u201d
                        <div class="remove-pin" onclick="event.stopPropagation(); removePin(${i})" title="Remove Pin">\u00d7</div>
                    </div>
                `;
            }).join('');
        }

        function scrollToTranscriptPin(pinId) {
            clearHighlights();
            const loc = document.getElementById('loc-' + pinId);
            const side = document.getElementById('sidebar-' + pinId);
            if (loc) {
                loc.scrollIntoView({ behavior: 'smooth', block: 'center' });
                loc.classList.add('active-highlight');
            }
            if (side) {
                side.classList.add('active-highlight');
            }
            setTimeout(clearHighlights, 2000);
        }

        function highlightSidebarPin(pinId) {
            clearHighlights();
            const loc = document.getElementById('loc-' + pinId);
            const side = document.getElementById('sidebar-' + pinId);
            if (side) {
                side.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                side.classList.add('active-highlight');
            }
            if (loc) {
                loc.classList.add('active-highlight');
            }
            setTimeout(clearHighlights, 2000);
        }

        function clearHighlights() {
            document.querySelectorAll('.active-highlight').forEach(el => el.classList.remove('active-highlight'));
        }

        async function resetAiSession() {
            if (aiSession) {
                try { aiSession.destroy(); } catch(e) {}
            }

            if (!aiAvailable || !activeEpisode) {
                updateContextTracker();
                return;
            }

            let pinnedText = '';
            if (pinnedSnippets.length > 0) {
                pinnedText = "PINNED HIGHLIGHTS BY USER:\n";
                pinnedSnippets.forEach((pin, i) => pinnedText += `[Snippet ${i+1}]: "${pin.text}"\n`);
                pinnedText += "\n";
            }

            const rawText = activeEpisode.transcript.replace(/<[^>]*>?/gm, '\n').replace(/\n+/g, '\n');
            const maxTranscriptLength = Math.max(0, 10000 - pinnedText.length);
            const contextText = rawText.substring(0, maxTranscriptLength);

            const initialPrompts = [
                {
                    role: 'system',
                    content: `You are a helpful assistant analyzing the podcast transcript for "${activeEpisode.title}".\n\n${pinnedText}Transcript Snippet:\n${contextText}\n\nAnswer the user's questions based ONLY on the transcript and pinned snippets. Be concise.`
                }
            ];

            const historyNodes = chatContainer.querySelectorAll('.chat-message');
            historyNodes.forEach(node => {
                const role = node.querySelector('.msg-role').textContent;
                const text = node.querySelector('.msg-text').textContent;
                if (role === 'YOU') {
                    initialPrompts.push({ role: 'user', content: text });
                } else if (role === 'ASSISTANT') {
                    initialPrompts.push({ role: 'assistant', content: text });
                }
            });

            try {
                const globalLM = window.LanguageModel;
                const aiObj = window.ai;

                if (globalLM && typeof globalLM.create === 'function') {
                    aiSession = await globalLM.create({ initialPrompts: initialPrompts });
                } else if (aiObj && aiObj.languageModel && typeof aiObj.languageModel.create === 'function') {
                    aiSession = await aiObj.languageModel.create({ initialPrompts: initialPrompts });
                }
                updateContextTracker();
            } catch(e) {
                console.error("Session creation failed", e);
                updateContextTracker();
            }
        }

        async function handleChatSubmit() {
            const text = chatInput.value.trim();
            if (!text || !aiAvailable || !aiSession) return;

            appendChatMessage('user', text);
            chatInput.value = '';
            chatInput.style.height = 'auto';
            chatInput.disabled = true;
            chatSubmit.disabled = true;
            aiStatus.textContent = 'Thinking...';

            try {
                const response = await aiSession.prompt(text);
                appendChatMessage('ai', response);
                updateContextTracker();
            } catch(e) {
                console.error(e);
                appendChatMessage('ai', 'Sorry, I encountered an error generating the response.');
            } finally {
                chatInput.disabled = false;
                chatSubmit.disabled = false;
                chatInput.focus();
                aiStatus.textContent = 'Ready';
            }
        }

        function appendChatMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-message';

            let displayRole = 'Assistant';
            if (role === 'user') displayRole = 'You';
            if (role === 'system') displayRole = 'System';

            let colorStyle = '';
            if (role === 'system') colorStyle = 'opacity: 0.5; font-style: italic;';

            let renderedHtml = '';
            if (role === 'ai' && typeof marked !== 'undefined') {
                renderedHtml = marked.parse(text);
            } else {
                const escapedText = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                renderedHtml = escapedText.replace(/\n/g, '<br>');
            }

            msgDiv.innerHTML = `
                <div class="msg-role">${displayRole}</div>
                <div class="msg-text" style="${colorStyle}">${renderedHtml}</div>
            `;

            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        init();
    </script>
</body>
</html>
