title: "tk"
description: "caveat emptor"
author: Toni Kukurin

copyright: "Toni Kukurin"
mathjax: true

permalink: "/:title"
date_format: "%b %-d, %Y"

markdown: kramdown
mathjax: true

exclude: ["*.ipynb"]

collections:
  opera:
    output: true

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "opera"
    values:
      layout: "bare-app"
  - scope:
      path: ""
    values:
      layout: "default"

social:
  github: tkukurin
  twitter: tkukurin
  bluesky: tkukurin.bsky.social
  linkedin: toni

