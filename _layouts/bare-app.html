<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inconsolata:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/css/tufte.css' | relative_url }}">
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .topbar { flex-shrink: 0; padding: 0.8rem 1.2rem; border-bottom: 0.5px solid var(--rule); }
    .bare-app-content { flex: 1; display: flex; overflow: hidden; }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="mark" href="{{ '/' | relative_url }}">&larr; <em>W</em><span class="amp">&amp;</span><em>S</em> Index</a>
    <span class="post-meta">{{ page.title }}</span>
  </header>
  <div class="bare-app-content">
    {{ content }}
  </div>
</body>
</html>
