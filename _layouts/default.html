<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inconsolata:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/css/tufte.css' | relative_url }}">
  {% if site.mathjax %}
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  {% endif %}
</head>
<body>

<main class="shell">
  <header class="topbar">
    <a class="mark" href="{{ '/' | relative_url }}"><em>Wits</em> <span class="amp">&amp;</span> <em>scribbles</em></a>
    <nav class="nav">
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="is-here"{% endif %}>Index</a>
      <a href="{{ '/marginalia' | relative_url }}" {% if page.url == '/marginalia' or page.url == '/marginalia.html' %}class="is-here"{% endif %}>Marginalia</a>
      <a href="{{ '/impedimenta' | relative_url }}" {% if page.url == '/impedimenta' or page.url == '/impedimenta.html' %}class="is-here"{% endif %}>Workshop</a>
    </nav>
  </header>

  {{ content }}

  <footer class="foot">
    <div class="l">Colophon</div>
    <div class="r">
      <span>Set in <em>EB Garamond</em>. Kept by <a href="https://github.com/tkukurin">tkukurin</a>.</span>
      <span><a href="{{ '/impedimenta' | relative_url }}">Workshop</a></span>
    </div>
  </footer>
</main>

<script>
// Lift kramdown footnotes into sidenotes on wide screens
(function(){
  if (window.innerWidth < 900) return;
  var content = document.querySelector('.post-content');
  if (!content) return;
  var fnSection = content.querySelector('.footnotes');
  if (!fnSection) return;

  var refs = content.querySelectorAll('sup[role="doc-noteref"]');
  refs.forEach(function(ref) {
    var link = ref.querySelector('a');
    if (!link) return;
    var id = link.getAttribute('href').replace('#', '');
    var li = fnSection.querySelector('#' + id);
    if (!li) return;

    var note = document.createElement('span');
    note.className = 'footnote-sidenote';
    note.innerHTML = li.innerHTML.replace(/<a[^>]*class="reversefootnote"[^>]*>.*?<\/a>/g, '');

    var parent = ref.parentElement;
    if (parent) {
      parent.style.position = 'relative';
      parent.appendChild(note);
    }
  });

  fnSection.classList.add('footnotes-hidden');
})();
</script>
</body>
</html>
