<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inconsolata:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/css/tufte.css' | relative_url }}">
  {% if site.mathjax %}
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  {% endif %}
</head>
<body>

<main class="shell">
  {% unless page.url == '/' %}
  <header class="topbar">
    <a class="mark" href="{{ '/' | relative_url }}">← <em>W</em><span class="amp">&amp;</span><em>S</em> Index</a>
    {% if page.date %}<span class="post-meta">{{ page.date | date: "%-d %b %Y" }}{% if page.tags.size > 0 %} · <em>{{ page.tags | join: ", " }}</em>{% endif %}</span>{% endif %}
  </header>
  {% endunless %}

  {{ content }}

  <footer class="foot">
    <span>Set in <em>EB Garamond</em>. Kept by <a href="https://github.com/tkukurin">tkukurin</a>.</span>
    <a href="{{ '/impedimenta' | relative_url }}">Workshop</a>
  </footer>
</main>

<script>
// Lift kramdown footnotes into margin notes on wide screens.
// aside.fn-note positioned absolutely in the right margin of .post-content.
(function(){
  if (window.innerWidth < 900) return;
  var content = document.querySelector('.post-content');
  if (!content) return;
  var fnSection = content.querySelector('.footnotes');
  if (!fnSection) return;

  // Collect all footnote refs
  var refs = content.querySelectorAll('a[role="doc-noteref"], sup[role="doc-noteref"] a');
  var notes = [];

  refs.forEach(function(link, i) {
    var id = link.getAttribute('href').replace('#', '');
    var li = document.getElementById(id);
    if (!li) return;

    var note = document.createElement('aside');
    note.className = 'fn-note';
    note.innerHTML = '<span class="fn-num">' + (i + 1) + '.</span> ' +
      li.innerHTML.replace(/<a[^>]*class="reversefootnote"[^>]*>.*?<\/a>/g, '');

    // Append to .post-content; position absolutely relative to it.
    content.appendChild(note);

    // Align note top with the block element containing the ref.
    var block = link.closest('h1, h2, h3, h4, h5, h6, p, li, blockquote, pre') || link.parentElement;
    var top = block.offsetTop;

    notes.push({ el: note, idealTop: top });
  });

  // Resolve overlaps: push notes down if they'd collide.
  var gap = 6;
  for (var i = 0; i < notes.length; i++) {
    notes[i].el.style.top = notes[i].idealTop + 'px';
  }
  // Second pass: after rendering, fix collisions using actual heights.
  requestAnimationFrame(function(){
    var prevBottom = 0;
    for (var i = 0; i < notes.length; i++) {
      var el = notes[i].el;
      var currentTop = parseFloat(el.style.top);
      if (currentTop < prevBottom + gap) {
        currentTop = prevBottom + gap;
        el.style.top = currentTop + 'px';
      }
      prevBottom = currentTop + el.offsetHeight;
    }
  });

  fnSection.classList.add('footnotes-hidden');
})();
</script>
</body>
</html>
