<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inconsolata:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/css/tufte.css' | relative_url }}">
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; }
    main,main.shell {width:100%;max-width:100%;padding:0;margin:0} 
    .topbar { padding: 1rem; }
    .bare-frame {
      border: none;
      width: 100%;
      height: 100%;
    }
    .shell { display: flex; flex-direction: column; height: 100%; max-width: none; }
    .topbar + .bare-frame { flex: 1; }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <a class="mark" href="{{ '/' | relative_url }}">← <em>W</em><span class="amp">&amp;</span><em>S</em> Index</a>
      <span class="post-meta">{{ page.title }}</span>
    </header>
    <iframe class="bare-frame" srcdoc="{{ content | xml_escape }}"></iframe>
  </main>
</body>
</html>
